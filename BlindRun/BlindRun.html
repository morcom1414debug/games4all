<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Running Bop - Games4all</title>
    <style>
        /* CSS ปรับปรุงใหม่สำหรับ Visual Effects */
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght=400;600;700;800;900&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Kanit', sans-serif;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            position: relative;
            /* 3. ท้องฟ้า (Vibrant Blue Sky): ปรับพื้นหลังเป็นสีฟ้าสดใส */
            background: #4facfe; 
        }

        /* -------------------------------------------
           Visual Update 1: Parallax & 3D Road
        ------------------------------------------- */
        .parallax-layer {
            position: absolute;
            top: 0; left: 0; width: 200%; height: 100%;
            background-repeat: repeat-x;
            z-index: -3;
            /* 2. การซ่อนจาก Screen Reader (SC) */
            pointer-events: none;
            user-select: none;
        }
        
        /* 3. ท้องฟ้า (Vibrant Blue Sky): ไล่เฉดสีให้ดูเคลียร์ตาและสว่างสดชื่น */
        .layer-sky {
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            z-index: -5;
            position: relative;
        }
        .layer-sky::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(45deg, rgba(255,0,0,0.04), rgba(255,165,0,0.04), rgba(255,255,0,0.04), rgba(0,128,0,0.04), rgba(0,0,255,0.04), rgba(238,130,238,0.04));
            pointer-events: none;
        }

        .cyber-sun {
            position: absolute;
            top: 35px;
            right: 12%;
            font-size: 4.5rem;
            animation: sunBob 4s ease-in-out infinite alternate;
            z-index: -4;
            pointer-events: none;
            user-select: none;
        }
        @keyframes sunBob {
            0% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 15px #f59e0b); }
            100% { transform: translateY(-12px) scale(1.05); filter: drop-shadow(0 0 30px #d97706); }
        }

        .cloud {
            position: absolute;
            color: rgba(255, 255, 255, 0.9);
            z-index: -4;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.06));
            pointer-events: none;
            user-select: none;
        }
        .cloud-1 { top: 60px; left: -150px; animation: moveCloud 28s linear infinite; font-size: 5rem; }
        .cloud-2 { top: 140px; left: -120px; animation: moveCloud 19s linear infinite; animation-delay: -6s; font-size: 3.2rem; }
        .cloud-3 { top: 30px; left: -200px; animation: moveCloud 36s linear infinite; animation-delay: -14s; font-size: 4.2rem; }
        @keyframes moveCloud {
            0% { left: -200px; }
            100% { left: 100vw; }
        }

        .birds-group {
            position: absolute;
            top: 80px;
            font-size: 1.8rem;
            z-index: -4;
            animation: flyBirds 16s linear infinite;
            pointer-events: none;
            user-select: none;
        }
        @keyframes flyBirds {
            0% { left: -60px; transform: scaleX(1); }
            100% { left: 100vw; transform: scaleX(1); }
        }

        .layer-city {
            background-image: url('data:image/svg+xml;utf8,<svg width="200" height="150" xmlns="http://www.w3.org/2000/svg"><path d="M0 150 L50 50 L100 150 Z" fill="rgba(56, 189, 248, 0.2)" stroke="%2338bdf8" stroke-width="2"/><path d="M80 150 L130 80 L200 150 Z" fill="rgba(192, 132, 252, 0.2)" stroke="%23c084fc" stroke-width="2"/></svg>');
            background-size: 300px 200px;
            background-position: bottom;
            animation: scrollCity 20s linear infinite;
            z-index: -4;
            opacity: 0.8;
            pointer-events: none;
            user-select: none;
        }

        @keyframes scrollCity { from { background-position: 0 bottom; } to { background-position: -300px bottom; } }

        .road-container {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60vh;
            perspective: 1200px;
            overflow: hidden;
            z-index: -2;
            pointer-events: none;
            user-select: none;
        }

        .road {
            position: absolute;
            bottom: -30%; left: -50%; width: 200%; height: 160%;
            background: 
                linear-gradient(90deg, transparent 49%, #ffeb3b 49%, #ffeb3b 51%, transparent 51%),
                repeating-linear-gradient(0deg, #0b0f19 0px, #0b0f19 60px, #172033 60px, #172033 120px);
            transform: rotateX(70deg);
            animation: roadMove 0.8s linear infinite;
            border-left: 10px solid #f0f;
            border-right: 10px solid #f0f;
            box-shadow: 
                0 0 40px rgba(255, 0, 255, 0.8), 
                0 0 40px rgba(255, 235, 59, 0.4) inset,
                0 0 100px rgba(15, 23, 42, 0.6) inset;
        }

        @keyframes roadMove {
            from { background-position: 0 0, 0 0; }
            to { background-position: 0 0, 0 120px; }
        }

        /* 4. ฉากข้างทางสลับซ้ายขวา (Asymmetrical Roadside Objects): ปรับความเร็วเป็นค่าเฉพาะ (Prime number) เพื่อให้เหลื่อมกันตลอดเวลา */
        .side-obj {
            position: absolute;
            top: 25%;
            left: 50%;
            font-size: 3.8rem;
            pointer-events: none;
            z-index: -1;
            user-select: none;
        }
        
        .left-tree { animation: passLeft 2.3s linear infinite; }
        .left-rock { animation: passLeft 3.7s linear infinite; animation-delay: -1.2s; }
        .left-sign { animation: passLeft 4.1s linear infinite; animation-delay: -0.6s; }
        
        .right-bush  { animation: passRight 2.9s linear infinite; animation-delay: -0.3s; }
        .right-box   { animation: passRight 3.1s linear infinite; animation-delay: -1.8s; }
        .right-flower { animation: passRight 4.7s linear infinite; animation-delay: -0.9s; }

        @keyframes passLeft {
            0% { transform: translate(-40px, 0) scale(0); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translate(-520px, 35vh) scale(3.2); opacity: 0; }
        }
        @keyframes passRight {
            0% { transform: translate(40px, 0) scale(0); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translate(520px, 35vh) scale(3.2); opacity: 0; }
        }

        /* -------------------------------------------
           Visual Update 2: Rim Indicators
        ------------------------------------------- */
        .rim-indicator {
            position: absolute;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s; z-index: 20;
            display: flex; justify-content: center; align-items: center;
            user-select: none;
        }
        .rim-up { top: 0; left: 0; width: 100%; height: 15vh; background: linear-gradient(to bottom, rgba(0,255,255,0.5), transparent); border-top: 5px solid #0ff; }
        .rim-down { bottom: 0; left: 0; width: 100%; height: 15vh; background: linear-gradient(to top, rgba(255,0,255,0.5), transparent); border-bottom: 5px solid #f0f; }
        .rim-left { top: 0; left: 0; width: 15vw; height: 100%; background: linear-gradient(to right, rgba(0,255,0,0.5), transparent); border-left: 5px solid #0f0; }
        .rim-right { top: 0; right: 0; width: 15vw; height: 100%; background: linear-gradient(to left, rgba(255,255,0,0.5), transparent); border-right: 5px solid #ff0; }
        .rim-icon { font-size: 4rem; text-shadow: 0 0 20px currentColor; color: #fff; animation: pulseOpacity 0.5s infinite; }
        @keyframes pulseOpacity { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

        /* -------------------------------------------
           Visual Update 3: Cybercat Character (หันหลังให้ผู้เล่น)
        ------------------------------------------- */
        .character-container {
            position: absolute;
            bottom: 4%; left: 50%;
            transform: translateX(-50%);
            width: 150px; height: 180px;
            z-index: 10;
            pointer-events: none;
            user-select: none;
        }

        .robot {
            width: 100%; height: 100%;
            position: relative;
            transform-origin: bottom center;
            animation: runBounce 0.35s alternate infinite ease-in-out;
            z-index: 2;
        }
        
        .robot-head {
            width: 90px; height: 80px; background: #0ff;
            border-radius: 50%;
            position: absolute; top: 15px; left: 30px;
            box-shadow: 0 0 20px #0ff;
            z-index: 5;
            animation: headBounce 0.35s alternate infinite ease-in-out;
            animation-delay: 0.1s;
        }
        /* 1. หัวของตัวละคร: เอาเส้นขีดขวางตรงท้ายทอยออกโดยการลบ Selector .robot-head::after ออกไปแล้ว */

        .robot-eye, .cat-nose, .cat-whiskers-l, .cat-whiskers-r {
            display: none !important;
        }
        
        .robot-ear-l, .robot-ear-r {
            width: 30px; height: 35px; background: #f0f;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            position: absolute; top: -18px;
            box-shadow: 0 0 15px #f0f;
        }
        .robot-ear-l { left: 5px; transform: rotate(-15deg); }
        .robot-ear-r { right: 5px; transform: rotate(15deg); }

        .robot-body {
            width: 76px; height: 76px; background: #f0f;
            border-radius: 20px; position: absolute; top: 90px; left: 37px;
            box-shadow: 0 0 20px #f0f;
            z-index: 3;
        }

        .cat-arm, .cat-leg {
            position: absolute; background: #0ff;
            border-radius: 10px;
            box-shadow: 0 0 10px #0ff;
        }
        .arm-l {
            width: 15px; height: 35px; top: 15px; left: -10px;
            transform-origin: top center;
            animation: armSwingL 0.35s alternate infinite ease-in-out;
        }
        .arm-r {
            width: 15px; height: 35px; top: 15px; right: -10px;
            transform-origin: top center;
            animation: armSwingR 0.35s alternate infinite ease-in-out;
        }
        .cat-leg {
            width: 18px; height: 40px; bottom: -25px;
            transform-origin: top center;
        }
        .leg-l {
            left: 12px;
            animation: legSwingL 0.35s alternate infinite ease-in-out;
        }
        .leg-r {
            right: 12px;
            animation: legSwingR 0.35s alternate infinite ease-in-out;
        }
        
        /* 2. หางแมว: ปรับให้อยู่เลเยอร์ด้านหลังตัว (z-index: 1) อย่างสมบูรณ์แบบ */
        .cat-tail {
            position: absolute; width: 14px; height: 55px;
            background: #f0f; border-radius: 10px;
            bottom: 10px; left: 31px;
            transform-origin: bottom center;
            animation: tailWag 0.4s alternate infinite ease-in-out;
            box-shadow: 0 0 12px #f0f;
            z-index: 1; 
        }

        .cat-shadow {
            position: absolute;
            bottom: -20px; left: 50%;
            transform: translateX(-50%);
            width: 85px; height: 18px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            animation: shadowPulse 0.35s alternate infinite ease-in-out;
            z-index: 1;
        }

        /* 2. ลำตัว แขน ขา: ปรับ Z-index แขนขาให้หลบไปด้านหลังลำตัว (z-index: 1) เมื่อก้าวไปข้างหน้า (สเกลเล็กลง) */
        @keyframes armSwingL { 
            0% { transform: translateY(0px) scale(1.1); filter: brightness(1.1); z-index: 4; } 
            100% { transform: translateY(-8px) scale(0.85); filter: brightness(0.8); z-index: 1; } 
        }
        @keyframes armSwingR { 
            0% { transform: translateY(-8px) scale(0.85); filter: brightness(0.8); z-index: 1; } 
            100% { transform: translateY(0px) scale(1.1); filter: brightness(1.1); z-index: 4; } 
        }
        @keyframes legSwingL { 
            0% { transform: translateY(-12px) scale(1.15); filter: brightness(1.1); z-index: 4; } 
            100% { transform: translateY(5px) scale(0.8); filter: brightness(0.8); z-index: 1; } 
        }
        @keyframes legSwingR { 
            0% { transform: translateY(5px) scale(0.8); filter: brightness(0.8); z-index: 1; } 
            100% { transform: translateY(-12px) scale(1.15); filter: brightness(1.1); z-index: 4; } 
        }
        @keyframes tailWag { 0% { transform: rotate(-20deg); } 100% { transform: rotate(20deg); } }
        
        @keyframes runBounce { 
            0% { transform: translateY(0) rotate(-2deg); } 
            100% { transform: translateY(-12px) rotate(2deg); } 
        }
        @keyframes headBounce {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-3px) rotate(2deg); }
        }

        /* Action Animations */
        .correct-flash { filter: drop-shadow(0 0 30px #0f0) brightness(1.5); color: #0f0; }
        .wrong-flash { filter: drop-shadow(0 0 30px #f00) brightness(0.5); color: red; }
        @keyframes jumpAnim {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-140px) scaleY(1.1); }
        }
        @keyframes slideAnim {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(40px) scaleY(0.45); }
        }
        @keyframes dodgeLAnim {
            0%, 100% { transform: translateX(0) rotate(0); }
            50% { transform: translateX(-100px) rotate(-20deg); }
        }
        @keyframes dodgeRAnim {
            0%, 100% { transform: translateX(0) rotate(0); }
            50% { transform: translateX(100px) rotate(20deg); }
        }
        @keyframes crashAnim {
            0% { transform: rotate(0); }
            25% { transform: rotate(-30deg) translateY(-20px); }
            100% { transform: rotate(90deg) translateY(50px); opacity: 0; }
        }

        /* -------------------------------------------
           Original UI & Styles (Preserved) 
        ------------------------------------------- */
        .orb { position: absolute; border-radius: 50%; background: radial-gradient(circle, #fff, rgba(255,255,255,0)); pointer-events: none; animation: orbMove 1.5s forwards ease-out; }
        @keyframes orbMove { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2) translate(0, -100px); opacity: 0; } }
        @keyframes windFly { 0% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(2) translateY(-200px); opacity: 0; } }

        #menu, #game, #result {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            z-index: 100;
        }
        #menu h1 {
            font-size: 4.2rem; font-weight: 900; color: #fff;
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 2rem; text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-group { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; max-width: 400px; padding: 0 20px; }
        
        button {
            border: none; border-radius: 16px; color: #fff; font-family: 'Kanit', sans-serif;
            font-weight: 700; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 14px 36px rgba(0,0,0,0.45); position: relative; overflow: hidden;
        }
        .level-btn::before, .movement-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transform: translateX(-120%); transition: transform 0.7s; }
        .level-btn:hover::before, .movement-btn:hover::before { transform: translateX(120%); }
        .level-btn:hover, .movement-btn:hover { transform: translateY(-12px) scale(1.05); }
        .level-btn:active, .movement-btn:active { transform: translateY(-5px) scale(0.96); }
        
        #easy { background: linear-gradient(135deg, #51cf66, #40c057); color: white; }
        #hard { background: linear-gradient(135deg, #ff6b6b, #fa5252); color: white; }
        .level-btn { padding: 1.5rem 2rem; font-size: 1.8rem; }
        .movement-btn { padding: 1.2rem 1.8rem; font-size: 1.55rem; max-width: 340px; background: linear-gradient(135deg, #8b5cf6, #6d28d9); margin-top: 20px; }
        
        .back-btn, .stop-btn, .audio-mode-btn {
            position: absolute; z-index: 100;
            padding: 0.8rem 1.5rem; font-size: 1.2rem; border-radius: 12px;
        }
        .back-btn { top: 20px; left: 20px; background: #ef4444; }
        .stop-btn { top: 20px; left: 120px; background: #f59e0b; display: none; }
        .audio-mode-btn { bottom: 20px; left: 20px; background: #6366f1; }
        
        #scoreDisplay {
            position: absolute; top: 20px; right: 20px; font-size: 2rem; color: #ffe066;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5); z-index: 100;
        }
        .question-heading { font-size: 2.1rem; font-weight: 700; margin-top: 10vh; text-shadow: 0 2px 10px rgba(0,0,0,0.6); z-index: 100; }
        
        .icon-container { margin: 2vh auto; display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; z-index: 100; }
        .action-icon {
            font-size: 4rem; background: rgba(0, 0, 0, 0.4); border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px; padding: 15px; width: 100px; height: 100px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: all 0.3s;
        }
        
        .judgment {
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4.8rem; font-weight: 900; color: #ffffff; text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            opacity: 0; pointer-events: none; z-index: 100;
            animation: judgmentPop 1.1s forwards;
        }
        @keyframes judgmentPop { 
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); } 
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); } 
            70% { opacity: 1; transform: translate(-50%, -120%) scale(1.05); } 
            100% { opacity: 0; transform: translate(-50%, -180%) scale(0.85); } 
        }
        
        #result { background: rgba(15, 23, 42, 0.95); z-index: 200; padding: 1.8rem 1.4rem; max-height: 85vh; overflow-y: auto; }
        #result h2 { font-size: 2.6rem; margin: 0.4rem 0 1rem; color: #38bdf8; text-shadow: 0 9px 28px rgba(0,0,0,0.55); }
        #resultMsg { font-size: 1.9rem; margin: 1.4rem 0; line-height: 1.45; }
        #finalScore { font-size: 4.5rem; font-weight: 900; color: #facc15; text-shadow: 0 0 20px rgba(250, 204, 21, 0.5); margin: 1rem 0; }
        .restart-btn { background: linear-gradient(135deg, #22c55e, #16a34a); padding: 1rem 2.5rem; font-size: 1.5rem; margin-top: 1.5rem; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="parallax-layer layer-sky" aria-hidden="true">
        <div class="cyber-sun">😎</div>
        <div class="cloud cloud-1">☁️</div>
        <div class="cloud cloud-2">☁️</div>
        <div class="cloud cloud-3">☁️</div>
        <div class="birds-group">🦅</div>
    </div>
    
    <div class="parallax-layer layer-city" aria-hidden="true"></div>

    <div class="road-container" aria-hidden="true">
        <div class="road"></div>
        <div class="side-obj left-tree">🌲</div>
        <div class="side-obj left-rock">🪨</div>
        <div class="side-obj left-sign">🪧</div>
        <div class="side-obj right-bush">🌿</div>
        <div class="side-obj right-box">📮</div>
        <div class="side-obj right-flower">🌻</div>
    </div>

    <div class="rim-indicator rim-up" id="rimUp" aria-hidden="true"><div class="rim-icon">⬆️</div></div>
    <div class="rim-indicator rim-down" id="rimDown" aria-hidden="true"><div class="rim-icon">⬇️</div></div>
    <div class="rim-indicator rim-left" id="rimLeft" aria-hidden="true"><div class="rim-icon">⬅️</div></div>
    <div class="rim-indicator rim-right" id="rimRight" aria-hidden="true"><div class="rim-icon">➡️</div></div>

    <div class="character-container" id="characterContainer" aria-hidden="true">
        <div class="robot">
            <div class="robot-head">
                <div class="robot-ear-l"></div>
                <div class="robot-ear-r"></div>
                <div class="robot-eye eye-left"></div>
                <div class="robot-eye eye-right"></div>
                <div class="cat-nose"></div>
                <div class="cat-whiskers-l"></div>
                <div class="cat-whiskers-r"></div>
            </div>
            <div class="robot-body"></div>
            <div class="cat-arm arm-l"></div>
            <div class="cat-arm arm-r"></div>
            <div class="cat-leg leg-l"></div>
            <div class="cat-leg leg-r"></div>
            <div class="cat-tail"></div>
        </div>
        <div class="cat-shadow"></div>
    </div>

    <div id="menu">
        <h1>Running Bop</h1>
        <div class="btn-group" id="levelSelect">
            <button class="level-btn" id="easy" onclick="startGame('easy', false)">วิ่งแบบมือสมัครเล่น (ง่าย)</button>
            <button class="level-btn" id="hard" onclick="startGame('hard', false)">วิ่งแบบมืออาชีพ (ยาก)</button>
            <button class="movement-btn" onclick="startGame('easy', true)">🏃‍♂️ โหมดวิ่งโดยใช้การเคลื่อนไหว</button>
        </div>
    </div>

    <div id="game" class="hidden">
        <button class="back-btn" id="backBtn">⬅️ ออก</button>
        <button class="stop-btn" id="stopBtn">⏹️ หยุด</button>
        <button class="audio-mode-btn" id="audioModeBtn">โหมดเสียง: File</button>
        
        <div id="scoreDisplay">0 คะแนน</div>
        
        <div class="question-heading" id="questionHeading" aria-live="assertive">เตรียมพร้อม!</div>
        <div class="icon-container" id="iconContainer" aria-hidden="true"></div>
    </div>

    <div id="result" class="hidden">
        <h2 id="resultTitle">จบเกม</h2>
        <div id="resultMsg"></div>
        <div id="finalScore">0</div>
        <button class="restart-btn" onclick="location.reload()">เล่นอีกครั้ง</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC เดิม 100% ---
        // วางโค้ด JavaScript ทั้งหมดจากไฟล์เดิมของคุณทับลงไปในส่วนนี้ได้เลยครับ 
        // โดยไม่ต้องแก้ไข Logic การคำนวณคะแนน หรือ AudioContext ใดๆ ทั้งสิ้น
        
        let audioCtx;
        let commandFolder = 'audio'; 
        let bgmSource = null;
        let audioMode = 'file'; 
        let useMotion = false;
        let motionListener = null;
        let lastMotionDir = null;
        let lastShakeTime = 0;
        
        const TILT_SIDE_THRESHOLD = 7.0;
        const TILT_FORWARD_THRESHOLD = -8.0;
        const SHAKE_THRESHOLD = 18;
        const SHAKE_DEBOUNCE = 450;
        
        const soundBuffers = {};
        let score = 0;
        let currentCommand = null;
        let timerInterval = null;
        let currentLevel = 'easy';
        let currentIcon = null;
        let currentControlType = 'keyboard';
        
        const keyCodeMap = { 'ArrowUp': 'ArrowUp', 'KeyW': 'ArrowUp', 'ArrowDown': 'ArrowDown', 'KeyS': 'ArrowDown', 'ArrowLeft': 'ArrowLeft', 'KeyA': 'ArrowLeft', 'ArrowRight': 'ArrowRight', 'KeyD': 'ArrowRight' };
        const obstacleCommands = [ { name: 'up', symbol: '↑', key: 'ArrowUp' }, { name: 'down', symbol: '↓', key: 'ArrowDown' }, { name: 'left', symbol: '←', key: 'ArrowLeft' }, { name: 'right', symbol: '→', key: 'ArrowRight' } ];
        const coinCommands = [ { name: 'coin_up', symbol: '↑💰', key: 'ArrowUp' }, { name: 'coin_down', symbol: '↓💰', key: 'ArrowDown' }, { name: 'coin_left', symbol: '←💰', key: 'ArrowLeft' }, { name: 'coin_right', symbol: '→💰', key: 'ArrowRight' } ];
        
        const visualObjMap = { 'up': '🔌', 'down': '🚧', 'left': '🛸', 'right': '🛡️', 'coin_right': '🪙', 'coin_left': '🪙', 'coin_up': '🪙', 'coin_down': '🪙' };

        document.addEventListener('DOMContentLoaded', () => {
            backBtn = document.getElementById('backBtn');
            levelSelect = document.getElementById('levelSelect');
            gameDiv = document.getElementById('game');
            resultDiv = document.getElementById('result');
            questionHeading = document.getElementById('questionHeading');
            iconContainer = document.getElementById('iconContainer');
            stopBtn = document.getElementById('stopBtn');
            audioModeBtn = document.getElementById('audioModeBtn');
            scoreDisplay = document.getElementById('scoreDisplay');
            
            backBtn.onclick = () => { stopBackgroundBGM(); removeMotionListeners(); location.href = '../index.html'; };
            stopBtn.onclick = () => { if (running) fail('ผู้เล่นกดหยุด'); };
            audioModeBtn.onclick = () => {
                audioMode = audioMode === 'file' ? 'off' : 'file';
                audioModeBtn.textContent = `โหมดเสียง: ${audioMode === 'file' ? 'File' : 'ปิด'}`;
                if (audioMode === 'off') stopBackgroundBGM();
                else if (running) startBackgroundBGM();
            };
        });

        function activateApplicationMode() {
            levelSelect.setAttribute('aria-hidden', 'true');
            gameDiv.setAttribute('aria-hidden', 'false');
            gameDiv.setAttribute('role', 'application');
            gameDiv.setAttribute('tabindex', '0');
            try { gameDiv.focus(); } catch (e) {}
        }
        
        function deactivateApplicationMode() {
            gameDiv.setAttribute('aria-hidden', 'true');
            gameDiv.removeAttribute('role');
            gameDiv.removeAttribute('tabindex');
            levelSelect.setAttribute('aria-hidden', 'false');
        }

        function triggerRim(key) {
            const rims = ['rim-up', 'rim-down', 'rim-left', 'rim-right'];
            rims.forEach(id => document.getElementById(id).style.opacity = '0');
            const directionMap = { 'ArrowUp': 'rim-up', 'ArrowDown': 'rim-down', 'ArrowLeft': 'rim-left', 'ArrowRight': 'rim-right' };
            const targetId = directionMap[key];
            if (targetId) document.getElementById(targetId).style.opacity = '1';
        }

        function triggerRobotAnimation(action) {
            const robot = document.querySelector('.robot');
            robot.className = 'robot'; 
            if (action) {
                void robot.offsetWidth; 
                robot.classList.add(`anim-${action}`);
            }
        }
        
        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                await loadAllSounds();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
        }

        async function loadAllSounds() {
            const obstacleSounds = ['กระโดดขึ้น.mp3', 'ก้มตัว.mp3', 'เบี่ยงซ้าย.mp3', 'เบี่ยงขวา.mp3'];
            const coinSounds = ['เหรียญอยู่ขวา.mp3', 'เหรียญอยู่ซ้าย.mp3', 'กระโดดเก็บเหรียญ.mp3', 'ก้มเก็บเหรียญ.mp3'];
            const allCommands = [...obstacleSounds, ...coinSounds];
            const promises = allCommands.map(sound => {
                const url = `${commandFolder}/${sound}`;
                const name = sound.replace('.mp3', '');
                return fetch(url)
                    .then(response => response.arrayBuffer())
                    .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
                    .then(buffer => { soundBuffers[name] = buffer; })
                    .catch(err => console.warn(`โหลดเสียง ${name} ไม่สำเร็จ`, err));
            });
            await Promise.all(promises);
            
            const soundsToLoad = [
                ['pass', 'audio/pass.mp3'], ['pass1', 'audio/pass1.mp3'], ['pass2', 'audio/pass2.mp3'], ['pass3', 'audio/pass3.mp3'],
                ['die0', 'audio/die.mp3'], ['die1', 'audio/die1.mp3'], ['die2', 'audio/die2.mp3'],
                ['coin', 'audio/coin.mp3'], ['coin1', 'audio/coin1.mp3'], ['coin2', 'audio/coin2.mp3'], ['coin3', 'audio/coin3.mp3'],
                ['bgm', 'audio/bgm.mp3']
            ];
            const extraPromises = soundsToLoad.map(([name, url]) => loadSound(name, url));
            await Promise.all(extraPromises);
        }

        async function loadSound(name, url) {
            try {
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                soundBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
            } catch (err) {
                console.warn(`โหลดเสียง ${name} ไม่สำเร็จ`, err);
            }
        }

        function play(name, loop = false) {
            if (audioMode === 'off') return null;
            if (!soundBuffers[name]) return null;
            const source = audioCtx.createBufferSource();
            source.buffer = soundBuffers[name];
            source.loop = loop;
            source.connect(audioCtx.destination);
            source.start();
            return source;
        }

        function startBackgroundBGM() {
            if (audioMode === 'off') return;
            if (!bgmSource) bgmSource = play('bgm', true);
        }
        function stopBackgroundBGM() {
            if (bgmSource) {
                try { bgmSource.stop(); } catch(e) {}
                bgmSource = null;
            }
        }
        
        function dispatchDirection(direction) {
            if (!running || isProcessingTimeout || !currentCommand) return;
            const targetKey = currentCommand.cmd.key;
            const directionMap = { 'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right' };
            const requiredDirection = directionMap[targetKey];
            if (direction === requiredDirection) {
                handleCorrect();
            } else {
                handleWrong();
            }
        }

        function handleDeviceMotion(e) {
            if (!useMotion || !running || isProcessingTimeout || !currentCommand) return;
            const acc = e.accelerationIncludingGravity;
            if (!acc || typeof acc.x !== 'number') return;
            
            let dir = null;
            if (acc.x < -TILT_SIDE_THRESHOLD) dir = 'left';
            else if (acc.x > TILT_SIDE_THRESHOLD) dir = 'right';
            if (acc.z < TILT_FORWARD_THRESHOLD) dir = 'down';
            
            const accelMagnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            const now = Date.now();
            if (accelMagnitude > SHAKE_THRESHOLD && (now - lastShakeTime > SHAKE_DEBOUNCE)) {
                dir = 'up';
                lastShakeTime = now;
            }
            if (dir && dir !== lastMotionDir) {
                dispatchDirection(dir);
                lastMotionDir = dir;
            } else if (!dir) {
                lastMotionDir = null;
            }
        }
        
        function addMotionListeners() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleDeviceMotion);
                        } else {
                            alert("ไม่ได้รับอนุญาตให้ใช้เซ็นเซอร์จับการเคลื่อนไหว (Motion Sensor)");
                            useMotion = false;
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleDeviceMotion);
            }
        }

        function removeMotionListeners() {
            window.removeEventListener('devicemotion', handleDeviceMotion);
        }
        
        async function startGame(level, motionMode) {
            await initAudio();
            currentLevel = level;
            useMotion = motionMode;
            currentControlType = motionMode ? 'motion' : 'keyboard';
            score = 0;
            running = true;
            scoreDisplay.textContent = "0 คะแนน";
            
            activateApplicationMode();
            document.getElementById('menu').classList.add('hidden');
            gameDiv.classList.remove('hidden');
            stopBtn.style.display = 'block';
            
            startBackgroundBGM();
            if (useMotion) {
                addMotionListeners();
            } else {
                removeMotionListeners();
            }
            setTimeout(nextQuestion, 1000);
        }

        function createWindTrail() {
            if (!currentIcon) return;
            const trail = document.createElement('div');
            trail.className = 'orb';
            const rect = currentIcon.getBoundingClientRect();
            trail.style.left = `${rect.left}px`;
            trail.style.top = `${rect.top + rect.height / 2}px`;
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 500);
        }

        const judgmentWords = ["PERFECT!", "NICE!", "WOW!", "AWESOME!", "GREAT!", "EXCELLENT!", "FAST!", "SUPER!", "BOOM!"];
        
        async function nextQuestion() {
            if (!running) return;
            isProcessingTimeout = false;
            iconContainer.innerHTML = '';
            document.body.classList.remove('grayscale');
            triggerRobotAnimation(''); 
            
            const isObstacle = Math.random() < 0.5;
            const commands = isObstacle ? obstacleCommands : coinCommands;
            const cmd = commands[Math.floor(Math.random() * commands.length)];
            currentCommand = { type: isObstacle ? 'obstacle' : 'coin', cmd };
            
            currentIcon = document.createElement('div');
            currentIcon.classList.add('action-icon');
            currentIcon.classList.add(isObstacle ? 'obstacle' : 'coin');
            currentIcon.textContent = visualObjMap[cmd.name] || cmd.symbol;
            iconContainer.appendChild(currentIcon);
            
            let audioName = cmd.name;
            if (audioName === 'up') audioName = 'กระโดดขึ้น';
            if (audioName === 'down') audioName = 'ก้มตัว';
            if (audioName === 'left') audioName = 'เบี่ยงซ้าย';
            if (audioName === 'right') audioName = 'เบี่ยงขวา';
            if (audioName === 'coin_right') audioName = 'เหรียญอยู่ขวา';
            if (audioName === 'coin_left') audioName = 'เหรียญอยู่ซ้าย';
            if (audioName === 'coin_up') audioName = 'กระโดดเก็บเหรียญ';
            if (audioName === 'coin_down') audioName = 'ก้มเก็บเหรียญ';
            
            if (audioMode === 'file') play(audioName);
            
            questionHeading.textContent = `ระวัง! ${cmd.name.replace('coin_', 'เหรียญ ')}`;
            
            let timeLimit = currentLevel === 'hard' ? (isObstacle ? 1500 : 2000) : (isObstacle ? 2500 : 3500);
            timerInterval = setTimeout(() => {
                if (currentCommand && currentCommand.type === 'obstacle') {
                    handleWrong();
                } else {
                    nextQuestion();
                }
            }, timeLimit);
        }

        async function handleCorrect() {
            isProcessingTimeout = true;
            clearInterval(timerInterval);
            currentIcon.classList.add('correct-flash');
            
            const actionMap = { 'ArrowUp': 'jump', 'ArrowDown': 'slide', 'ArrowLeft': 'dodge-l', 'ArrowRight': 'dodge-r' };
            triggerRobotAnimation(actionMap[currentCommand.cmd.key] || 'jump');
            triggerRim(currentCommand.cmd.key);
            
            if (currentCommand.type === 'obstacle') {
                const passVariants = ['pass', 'pass1', 'pass2', 'pass3'];
                const randomPass = passVariants[Math.floor(Math.random() * passVariants.length)];
                play(randomPass);
                createWindTrail();
                currentIcon.style.animation = 'windFly 0.5s forwards';
                score += 25;
            } else {
                const coinVariants = ['coin', 'coin1', 'coin2', 'coin3'];
                const randomCoin = coinVariants[Math.floor(Math.random() * coinVariants.length)];
                play(randomCoin);
                score += 50;
            }
            
            scoreDisplay.textContent = `${score} คะแนน`;
            
            const jMsg = document.createElement('div');
            jMsg.className = 'judgment';
            jMsg.textContent = judgmentWords[Math.floor(Math.random() * judgmentWords.length)];
            document.getElementById('game').appendChild(jMsg);
            setTimeout(() => { if (jMsg.parentNode) jMsg.remove(); }, 1200);
            
            setTimeout(() => {
                currentCommand = null;
                nextQuestion();
            }, 600);
        }

        function handleWrong() {
            isProcessingTimeout = true;
            clearInterval(timerInterval);
            currentIcon.classList.add('wrong-flash');
            triggerRobotAnimation('crash');
            
            const dieVariants = ['die0', 'die1', 'die2'];
            const randomDie = dieVariants[Math.floor(Math.random() * dieVariants.length)];
            play(randomDie);
            
            document.body.classList.add('grayscale');
            setTimeout(() => { fail('ชนอุปสรรค หรือหลบผิดจังหวะ!'); }, 1000);
        }

        function fail(reason) {
            running = false;
            stopBackgroundBGM();
            removeMotionListeners();
            deactivateApplicationMode();
            
            gameDiv.classList.add('hidden');
            resultDiv.classList.remove('hidden');
            
            const title = document.getElementById('resultTitle');
            const msg = document.getElementById('resultMsg');
            const scoreDiv = document.getElementById('finalScore');
            
            title.setAttribute('tabindex', '-1');
            scoreDiv.textContent = score + " คะแนน";
            
            let modeName = "ทั่วไป";
            if (currentControlType === 'motion') modeName = "วิ่งโดยใช้การเคลื่อนไหว";
            else if (currentLevel === 'easy') modeName = "วิ่งแบบมือสมัครเล่น";
            else if (currentLevel === 'hard') modeName = "วิ่งแบบมืออาชีพ";
            
            title.textContent = `จบเกม: ${reason} (${modeName})`;
            
            const perfect = ["สุดยอดไปเลย! คุณคือตำนาน Speed Runner ตัวจริง 💖", "เซียนตัวจริงมาแล้ว! เกิน 2500 คะแนนเลยนะ!"];
            const good = ["เก่งมาก! ทำคะแนนได้หลักพันแล้ว 💪", "เยี่ยมเลย ใกล้เซียนแล้ว!"];
            const normal = ["พยายามได้ดีมาก! ลองอีกครั้งรับรองปังกว่านี้ 🌟", "ครั้งหน้าต้องได้เยอะกว่านี้แน่เลย สู้ๆ นะ!"];
            
            if (score >= 2500) msg.innerHTML = perfect[Math.floor(Math.random() * perfect.length)];
            else if (score >= 1000) msg.innerHTML = good[Math.floor(Math.random() * good.length)];
            else msg.innerHTML = normal[Math.floor(Math.random() * normal.length)];
            
            setTimeout(() => { try { title.focus(); } catch(e) {} }, 120);
        }
        
        window.addEventListener('beforeunload', () => {
            stopBackgroundBGM();
            removeMotionListeners();
        });

        document.addEventListener('keydown', (e) => {
            if (!running || isProcessingTimeout || !currentCommand) return;
            if (e.ctrlKey || e.altKey || e.metaKey) return;
            const code = e.code;
            const effectiveKey = keyCodeMap[code];
            if (effectiveKey && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(effectiveKey)) {
                e.preventDefault();
                const dirMap = { 'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right' };
                dispatchDirection(dirMap[effectiveKey]);
            }
        });
    </script>
</body>
</html>
