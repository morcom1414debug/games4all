<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Fighter - ศึกจ้าวนักคำนวณ</title>
    <style>
        :root {
            --player-color: #00ffcc;
            --bot-color: #ff3300;
            --bg-dark: #1a1a1a;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --combo-color: #ffcc00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: fixed;
            width: 100%;
        }

        #game-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            max-height: 600px;
            position: relative;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            border: 4px solid #444;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            transition: filter 2s ease-in-out, box-shadow 1s ease-out;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            font-size: 2.5rem;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
            animation: particleAnim 2.5s ease-out forwards;
        }

        @keyframes particleAnim {
            0% { transform: translateY(0) rotate(0deg) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { transform: translateY(var(--move-y)) rotate(var(--rot)) scale(1); opacity: 0; }
        }

        .damage-popup {
            position: absolute;
            font-size: 2.5rem;
            font-weight: bold;
            font-style: italic;
            pointer-events: none;
            z-index: 50;
            text-shadow: 2px 2px 0px #000, -2px -2px 0px #000;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-150px) scale(1); opacity: 0; }
        }

        .animate-damage { animation: floatUp 1s ease-out forwards; }

        .damage-critical {
            font-size: 4rem;
            color: #fff !important;
            text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff6600 !important;
            animation: criticalFloat 1.2s ease-out forwards !important;
        }

        @keyframes criticalFloat {
            0% { transform: scale(0.3) rotate(-20deg); opacity: 0; }
            20% { transform: scale(1.5) rotate(10deg); opacity: 1; }
            100% { transform: translateY(-200px) scale(1); opacity: 0; }
        }

        @keyframes screen-shake-heavy {
            0% { transform: translate(0,0); }
            25% { transform: translate(-10px, 10px); }
            50% { transform: translate(10px, -10px); }
            75% { transform: translate(-10px, -10px); }
            100% { transform: translate(0,0); }
        }
        .shake-heavy { animation: screen-shake-heavy 0.5s ease-in-out; }

        .victory-aura { filter: drop-shadow(0 0 20px #ffcc00) brightness(1.5); transform: scale(1.3); transition: all 1s ease-out; }
        .game-over-filter { filter: grayscale(1) contrast(1.2); }
        .final-msg-anim { animation: titlePop 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        @keyframes titlePop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1.2); opacity: 1; } }

        .game-icon { width: 100%; height: 100%; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        @keyframes idleMove { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .idle { animation: idleMove 2.5s ease-in-out infinite; }
        .delay-idle { animation-delay: 1.2s; }
        @keyframes attack-right { 0% { transform: translateX(0); } 30% { transform: translateX(50px) scale(1.2); filter: brightness(1.5); } 100% { transform: translateX(0); } }
        .p-attack { animation: attack-right 0.4s ease-out !important; }
        @keyframes attack-left { 0% { transform: translateX(0); } 30% { transform: translateX(-50px) scale(1.2); filter: brightness(1.5); } 100% { transform: translateX(0); } }
        .c-attack { animation: attack-left 0.4s ease-out !important; }
        @keyframes is-hit { 0%, 100% { transform: scale(1); filter: none; } 20% { transform: scale(0.9) rotate(-10deg); filter: drop-shadow(0 0 20px red) brightness(2); } 50% { transform: scale(1.1) rotate(10deg); } }
        .hit-effect { animation: is-hit 0.4s ease-out !important; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake-anim { animation: shake 0.2s ease-in-out 2; }

        #start-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px;
        }

        .title {
            font-size: 5rem; text-transform: uppercase; font-style: italic;
            background: linear-gradient(to bottom, #fff 20%, #ffcc00 50%, #ff6600 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(5px 5px 0px #000); margin-bottom: 20px; outline: none;
        }

        .btn-start {
            padding: 15px 40px; font-size: 1.5rem; background: #ffcc00; border: none; cursor: pointer; font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: all 0.2s;
        }

        #battle-arena { display: none; padding: 15px; flex-direction: column; height: 100%; }
        .battle-layout { display: flex; justify-content: space-between; align-items: flex-start; flex-grow: 1; padding: 0 20px; }
        .side-group { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 15px; outline: none; }
        .hp-bar-bg { height: 25px; background: #333; border: 2px solid #fff; position: relative; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.3s ease-out; }
        .char-graphic { width: 120px; height: 120px; }

        #quiz-container { margin-top: auto; text-align: center; padding-bottom: 10px; }
        #question-text { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; text-shadow: 2px 2px 4px #000; outline: none; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: 0 auto; }

        /* [ปรับปรุงจุดนี้เพื่อ iOS] */
        .option-btn {
            padding: 20px; font-size: 1.5rem; 
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3) !important; 
            border: none; color: white; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            outline: none;
        }

        .option-btn:hover { 
            background: rgba(255,255,255,0.45) !important; 
            transform: scale(1.1); 
        }

        .option-btn:focus, .option-btn:focus-visible { 
            background: rgba(255,255,255,0.3) !important; 
            -webkit-tap-highlight-color: transparent;
            outline: none; 
        }
        
        .option-btn.correct { 
            background-color: var(--correct-color) !important; 
            filter: drop-shadow(0 0 20px var(--correct-color)); 
            transform: scale(1.15); z-index: 2; 
        }
        .option-btn.wrong { 
            background-color: var(--wrong-color) !important; 
            filter: drop-shadow(0 0 20px var(--wrong-color)); 
        }

        #timer-bar-bg { width: 100%; background: #222; height: 8px; margin-bottom: 15px; }
        #timer-fill { height: 100%; width: 100%; background: #ffcc00; transition: width 0.1s linear; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

        @media (max-width: 600px) {
            .title { font-size: 3rem; }
            .char-graphic { width: 80px; height: 80px; }
            .option-btn { font-size: 1.2rem; padding: 15px; }
            #question-text { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sr-announcer" class="sr-only" aria-live="assertive"></div>

    <div id="start-screen">
        <h1 class="title" id="main-title" tabindex="-1">Math Fighter</h1>
        <p style="margin-bottom: 20px; font-size: 1.2rem;">ตอบคำถามให้ถูกต้องเพื่อโจมตี! (7 วินาทีต่อข้อ)</p>
        <div style="display: flex; gap: 20px;">
            <button class="btn-start" onclick="startGame('easy')" style="background:#00ff88; color:#000;">โหมดง่าย</button>
            <button class="btn-start" onclick="startGame('hard')" style="background:#ff4400; color:#fff;">โหมดยาก</button>
        </div>
    </div>

    <div id="battle-arena">
        <div class="battle-layout">
            <section id="player-group" class="side-group idle" role="group" aria-label="ผู้เล่น พลัง 1000" tabindex="0">
                <div class="health-box" aria-hidden="true">
                    <div style="font-weight:bold; color:var(--player-color); font-size:1.1rem; margin-bottom:5px;">PLAYER</div>
                    <div class="hp-bar-bg" style="transform: skewX(-20deg);">
                        <div id="player-hp-fill" class="hp-fill" style="background: var(--player-color); box-shadow: 0 0 15px var(--player-color);"></div>
                    </div>
                </div>
                <div class="char-graphic" aria-hidden="true">
                    <svg class="game-icon" viewBox="0 0 24 24" stroke="var(--player-color)">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </section>

            <div style="font-size: 1.5rem; color: #555; align-self: center; margin-bottom: 40px;" aria-hidden="true">VS</div>

            <section id="bot-group" class="side-group idle delay-idle" role="group" aria-label="บอท พลัง 1000" tabindex="0">
                <div class="health-box" style="text-align: right;" aria-hidden="true">
                    <div style="font-weight:bold; color:var(--bot-color); font-size:1.1rem; margin-bottom:5px;">CPU BOT</div>
                    <div class="hp-bar-bg" style="transform: skewX(20deg);">
                        <div id="bot-hp-fill" class="hp-fill" style="background: var(--bot-color); margin-left: auto; box-shadow: 0 0 15px var(--bot-color);"></div>
                    </div>
                </div>
                <div class="char-graphic" aria-hidden="true">
                    <svg class="game-icon" viewBox="0 0 24 24" stroke="var(--bot-color)">
                        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                        <circle cx="7" cy="15" r="0.5" fill="currentColor"></circle>
                        <circle cx="17" cy="15" r="0.5" fill="currentColor"></circle>
                        <path d="M12 11V7M8 7h8M12 3v4"></path>
                    </svg>
                </div>
            </section>
        </div>

        <div id="quiz-container">
            <div id="timer-bar-bg" aria-hidden="true">
                <div id="timer-fill"></div>
            </div>
            <h2 id="question-text" tabindex="-1"></h2>
            <div class="options-grid" id="options-grid"></div>
        </div>
    </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sounds = {};

async function loadSound(name, url) {
    try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        sounds[name] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) { console.error("Error loading sound:", name); }
}

const soundFiles = [
    ['start', 'audio/start.mp3'], ['back', 'audio/back.mp3'],
    ['at1', 'audio/at1.mp3'], ['at2', 'audio/at2.mp3'], ['at3', 'audio/at3.mp3'],
    ['en1', 'audio/en1.mp3'], ['en2', 'audio/en2.mp3'], ['en3', 'audio/en3.mp3'],
    ['atc', 'audio/atc.mp3'], ['enc', 'audio/enc.mp3'],
    ['win', 'audio/win.mp3'], ['lost', 'audio/lost.mp3']
];

soundFiles.forEach(f => loadSound(f[0], f[1]));

let bgmSource = null, playerHP = 1000, botHP = 1000;
let playerCombo = 0, botCombo = 0;
let sessionQuestions = [];
let currentQIndex = 0;
let timerInterval = null;
let lastPlayerAtk = "", lastBotAtk = "";

const MINUS = '\u2212';
const MULTIPLY = '\u00d7';
const DIVIDE = '\u00f7';

function generateOptions(ans) {
    let opts = new Set([ans]);
    while (opts.size < 4) {
        let offset = Math.floor(Math.random() * 21) - 10; 
        if (offset === 0) offset = (Math.random() > 0.5 ? 5 : -5);
        let wrongAns = ans + offset;
        if (wrongAns >= 0) opts.add(wrongAns);
    }
    return Array.from(opts).sort(() => Math.random() - 0.5);
}

function generateQuestions() {
    const easySet = []; const hardSet = [];
    const usedQuestions = new Set();
    while (easySet.length < 500) {
        let a = Math.floor(Math.random() * 90) + 10;
        let b = Math.floor(Math.random() * 90) + 10;
        let isAdd = Math.random() > 0.5;
        let qText, ans;
        if (isAdd) { ans = a + b; qText = `${a} + ${b} = ?`; }
        else { if (a < b) [a, b] = [b, a]; ans = a - b; qText = `${a} ${MINUS} ${b} = ?`; }
        if (!usedQuestions.has(qText)) { easySet.push({ q: qText, a: ans, options: generateOptions(ans) }); usedQuestions.add(qText); }
    }
    usedQuestions.clear();
    while (hardSet.length < 500) {
        let type = Math.floor(Math.random() * 4); 
        let qText, ans;
        if (type === 0) { let a = Math.floor(Math.random() * 800) + 100; let b = Math.floor(Math.random() * 90) + 10; ans = a + b; qText = `${a} + ${b} = ?`; }
        else if (type === 1) { let a = Math.floor(Math.random() * 800) + 200; let b = Math.floor(Math.random() * 90) + 10; ans = a - b; qText = `${a} ${MINUS} ${b} = ?`; }
        else if (type === 2) { let a = Math.floor(Math.random() * 11) + 2; let b = Math.floor(Math.random() * 11) + 2; ans = a * b; qText = `${a} ${MULTIPLY} ${b} = ?`; }
        else { let b = Math.floor(Math.random() * 11) + 2; ans = Math.floor(Math.random() * 11) + 2; let a = ans * b; qText = `${a} ${DIVIDE} ${b} = ?`; }
        if (!usedQuestions.has(qText)) { hardSet.push({ q: qText, a: ans, options: generateOptions(ans) }); usedQuestions.add(qText); }
    }
    return { easy: easySet, hard: hardSet };
}

window.onload = () => { setTimeout(() => { document.getElementById('main-title').focus(); }, 500); };

function playSound(name) {
    if (sounds[name]) {
        const source = audioCtx.createBufferSource();
        source.buffer = sounds[name];
        source.connect(audioCtx.destination);
        source.start();
        return source;
    }
}

function playBGM() {
    if (sounds.back) {
        bgmSource = audioCtx.createBufferSource();
        bgmSource.buffer = sounds.back;
        bgmSource.loop = true;
        bgmSource.connect(audioCtx.destination);
        bgmSource.start();
    }
}

function announce(msg) {
    const announcer = document.getElementById('sr-announcer');
    if (announcer.getAttribute('aria-live') === 'off') return;
    announcer.textContent = ""; 
    setTimeout(() => { 
        announcer.textContent = msg; 
        setTimeout(() => {
            if (announcer.getAttribute('aria-live') !== 'off') {
                announcer.textContent = "";
            }
        }, 2000);
    }, 50);
}

function showDamage(amount, side, isCombo = false) {
    const container = document.getElementById('game-container');
    const damageEl = document.createElement('div');
    damageEl.className = `damage-popup animate-damage ${isCombo ? 'damage-critical' : ''}`;
    damageEl.textContent = isCombo ? `COMBO! -${amount}` : `-${amount}`;
    if (side === 'player') { damageEl.style.color = 'var(--bot-color)'; damageEl.style.left = '15%'; damageEl.style.bottom = '120px'; }
    else { damageEl.style.color = 'var(--combo-color)'; damageEl.style.right = '15%'; damageEl.style.bottom = '120px'; }
    container.appendChild(damageEl);
    setTimeout(() => damageEl.remove(), 1200);
    if (isCombo) { container.classList.add('shake-heavy'); setTimeout(() => container.classList.remove('shake-heavy'), 500); }
}

function startGame(mode) {
    const allData = generateQuestions();
    sessionQuestions = (mode === 'easy') ? [...allData.easy].sort(() => Math.random() - 0.5) : [...allData.hard].sort(() => Math.random() - 0.5);
    
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('battle-arena').style.display = 'flex';
    document.getElementById('sr-announcer').setAttribute('aria-live', 'assertive');
    
    currentQIndex = 0; playerHP = 1000; botHP = 1000;
    updateUI();

    const s = playSound('start');
    const qEl = document.getElementById('question-text');

    qEl.style.fontSize = "5rem"; 
    qEl.style.color = "var(--combo-color)";
    qEl.textContent = "3";

    setTimeout(() => {
        if (!bgmSource) { qEl.textContent = "2"; }
    }, 450);

    setTimeout(() => {
        if (!bgmSource) {
            qEl.textContent = "FIGHT";
            qEl.style.color = "#ff3300";
        }
    }, 900);

    s.onended = () => {
        qEl.style.fontSize = ""; 
        qEl.style.color = "";
        playBGM();
        nextQuestion();
    };
}

function nextQuestion() {
    if (playerHP <= 0 || botHP <= 0) {
        endGame();
        return;
    }
    
    if (document.activeElement && document.activeElement.tagName === 'BUTTON') {
        document.activeElement.blur();
    }

    const announcer = document.getElementById('sr-announcer');
    if (announcer.getAttribute('aria-live') !== 'off') {
        announcer.textContent = "";
    }

    if (currentQIndex >= sessionQuestions.length) currentQIndex = 0;
    const currentQuestion = sessionQuestions[currentQIndex];
    const qEl = document.getElementById('question-text');
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    qEl.textContent = currentQuestion.q;

    let spoken = currentQuestion.q
        .replace('+', ' บวก ')
        .replace(MINUS, ' ลบ ')
        .replace(MULTIPLY, ' คูณ ')
        .replace(DIVIDE, ' หาร ')
        .replace('=', ' เท่ากับ ')
        .replace('?', ' '); 
    qEl.setAttribute('aria-label', spoken);

    currentQuestion.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.setAttribute('aria-label', opt); 
        btn.onclick = (e) => checkAnswer(opt, currentQuestion.a, e.target);
        grid.appendChild(btn);
    });
    setTimeout(() => { qEl.focus(); }, 100);
    startTimer();
}

function startTimer() {
    let timeLeft = 7000;
    const bar = document.getElementById('timer-fill');
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft -= 100;
        bar.style.width = (timeLeft / 7000) * 100 + "%";
        if (timeLeft <= 0) { clearInterval(timerInterval); checkAnswer(null, null, null); }
    }, 100);
}

function triggerCombatAnimation(attacker) {
    const p = document.getElementById('player-group');
    const c = document.getElementById('bot-group');
    if (attacker === 'player') {
        p.classList.remove('idle'); p.classList.add('p-attack'); c.classList.add('hit-effect');
        setTimeout(() => { p.classList.remove('p-attack'); c.classList.remove('hit-effect'); p.classList.add('idle'); }, 400);
    } else {
        c.classList.remove('idle', 'delay-idle'); c.classList.add('c-attack'); p.classList.add('hit-effect');
        setTimeout(() => { c.classList.remove('c-attack'); p.classList.remove('hit-effect'); c.classList.add('idle', 'delay-idle'); }, 400);
    }
}

function checkAnswer(sel, correctVal, clickedBtn) {
    clearInterval(timerInterval);
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true); 
    const correct = (sel !== null) && (sel === correctVal);

    if (clickedBtn) {
        if (correct) clickedBtn.classList.add('correct');
        else {
            clickedBtn.classList.add('wrong');
            document.getElementById('game-container').classList.add('shake-anim');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake-anim'), 400);
        }
    } else if (sel === null) {
        document.getElementById('game-container').classList.add('shake-anim');
        setTimeout(() => document.getElementById('game-container').classList.remove('shake-anim'), 400);
    }

    if (correct) {
        playerCombo++; botCombo = 0;
        let dmg = Math.floor(Math.random() * 101) + 50;
        let isCrit = false;
        if (playerCombo >= 5) {
            dmg = Math.floor(Math.random() * 151) + 200;
            playSound('atc'); announce(`คอมโบโจมตีแรงพิเศษ ${dmg} หน่วย!`);
            playerCombo = 0; isCrit = true;
        } else {
            let pool = ['at1','at2','at3'].filter(s => s !== lastPlayerAtk);
            let s = pool[Math.floor(Math.random() * pool.length)];
            playSound(s); lastPlayerAtk = s;
            announce(`ถูกต้อง โจมตีบอทเสียพลัง ${dmg} หน่วย`);
        }
        botHP -= dmg; showDamage(dmg, 'bot', isCrit); triggerCombatAnimation('player');
    } else {
        botCombo++; playerCombo = 0;
        let dmg = Math.floor(Math.random() * 101) + 50;
        let isCrit = false;
        if (botCombo >= 5) {
            dmg = Math.floor(Math.random() * 151) + 200;
            playSound('enc'); announce(`อันตราย! บอทใช้คอมโบโจมตีคุณ ${dmg} หน่วย!`);
            botCombo = 0; isCrit = true;
        } else {
            let pool = ['en1','en2','en3'].filter(s => s !== lastBotAtk);
            let s = pool[Math.floor(Math.random() * pool.length)];
            playSound(s); lastBotAtk = s;
            announce(sel === null ? `หมดเวลา! โดนโจมตีเสียพลัง ${dmg} หน่วย` : `ผิดพลาด โดนโจมตีเสียพลัง ${dmg} หน่วย`);
        }
        playerHP -= dmg; showDamage(dmg, 'player', isCrit); triggerCombatAnimation('bot');
    }

    updateUI();
    
    if (playerHP <= 0 || botHP <= 0) {
        setTimeout(endGame, 2800);
    } else {
        currentQIndex++;
        setTimeout(nextQuestion, 2800);
    }
}

function updateUI() {
    document.getElementById('player-hp-fill').style.width = Math.max(0, playerHP/10) + "%";
    document.getElementById('bot-hp-fill').style.width = Math.max(0, botHP/10) + "%";
    document.getElementById('player-group').setAttribute('aria-label', `ผู้เล่น พลังเหลือ ${Math.max(0, playerHP)}`);
    document.getElementById('bot-group').setAttribute('aria-label', `บอท พลังเหลือ ${Math.max(0, botHP)}`);
}

function spawnEndEffects(type) {
    const container = document.getElementById('game-container');
    const symbol = (type === 'win') ? '🏆' : '💀';
    const count = 25; 

    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = symbol;
        p.style.left = Math.random() * 90 + 5 + '%';
        
        if (type === 'win') {
            p.style.bottom = "-50px";
            p.style.setProperty('--move-y', '-600px');
        } else {
            p.style.top = "-50px";
            p.style.setProperty('--move-y', '600px');
        }
        
        p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
        p.style.animationDelay = (Math.random() * 1.5) + 's';
        
        container.appendChild(p);
        setTimeout(() => p.remove(), 4000);
    }
}

function endGame() {
    clearInterval(timerInterval);
    const announcer = document.getElementById('sr-announcer');
    announcer.setAttribute('aria-live', 'off');
    announcer.textContent = "";

    if (bgmSource) bgmSource.stop();
    const container = document.getElementById('game-container');
    const playerGraphic = document.querySelector('#player-group .game-icon');
    const qEl = document.getElementById('question-text');
    const grid = document.getElementById('options-grid');
    
    qEl.textContent = ""; 
    qEl.removeAttribute('aria-label');
    grid.innerHTML = '';
    
    const winMsgs = [
        "YOU WIN! ยินดีด้วย คุณคือจ้าวนักคำนวณ!",
        "สุดยอดไปเลย! ชนะขาดลอย สมกับเป็นยอดฝีมือ",
        "ชัยชนะเป็นของคุณ! ทักษะคณิตศาสตร์ของคุณยอดเยี่ยมมาก",
        "ยินดีด้วย! คุณเอาชนะบอทได้อย่างเหนือชั้น",
        "สำเร็จ! ชนะแล้ว พลังสมองของคุณแข็งแกร่งจริงๆ"
    ];
    
    const loseMsgs = [
        "GAME OVER พยายามเข้า สู้ใหมีกครั้งนะ",
        "เกือบชนะแล้ว! ลองอีกนิด ฝึกฝนอีกหน่อยเก่งแน่นอน",
        "ไม่เป็นไรนะ วันนี้บอทมาแรงจริงๆ กลับมาแก้มือใหม่ได้เสมอ",
        "อย่ายอมแพ้! ทุกความพยายามทำให้คุณเก่งขึ้น",
        "จบเกมแล้ว แต่ความสามารถคุณพัฒนาขึ้นมาก สู้ต่อไป!"
    ];

    let isWin = botHP <= 0;
    let endSound = isWin ? 'win' : 'lost';
    let endMsg = isWin ? winMsgs[Math.floor(Math.random() * winMsgs.length)] : loseMsgs[Math.floor(Math.random() * loseMsgs.length)];
    
    if (isWin) {
        playerGraphic.classList.add('victory-aura');
        container.style.boxShadow = "inset 0 0 100px var(--combo-color)"; 
    } else {
        container.classList.add('game-over-filter');
    }

    const finalSound = playSound(endSound);
    spawnEndEffects(isWin ? 'win' : 'lost');

    finalSound.onended = () => {
        qEl.textContent = ""; 
        setTimeout(() => {
            qEl.textContent = endMsg;
            qEl.setAttribute('aria-label', endMsg); 
            qEl.classList.add('final-msg-anim');
            
            setTimeout(() => {
                qEl.focus();
            }, 150); 
        }, 50);
        
        const rb = document.createElement('button');
        rb.className = 'btn-start';
        rb.style.marginTop = "20px";
        rb.textContent = "กลับหน้าหลักชุมชน";
        rb.setAttribute('aria-label', "กลับหน้าหลักชุมชน");
        rb.onclick = () => location.reload();
        grid.appendChild(rb);
    };
}
</script>
</body>
