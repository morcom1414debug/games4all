<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Fighter - ศึกจ้าวนักคำนวณ</title>
    <style>
        :root {
            --player-color: #00ffcc;
            --bot-color: #ff3300;
            --bg-dark: #1a1a1a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: fixed;
            width: 100%;
        }

        #game-container {
            width: 95%; max-width: 1000px;
            height: 90vh; max-height: 600px;
            position: relative;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            border: 4px solid #444;
            display: flex;
            flex-direction: column;
        }

        /* --- Animations (คงเดิมตามต้นฉบับ) --- */
        .game-icon { width: 100%; height: 100%; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        @keyframes idleMove { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .idle { animation: idleMove 2.5s ease-in-out infinite; }
        .delay-idle { animation-delay: 1.2s; }
        @keyframes attack-right { 0% { transform: translateX(0); } 30% { transform: translateX(50px) scale(1.2); filter: brightness(1.5); } 100% { transform: translateX(0); } }
        .p-attack { animation: attack-right 0.4s ease-out !important; }
        @keyframes attack-left { 0% { transform: translateX(0); } 30% { transform: translateX(-50px) scale(1.2); filter: brightness(1.5); } 100% { transform: translateX(0); } }
        .c-attack { animation: attack-left 0.4s ease-out !important; }
        @keyframes is-hit { 0%, 100% { transform: scale(1); filter: none; } 20% { transform: scale(0.9) rotate(-10deg); filter: drop-shadow(0 0 20px red) brightness(2); } 50% { transform: scale(1.1) rotate(10deg); } }
        .hit-effect { animation: is-hit 0.4s ease-out !important; }

        /* --- UI Styles --- */
        #start-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
        .title { font-size: 5rem; text-transform: uppercase; font-style: italic; background: linear-gradient(to bottom, #fff 20%, #ffcc00 50%, #ff6600 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(5px 5px 0px #000); margin-bottom: 20px; outline: none; }
        .btn-start { padding: 15px 40px; font-size: 1.5rem; background: #ffcc00; border: none; cursor: pointer; font-weight: bold; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.2s; }
        
        #battle-arena { display: none; padding: 15px; flex-direction: column; height: 100%; }
        .battle-layout { display: flex; justify-content: space-between; align-items: flex-start; flex-grow: 1; padding: 0 20px; }
        
        /* ปรับปรุงโครงสร้าง Side Group ให้เป็นก้อนเดียวสำหรับ SR */
        .side-group { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 15px; outline: none; cursor: default; }
        .health-box { width: 100%; }
        .hp-bar-bg { height: 25px; background: #333; border: 2px solid #fff; position: relative; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.3s ease-out; }
        .char-graphic { width: 110px; height: 110px; }

        #quiz-container { margin-top: auto; text-align: center; padding-bottom: 10px; }
        #question-text { font-size: 2rem; margin-bottom: 15px; outline: none; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 600px; margin: 0 auto; }
        .option-btn { padding: 15px; font-size: 1.2rem; background: rgba(255,255,255,0.1); border: 1px solid #666; color: white; cursor: pointer; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sr-announcer" class="sr-only" aria-live="assertive"></div>

    <div id="start-screen">
        <h1 class="title" id="main-title" tabindex="-1">Math Fighter</h1>
        <p style="margin-bottom: 15px; font-size: 1.2rem;">ตอบคำถามให้ถูกต้องเพื่อโจมตี! มีเวลา 7 วินาทีต่อข้อ</p>
        <div style="display: flex; gap: 20px;">
            <button class="btn-start" onclick="startGame('easy')" style="background:#00ff88; color:#000;">โหมดง่าย</button>
            <button class="btn-start" onclick="startGame('hard')" style="background:#ff4400; color:#fff;">โหมดยาก</button>
        </div>
    </div>

    <div id="battle-arena">
        <div class="battle-layout">
            
            <section id="player-group" class="side-group idle" role="group" aria-label="ผู้เล่น 1000" tabindex="0">
                <div class="health-box" aria-hidden="true">
                    <div style="font-weight:bold; color:var(--player-color); font-size:1.1rem; margin-bottom:5px;">PLAYER</div>
                    <div class="hp-bar-bg" style="transform: skewX(-20deg);">
                        <div id="player-hp-fill" class="hp-fill" style="background: var(--player-color);"></div>
                    </div>
                </div>
                <div class="char-graphic" aria-hidden="true">
                    <svg class="game-icon" viewBox="0 0 24 24" stroke="var(--player-color)">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </section>

            <div style="font-size: 1.5rem; color: #555; align-self: center; margin-bottom: 40px;" aria-hidden="true">VS</div>

            <section id="bot-group" class="side-group idle delay-idle" role="group" aria-label="บอท 1000" tabindex="0">
                <div class="health-box" style="text-align: right;" aria-hidden="true">
                    <div style="font-weight:bold; color:var(--bot-color); font-size:1.1rem; margin-bottom:5px;">CPU</div>
                    <div class="hp-bar-bg" style="transform: skewX(20deg);">
                        <div id="bot-hp-fill" class="hp-fill" style="background: var(--bot-color); margin-left: auto;"></div>
                    </div>
                </div>
                <div class="char-graphic" aria-hidden="true">
                    <svg class="game-icon" viewBox="0 0 24 24" stroke="var(--bot-color)">
                        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                        <circle cx="7" cy="15" r="0.5" fill="currentColor"></circle>
                        <circle cx="17" cy="15" r="0.5" fill="currentColor"></circle>
                        <path d="M12 11V7M8 7h8M12 3v4"></path>
                    </svg>
                </div>
            </section>
        </div>

        <div id="quiz-container">
            <div style="width:100%; background:#222; height:8px; margin-bottom:15px" aria-hidden="true">
                <div id="timer-fill" style="height:100%; width:100%; background:#ffcc00"></div>
            </div>
            <h2 id="question-text" tabindex="-1"></h2>
            <div class="options-grid" id="options-grid"></div>
        </div>
    </div>
</div>

<script>
// --- Logic การทำงาน (ไล่กลับไปตามต้นฉบับ 9) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sounds = {};
async function loadSound(name, url) {
    try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        sounds[name] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) { console.error(name); }
}
const soundFiles = [['start', 'audio/start.mp3'], ['back', 'audio/back.mp3'], ['at1', 'audio/at1.mp3'], ['at2', 'audio/at2.mp3'], ['at3', 'audio/at3.mp3'], ['en1', 'audio/en1.mp3'], ['en2', 'audio/en2.mp3'], ['en3', 'audio/en3.mp3'], ['atc', 'audio/atc.mp3'], ['enc', 'audio/enc.mp3'], ['win', 'audio/win.mp3'], ['lost', 'audio/lost.mp3']];
soundFiles.forEach(f => loadSound(f[0], f[1]));

let bgmSource = null, playerHP = 1000, botHP = 1000, playerCombo = 0, botCombo = 0, currentQIndex = 0, timerInterval = null, sessionQuestions = [];

function generateQuestions() {
    const easySet = [], hardSet = [];
    for (let i = 0; i < 100; i++) {
        let op = Math.random() > 0.5 ? { name: 'บวก', func: (a, b) => a + b } : { name: 'ลบ', func: (a, b) => a - b };
        let a = Math.floor(Math.random() * 90) + 10, b = Math.floor(Math.random() * 80) + 5;
        if (op.name === 'ลบ' && a < b) [a, b] = [b, a];
        let ans = op.func(a, b), opts = [ans, ans + 2, ans - 5, ans + 10].sort(() => Math.random() - 0.5);
        easySet.push({ q: `${a} ${op.name} ${b} ?`, a: ans, options: opts });
    }
    for (let i = 0; i < 100; i++) {
        let isDiv = Math.random() > 0.5, q, ans;
        if (isDiv) {
            let b = Math.floor(Math.random() * 12) + 2; ans = Math.floor(Math.random() * 12) + 2;
            let a = ans * b; q = `${a} หารด้วย ${b} ?`;
        } else {
            let a = Math.floor(Math.random() * 12) + 2, b = Math.floor(Math.random() * 15) + 2;
            ans = a * b; q = `${a} คูณด้วย ${b} ?`;
        }
        let opts = [ans, ans + 1, ans - 2, ans + 5].sort(() => Math.random() - 0.5);
        hardSet.push({ q: q, a: ans, options: opts });
    }
    return { easy: easySet, hard: hardSet };
}

window.onload = () => { setTimeout(() => document.getElementById('main-title').focus(), 500); };

function playSound(name) {
    if (sounds[name]) {
        const source = audioCtx.createBufferSource();
        source.buffer = sounds[name]; source.connect(audioCtx.destination);
        source.start(); return source;
    }
}

function playBGM() {
    if (sounds.back) {
        bgmSource = audioCtx.createBufferSource();
        bgmSource.buffer = sounds.back; bgmSource.loop = true;
        bgmSource.connect(audioCtx.destination); bgmSource.start();
    }
}

// ฟังก์ชันประกาศเสียง (aria-live) กลับไปใช้ข้อความเต็มตามต้นฉบับ
function announce(msg) {
    const announcer = document.getElementById('sr-announcer');
    announcer.textContent = ""; setTimeout(() => announcer.textContent = msg, 50);
}

function startGame(mode) {
    const allData = generateQuestions();
    sessionQuestions = mode === 'easy' ? [...allData.easy].sort(() => Math.random() - 0.5) : [...allData.easy, ...allData.hard].sort(() => Math.random() - 0.5);
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('battle-arena').style.display = 'flex';
    playSound('start'); playBGM(); nextQuestion();
}

function nextQuestion() {
    if (playerHP <= 0 || botHP <= 0) return;
    const q = sessionQuestions[currentQIndex % sessionQuestions.length];
    const qEl = document.getElementById('question-text');
    const grid = document.getElementById('options-grid');
    grid.innerHTML = ''; qEl.textContent = q.q;
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn'; btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt, q.a);
        grid.appendChild(btn);
    });
    setTimeout(() => qEl.focus(), 100);
    startTimer();
}

function startTimer() {
    let left = 7000; clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        left -= 100; document.getElementById('timer-fill').style.width = (left/7000)*100 + "%";
        if (left <= 0) { clearInterval(timerInterval); checkAnswer(null, null); }
    }, 100);
}

function triggerCombatAnimation(attacker) {
    const p = document.getElementById('player-group');
    const c = document.getElementById('bot-group');
    if (attacker === 'player') {
        p.classList.remove('idle'); p.classList.add('p-attack'); c.classList.add('hit-effect');
        setTimeout(() => { p.classList.remove('p-attack'); c.classList.remove('hit-effect'); p.classList.add('idle'); }, 400);
    } else {
        c.classList.remove('idle', 'delay-idle'); c.classList.add('c-attack'); p.classList.add('hit-effect');
        setTimeout(() => { c.classList.remove('c-attack'); p.classList.remove('hit-effect'); c.classList.add('idle', 'delay-idle'); }, 400);
    }
}

function checkAnswer(sel, correctVal) {
    clearInterval(timerInterval);
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    const correct = (sel !== null) && (sel === correctVal);

    if (correct) {
        playerCombo++; botCombo = 0;
        let dmg = Math.floor(Math.random() * 101) + 50;
        if (playerCombo >= 5) {
            dmg = Math.floor(Math.random() * 151) + 200;
            playSound('atc'); announce(`ยินดีด้วย คอมโบโจมตีแรงพิเศษทำงาน สร้างความเสียหาย ${dmg} หน่วย!`); playerCombo = 0;
        } else {
            let s = ['at1','at2','at3'][Math.floor(Math.random()*3)];
            playSound(s); announce(`ถูกต้อง! คุณโจมตีบอทได้สำเร็จ สร้างความเสียหาย ${dmg} หน่วย`);
        }
        botHP -= dmg; triggerCombatAnimation('player');
    } else {
        botCombo++; playerCombo = 0;
        let dmg = Math.floor(Math.random() * 101) + 50;
        if (botCombo >= 5) {
            dmg = Math.floor(Math.random() * 151) + 200;
            playSound('enc'); announce(`ระวัง! บอทใช้คอมโบสวนกลับรุนแรง คุณโดนโจมตี ${dmg} หน่วย!`); botCombo = 0;
        } else {
            let s = ['en1','en2','en3'][Math.floor(Math.random()*3)];
            playSound(s); announce(sel === null ? `หมดเวลาเสียแล้ว! บอทโจมตีคุณเข้าอย่างจัง ${dmg} หน่วย` : `คำตอบยังไม่ถูกนะครับ บอทฉวยโอกาสโจมตีคุณ ${dmg} หน่วย`);
        }
        playerHP -= dmg; triggerCombatAnimation('bot');
    }

    updateUI();
    currentQIndex++;
    setTimeout(() => (playerHP > 0 && botHP > 0) ? nextQuestion() : endGame(), 2500);
}

function updateUI() {
    document.getElementById('player-hp-fill').style.width = Math.max(0, playerHP/10) + "%";
    document.getElementById('bot-hp-fill').style.width = Math.max(0, botHP/10) + "%";
    
    // อัปเดตข้อมูลประจำ Object (ใช้เลขตัวเดียวตามความต้องการใหม่)
    document.getElementById('player-group').setAttribute('aria-label', `ผู้เล่น ${Math.max(0, playerHP)}`);
    document.getElementById('bot-group').setAttribute('aria-label', `บอท ${Math.max(0, botHP)}`);
}

function endGame() {
    if (bgmSource) bgmSource.stop();
    const qEl = document.getElementById('question-text');
    const grid = document.getElementById('options-grid');
    qEl.textContent = "กำลังประมวลผลการต่อสู้..."; grid.innerHTML = '';
    let endSound = botHP <= 0 ? 'win' : 'lost';
    let endMsg = botHP <= 0 ? "YOU WIN! ยินดีด้วย คุณชนะแล้ว" : "GAME OVER พยายามเข้า สู้ใหม่อีกครั้ง";
    let srMsg = botHP <= 0 ? "จบการต่อสู้ คุณชนะบอทได้สำเร็จ ยินดีด้วยครับ" : "จบการต่อสู้ คุณพ่ายแพ้ พยายามใหม่ในรอบหน้านะครับ";
    const finalSound = playSound(endSound);
    announce(srMsg);
    finalSound.onended = () => {
        qEl.textContent = endMsg;
        qEl.focus();
        const rb = document.createElement('button');
        rb.className = 'btn-start'; rb.style.marginTop = "20px";
        rb.textContent = "เริ่มการแข่งขันใหม่"; rb.onclick = () => location.reload();
        grid.appendChild(rb);
    };
}
</script>
</body>
</html>
