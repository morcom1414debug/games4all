<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Fighter - ศึกจ้าวนักคำนวณ</title>
    <style>
        :root {
            --player-color: #00ffcc;
            --bot-color: #ff3300;
            --bg-dark: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* ป้องกันการเลื่อนจอใน iOS */
            position: fixed;
            width: 100%;
        }

        #game-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh; /* ปรับตามความสูงหน้าจอจริง */
            max-height: 600px;
            position: relative;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            border: 4px solid #444;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* --- ปรับแต่งส่วน Mobile Responsive --- */
        @media (max-height: 700px) {
            .title { font-size: 3rem !important; }
            .stage { height: 160px !important; }
            .char { width: 100px !important; height: 140px !important; }
            #question-text { font-size: 1.5rem !important; margin-bottom: 10px !important; }
            .option-btn { padding: 10px !important; font-size: 1.1rem !important; }
            .hud { margin-bottom: 20px !important; }
        }

        /* หน้าแรก */
        #start-screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .title {
            font-size: 5rem;
            text-transform: uppercase;
            font-style: italic;
            background: linear-gradient(to bottom, #fff 20%, #ffcc00 50%, #ff6600 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(5px 5px 0px #000);
            margin-bottom: 20px;
            outline: none;
        }

        .mode-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .mode-container { flex-direction: column; gap: 10px; width: 80%; }
        }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #ffcc00;
            border: none;
            cursor: pointer;
            font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: all 0.2s;
        }

        .btn-easy { background: #00ff88; color: #000; }
        .btn-hard { background: #ff4400; color: #fff; }

        .btn-start:hover { transform: scale(1.1); filter: brightness(1.2); }

        /* Battle Arena */
        #battle-arena {
            display: none;
            padding: 15px;
            flex-direction: column;
            height: 100%;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .health-box { width: 40%; }
        .name-label { font-weight: bold; margin-bottom: 5px; text-transform: uppercase; font-size: 0.8rem; }
        
        .hp-bar-bg {
            height: 25px;
            background: #333;
            border: 2px solid #fff;
            transform: skewX(-20deg);
            position: relative;
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            width: 100%;
            transition: width 0.3s ease-out;
        }
        #player-hp-fill { background: var(--player-color); box-shadow: 0 0 15px var(--player-color); }
        #bot-hp-fill { background: var(--bot-color); box-shadow: 0 0 15px var(--bot-color); }

        .stage {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 220px;
            padding: 0 30px;
        }

        .char {
            width: 130px;
            height: 180px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
            position: relative;
            border-bottom: 8px solid #555;
        }
        
        #player-char { border-bottom-color: var(--player-color); }
        #bot-char { border-bottom-color: var(--bot-color); }

        #quiz-container {
            margin-top: auto; /* ดันคำถามลงล่าง */
            text-align: center;
            padding-bottom: 10px;
        }

        #question-text {
            font-size: 2rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px #000;
            outline: none;
            min-height: 2.5rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .option-btn {
            padding: 15px;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid #666;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .option-btn:hover:not(:disabled) { background: rgba(255,255,255,0.3); border-color: #fff; }
        .option-btn:disabled { cursor: default; opacity: 0.5; }

        #timer-bar-bg {
            width: 100%;
            background: #222;
            margin-bottom: 10px;
            height: 6px;
        }
        #timer-fill { height: 100%; width: 100%; background: #ffcc00; transition: width 0.1s linear; }

        @keyframes hit-shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(10px); }
            50% { transform: translateX(-10px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

        .shake { animation: hit-shake 0.2s; }
        .flash-red { background: rgba(255,0,0,0.5) !important; }
        .flash-green { background: rgba(0,255,0,0.5) !important; }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sr-announcer" class="sr-only" aria-live="assertive"></div>

    <div id="start-screen">
        <h1 class="title" id="main-title" tabindex="-1">Math Fighter</h1>
        <p style="margin-bottom: 10px;">เลือกโหมดเพื่อเริ่มการต่อสู้ (7 วินาทีต่อข้อ)</p>
        <div class="mode-container">
            <button class="btn-start btn-easy" onclick="startGame('easy')">โหมดง่าย (บวก/ลบ)</button>
            <button class="btn-start btn-hard" onclick="startGame('hard')">โหมดยาก (จัดเต็ม)</button>
        </div>
    </div>

    <div id="battle-arena">
        <div class="hud">
            <div class="health-box">
                <div class="name-label">Player (YOU)</div>
                <div class="hp-bar-bg"><div id="player-hp-fill" class="hp-fill"></div></div>
                <div id="player-hp-text" class="sr-only"></div>
            </div>
            <div class="health-box" style="text-align: right;">
                <div class="name-label">CPU BOT</div>
                <div class="hp-bar-bg" style="transform: skewX(20deg);"><div id="bot-hp-fill" class="hp-fill" style="margin-left: auto;"></div></div>
                <div id="bot-hp-text" class="sr-only"></div>
            </div>
        </div>

        <div class="stage">
            <div id="player-char" class="char"></div>
            <div id="bot-char" class="char"></div>
        </div>

        <div id="quiz-container">
            <div id="timer-bar-bg"><div id="timer-fill"></div></div>
            <h2 id="question-text" tabindex="-1"></h2>
            <div class="options-grid" id="options-grid"></div>
        </div>
    </div>
</div>

<script>
// --- LOGIC การทำงานคงเดิม 100% จากไฟล์ล่าสุดที่อัปโหลด ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sounds = {};

async function loadSound(name, url) {
    try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        sounds[name] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) { console.error("Error loading sound:", name); }
}

const soundFiles = [
    ['start', 'audio/start.mp3'], ['back', 'audio/back.mp3'],
    ['at1', 'audio/at1.mp3'], ['at2', 'audio/at2.mp3'], ['at3', 'audio/at3.mp3'],
    ['en1', 'audio/en1.mp3'], ['en2', 'audio/en2.mp3'], ['en3', 'audio/en3.mp3'],
    ['atc', 'audio/atc.mp3'], ['enc', 'audio/enc.mp3'],
    ['win', 'audio/win.mp3'], ['lost', 'audio/lost.mp3']
];

soundFiles.forEach(f => loadSound(f[0], f[1]));

let bgmSource = null;
let playerHP = 1000, botHP = 1000;
let playerCombo = 0, botCombo = 0;
let sessionQuestions = [];
let currentQIndex = 0;
let timerInterval = null;
let lastPlayerAtk = "", lastBotAtk = "";

function generateQuestions() {
    const easySet = [];
    const hardSet = [];
    for (let i = 0; i < 100; i++) {
        let op = Math.random() > 0.5 ? { name: 'บวก', func: (a, b) => a + b } : { name: 'ลบ', func: (a, b) => a - b };
        let a = Math.floor(Math.random() * 90) + 10;
        let b = Math.floor(Math.random() * 80) + 5;
        if (op.name === 'ลบ' && a < b) [a, b] = [b, a];
        let ans = op.func(a, b);
        let opts = [ans, ans + 2, ans - 5, ans + 10].sort(() => Math.random() - 0.5);
        easySet.push({ q: `${a} ${op.name} ${b} เท่ากับเท่าไหร่?`, a: ans, options: opts });
    }
    for (let i = 0; i < 100; i++) {
        let isDiv = Math.random() > 0.5;
        let q, ans;
        if (isDiv) {
            let b = Math.floor(Math.random() * 12) + 2;
            ans = Math.floor(Math.random() * 12) + 2;
            let a = ans * b;
            q = `${a} หารด้วย ${b} เท่ากับเท่าไหร่?`;
        } else {
            let a = Math.floor(Math.random() * 12) + 2;
            let b = Math.floor(Math.random() * 15) + 2;
            ans = a * b;
            q = `${a} คูณด้วย ${b} เท่ากับเท่าไหร่?`;
        }
        let opts = [ans, ans + 1, ans - 2, ans + 5].sort(() => Math.random() - 0.5);
        hardSet.push({ q: q, a: ans, options: opts });
    }
    return { easy: easySet, hard: hardSet };
}

window.onload = () => {
    setTimeout(() => { document.getElementById('main-title').focus(); }, 500);
};

function playSound(name) {
    if (sounds[name]) {
        const source = audioCtx.createBufferSource();
        source.buffer = sounds[name];
        source.connect(audioCtx.destination);
        source.start();
        return source;
    }
}

function playBGM() {
    if (sounds.back) {
        bgmSource = audioCtx.createBufferSource();
        bgmSource.buffer = sounds.back;
        bgmSource.loop = true;
        bgmSource.connect(audioCtx.destination);
        bgmSource.start();
    }
}

function announce(msg) {
    const announcer = document.getElementById('sr-announcer');
    announcer.textContent = ""; 
    setTimeout(() => { announcer.textContent = msg; }, 50);
}

function startGame(mode) {
    const allData = generateQuestions();
    if (mode === 'easy') {
        sessionQuestions = [...allData.easy].sort(() => Math.random() - 0.5);
    } else {
        sessionQuestions = [...allData.easy, ...allData.hard].sort(() => Math.random() - 0.5);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('battle-arena').style.display = 'flex'; // เปลี่ยนเป็น flex ตาม CSS ใหม่
    currentQIndex = 0;
    const s = playSound('start');
    s.onended = () => {
        playBGM();
        nextQuestion();
    };
}

function nextQuestion() {
    if (playerHP <= 0 || botHP <= 0) return;
    if (currentQIndex >= sessionQuestions.length) currentQIndex = 0;
    const currentQuestion = sessionQuestions[currentQIndex];
    const qEl = document.getElementById('question-text');
    qEl.textContent = ""; 
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    setTimeout(() => {
        qEl.textContent = currentQuestion.q;
        currentQuestion.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(opt, currentQuestion.a);
            grid.appendChild(btn);
        });
        document.activeElement.blur();
        setTimeout(() => { qEl.focus(); }, 100);
        startTimer();
    }, 50);
}

function startTimer() {
    let timeLeft = 7000;
    const bar = document.getElementById('timer-fill');
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft -= 100;
        bar.style.width = (timeLeft / 7000) * 100 + "%";
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            checkAnswer(null, null);
        }
    }, 100);
}

function checkAnswer(sel, correctVal) {
    clearInterval(timerInterval);
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true); 

    const correct = (sel !== null) && (sel === correctVal);

    if (correct) {
        playerCombo++; botCombo = 0;
        let dmg = Math.floor(Math.random() * 101) + 50;
        if (playerCombo >= 5) {
            dmg = Math.floor(Math.random() * 151) + 200;
            playSound('atc'); announce(`คอมโบโจมตีแรงพิเศษ ${dmg} หน่วย!`);
            playerCombo = 0;
        } else {
            let pool = ['at1','at2','at3'].filter(s => s !== lastPlayerAtk);
            let s = pool[Math.floor(Math.random() * pool.length)];
            playSound(s); lastPlayerAtk = s;
            announce(`ถูกต้อง โจมตีบอทเสียพลัง ${dmg} หน่วย`);
        }
        botHP -= dmg; animate('bot-char', 'flash-green');
    } else {
        botCombo++; playerCombo = 0;
        let dmg = Math.floor(Math.random() * 101) + 50;
        if (botCombo >= 5) {
            dmg = Math.floor(Math.random() * 151) + 200;
            playSound('enc'); announce(`อันตราย! บอทใช้คอมโบโจมตีคุณ ${dmg} หน่วย!`);
            botCombo = 0;
        } else {
            let pool = ['en1','en2','en3'].filter(s => s !== lastBotAtk);
            let s = pool[Math.floor(Math.random() * pool.length)];
            playSound(s); lastBotAtk = s;
            announce(sel === null ? `หมดเวลา! โดนโจมตีเสียพลัง ${dmg} หน่วย` : `ผิดพลาด โดนโจมตีเสียพลัง ${dmg} หน่วย`);
        }
        playerHP -= dmg; animate('player-char', 'flash-red');
    }

    updateUI();
    currentQIndex++;
    setTimeout(() => {
        if (playerHP > 0 && botHP > 0) nextQuestion();
        else endGame();
    }, 3000);
}

function updateUI() {
    document.getElementById('player-hp-fill').style.width = Math.max(0, playerHP/10) + "%";
    document.getElementById('bot-hp-fill').style.width = Math.max(0, botHP/10) + "%";
    document.getElementById('player-hp-text').textContent = `คุณเหลือพลัง ${Math.max(0, playerHP)}`;
    document.getElementById('bot-hp-text').textContent = `บอทเหลือพลัง ${Math.max(0, botHP)}`;
}

function animate(id, cls) {
    document.getElementById(id).classList.add('shake');
    document.getElementById('battle-arena').classList.add(cls);
    setTimeout(() => {
        document.getElementById(id).classList.remove('shake');
        document.getElementById('battle-arena').classList.remove(cls);
    }, 300);
}

function endGame() {
    if (bgmSource) bgmSource.stop();
    const qEl = document.getElementById('question-text');
    const grid = document.getElementById('options-grid');
    qEl.textContent = "กำลังประมวลผลการต่อสู้...";
    grid.innerHTML = '';
    let endSound = botHP <= 0 ? 'win' : 'lost';
    let endMsg = botHP <= 0 ? "YOU WIN! ยินดีด้วย คุณชนะแล้ว" : "GAME OVER พยายามเข้า สู้ใหม่อีกครั้ง";
    let srMsg = botHP <= 0 ? "จบการต่อสู้ คุณชนะบอทได้สำเร็จ ยินดีด้วยครับ" : "จบการต่อสู้ คุณพ่ายแพ้ พยายามใหม่ในรอบหน้านะครับ";
    const finalSound = playSound(endSound);
    announce(srMsg);
    finalSound.onended = () => {
        qEl.textContent = endMsg;
        document.activeElement.blur();
        setTimeout(() => { qEl.focus(); }, 150);
        const rb = document.createElement('button');
        rb.className = 'btn-start';
        rb.style.marginTop = "20px";
        rb.textContent = "กลับไปเริ่มใหม่";
        rb.onclick = () => location.reload();
        grid.appendChild(rb);
    };
}
</script>
</body>
</html>
