<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมทายจำนวนคำจากเพลง</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap');
        body { font-family: 'Kanit', sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; text-align: center; background-color: #f8f9fa; color: #333; }
        .hidden { display: none !important; }
        .game-card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        .btn-back { position: absolute; top: 15px; left: 15px; padding: 8px 12px; font-size: 0.9rem; background-color: #95a5a6; }
        button { padding: 15px 25px; font-size: 1.1rem; cursor: pointer; border-radius: 12px; border: none; background-color: #4A90E2; color: white; margin: 10px; transition: all 0.2s; font-weight: bold; }
        button:hover:not(:disabled) { background-color: #357ABD; transform: translateY(-2px); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; opacity: 0.5; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        #status-msg { margin: 10px 0; font-weight: 500; min-height: 1.5em; color: #e67e22; font-size: 1.1rem; }
        h1, h2 { color: #2c3e50; margin-bottom: 5px; outline: none; }
        .result-text { font-size: 1.5rem; margin-bottom: 20px; font-weight: bold; }
        .sr-announcer { position: absolute; clip: rect(1px, 1px, 1px, 1px); padding: 0; border: 0; height: 1px; width: 1px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="start-screen" class="game-card">
        <button class="btn-back" onclick="window.location.href='../index.html'">กลับสู่ชุมชน</button>
        <h1 id="start-heading" tabindex="-1">🎵 เกมทายจำนวนคำ</h1>
        <p>กติกา: ฟังเพลงจบแล้วเลือกคำตอบที่ถูกต้อง</p>
        <p style="color: #e74c3c;">* ผิดได้ 1 ครั้ง และฟังซ้ำได้ 3 ครั้งตลอดรอบเกม! *</p>
        <button id="btn-start">เริ่มท้าทายเลย!</button>
    </div>

    <div id="game-screen" class="game-card hidden">
        <h2 id="question-text" tabindex="-1">เตรียมเพลง...</h2>
        <div id="status-msg"></div>
        <div id="audio-controls">
            <button id="btn-replay">ฟังซ้ำ (3/3)</button>
        </div>
        <div id="options-container" class="options-grid"></div>
    </div>

    <div id="result-screen" class="game-card hidden">
        <button class="btn-back" onclick="window.location.href='../index.html'">กลับสู่ชุมชน</button>
        <h2 id="result-title" tabindex="-1">จบเกม!</h2>
        <p id="result-message" class="result-text"></p>
        <button onclick="location.reload()">เล่นใหม่อีกครั้ง</button>
    </div>

    <div id="announcer" class="sr-announcer" aria-live="assertive" aria-atomic="true"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let currentSource = null;
        const audioBuffers = {};

        const songData = [
            { file: 'espresso.mp3', words: [{w:'อเมริกาโน่', n:6}, {w:'เอสเพรซโซ่', n:8}, {w:'ลาเต้', n:14}, {w:'คาปูชิโน่', n:6}] },
            { file: 'หมี.mp3', words: [{w:'หมี', n:7}, {w:'หีบ', n:4}, {w:'หนี', n:8}, {w:'หาย', n:14}] },
            { file: 'ว้าวุ่น.mp3', words: [{w:'ว้าวุ่น', n:7}, {w:'วาสนา', n:5}, {w:'ชีวิต', n:5}, {w:'สู้', n:8}] },
            { file: 'ดี4.mp3', words: [{w:'ดี', n:27}, {w:'หู', n:5}, {w:'หัน', n:6}, {w:'หลาย', n:12}] },
            { file: 'fruit.mp3', words: [{w:'แอปเปิ้ล', n:9}, {w:'มะละกอ', n:9}, {w:'กล้วย', n:10}, {w:'ส้ม', n:10}] },
            { file: 'จึ้ง.mp3', words: [{w:'จึ้ง', n:8}, {w:'แกง', n:8}, {w:'ปัง', n:8}, {w:'บ้ง', n:5}] },
            { file: '1469.mp3', words: [{w:'หนึ่ง', n:8}, {w:'สี่', n:12}, {w:'หก', n:20}, {w:'เก้า', n:16}] },
            { file: 'mama.mp3', words: [{w:'มาม่า', n:8}, {w:'ไวไว', n:7}, {w:'ซื่อสัตย์', n:3}, {w:'นิสชิน', n:6}] },
            { file: 'kitchen.mp3', words: [{w:'หม้อ', n:9}, {w:'จาน', n:8}, {w:'ชาม', n:9}, {w:'กระทะ', n:9}] },
            { file: 'ma.mp3', words: [{w:'มะม่วง', n:6}, {w:'มะนาว', n:5}, {w:'มะยม', n:6}, {w:'มะขาม', n:7}] },
            { file: 'flower.mp3', words: [{w:'จำปี', n:5}, {w:'จำปา', n:7}, {w:'แก้ว', n:9}, {w:'มะลิ', n:18}] },
            { file: 'pen.mp3', words: [{w:'กระเป๋า', n:10}, {w:'ดินสอ', n:11}, {w:'ปากกา', n:12}, {w:'สมุด', n:6}] },
            { file: 'catdog.mp3', words: [{w:'แมว', n:11}, {w:'หมา', n:7}, {w:'หมี', n:13}, {w:'กบ', n:6}] },
            { file: 'tour.mp3', words: [{w:'ท่าน', n:6}, {w:'ทัวร์', n:4}, {w:'หาด', n:5}, {w:'ใกล้', n:7}] },
            { file: 'somtam.mp3', words: [{w:'อ๊า', n:14}, {w:'โอ๊ย', n:22}, {w:'อู๊ย', n:12}, {w:'อื๊ม', n:5}] },
            { file: 'iPhone.mp3', words: [{w:'iPhone', n:8}, {w:'Samsung', n:9}, {w:'Oppo', n:8}, {w:'Vivo', n:8}] },
            { file: 'benz.mp3', words: [{w:'เบ๊น', n:10}, {w:'โตโยต้า', n:6}, {w:'ฮอนด้า', n:7}, {w:'ตุ๊ก', n:15}] },
            { file: 'bangkok.mp3', words: [{w:'กรุงเทพ', n:6}, {w:'พัทยา', n:6}, {w:'เชียงใหม่', n:4}, {w:'สงขลา', n:9}] },
            { file: 'lay.mp3', words: [{w:'เลย์', n:12}, {w:'คอนเน่', n:11}, {w:'เทสโต้', n:6}, {w:'ฮานามิ', n:5}] },
            { file: 'color.mp3', words: [{w:'แดง', n:11}, {w:'เขียว', n:8}, {w:'เหลือง', n:8}, {w:'ม่วง', n:9}] },
            { file: 'day.mp3', words: [{w:'จันทร์', n:9}, {w:'พุธ', n:6}, {w:'เสาร์', n:8}, {w:'อาทิตย์', n:7}] },
            { file: 'month.mp3', words: [{w:'มีนา', n:7}, {w:'เมษา', n:9}, {w:'สิงหา', n:4}, {w:'กันยา', n:7}] },
            { file: 'finger.mp3', words: [{w:'โป้ง', n:22}, {w:'ชี้', n:14}, {w:'ก้อย', n:7}, {w:'นาง', n:6}] }
        ];

        let currentRound = 0, lives = 1, usedSongs = [], replayCount = 3, currentSongFile = "";
        const statusMsg = document.getElementById('status-msg'), announcer = document.getElementById('announcer'), btnReplay = document.getElementById('btn-replay'), questionHeading = document.getElementById('question-text');

        window.onload = () => {
            document.getElementById('start-heading').focus();
        };

        async function loadSound(file) {
            const url = `audio/${file}`;
            if (audioBuffers[url]) return audioBuffers[url];
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            audioBuffers[url] = audioBuffer;
            return audioBuffer;
        }

        function playSound(buffer, callback) {
            if (currentSource) currentSource.stop();
            currentSource = audioCtx.createBufferSource();
            currentSource.buffer = buffer;
            currentSource.connect(audioCtx.destination);
            currentSource.onended = () => {
                if(callback) callback();
            };
            currentSource.start(0);
        }

        function announce(text) { announcer.textContent = text; setTimeout(() => { announcer.textContent = ""; }, 1000); }

        document.getElementById('btn-start').addEventListener('click', async () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            currentRound = 0; lives = 1; usedSongs = []; replayCount = 3;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            nextQuestion();
        });

        btnReplay.addEventListener('click', async () => {
            if (replayCount <= 0) return;
            replayCount--;
            btnReplay.disabled = true;
            document.getElementById('options-container').classList.add('hidden');
            statusMsg.textContent = "กำลังเล่นซ้ำ...";
            playSound(await loadSound(currentSongFile), () => {
                btnReplay.textContent = `ฟังซ้ำ (${replayCount}/3)`;
                if (replayCount > 0) {
                    btnReplay.disabled = false;
                } else {
                    btnReplay.classList.add('hidden');
                }
                document.getElementById('options-container').classList.remove('hidden');
                statusMsg.textContent = "";
                questionHeading.focus();
            });
        });

        async function nextQuestion() {
            if (currentRound >= 7) { endGame(true); return; }
            statusMsg.textContent = ""; currentRound++;
            let availableSongs = songData.filter(s => !usedSongs.includes(s.file));
            let selectedSong = availableSongs[Math.floor(Math.random() * availableSongs.length)];
            usedSongs.push(selectedSong.file); currentSongFile = selectedSong.file;
            
            if (replayCount > 0) {
                btnReplay.classList.remove('hidden');
                btnReplay.disabled = true;
                btnReplay.textContent = `ฟังซ้ำ (${replayCount}/3)`;
            } else {
                btnReplay.classList.add('hidden');
            }
            
            document.getElementById('options-container').classList.add('hidden');
            questionHeading.textContent = `ข้อที่ ${currentRound}: ตั้งใจฟังเพลงนะ...`;
            
            // ไม่ focus ตรงนี้ ให้รอเล่นจบก่อน
            playSound(await loadSound(selectedSong.file), () => {
                if (replayCount > 0) btnReplay.disabled = false;
                generateOptions(selectedSong);
                document.getElementById('options-container').classList.remove('hidden');
                // Focus ที่ Heading หลังจากเพลงจบและตัวเลือกปรากฏแล้ว
                questionHeading.focus();
            });
        }

        async function checkAnswer(isCorrect, btn, container) {
            if (isCorrect) {
                playSound(await loadSound('t.mp3'));
                statusMsg.textContent = "ถูกต้อง!"; announce("ถูกต้อง");
                container.querySelectorAll('button').forEach(b => b.disabled = true);
                btnReplay.classList.add('hidden');
                setTimeout(nextQuestion, 2000);
            } else if (lives > 0) {
                lives--; btn.disabled = true; btn.style.opacity = "0.3";
                playSound(await loadSound('f.mp3'));
                statusMsg.textContent = "ผิดครับ! แก้ตัวได้อีกหนึ่งครั้ง";
                announce("ผิดครับ! แก้ตัวได้อีกหนึ่งครั้ง");
            } else { endGame(false); }
        }

        function generateOptions(song) {
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            const questionType = Math.floor(Math.random() * 3);
            
            if (questionType === 0) {
                const target = song.words[Math.floor(Math.random() * song.words.length)];
                questionHeading.textContent = `ข้อที่ ${currentRound}: มีคำว่า "${target.w}" กี่ครั้ง?`;
                let options = [target.n, target.n + 1, target.n - 1, target.n + 2].sort(() => Math.random() - 0.5);
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.textContent = opt;
                    btn.onclick = () => checkAnswer(opt == target.n, btn, container);
                    container.appendChild(btn);
                });
            } else {
                const allCounts = song.words.map(item => item.n);
                const limit = (questionType === 1) ? Math.min(...allCounts) : Math.max(...allCounts);
                questionHeading.textContent = (questionType === 1) ? `ข้อที่ ${currentRound}: คำใดมีจำนวน "น้อยที่สุด"?` : `ข้อที่ ${currentRound}: คำใดมีจำนวน "มากที่สุด"?`;
                
                const targetWords = song.words.filter(item => item.n === limit).map(item => item.w);
                song.words.forEach(item => {
                    const btn = document.createElement('button');
                    btn.textContent = item.w;
                    btn.onclick = () => checkAnswer(targetWords.includes(item.w), btn, container);
                    container.appendChild(btn);
                });
            }
        }

        async function endGame(isWin) {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const resultTitle = document.getElementById('result-title');
            resultTitle.textContent = isWin ? "🏆 คุณชนะ!" : "💀 เกมโอเวอร์";
            resultTitle.focus();
            
            playSound(await loadSound(isWin ? 'end.mp3' : 'end1.mp3'));
            document.getElementById('result-message').textContent = isWin ? "สุดยอด หูเทพมาก!" : "ไม่เป็นไรนะ ลองใหม่!";
        }
    </script>
</body>
</html>
