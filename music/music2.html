<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมทายจำนวนคำจากเพลง</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap');
        body { font-family: 'Kanit', sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; text-align: center; background-color: #f8f9fa; color: #333; }
        .hidden { display: none !important; }
        .game-card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        button { padding: 15px 25px; font-size: 1.1rem; cursor: pointer; border-radius: 12px; border: none; background-color: #4A90E2; color: white; margin: 10px; transition: all 0.2s; font-weight: bold; }
        button:hover:not(:disabled) { background-color: #357ABD; transform: translateY(-2px); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; opacity: 0.5; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        #status-msg { margin: 10px 0; font-weight: 500; min-height: 1.5em; color: #e67e22; font-size: 1.1rem; }
        h1:focus, h2:focus { outline: none; }
        .sr-announcer { position: absolute; clip: rect(1px, 1px, 1px, 1px); padding: 0; border: 0; height: 1px; width: 1px; overflow: hidden; }
        h1, h2 { color: #2c3e50; margin-bottom: 5px; }
        .result-text { font-size: 1.5rem; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen" class="game-card">
        <h1 id="start-heading" tabindex="-1">🎵 เกมทายจำนวนคำ</h1>
        <p>กติกา: ฟังเพลงจบแล้วทายจำนวนคำ</p>
        <p style="color: #e74c3c;">* ผิดได้ 1 ครั้ง และฟังซ้ำได้ 1 ครั้งตลอดเกม! *</p>
        <button id="btn-start">เริ่มท้าทายเลย!</button>
    </div>

    <div id="game-screen" class="game-card hidden">
        <h2 id="question-text" tabindex="-1">เตรียมเพลง...</h2>
        <div id="status-msg"></div>
        <div id="audio-controls">
            <button id="btn-replay">ฟังซ้ำ (1/1)</button>
        </div>
        <div id="options-container" class="options-grid"></div>
    </div>

    <div id="result-screen" class="game-card hidden">
        <h2 id="result-title" tabindex="-1">จบเกม!</h2>
        <p id="result-message" class="result-text"></p>
        <button onclick="location.reload()">เล่นใหม่อีกครั้ง</button>
    </div>

    <div id="announcer" class="sr-announcer" aria-live="assertive" aria-atomic="true"></div>

    <script>
        // Web Audio API Setup
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let currentSource = null;
        const audioBuffers = {};

        const songData = [
            // ข้อมูลเดิม
            { file: 'espresso.mp3', words: [{w:'อเมริกาโน่', n:6}, {w:'เอสเพรซโซ่', n:8}, {w:'ลาเต้', n:14}, {w:'คาปูชิโน่', n:6}] },
            { file: 'หมี.mp3', words: [{w:'หมี', n:7}, {w:'หีบ', n:4}, {w:'หนี', n:8}, {w:'หาย', n:14}] },
            { file: 'ว้าวุ่น.mp3', words: [{w:'ว้าวุ่น', n:7}, {w:'วาสนา', n:5}, {w:'ชีวิต', n:5}, {w:'สู้', n:8}] },
            { file: 'ดี4.mp3', words: [{w:'ดี', n:27}, {w:'หู', n:5}, {w:'หัน', n:6}, {w:'หลาย', n:12}] },
            { file: 'fruit.mp3', words: [{w:'แอปเปิ้ล', n:9}, {w:'มะละกอ', n:9}, {w:'กล้วย', n:10}, {w:'ส้ม', n:10}] },
            { file: 'จึ้ง.mp3', words: [{w:'จึ้ง', n:8}, {w:'แกง', n:8}, {w:'ปัง', n:8}, {w:'บ้ง', n:5}] },
            { file: '1469.mp3', words: [{w:'หนึ่ง', n:8}, {w:'สี่', n:12}, {w:'หก', n:20}, {w:'เก้า', n:16}] },
            { file: 'mama.mp3', words: [{w:'มาม่า', n:8}, {w:'ไวไว', n:7}, {w:'ซื่อสัตย์', n:3}, {w:'นิสชิน', n:6}] },
            
            // ข้อมูลที่เพิ่มใหม่
            { file: 'kitchen.mp3', words: [{w:'หม้อ', n:9}, {w:'จาน', n:8}, {w:'ชาม', n:9}, {w:'กระทะ', n:9}] },
            { file: 'ma.mp3', words: [{w:'มะม่วง', n:6}, {w:'มะนาว', n:5}, {w:'มะยม', n:6}, {w:'มะขาม', n:7}] },
            { file: 'flower.mp3', words: [{w:'จำปี', n:5}, {w:'จำปา', n:7}, {w:'แก้ว', n:9}, {w:'มะลิ', n:18}] },
            { file: 'pen.mp3', words: [{w:'กระเป๋า', n:10}, {w:'ดินสอ', n:11}, {w:'ปากกา', n:12}, {w:'สมุด', n:6}] },
            { file: 'catdog.mp3', words: [{w:'แมว', n:11}, {w:'หมา', n:7}, {w:'หมี', n:13}, {w:'กบ', n:6}] },
            { file: 'tour.mp3', words: [{w:'ท่าน', n:6}, {w:'ทัวร์', n:4}, {w:'หาด', n:5}, {w:'ใกล้', n:7}] },
            { file: 'somtam.mp3', words: [{w:'อ๊า', n:14}, {w:'โอ๊ย', n:22}, {w:'อู๊ย', n:12}, {w:'อื๊ม', n:5}] }
        ];

        let currentRound = 0, lives = 1, usedSongs = [], canReplay = true, currentSongFile = "";
        const statusMsg = document.getElementById('status-msg');
        const announcer = document.getElementById('announcer');
        const btnReplay = document.getElementById('btn-replay');
        const questionHeading = document.getElementById('question-text');

        async function loadSound(file) {
            const url = `audio/${file}`;
            if (audioBuffers[url]) return audioBuffers[url];
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            audioBuffers[url] = audioBuffer;
            return audioBuffer;
        }

        function playSound(buffer, callback) {
            if (currentSource) currentSource.stop();
            currentSource = audioCtx.createBufferSource();
            currentSource.buffer = buffer;
            currentSource.connect(audioCtx.destination);
            currentSource.onended = callback;
            currentSource.start(0);
        }

        function announce(text) {
            announcer.textContent = text;
            setTimeout(() => { announcer.textContent = ""; }, 1000); 
        }

        window.onload = () => document.getElementById('start-heading').focus();

        document.getElementById('btn-start').addEventListener('click', async () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            currentRound = 0; lives = 1; usedSongs = []; canReplay = true;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            nextQuestion();
        });

        btnReplay.addEventListener('click', async () => {
            if (!canReplay) return;
            canReplay = false;
            btnReplay.classList.add('hidden');
            document.getElementById('options-container').classList.add('hidden');
            statusMsg.textContent = "กำลังเล่นซ้ำ...";
            const buffer = await loadSound(currentSongFile);
            playSound(buffer, () => {
                document.getElementById('options-container').classList.remove('hidden');
                statusMsg.textContent = "";
                questionHeading.focus();
            });
        });

        async function nextQuestion() {
            if (currentRound >= 5) { endGame(true); return; }
            statusMsg.textContent = ""; 
            currentRound++; 
            
            if (!canReplay) btnReplay.classList.add('hidden');
            else btnReplay.classList.remove('hidden');
            
            let availableSongs = songData.filter(s => !usedSongs.includes(s.file));
            let selectedSong = availableSongs[Math.floor(Math.random() * availableSongs.length)];
            usedSongs.push(selectedSong.file);
            currentSongFile = selectedSong.file;
            
            document.getElementById('options-container').classList.add('hidden'); 
            questionHeading.textContent = `ข้อที่ ${currentRound}: ตั้งใจฟังเพลงนะ...`;
            
            const buffer = await loadSound(selectedSong.file);
            playSound(buffer, () => {
                generateOptions(selectedSong);
                document.getElementById('options-container').classList.remove('hidden');
                questionHeading.focus();
            });
        }

        function generateOptions(song) {
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            let type = Math.floor(Math.random() * 4);
            const target = song.words[type];
            questionHeading.textContent = `ข้อที่ ${currentRound}: มีคำว่า "${target.w}" กี่ครั้ง?`;
            
            let options = [target.n, target.n+1, target.n-1, target.n+2].map(String);
            options.sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.onclick = async () => {
                    if (opt == target.n) {
                        const buffer = await loadSound('t.mp3');
                        playSound(buffer);
                        statusMsg.textContent = "ถูกต้อง!";
                        announce("ถูกต้อง");
                        container.querySelectorAll('button').forEach(b => b.disabled = true);
                        btnReplay.classList.add('hidden');
                        setTimeout(nextQuestion, 2000);
                    } else {
                        if (lives > 0) {
                            lives--;
                            const buffer = await loadSound('f.mp3');
                            playSound(buffer);
                            btn.disabled = true;
                            btn.style.opacity = "0.3";
                            statusMsg.textContent = "ผิดครับ! แก้ตัวได้อีกหนึ่งครั้ง";
                            announce("ตอบผิด แก้ตัวได้อีกครั้ง ปุ่มเดิมใช้ไม่ได้แล้ว");
                        } else { endGame(false); }
                    }
                };
                container.appendChild(btn);
            });
        }

        async function endGame(isWin) {
            document.getElementById('game-screen').classList.add('hidden');
            const resultScreen = document.getElementById('result-screen');
            resultScreen.classList.remove('hidden');
            
            const effectFile = isWin ? 'end.mp3' : 'end1.mp3';
            const buffer = await loadSound(effectFile);
            playSound(buffer);
            
            const resultTitle = document.getElementById('result-title');
            resultTitle.textContent = isWin ? "🏆 คุณชนะ!" : "💀 เกมโอเวอร์";
            document.getElementById('result-message').textContent = isWin ? "สุดยอด หูเทพมาก!" : "ไม่เป็นไรนะ ลองใหม่!";
            resultTitle.focus();
        }
    </script>
</body>
</html>
