<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>จริงหรือเอ๊ะ</title>
    <style>
        :root {
            --player-color: #00ffcc;
            --bot-color: #ff3300;
            --bg-dark: #0f172a;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --combo-color: #ffcc00;
            --btn-default: #334155;
            --plate-bg: rgba(15, 23, 42, 0.85);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100%;
            position: fixed;
        }

        /* --- CSS ส่วนที่เพิ่มใหม่สำหรับปุ่มหกเหลี่ยม --- */
        .home-btn-hex {
            width: 60px; 
            height: 60px;
            background-color: var(--combo-color) !important; 
            color: #000 !important; 
            font-size: 1.8rem;
            display: flex; 
            justify-content: center; 
            align-items: center;
            cursor: pointer; 
            border: none;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.5));
            z-index: 9999; 
            position: fixed; 
            top: 20px; 
            left: 20px;
            text-decoration: none;
        }

        .home-btn-hex:hover {
            transform: scale(1.1);
            filter: brightness(1.1) drop-shadow(0 0 15px rgba(255, 204, 0, 0.8));
        }

        .end-game-btn-container {
            position: relative;
            top: 0;
            left: 0;
        }
        /* -------------------------------------- */

        #game-container {
            width: 100%; height: 100%;
            max-width: 600px;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: filter 2s ease-in;
        }

        #battle-field {
            flex: 0 0 35%;
            display: flex; align-items: flex-end; justify-content: space-between;
            padding: 20px 8% 10px 8%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
            z-index: 10;
        }

        .side-group { 
            width: clamp(100px, 28vw, 150px); 
            display: flex; flex-direction: column; align-items: center; 
            position: relative; outline: none;
        }

        .hp-bar-bg { height: 12px; background: #1e293b; border: 2px solid #fff; width: 100%; margin-bottom: 8px; overflow: hidden; border-radius: 6px; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.4s cubic-bezier(0.22, 0.61, 0.36, 1); }
        .character-svg { width: 100%; height: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

        #center-ui {
            flex: 0 0 auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px 20px 0 20px;
            z-index: 20;
        }

        #timer-bar-bg { width: 90%; background: #1e293b; height: 8px; margin-bottom: 20px; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #timer-fill { height: 100%; width: 100%; background: var(--combo-color); transition: width 0.1s linear; border-radius: 4px; }

        #question-plate {
            background: var(--plate-bg);
            padding: 25px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }

        #question-text { 
            font-size: clamp(1.6rem, 7vw, 2.4rem);
            text-align: center; margin: 0;
            color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-weight: bold; line-height: 1.3; outline: none; word-break: break-word;
        }

        .options-grid { display: flex; justify-content: center; gap: clamp(20px, 8vw, 40px); width: 100%; }

        .option-btn {
            width: clamp(90px, 24vw, 120px); 
            height: clamp(90px, 24vw, 120px); 
            font-size: clamp(2.8rem, 14vw, 3.8rem); 
            border: none; cursor: pointer; border-radius: 50%;
            background: var(--btn-default); color: white; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 0 #0f172a, 0 12px 24px rgba(0,0,0,0.3);
        }
        .option-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 4px 0 #0f172a; }
        .option-btn.correct { background-color: var(--correct-color) !important; transform: scale(1.15); box-shadow: 0 0 40px var(--correct-color); z-index: 5; }
        .option-btn.wrong { background-color: var(--wrong-color) !important; opacity: 0.8; transform: scale(0.9); }

        #bottom-ui {
            flex: 1;
            display: flex; align-items: flex-start; justify-content: center;
            padding: 20px 25px 20px 25px;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.95), transparent);
            z-index: 10;
            overflow-y: auto;
        }

        #info-box {
            text-align: center; color: #fff;
            font-size: clamp(1.3rem, 5vw, 1.5rem);
            font-weight: 600; visibility: hidden;
            line-height: 1.3; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            word-wrap: break-word; max-width: 100%;
            margin-top: 20px;
        }

        .damage-popup { position: absolute; top: -60px; font-weight: 900; font-size: 2.2rem; animation: damageFloat 1s forwards; z-index: 100; text-shadow: 2px 2px 0 #000; pointer-events: none; }
        @keyframes damageFloat { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-80px) scale(1.2); opacity: 0; } }
        
        .idle { animation: idleMove 3s ease-in-out infinite; }
        @keyframes idleMove { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .slide-in-left { transform: translateX(-250px); opacity: 0; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .slide-in-right { transform: translateX(250px); opacity: 0; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .in-place { transform: translateX(0); opacity: 1; }

        @keyframes playerJump { 0% { transform: translate(0, 0); } 30% { transform: translate(40px, -60px); } 100% { transform: translate(0, 0); } }
        .p-jump { animation: playerJump 0.5s ease-out !important; }
        @keyframes botJump { 0% { transform: translate(0, 0); } 30% { transform: translate(-40px, -60px); } 100% { transform: translate(0, 0); } }
        .b-jump { animation: botJump 0.5s ease-out !important; }

        .is-dizzy { animation: dizzy 0.15s infinite; filter: saturate(2) brightness(1.3); }
        @keyframes dizzy { 0% { transform: translateX(-4px); } 50% { transform: translateX(4px); } 100% { transform: translateX(-4px); } }
        
        .victory-jump { animation: victoryJump 0.4s infinite; }
        @keyframes victoryJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-35px); } }

        .celebration-element { position: absolute; top: -100px; font-size: 4rem; z-index: 150; animation: fallRotate 3s ease-in forwards; pointer-events: none; }
        @keyframes fallRotate { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(110vh) rotate(720deg); } }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        #start-screen { position:absolute; inset:0; background:rgba(15, 23, 42, 0.98); z-index:200; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sr-announcer" class="sr-only" aria-live="assertive"></div>

    <div id="start-screen">
        <button class="home-btn-hex" aria-label="กลับสู่ชุมชน" onclick="window.location.href='../index.html'">🏠</button>

        <h1 style="font-size:3.5rem; color:var(--combo-color); margin-bottom:10px; text-shadow: 0 4px 10px rgba(0,0,0,0.5);">จริงหรือเอ๊ะ</h1>
<div style="text-align: center; margin-bottom: 15px; color: #94a3b8; line-height: 1.5;">
    <div style="font-size: 0.85rem;">
        ให้เสียงโดย: เอ๋ Entertain <span style="margin: 0 5px; opacity: 0.5;">|</span> Dev: Morcom
    </div>
    
    <div style="font-size: 0.7rem; opacity: 0.7; margin-top: 2px;">
        * ข้อมูลจาก AI ควรศึกษาเพิ่มเติมจากแหล่งอ้างอิงที่เชื่อถือได้
    </div>
</div>
        <button class="option-btn" onclick="startGameSequence()" style="width:220px; height:80px; border-radius:20px; font-size:2rem;">เริ่มเอ๊ะ</button>
    </div>

    <div id="battle-field">
        <section id="player-group" class="side-group idle slide-in-left" role="group" aria-label="ผู้เล่น พลัง 1000" tabindex="0">
            <div id="player-damage-container"></div>
            <div class="hp-bar-bg" aria-hidden="true">
                <div id="player-hp-fill" class="hp-fill" style="background:var(--player-color); box-shadow: 0 0 15px var(--player-color);"></div>
            </div>
            <svg class="character-svg" viewBox="0 0 100 100" aria-hidden="true">
                <rect x="38" y="75" width="8" height="15" fill="#e2e8f0" stroke="#fff" stroke-width="1"/>
                <rect x="54" y="75" width="8" height="15" fill="#e2e8f0" stroke="#fff" stroke-width="1"/>
                <path d="M30 50 Q30 40 50 40 Q70 40 70 50 L65 75 L35 75 Z" fill="var(--player-color)" stroke="#fff" stroke-width="2"/>
                <rect x="22" y="48" width="8" height="20" rx="4" fill="var(--player-color)" stroke="#fff" stroke-width="1.5"/>
                <rect x="70" y="48" width="8" height="20" rx="4" fill="var(--player-color)" stroke="#fff" stroke-width="1.5"/>
                <circle cx="50" cy="28" r="22" fill="#ffe4e1" stroke="#fff" stroke-width="1.5"/>
                <path d="M28 28 Q28 8 50 8 Q72 8 72 28 L72 20 Q60 5 40 10 Q28 15 28 28" fill="#1a1a1a"/>
                <path d="M40 22 Q43 20 46 22" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
                <path d="M54 22 Q57 20 60 22" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
                <circle cx="43" cy="28" r="2.5" fill="#1a1a1a"/>
                <circle cx="57" cy="28" r="2.5" fill="#1a1a1a"/>
                <path d="M50 30 L50 34" fill="none" stroke="#1a1a1a" stroke-width="1"/>
                <path d="M45 38 Q50 42 55 38" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
            </svg>
            <span style="font-size:0.8rem; color:var(--player-color); font-weight:900; margin-top:5px; letter-spacing:1px;" aria-hidden="true">YOU</span>
        </section>

        <section id="bot-group" class="side-group idle slide-in-right" role="group" aria-label="บอท พลัง 1000" tabindex="0">
            <div id="bot-damage-container"></div>
            <div class="hp-bar-bg" aria-hidden="true">
                <div id="bot-hp-fill" class="hp-fill" style="background:var(--bot-color); box-shadow: 0 0 15px var(--bot-color);"></div>
            </div>
            <svg class="character-svg" viewBox="0 0 100 100" aria-hidden="true">
                <rect x="38" y="75" width="8" height="15" fill="#334155" stroke="var(--bot-color)" stroke-width="1"/>
                <rect x="54" y="75" width="8" height="15" fill="#334155" stroke="var(--bot-color)" stroke-width="1"/>
                <path d="M30 50 Q30 40 50 40 Q70 40 70 50 L65 75 L35 75 Z" fill="#1e293b" stroke="var(--bot-color)" stroke-width="2"/>
                <rect x="22" y="48" width="8" height="20" rx="4" fill="#1e293b" stroke="var(--bot-color)" stroke-width="1.5"/>
                <rect x="70" y="48" width="8" height="20" rx="4" fill="#1e293b" stroke="var(--bot-color)" stroke-width="1.5"/>
                <circle cx="50" cy="28" r="22" fill="#334155" stroke="var(--bot-color)" stroke-width="1.5"/>
                <path d="M28 28 A22 22 0 0 1 72 28 L72 18 Q50 6 28 18 Z" fill="#000" stroke="var(--bot-color)" stroke-width="1"/>
                <circle cx="43" cy="25" r="3" fill="var(--bot-color)">
                    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite" />
                </circle>
                <circle cx="57" cy="25" r="3" fill="var(--bot-color)">
                    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite" />
                </circle>
                <path d="M45 38 L55 38" fill="none" stroke="var(--bot-color)" stroke-width="2"/>
            </svg>
            <span style="font-size:0.8rem; color:var(--bot-color); font-weight:900; margin-top:5px; letter-spacing:1px;" aria-hidden="true">ENEMY</span>
        </section>
    </div>

    <div id="center-ui">
        <div id="timer-bar-bg" aria-hidden="true"><div id="timer-fill"></div></div>
        <div id="question-plate">
            <h2 id="question-text" tabindex="-1" aria-hidden></h2>
        </div>
        <div class="options-grid" id="options-grid"></div>
    </div>

    <div id="bottom-ui">
        <div id="info-box" aria-hidden="true"></div>
    </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sounds = {};
const questionsData = [
    {         q: "หลั่งข้างนอก หรือนับวันหน้า 7 หลัง 7 เป็นวิธีคุมกำเนิดที่ปลอดภัย 100% ชัวร์ไม่มีท้อง... จริง หรือ เอ๊ะ?", 
        a: ["จริง", "เอ๊ะ"], c: 1, 
        info: "เอ๊ะแน่นอนครับ! ทั้งสองวิธีมีโอกาสพลาดสูงมาก น้ำหล่อลื่นอาจมีอสุจิปนอยู่ ส่วนรอบเดือนก็คลาดเคลื่อนได้ง่าย ไม่ใช่วิธีคุมกำเนิดที่ได้มาตรฐาน" 
    },
    { 
        q: "การใส่ถุงยางอนามัยซ้อนกัน 2 ชั้น จะช่วยเพิ่มความปลอดภัยเป็นสองเท่า... จริง หรือ เอ๊ะ?", 
        a: ["จริง", "เอ๊ะ"], c: 1, 
        info: "เอ๊ะครับ! การใส่ซ้อนกันจะทำให้เนื้อยางเสียดสีกันเองจนขาดง่ายกว่าเดิม ใส่ชั้นเดียวที่ไซส์พอดีคำคือเซฟที่สุดแล้ว" 
    },
    { 
        q: "การใช้น้ำยาล้างจุดซ่อนเร้นสวนล้างช่องคลอดบ่อยๆ เป็นสิ่งที่ดีต่อสุขภาพ... จริง หรือ เอ๊ะ?", 
        a: ["จริง", "เอ๊ะ"], c: 1, 
        info: "เอ๊ะครับ! ช่องคลอดมีระบบทำความสะอาดตัวเองอยู่แล้ว การสวนล้างบ่อยๆ จะไปทำลายสมดุลแบคทีเรียดี (Lactobacillus) ทำให้ติดเชื้อง่ายขึ้น ล้างแค่ภายนอกด้วยน้ำสะอาดก็พอ" 
    },
    { 
        q: "ไซส์รองเท้าหรือขนาดนิ้วมือ สามารถบอกขนาดอวัยวะเพศชายได้อย่างแม่นยำ... จริง หรือ เอ๊ะ?", 
        a: ["จริง", "เอ๊ะ"], c: 1, 
        info: "เอ๊ะครับ! ไม่มีงานวิจัยทางการแพทย์ใดๆ ยืนยันว่าขนาดอวัยวะเพศสัมพันธ์กับไซส์รองเท้าหรือนิ้วมือ ทุกอย่างขึ้นอยู่กับกรรมพันธุ์และฮอร์โมนล้วนๆ" 
    },
    {
    { 
        q: "อวัยวะเพศชายที่มีลักษณะโค้งงอเล็กน้อยตอนแข็งตัว (ไม่ตรงเป๊ะเป็นไม้บรรทัด) ถือเป็นความพิการผิดปกติร้ายแรง... จริง หรือ เอ๊ะ?", 
        a: ["จริง", "เอ๊ะ"], c: 1, 
        info: "เอ๊ะครับ! องคชาตของคนส่วนใหญ่มักจะมีความโค้งหรืองอไปทางซ้าย ขวา บน หรือล่างเล็กน้อยเป็นธรรมชาติอยู่แล้ว ตราบใดที่ยังแข็งตัวได้ปกติและไม่สร้างความเจ็บปวดระหว่างสอดใส่ ถือว่าปกติธรรมดามากครับ" 
    }
];

let playerHP = 1000, botHP = 1000, timerInterval = null, bgmSource = null;
let comboCount = 0, lastAtSound = "", lastEnSound = "";
let shuffledQuestions = [], currentQIndex = 0;

function shuffleQuestions() {
    shuffledQuestions = [...questionsData];
    for (let i = shuffledQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledQuestions[i], shuffledQuestions[j]] = [shuffledQuestions[j], shuffledQuestions[i]];
    }
    currentQIndex = 0;
}

async function loadSound(name, url) {
    try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        sounds[name] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) { console.error(name, "failed"); }
}

const soundFiles = [
    ['start','audio/start.mp3'],['back','audio/back.mp3'],
    ['at1','audio/at1.mp3'],['at2','audio/at2.mp3'],['at3','audio/at3.mp3'],['atc','audio/atc.mp3'],
    ['en1','audio/en1.mp3'],['en2','audio/en2.mp3'],['en3','audio/en3.mp3'],['enc','audio/enc.mp3'],
    ['win','audio/win.mp3'],['lost','audio/lost.mp3'],['combo','audio/combo.mp3']
];
soundFiles.forEach(f => loadSound(f[0], f[1]));

function playSound(name) { 
    if(sounds[name]) { 
        const s = audioCtx.createBufferSource(); 
        s.buffer = sounds[name]; s.connect(audioCtx.destination); 
        s.start(); return s; 
    } 
}

function playRandomSound(prefix, lastSound) {
    const pool = [1, 2, 3].filter(num => `${prefix}${num}` !== lastSound);
    const chosen = `${prefix}${pool[Math.floor(Math.random() * pool.length)]}`;
    playSound(chosen); return chosen;
}

function announce(msg) {
    const el = document.getElementById('sr-announcer');
    el.textContent = ""; 
    if(msg !== "") { setTimeout(() => { el.textContent = msg; }, 50); }
}

function startGameSequence() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('start-screen').style.display = 'none';
    shuffleQuestions();
    const startSnd = playSound('start');
    const qEl = document.getElementById('question-text');
    
    const countdown = (val, delay, isFinal) => {
        setTimeout(() => {
            qEl.textContent = val;
            if(isFinal) {
                document.getElementById('player-group').classList.add('in-place');
                document.getElementById('bot-group').classList.add('in-place');
            }
        }, delay);
    };
    countdown("3", 0, false); countdown("2", 500, false); countdown("1", 1000, false); countdown("GO!", 1500, true);

    if (startSnd) {
        startSnd.onended = () => {
            bgmSource = playSound('back'); if(bgmSource) bgmSource.loop = true;
            nextQuestion();
        };
    } else {
        setTimeout(() => {
            bgmSource = playSound('back'); if(bgmSource) bgmSource.loop = true;
            nextQuestion();
        }, 2500);
    }
}

function nextQuestion() {
    if (playerHP <= 0 || botHP <= 0) { endGame(); return; }
    if (currentQIndex >= shuffledQuestions.length) { shuffleQuestions(); }
    announce(""); 
    document.getElementById('info-box').style.visibility = 'hidden';
    document.getElementById('options-grid').style.display = 'flex';
    const qData = shuffledQuestions[currentQIndex];
    const qEl = document.getElementById('question-text');
    qEl.textContent = qData.q;
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    const b1 = document.createElement('button'); b1.className='option-btn'; b1.innerHTML='👍';
    b1.setAttribute('aria-label', 'จริง'); b1.onclick=()=>checkAnswer(0===qData.c, b1);
    const b2 = document.createElement('button'); b2.className='option-btn'; b2.innerHTML='👎';
    b2.setAttribute('aria-label', 'เอ๊ะ'); b2.onclick=()=>checkAnswer(1===qData.c, b2);
    grid.appendChild(b1); grid.appendChild(b2);
    setTimeout(() => { qEl.focus(); }, 100);
    startTimer();
}

function startTimer() {
    let timeLeft = 20000;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft -= 100;
        document.getElementById('timer-fill').style.width = (timeLeft/20000)*100 + "%";
        if(timeLeft <= 0) { clearInterval(timerInterval); checkAnswer(false, null); }
    }, 100);
}

function checkAnswer(isCorrect, btn) {
    clearInterval(timerInterval);
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    const qData = shuffledQuestions[currentQIndex];
    let fb = "";
    
    if (isCorrect) {
        if(btn) btn.classList.add('correct');
        comboCount = comboCount < 0 ? 1 : comboCount + 1;
        let dmg = (comboCount >= 4) ? (Math.floor(Math.random()*91)+190) : (Math.floor(Math.random()*71)+70);
        if(comboCount >= 4) { playSound('atc'); playSound('combo'); comboCount = 0; }
        else { lastAtSound = playRandomSound('at', lastAtSound); }
        botHP -= dmg; showDamage('bot', dmg); triggerJump('player');
        fb = `ถูกต้อง! บอทเสียพลัง ${dmg}`;
    } else {
        if(btn) btn.classList.add('wrong');
        btns.forEach((b, idx) => { if(idx === qData.c) b.classList.add('correct'); });
        comboCount = comboCount > 0 ? -1 : comboCount - 1;
        let dmg = (comboCount <= -4) ? (Math.floor(Math.random()*91)+190) : (Math.floor(Math.random()*71)+70);
        if(comboCount <= -4) { playSound('enc'); playSound('combo'); comboCount = 0; }
        else { lastEnSound = playRandomSound('en', lastEnSound); }
        playerHP -= dmg; showDamage('player', dmg); triggerJump('bot');
        fb = `พลาด! คุณเสียพลัง ${dmg}`;
    }
    
    updateHP();
    const infoText = qData.info;
    document.getElementById('info-box').textContent = infoText;
    document.getElementById('info-box').style.visibility = 'visible';
    
    setTimeout(() => { announce(`${fb} ข้อมูล: ${infoText}`); }, 1500);

    currentQIndex++;
    setTimeout(nextQuestion, 14000);
}

function showDamage(target, amount) {
    const container = document.getElementById(`${target}-damage-container`);
    const div = document.createElement('div');
    div.className = 'damage-popup';
    div.textContent = `-${amount}`;
    div.style.color = target === 'bot' ? 'var(--player-color)' : 'var(--bot-color)';
    container.appendChild(div);
    setTimeout(() => div.remove(), 1000);
}

function triggerJump(attacker) {
    const p = document.getElementById('player-group'), b = document.getElementById('bot-group');
    if(attacker === 'player') {
        p.classList.remove('idle'); p.classList.add('p-jump'); b.classList.add('is-dizzy');
        setTimeout(() => { p.classList.remove('p-jump'); p.classList.add('idle'); b.classList.remove('is-dizzy'); }, 800);
    } else {
        b.classList.remove('idle'); b.classList.add('b-jump'); p.classList.add('is-dizzy');
        setTimeout(() => { b.classList.remove('b-jump'); b.classList.add('idle'); p.classList.remove('is-dizzy'); }, 800);
    }
}

function updateHP() {
    document.getElementById('player-hp-fill').style.width = Math.max(0, playerHP/10) + "%";
    document.getElementById('bot-hp-fill').style.width = Math.max(0, botHP/10) + "%";
    document.getElementById('player-group').setAttribute('aria-label', `ผู้เล่น พลังเหลือ ${Math.max(0, playerHP)}`);
    document.getElementById('bot-group').setAttribute('aria-label', `บอท พลังเหลือ ${Math.max(0, botHP)}`);
}

function endGame() {
    if(bgmSource) bgmSource.stop();
    clearInterval(timerInterval); 
    
    document.getElementById('timer-bar-bg').style.display = 'none';

    announce(""); 
    const win = botHP <= 0;
    const container = document.getElementById('game-container');
    const endSnd = playSound(win ? 'win' : 'lost');

    if(win) {
        for(let i=0; i<15; i++) {
            setTimeout(() => {
                const conf = document.createElement('div');
                conf.className = 'celebration-element';
                conf.textContent = ['✨','🎉','🎊','⭐'][Math.floor(Math.random()*4)];
                conf.style.left = Math.random()*100 + "vw";
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 3000);
            }, i * 200);
        }
        const trophy = document.createElement('div');
        trophy.className = 'celebration-element';
        trophy.innerHTML = '🏆'; trophy.style.left = '45vw'; trophy.style.fontSize = '5rem';
        document.body.appendChild(trophy);
        document.getElementById('player-group').classList.add('victory-jump');
    } else {
        container.style.filter = "brightness(0.2) grayscale(0.8)";
        const skull = document.createElement('div');
        skull.className = 'celebration-element';
        skull.innerHTML = '💀'; skull.style.left = '45vw'; skull.style.fontSize = '5rem';
        document.body.appendChild(skull);
    }

    const showFinalResult = () => {
        document.getElementById('info-box').style.visibility = 'hidden';
        const qEl = document.getElementById('question-text');
        qEl.textContent = win ? "ชัยชนะเป็นของคุณ!" : "พ่ายแพ้ให้กับบอท...";
        
        /* เปลี่ยนปุ่ม เล่นใหม่ เป็นปุ่ม กลับสู่ชุมชน ในหน้าสรุปเกม */
        document.getElementById('options-grid').innerHTML = `
            <div class="end-game-btn-container">
                <button class="home-btn-hex" style="position:static;" aria-label="กลับสู่ชุมชน" onclick="window.location.href='../index.html'">🏠</button>
            </div>`;
        qEl.focus();
    };

    if (endSnd) {
        endSnd.onended = showFinalResult;
    } else {
        setTimeout(showFinalResult, 3000);
    }
}
</script>
