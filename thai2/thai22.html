<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>จอมยุทธสำบัดสำนวน - High Contrast Edition</title>
    <style>
        /* [STAGE 6: SILENT OPERATOR - ปรับสีสันเพื่อ High Contrast และ Accessibility] */
        :root {
            --player-color: #b22222; /* แดงชาดเข้ม */
            --correct-color: #1b5e20; /* เขียวเข้มจัด */
            --wrong-color: #b71c1c; /* แดงเข้มจัด */
            --combo-color: #daa520; /* ทองสุก */
            --ui-bg: #fffcf5; /* ขาวนวลถนอมสายตา */
            --board-color: #3e2723; /* น้ำตาลเข้มไม้ */
            --skin-asia: #FFE4B5;
            --text-main: #1a252f; /* น้ำเงินเข้มเกือบดำ เพื่อ Contrast สูงสุด */
        }

        .sr-only {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
        }

        body {
            margin: 0; padding: 0; background-color: #d7ccc8; color: var(--text-main);
            font-family: 'Sarabun', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            height: 100vh; position: fixed; width: 100%;
        }

        #game-container {
            width: 95%; max-width: 1000px; height: 95vh; max-height: 850px;
            position: relative; background: var(--ui-bg); border: 10px solid var(--player-color);
            border-radius: 24px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        /* --- Animation Logic (คงเดิม 100%) --- */
        .shake-screen { animation: screenShake 0.4s; }
        @keyframes screenShake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-5px, 5px); } 75% { transform: translate(5px, -5px); } }
        .flash-correct { animation: flashGreen 0.5s; }
        @keyframes flashGreen { 0% { box-shadow: inset 0 0 0 0px rgba(46, 204, 113, 0.5); } 100% { box-shadow: inset 0 0 100px 50px rgba(46, 204, 113, 0); } }

        .particle {
            position: absolute; pointer-events: none; z-index: 100; border-radius: 50%;
            animation: particleOut 0.8s ease-out forwards;
        }
        @keyframes particleOut { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; } }

        .floating-text {
            position: absolute; pointer-events: none; font-size: 3rem; font-weight: 900;
            z-index: 1000; animation: floatUp 1.2s ease-out forwards;
            text-shadow: 2px 2px 0px #fff;
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }
        .text-gain { color: var(--correct-color); }
        .text-loss { color: var(--wrong-color); }

        /* --- UI Elements --- */
        #top-ui { background: #efebe9; padding: 15px 25px; z-index: 10; border-bottom: 4px solid var(--player-color); display: none; }
        .hp-bar-bg { height: 35px; background: #fff; border: 3px solid var(--text-main); border-radius: 20px; overflow: hidden; position: relative; }
        #player-hp-fill { height: 100%; width: 40%; background: linear-gradient(90deg, #d32f2f, var(--player-color)); transition: width 0.5s; }
        .hp-text { position: absolute; width: 100%; text-align: center; top: 0; font-weight: 900; font-size: 1.2rem; line-height: 35px; color: #000; text-shadow: 1px 1px 0 #fff; }
        #timer-bar-bg { width: 100%; height: 12px; background: #e0e0e0; border-radius: 6px; overflow: hidden; margin-top: 12px; border: 1px solid #999; }
        #timer-fill { width: 100%; height: 100%; background: var(--combo-color); transition: width 0.1s linear; }
        
        #pitch { flex-grow: 1; position: relative; display: none; background: #fafafa; overflow: hidden; border-bottom: 2px solid #ddd; }
        .blackboard { position: absolute; right: 20px; top: 30px; width: 200px; height: 120px; background: var(--board-color); border: 6px solid #8d6e63; border-radius: 8px; box-shadow: inset 0 0 10px #000; }
        
        /* --- Character Styling (ปรับสีผมและชุดใหม่ตามที่ขอ) --- */
        .character { position: absolute; bottom: 20px; transition: all 0.5s ease-in-out; pointer-events: none; }
        #player { left: 40px; width: 260px; display: flex; gap: 10px; z-index: 5; } 
        #bot { right: 40px; width: 160px; z-index: 5; } 
        .char-svg { width: 120px; height: 160px; filter: drop-shadow(4px 6px 10px rgba(0,0,0,0.25)); }
        
        .idle { animation: idle 2s infinite ease-in-out; }
        @keyframes idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .victory-anim { animation: celebrate 0.4s infinite; }
        @keyframes celebrate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-45px); } }
        .sad-anim { animation: shake 0.2s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* ปรับส่วนล่างให้รองรับคำถามยาวและอ่านง่ายขึ้น */
        #bottom-ui { background: var(--ui-bg); padding: 25px; display: none; flex-direction: column; border-top: 6px solid var(--player-color); max-height: 45%; overflow-y: auto; }
        #question-text { font-size: 2.2rem; text-align: center; margin: 0 0 20px 0; outline: none; color: var(--text-main); font-weight: 900; line-height: 1.3; }
        
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; }
        .option-btn { 
            padding: 22px 20px; font-size: 1.6rem; background: #ffffff; border: 4px solid var(--text-main); 
            border-radius: 18px; cursor: pointer; font-weight: 800; transition: all 0.2s; 
            color: var(--text-main); min-height: 90px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 var(--text-main);
        }
        .option-btn:hover:not(:disabled), .option-btn:focus { background: var(--player-color); color: #fff; border-color: var(--combo-color); transform: translateY(-2px); box-shadow: 0 6px 0 #000; }
        .option-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        
        #overlay-screen { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; padding: 30px; }
        
        .home-btn-hex {
            width: 80px; height: 80px; background-color: var(--combo-color) !important; 
            color: #000 !important; font-size: 2.5rem; display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: 4px solid #000; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            transition: all 0.3s ease; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            -webkit-appearance: none; text-decoration: none; z-index: 600;
        }

        .home-btn-hex:hover { transform: scale(1.1) rotate(8deg); filter: brightness(1.2); }
        .top-left-home { position: absolute; top: 25px; left: 25px; }
        #summary-home-btn { display: none; }
        #overlay-screen.summary-mode #summary-home-btn { display: flex !important; position: relative; margin-top: 30px; }
        #overlay-screen.summary-mode #action-btn { display: none !important; }

        @media (max-width: 600px) {
            #game-container { width: 100%; height: 100vh; border-radius: 0; border-width: 5px; }
            .options-grid { grid-template-columns: 1fr; gap: 12px; }
            #question-text { font-size: 1.8rem; }
            .option-btn { font-size: 1.4rem; padding: 15px; min-height: 70px; }
            #player { left: 15px; width: 180px; }
            #bot { right: 15px; width: 120px; }
            .char-svg { width: 85px; height: 120px; }
            #bottom-ui { padding: 15px; }
        }
    </style>
</head>
<body>

<div id="announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<div id="game-container">
    <div id="top-ui">
        <div class="hp-bar-bg">
            <div id="player-hp-fill"></div>
            <div class="hp-text" id="hp-label">400 / 1000</div>
        </div>
        <div id="timer-bar-bg"><div id="timer-fill"></div></div>
    </div>

    <div id="pitch">
        <div class="blackboard"></div>
        <div id="player" class="character idle">
            <!-- เด็กคนซ้าย: ผมดำสนิท ชุดเขียวไพร -->
            <svg class="char-svg" viewBox="0 0 100 120">
                <path d="M15 45 Q15 5 50 5 Q85 5 85 45 L90 60 L10 60 Z" fill="#000000"/>
                <circle cx="50" cy="45" r="28" fill="var(--skin-asia)"/> 
                <path d="M22 40 Q50 5 78 40" fill="#000000" stroke="#000" stroke-width="1"/>
                <rect x="30" y="72" width="40" height="40" rx="10" fill="#1b5e20"/>
                <circle cx="40" cy="45" r="3" fill="#333"/>
                <circle cx="60" cy="45" r="3" fill="#333"/>
                <path d="M45 58 Q50 63 55 58" stroke="#333" fill="none" stroke-width="2"/>
            </svg>
            <!-- เด็กคนขวา: ผมดำสนิท ชุดเหลืองอำพัน -->
            <svg class="char-svg" viewBox="0 0 100 120">
                <path d="M10 45 Q10 5 50 5 Q90 5 90 45 L95 90 L5 90 Z" fill="#000000"/>
                <circle cx="50" cy="45" r="28" fill="var(--skin-asia)"/>
                <path d="M22 40 Q50 8 78 40" fill="#000000" stroke="#000" stroke-width="1"/>
                <rect x="30" y="72" width="40" height="40" rx="10" fill="#ff8f00"/>
                <circle cx="40" cy="45" r="3" fill="#333"/>
                <circle cx="60" cy="45" r="3" fill="#333"/>
                <path d="M45 58 Q50 63 55 58" stroke="#333" fill="none" stroke-width="2"/>
            </svg>
        </div>
        
        <div id="bot" class="character idle">
            <!-- คุณครู: ผมเทา (ดอกเลา) ชุดน้ำเงินกรมท่า -->
            <svg class="char-svg" viewBox="0 0 100 140">
                <circle cx="75" cy="40" r="12" fill="#9e9e9e"/> 
                <circle cx="50" cy="45" r="28" fill="#FFDBAC"/> 
                <path d="M22 35 Q22 15 50 15 Q78 15 78 35 L82 45 L18 45 Z" fill="#9e9e9e"/>
                <rect x="28" y="44" width="18" height="12" rx="3" fill="none" stroke="#222" stroke-width="2"/>
                <rect x="54" y="44" width="18" height="12" rx="3" fill="none" stroke="#222" stroke-width="2"/>
                <path d="M46 50 L54 50" stroke="#222" stroke-width="2"/>
                <path d="M34 49 Q37 47 40 49" stroke="#000" fill="none" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M60 49 Q63 47 66 49" stroke="#000" fill="none" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="37" cy="51" r="2.5" fill="#000"/>
                <circle cx="63" cy="51" r="2.5" fill="#000"/>
                <path d="M48 55 Q50 57 52 55" stroke="#D2B48C" fill="none" stroke-width="1.5"/>
                <path d="M42 62 Q50 68 58 62" stroke="#d32f2f" fill="none" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="23" cy="55" r="2.5" fill="#F1C40F"/>
                <circle cx="77" cy="55" r="2.5" fill="#F1C40F"/>
                <path d="M25 75 Q50 70 75 75 L80 130 L20 130 Z" fill="#1a237e"/> 
                <path d="M40 73 L50 85 L60 73" fill="#0d1442"/>
                <circle cx="65" cy="90" r="2.5" fill="#F1C40F"/>
            </svg>
        </div>
    </div>

    <div id="bottom-ui">
        <h2 id="question-text" tabindex="-1"></h2>
        <div class="options-grid" id="options-grid"></div>
    </div>

    <div id="overlay-screen">
        <button id="main-home-btn" class="home-btn-hex top-left-home" aria-label="กลับสู่ชุมชน" onclick="window.location.href='../index9.html'">🏠</button>
        <h1 id="main-title" tabindex="-1" style="color: var(--player-color); text-align: center; font-size: 3rem; margin-bottom: 20px;">จอมยุทธสำบัดสำนวน</h1>
        <p id="summary-text" style="font-size: 1.8rem; margin-bottom: 40px; text-align: center; color: var(--text-main); font-weight: bold;">สะสมพลังความรู้ให้ครบ 1,000 เพื่อเป็นสุดยอดปราชญ์!</p>
        <button id="action-btn" class="option-btn" style="padding: 20px 60px; background: var(--correct-color); color: white; min-width: 300px; border:none; font-size: 2rem;" onclick="startGame()">เริ่มบทเรียน</button>
        <button id="summary-home-btn" class="home-btn-hex" aria-label="กลับสู่ชุมชน" onclick="window.location.href='../index9.html'">🏠</button>
    </div>
</div>

<script>
/* [STAGE 4: LOGIC RIGIDITY - ทุกอย่างคงเดิม 100% ยกเว้นชุดคำถาม] */
const questions = [
    { q: "สำนวน 'กล้วยใกล้ฝั่ง' มีความหมายตรงกับข้อใด?", a: ["สิ่งที่ทำได้ง่ายมาก", "แก่ใกล้จะตาย", "คนที่มีความรู้น้อย"], c: 1 },
    { q: "สำนวน 'กบในกะลาครอบ' หมายถึงอะไร?", a: ["คนที่มีโลกส่วนตัวสูง", "คนที่เชื่อคนง่าย", "คนที่มีความรู้น้อยแต่สำคัญตัวว่ารู้มาก"], c: 2 },
    { q: "สำนวน 'กระดูกสันหลังของชาติ' หมายถึงกลุ่มคนอาชีพใด?", a: ["ชาวนา", "ทหาร", "ข้าราชการ"], c: 0 },
    { q: "สำนวน 'กระดังงาลนไฟ' หมายถึงผู้หญิงลักษณะใด?", a: ["หญิงที่เคยแต่งงานแล้วย่อมมีเสน่ห์", "หญิงสาวที่สวยสะพรั่ง", "หญิงที่มีอารมณ์ร้อน"], c: 0 },
    { q: "สำนวน 'กระต่ายตื่นตูม' มีที่มาจากอะไร?", a: ["เสียงฟ้าผ่า", "เสียงมะพร้าวหล่น", "เสียงปืน"], c: 1 },
    { q: "สำนวน 'กระต่ายหมายจันทร์' หมายความว่าอย่างไร?", a: ["ชายหมายปองหญิงที่มีฐานะสูงกว่าตน", "คนที่มีความทะเยอทะยานสูง", "คนที่มีจินตนาการกว้างไกล"], c: 0 },
    { q: "สำนวน 'กล้านักมักบิ่น' สอนเรื่องใด?", a: ["การมีความกล้าหาญ", "ความพยายามอยู่ที่ไหนความสำเร็จอยู่ที่นั่น", "ความบ้าบิ่นอาจนำมาซึ่งอันตราย"], c: 2 },
    { q: "สำนวน 'กินคาบ' มีความหมายตรงกับข้อใด?", a: ["ชนะได้อย่างง่ายดายเด็ดขาด", "กินอาหารในแต่ละมื้อ", "การกินที่มูมมาม"], c: 0 },
    { q: "สำนวน 'กินปูนร้อนท้อง' หมายถึงอาการใด?", a: ["ความโกรธแค้น", "การกินของแสลง", "ทำผิดแล้วกลัวคนอื่นจะรู้จึงแสดงอาการพิรุธ"], c: 2 },
    { q: "สำนวน 'กินรังแตน' หมายถึงอาการอย่างไร?", a: ["อารมณ์เสียฉุนเฉียวดุร้าย", "หิวกระหายมาก", "พูดจาเสียงดัง"], c: 0 },
    { q: "สำนวน 'แกะดำ' ในสำนวนไทยหมายความว่าอย่างไร?", a: ["คนที่มีความสามารถพิเศษ", "คนที่ทำตัวแปลกแยกจากกลุ่มในทางไม่ดี", "คนที่เป็นผู้นำกลุ่ม"], c: 1 },
    { q: "สำนวน 'ใกล้เกลือกินด่าง' หมายความว่าอย่างไร?", a: ["ความมัธยัสถ์", "การประหยัดจนเกินเหตุ", "มองข้ามของดีที่อยู่ใกล้ตัว"], c: 2 },
    { q: "สำนวน 'ขิงก็ราข่าก็แรง' หมายถึงอะไร?", a: ["ต่างคนต่างไม่ยอมลดละกัน", "การทำอาหารที่รสจัด", "การทะเลาะกันของพี่น้อง"], c: 0 },
    { q: "สำนวน 'ขี่ช้างจับตั๊กแตน' หมายความว่าอย่างไร?", a: ["การทำงานที่คุ้มค่า", "ลงทุนมากแต่ได้ผลตอบแทนน้อย", "การทำสิ่งที่ยากลำบาก"], c: 1 },
    { q: "สำนวน 'ขุดบ่อล่อปลา' มีความหมายอย่างไร?", a: ["ทำกลอุบายให้ฝ่ายตรงข้ามหลงเชื่อ", "การเตรียมตัวทำงาน", "การประกอบอาชีพสุจริต"], c: 0 },
    { q: "สำนวน 'เข็นครกขึ้นภูเขา' หมายถึงอะไร?", a: ["ความพยายามที่ไร้ค่า", "การทำเรื่องง่ายให้เป็นเรื่องยาก", "การทำงานที่ยากลำบากเกินความสามารถ"], c: 2 },
    { q: "สำนวน 'ไข่ในหิน' หมายถึงอะไร?", a: ["ของที่ได้รับการทะนุถนอมอย่างยิ่ง", "ของที่หายาก", "คนที่มีความอดทนสูง"], c: 0 },
    { q: "สำนวน 'คางคกขึ้นวอ' หมายถึงคนลักษณะใด?", a: ["คนที่มีฐานะร่ำรวย", "คนต่ำต้อยพอได้ดีแล้วลืมตัว", "คนที่มีรูปร่างน่าเกลียด"], c: 1 },
    { q: "สำนวน 'คาบลูกคาบดอก' หมายถึงสถานการณ์ใด?", a: ["ความชัดเจน", "ความโชคดี", "ความก้ำกึ่งไม่แน่นอน"], c: 2 },
    { q: "สำนวน 'โคแก่เคี้ยวหญ้าอ่อน' หมายถึงอะไร?", a: ["ชายอายุมากที่มีภรรยาสาว", "การกินอาหารอ่อนๆ", "คนที่มีความพยายาม"], c: 0 },
    { q: "สำนวน 'ฆ้องปากแตก' หมายถึงคนลักษณะใด?", a: ["คนที่มีเสียงดัง", "คนที่เก็บความลับไม่อยู่", "คนที่ชอบด่าทอผู้อื่น"], c: 1 },
    { q: "สำนวน 'งมเข็มในมหาสมุทร' หมายความว่าอย่างไร?", a: ["ความพยายามที่ประสบความสำเร็จ", "การทำงานที่สูญเปล่า", "การค้นหาสิ่งที่ทำได้ยากยิ่ง"], c: 2 },
    { q: "สำนวน 'ใจดีสู้เสือ' หมายความว่าอย่างไร?", a: ["การมีเมตตาต่อสัตว์", "ทำใจให้กล้าเมื่อต้องเผชิญสิ่งที่น่ากลัว", "คนที่มีความกล้าหาญมาก"], c: 1 },

    { q: "สำนวน 'ตกถังข้าวสาร' หมายถึงใคร?", a: ["หนูที่หาของกิน", "ความโชคร้าย", "คนจนที่ได้แต่งงานกับคนรวย"], c: 2 },
    { q: "สำนวน 'ตบตา' หมายถึงอะไร?", a: ["การหลอกลวงให้เข้าใจผิด", "การรักษาดวงตา", "การแสดงละคร"], c: 0 },
    { q: "สำนวน 'ตะขิดตะขวงใจ' หมายถึงความรู้สึกใด?", a: ["ความมั่นใจ", "ความรู้สึกติดขัดใจหรือไม่สบายใจ", "ความโกรธ"], c: 1 },
    { q: "สำนวน 'ตีนแมว' หมายถึงใคร?", a: ["สัตว์เลี้ยง", "นักกีฬาวิ่ง", "หัวขโมยที่ย่องเบาเข้าบ้านคนอื่น"], c: 2 },
    { q: "สำนวน 'เตะฝุ่น' หมายถึงสถานการณ์ใด?", a: ["การว่างงาน", "การทำความสะอาด", "การเล่นฟุตบอล"], c: 0 },
    { q: "สำนวน 'โตเป็นควาย' มักใช้ดุใคร?", a: ["สัตว์เลี้ยง", "คนตัวใหญ่แต่ทำตัวไม่เหมาะสมหรือไม่ได้เรื่อง", "คนขยัน"], c: 1 },
    { q: "สำนวน 'ถ้อยทีถ้อยอาศัย' หมายถึงอะไร?", a: ["การทะเลาะกัน", "การยืมของ", "การพึ่งพาและผ่อนปรนเข้าหากัน"], c: 2 },
    { q: "สำนวน 'ทองแผ่นเดียวกัน' หมายถึงอะไร?", a: ["คนที่ดองกันจากการแต่งงานของลูกหลาน", "การซื้อทอง", "เพื่อนสนิท"], c: 0 },
    { q: "สำนวน 'นกไร้ไม้โห่' หมายถึงคนลักษณะใด?", a: ["คนที่มีเพื่อนมาก", "คนว้าเหว่ไม่มีที่พึ่งพาหรือคนรังเกียจ", "คนรักธรรมชาติ"], c: 1 },
    { q: "สำนวน 'น้ำขึ้นให้รีบตัก' สอนเรื่องใด?", a: ["การประหยัดน้ำ", "การขยันทำงานบ้าน", "เมื่อมีโอกาสดีมาถึงควรรีบทำ"], c: 2 },
    { q: "สำนวน 'หน้าเนื้อใจเสือ' หมายถึงคนลักษณะใด?", a: ["คนสวยแต่ใจร้าย", "คนที่หน้าตาดูใจดีแต่ใจจริงโหดร้าย", "คนรักสัตว์"], c: 1 }
];

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let sounds = {}; let bgmSource = null;
let playerHP = 400; let combo = 0; let wrongCombo = 0;
let currentQ = []; let timer = null; let lastSound = '';

/* Visual Effect Logic (คงเดิม) */
function createVisualEffect(isCorrect, changeValue) {
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');
    const rect = player.getBoundingClientRect();
    const color = isCorrect ? '#2ecc71' : '#e74c3c';
    const floatTxt = document.createElement('div');
    floatTxt.textContent = (isCorrect ? "+" : "-") + changeValue;
    floatTxt.className = `floating-text ${isCorrect ? 'text-gain' : 'text-loss'}`;
    floatTxt.style.left = (rect.left + rect.width / 2) + "px";
    floatTxt.style.top = (rect.top) + "px";
    document.body.appendChild(floatTxt);
    setTimeout(() => floatTxt.remove(), 1200);
    for(let i=0; i<12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.backgroundColor = color;
        p.style.width = p.style.height = (Math.random() * 12 + 8) + 'px';
        p.style.left = (rect.left + rect.width/2) + 'px';
        p.style.top = (rect.top + rect.height/2) + 'px';
        p.style.setProperty('--mx', (Math.random() - 0.5) * 300 + 'px');
        p.style.setProperty('--my', (Math.random() - 0.5) * 300 + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
    if(isCorrect) { container.classList.add('flash-correct'); setTimeout(() => container.classList.remove('flash-correct'), 500); }
    else { container.classList.add('shake-screen'); setTimeout(() => container.classList.remove('shake-screen'), 400); }
}

/* Audio Logic (คงเดิม 100%) */
async function initSounds() {
    const files = [['start','audio/start.mp3'],['back','audio/back.mp3'],['at1','audio/at1.mp3'],['at2','audio/at2.mp3'],['at3','audio/at3.mp3'],['atc','audio/atc.mp3'],['en1','audio/en1.mp3'],['en2','audio/en2.mp3'],['en3','audio/en3.mp3'],['enc','audio/enc.mp3'],['win','audio/win.mp3'],['lost','audio/lost.mp3']];
    for(let f of files) { try { const r = await fetch(f[1]); const b = await r.arrayBuffer(); sounds[f[0]] = await audioCtx.decodeAudioData(b); } catch(e){} }
}
initSounds();

function playSound(n) { if(!sounds[n]) return; const s = audioCtx.createBufferSource(); s.buffer = sounds[n]; s.connect(audioCtx.destination); s.start(); return s; }
function announce(msg) { const el = document.getElementById('announcer'); el.textContent = ''; if(msg) { setTimeout(() => { el.textContent = msg; }, 50); } }

/* Game Start Logic (คงเดิม) */
function startGame() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const overlay = document.getElementById('overlay-screen');
    overlay.style.display = 'none';
    overlay.classList.remove('summary-mode');
    document.getElementById('main-home-btn').style.display = 'none';
    const p = document.getElementById('player');
    p.classList.remove('giant-center', 'at-top-position', 'victory-anim', 'sad-anim');
    p.classList.add('idle');
    document.getElementById('top-ui').style.display = 'block';
    document.getElementById('pitch').style.display = 'flex';
    document.getElementById('bottom-ui').style.display = 'flex';
    playerHP = 400; combo = 0; wrongCombo = 0;
    currentQ = [...questions].sort(() => Math.random() - 0.5);
    updateUI();
    playSound('start');
    announce("เริ่มบทเรียน พลังปัจจุบันคือ 400 คะแนน");
    setTimeout(() => {
        nextQuestion();
        if(!bgmSource && sounds.back) { bgmSource = audioCtx.createBufferSource(); bgmSource.buffer = sounds.back; bgmSource.loop = true; bgmSource.connect(audioCtx.destination); bgmSource.start(); }
    }, 3000);
}

/* Question & Answer Logic (คงเดิม) */
function nextQuestion() {
    announce(""); 
    if(playerHP >= 1000 || playerHP <= 0) return endGame();
    if(currentQ.length === 0) currentQ = [...questions].sort(() => Math.random() - 0.5);
    const data = currentQ.pop();
    const h = document.getElementById('question-text');
    h.textContent = data.q; h.focus();
    const grid = document.getElementById('options-grid'); grid.innerHTML = '';
    data.a.forEach((opt, i) => {
        const b = document.createElement('button'); b.className = 'option-btn'; b.textContent = opt;
        b.onclick = () => checkAnswer(i, data.c); grid.appendChild(b);
    });
    let timeLeft = 20000;
    const bar = document.getElementById('timer-fill');
    clearInterval(timer);
    timer = setInterval(() => { timeLeft -= 100; bar.style.width = (timeLeft/20000)*100 + "%"; if(timeLeft <= 0) { clearInterval(timer); checkAnswer(-1, data.c); } }, 100);
}

function checkAnswer(idx, correct) {
    clearInterval(timer);
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    const isCorrect = idx === correct;
    const p = document.getElementById('player');
    let change = 0;
    if(isCorrect) {
        combo++; wrongCombo = 0;
        if(combo >= 4) { change = Math.floor(Math.random() * 71) + 180; playSound('atc'); combo = 0; } 
        else { change = Math.floor(Math.random() * 41) + 80; let s; do{s='at'+(Math.floor(Math.random()*3)+1);}while(s===lastSound); playSound(s); lastSound=s; }
        playerHP = Math.min(1000, playerHP + change);
        p.className = 'character victory-anim';
        announce(`ถูกต้อง! ได้พลังเพิ่ม ${change} คะแนน พลังรวมคือ ${playerHP}`);
        createVisualEffect(true, change);
    } else {
        wrongCombo++; combo = 0;
        if(wrongCombo >= 4) { change = Math.floor(Math.random() * 71) + 180; playSound('enc'); wrongCombo = 0; } 
        else { change = Math.floor(Math.random() * 41) + 80; let s; do{s='en'+(Math.floor(Math.random()*3)+1);}while(s===lastSound); playSound(s); lastSound=s; }
        playerHP = Math.max(0, playerHP - change);
        p.className = 'character sad-anim';
        announce(`เสียดายจัง หักพลัง ${change} คะแนน พลังรวมเหลือ ${playerHP}`);
        createVisualEffect(false, change);
    }
    updateUI();
    setTimeout(() => { if(playerHP < 1000 && playerHP > 0) { p.className = 'character idle'; nextQuestion(); } else { endGame(); } }, 4200);
}

function updateUI() { document.getElementById('player-hp-fill').style.width = (playerHP/10) + "%"; document.getElementById('hp-label').textContent = `${playerHP} / 1000`; }

function endGame() {
    clearInterval(timer); announce(""); 
    if(bgmSource){ try{bgmSource.stop();}catch(e){} bgmSource = null; }
    const win = playerHP >= 1000;
    const endSoundNode = playSound(win ? 'win' : 'lost');
    const p = document.getElementById('player');
    const overlay = document.getElementById('overlay-screen');
    const title = document.getElementById('main-title');
    const summary = document.getElementById('summary-text');
    p.classList.remove('idle'); p.classList.add('giant-center', win ? 'victory-anim' : 'sad-anim');
    document.getElementById('bottom-ui').style.display = 'none';
    const soundDuration = (endSoundNode && endSoundNode.buffer) ? endSoundNode.buffer.duration * 1000 : 4000;
    setTimeout(() => {
        p.classList.remove('giant-center'); p.classList.add('at-top-position');
        overlay.style.display = 'flex'; 
        overlay.classList.add('summary-mode');
        title.textContent = win ? "ชนะแล้ว! ท่านคือมหาปราชญ์" : "พยายามใหม่นะ พลังความรู้ยังไม่พอ";
        summary.textContent = win ? "สะสมพลังคำไวพจน์ได้ครบ 1,000 คะแนน!" : `สะสมพลังได้เพียง ${playerHP} คะแนน`;
        title.focus();
    }, soundDuration);
}
</script>
