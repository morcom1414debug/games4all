<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ภาษาไทย ไม่ยากอย่างที่คิด</title>
    <style>
        :root {
            --bg-classroom: #f0f4f8;
            --teacher-color: #ff7675;
            --student-color: #74b9ff;
            --board-color: #2d3436;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --ui-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-classroom);
            color: #2d3436;
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; position: fixed; width: 100%;
        }

        #game-container {
            width: 100%; max-width: 800px;
            height: 100vh; max-height: 900px;
            position: relative;
            background: linear-gradient(to bottom, #dfe6e9 0%, #ffffff 100%);
            display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Top UI: Health and Timer */
        #top-ui {
            padding: 15px;
            background: var(--ui-bg);
            border-bottom: 2px solid #ddd;
            z-index: 10;
        }

        .status-bar-container {
            width: 100%;
            height: 30px;
            background: #eee;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            margin-bottom: 10px;
        }

        #player-hp-bar {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #55efc4, #00b894);
            transition: width 0.3s ease;
        }

        .hp-text {
            position: absolute; width: 100%; text-align: center;
            top: 0; line-height: 30px; font-weight: bold; font-size: 14px;
        }

        #timer-container {
            width: 100%; height: 8px; background: #ddd; border-radius: 4px;
        }
        #timer-bar {
            width: 100%; height: 100%; background: #fab1a0; transition: width 0.1s linear;
        }

        /* Animation Area (Classroom) */
        #arena {
            flex: 1;
            position: relative;
            background: #fff;
            overflow: hidden;
            border-bottom: 5px solid #bdc3c7;
        }

        .blackboard {
            position: absolute; right: 20px; top: 40px;
            width: 150px; height: 100px;
            background: #2c3e50; border: 8px solid #a29bfe;
            border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .character {
            position: absolute; bottom: 20px;
            transition: transform 0.3s;
        }

        #teacher { right: 60px; width: 100px; height: 160px; }
        #students { left: 40px; width: 180px; height: 140px; display: flex; gap: 20px; }

        .char-svg { width: 100%; height: 100%; }

        /* Question Area */
        #quiz-container {
            height: 40%;
            background: #fff;
            padding: 20px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 15px;
        }

        #question-text {
            font-size: 22px; font-weight: bold; text-align: center;
            margin-bottom: 10px; color: #2d3436;
        }

        #options-grid {
            display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%;
        }

        .option-btn {
            background: #f1f2f6; border: 2px solid #dfe6e9;
            padding: 15px; border-radius: 10px; font-size: 18px;
            cursor: pointer; transition: all 0.2s;
        }
        .option-btn:hover { background: #e2e2e2; }

        /* Effects */
        .damage-pop {
            position: absolute; font-weight: bold; font-size: 32px;
            pointer-events: none; animation: floatUp 1s forwards; z-index: 100;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .effect-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 100px; pointer-events: none; opacity: 0; z-index: 50;
        }
        .active-effect { animation: popCenter 0.8s forwards; }

        @keyframes popCenter {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* Classroom Animations */
        .idle-anim { animation: idle 3s infinite ease-in-out; }
        @keyframes idle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .victory-anim { animation: celebrate 0.5s infinite; }
        @keyframes celebrate {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }
        .sad-anim { animation: shake 0.5s infinite; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #start-screen {
            position: absolute; inset: 0; background: var(--ui-bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center; padding: 20px;
        }

        .btn-main {
            padding: 20px 40px; font-size: 24px; background: #00b894;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,184,148,0.3);
        }

        [aria-live="polite"] { position: absolute; left: -9999px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-ui">
        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <strong id="main-heading">ภาษาไทย ไม่ยากอย่างที่คิด</strong>
            <span id="combo-display" style="color: #e67e22; font-weight: bold;"></span>
        </div>
        <div class="status-bar-container" id="hp-group" role="progressbar" aria-valuemin="0" aria-valuemax="1000">
            <div id="player-hp-bar"></div>
            <div class="hp-text" id="hp-label">400 / 1000</div>
        </div>
        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>
    </div>

    <div id="arena">
        <div class="blackboard"></div>
        
        <div id="students" class="character idle-anim">
            <svg class="char-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="30" r="20" fill="#ffeaa7"/>
                <rect x="35" y="50" width="30" height="40" rx="5" fill="#74b9ff"/>
                <rect x="30" y="80" width="40" height="10" fill="#fab1a0"/> </svg>
            <svg class="char-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="30" r="20" fill="#ffeaa7"/>
                <path d="M30 30 Q50 10 70 30" stroke="#fd79a8" stroke-width="10" fill="none"/> <rect x="35" y="50" width="30" height="40" rx="5" fill="#ff7675"/>
                <rect x="30" y="80" width="40" height="10" fill="#fab1a0"/> </svg>
        </div>

        <div id="teacher" class="character idle-anim">
            <svg class="char-svg" viewBox="0 0 100 150">
                <circle cx="50" cy="40" r="25" fill="#ffeaa7"/>
                <rect x="30" y="65" width="40" height="70" rx="5" fill="#a29bfe"/>
                <rect x="45" y="135" width="10" height="15" fill="#2d3436"/>
            </svg>
        </div>

        <div id="effect-correct" class="effect-overlay">🎉</div>
        <div id="effect-wrong" class="effect-overlay">❌</div>
    </div>

    <div id="quiz-container">
        <div id="question-text">พร้อมที่จะเริ่มเรียนหรือยัง?</div>
        <div id="options-grid">
            </div>
    </div>

    <div id="start-screen">
        <h1 style="font-size: 36px; color: #2d3436;">ภาษาไทย ไม่ยากอย่างที่คิด</h1>
        <p>สะสมพลังให้ครบ 1000 เพื่อชนะ!<br>ตอบถูกติดกัน 4 ข้อเพื่อทำ Combo!</p>
        <button class="btn-main" onclick="startGame()">เริ่มบทเรียน</button>
    </div>

    <button id="home-btn" class="btn-main" style="display:none; position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:110;" onclick="location.reload()">กลับหน้าแรก</button>
</div>

<div id="announcer" aria-live="polite"></div>

<script>
/** * AUDIO SYSTEM (100% Original Logic)
 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioFiles = {
    bgm: 'https://raw.githubusercontent.com/sh4m1/sc-res/main/bgm_action.mp3',
    correct: 'https://raw.githubusercontent.com/sh4m1/sc-res/main/correct.mp3',
    wrong: 'https://raw.githubusercontent.com/sh4m1/sc-res/main/wrong.mp3',
    combo: 'https://raw.githubusercontent.com/sh4m1/sc-res/main/combo.mp3',
    win: 'https://raw.githubusercontent.com/sh4m1/sc-res/main/victory.mp3',
    lost: 'https://raw.githubusercontent.com/sh4m1/sc-res/main/gameover.mp3'
};
const audioBuffers = {};
let bgmSource = null;

async function loadAudio() {
    for (let key in audioFiles) {
        try {
            const response = await fetch(audioFiles[key]);
            const arrayBuffer = await response.arrayBuffer();
            audioBuffers[key] = await audioCtx.decodeAudioData(arrayBuffer);
        } catch (e) { console.log("Audio load error", e); }
    }
}
loadAudio();

function playSound(name) {
    if (!audioBuffers[name]) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffers[name];
    source.connect(audioCtx.destination);
    source.start(0);
    return source;
}

function playBGM() {
    if (bgmSource) bgmSource.stop();
    bgmSource = audioCtx.createBufferSource();
    bgmSource.buffer = audioBuffers.bgm;
    bgmSource.loop = true;
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.3;
    bgmSource.connect(gainNode).connect(audioCtx.destination);
    bgmSource.start(0);
}

/**
 * GAME DATA & LOGIC
 */
const questions = [
    { q: "รถยนต์ มีลักษณนามว่าอะไร?", a: ["หลัง", "คัน", "เครื่อง"], c: 1 },
    { q: "จดหมาย มีลักษณนามว่าอะไร?", a: ["ฉบับ", "แผ่น", "ใบ"], c: 0 },
    { q: "พระพุทธรูป มีลักษณนามว่าอะไร?", a: ["รูป", "องค์", "ตน"], c: 1 },
    { q: "พระสงฆ์ มีลักษณนามว่าอะไร?", a: ["องค์", "รูป", "คน"], c: 1 },
    { q: "ยักษ์ มีลักษณนามว่าอะไร?", a: ["ตัว", "องค์", "ตน"], c: 2 },
    { q: "เลื่อย มีลักษณนามว่าอะไร?", a: ["ปื้น", "อัน", "เล่ม"], c: 0 },
    { q: "เกวียน มีลักษณนามว่าอะไร?", a: ["เล่ม", "คัน", "หลัง"], c: 0 },
    { q: "ขลุ่ย มีลักษณนามว่าอะไร?", a: ["อัน", "เล่ม", "เลา"], c: 2 },
    { q: "ปี่ มีลักษณนามว่าอะไร?", a: ["เลา", "อัน", "ตัว"], c: 0 },
    { q: "ถนน มีลักษณนามว่าอะไร?", a: ["เส้น", "สาย", "แถว"], c: 1 },
    { q: "พัดลม มีลักษณนามว่าอะไร?", a: ["เครื่อง", "ตัว", "อัน"], c: 1 },
    { q: "แหวน มีลักษณนามว่าอะไร?", a: ["วง", "อัน", "ชิ้น"], c: 0 },
    { q: "สร้อยคอ มีลักษณนามว่าอะไร?", a: ["เส้น", "สาย", "อัน"], c: 0 },
    { q: "มุ้ง มีลักษณนามว่าอะไร?", a: ["ผืน", "หลัง", "ตัว"], c: 1 },
    { q: "กรรไกร มีลักษณนามว่าอะไร?", a: ["อัน", "เล่ม", "เลา"], c: 1 },
    { q: "ดินสอ มีลักษณนามว่าอะไร?", a: ["แท่ง", "เล่ม", "อัน"], c: 0 },
    { q: "ปากกา มีลักษณนามว่าอะไร?", a: ["แท่ง", "ด้าม", "อัน"], c: 1 },
    { q: "พลอย มีลักษณนามว่าอะไร?", a: ["เม็ด", "ก้อน", "ดวง"], c: 0 },
    { q: "ดาว มีลักษณนามว่าอะไร?", a: ["เม็ด", "ดวง", "วง"], c: 1 },
    { q: "หนังสือ มีลักษณนามว่าอะไร?", a: ["เล่ม", "ผูก", "ฉบับ"], c: 0 },
    { q: "ร่ม มีลักษณนามว่าอะไร?", a: ["คัน", "อัน", "เล่ม"], c: 0 },
    { q: "เรือ มีลักษณนามว่าอะไร?", a: ["ลำ", "คัน", "เครื่อง"], c: 0 },
    { q: "เครื่องบิน มีลักษณนามว่าอะไร?", a: ["อัน", "เครื่อง", "ลำ"], c: 2 },
    { q: "ปราสาท มีลักษณนามว่าอะไร?", a: ["แห่ง", "หลัง", "องค์"], c: 1 },
    { q: "แห มีลักษณนามว่าอะไร?", a: ["เลา", "ตัว", "ปาก"], c: 2 },
    { q: "ฤาษี มีลักษณนามว่าอะไร?", a: ["คน", "ตน", "รูป"], c: 1 },
    { q: "ช้างป่า มีลักษณนามว่าอะไร?", a: ["เชือก", "ตัว", "ตน"], c: 1 },
    { q: "จาน มีลักษณนามว่าอะไร?", a: ["จาน", "อัน", "ใบ"], c: 2 },
    { q: "ไข่ มีลักษณนามว่าอะไร?", a: ["ใบ", "ฟอง", "ลูก"], c: 1 },
    { q: "เทียนพรรษา มีลักษณนามว่าอะไร?", a: ["เล่ม", "แท่ง", "ต้น"], c: 2 }
];

let playerHP = 400;
const maxHP = 1000;
let comboCount = 0;
let comboType = null; // 'correct' or 'wrong'
let currentQuestionIndex = 0;
let gameActive = false;
let timer = 100;
let timerInterval;

function startGame() {
    playerHP = 400;
    comboCount = 0;
    currentQuestionIndex = 0;
    gameActive = true;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('home-btn').style.display = 'none';
    updateUI();
    playBGM();
    nextQuestion();
    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timer = 100;
    timerInterval = setInterval(() => {
        if (!gameActive) return;
        timer -= 0.5;
        document.getElementById('timer-bar').style.width = timer + '%';
        if (timer <= 0) {
            handleAnswer(-1); // Treat as wrong if time out
        }
    }, 100);
}

function nextQuestion() {
    if (!gameActive) return;
    const qData = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById('question-text').textContent = qData.q;
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    
    qData.a.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => handleAnswer(idx === qData.c);
        grid.appendChild(btn);
    });
    timer = 100;
}

function handleAnswer(isCorrect) {
    if (!gameActive) return;

    let change = 0;
    let isComboAction = false;

    if (isCorrect === true) {
        // Correct Logic
        if (comboType === 'correct') comboCount++;
        else { comboCount = 1; comboType = 'correct'; }

        if (comboCount >= 4) {
            change = Math.floor(Math.random() * (250 - 180 + 1)) + 180;
            isComboAction = true;
            comboCount = 0; // reset after combo
            playSound('combo');
            showEffect('correct', true);
        } else {
            change = Math.floor(Math.random() * (120 - 80 + 1)) + 80;
            playSound('correct');
            showEffect('correct', false);
        }
        playerHP = Math.min(maxHP, playerHP + change);
        triggerAnim('victory');
    } else {
        // Wrong Logic
        if (comboType === 'wrong') comboCount++;
        else { comboCount = 1; comboType = 'wrong'; }

        if (comboCount >= 4) {
            change = -(Math.floor(Math.random() * (250 - 180 + 1)) + 180);
            isComboAction = true;
            comboCount = 0;
            playSound('combo');
            showEffect('wrong', true);
        } else {
            change = -(Math.floor(Math.random() * (120 - 80 + 1)) + 80);
            playSound('wrong');
            showEffect('wrong', false);
        }
        playerHP = Math.max(0, playerHP + change);
        triggerAnim('sad');
    }

    showDamage(change, isComboAction);
    updateUI();

    if (playerHP >= maxHP || playerHP <= 0) {
        endGame(playerHP >= maxHP);
    } else {
        nextQuestion();
    }
}

function showDamage(val, isCombo) {
    const el = document.createElement('div');
    el.className = 'damage-pop';
    el.textContent = (val > 0 ? '+' : '') + val;
    el.style.color = val > 0 ? '#2ecc71' : '#e74c3c';
    if (isCombo) el.style.fontSize = '48px';
    
    const arena = document.getElementById('arena');
    el.style.left = '50%';
    el.style.top = '40%';
    arena.appendChild(el);
    setTimeout(() => el.remove(), 1000);

    // Aria Live
    const msg = val > 0 ? `ถูกต้อง! ได้พลังเพิ่ม ${val}` : `ผิดครับ! ถูกลดพลัง ${val}`;
    document.getElementById('announcer').textContent = msg + ` พลังปัจจุบัน ${playerHP}`;
}

function showEffect(type, isBig) {
    const el = document.getElementById('effect-' + type);
    el.textContent = type === 'correct' ? '🎉' : '❌';
    if (isBig) el.style.fontSize = '200px';
    else el.style.fontSize = '100px';
    
    el.classList.remove('active-effect');
    void el.offsetWidth;
    el.classList.add('active-effect');
}

function triggerAnim(type) {
    const s = document.getElementById('students');
    const t = document.getElementById('teacher');
    s.classList.remove('idle-anim', 'victory-anim', 'sad-anim');
    t.classList.remove('idle-anim', 'victory-anim', 'sad-anim');
    
    s.classList.add(type + '-anim');
    t.classList.add(type + '-anim');
    
    setTimeout(() => {
        s.classList.remove(type + '-anim');
        t.classList.remove(type + '-anim');
        s.classList.add('idle-anim');
        t.classList.add('idle-anim');
    }, 1500);
}

function updateUI() {
    const percent = (playerHP / maxHP) * 100;
    document.getElementById('player-hp-bar').style.width = percent + '%';
    document.getElementById('hp-label').textContent = `${playerHP} / ${maxHP}`;
    document.getElementById('hp-group').setAttribute('aria-valuenow', playerHP);
    
    const comboLabel = document.getElementById('combo-display');
    if (comboCount > 1) {
        comboLabel.textContent = `${comboCount} COMBO!`;
    } else {
        comboLabel.textContent = '';
    }
}

function endGame(isWin) {
    gameActive = false;
    clearInterval(timerInterval);
    if (bgmSource) { try { bgmSource.stop(); } catch(e){} }
    
    playSound(isWin ? 'win' : 'lost');
    
    const h = document.getElementById('main-heading');
    h.textContent = isWin ? "ยินดีด้วย! คุณเก่งภาษาไทยมาก" : "พยายามต่อไปนะ! ลองใหม่อีกครั้ง";
    
    document.getElementById('question-text').textContent = isWin ? "ยอดเยี่ยม! พลังเต็ม 1000 แล้ว" : "พลังหมดเสียแล้ว คุณครูเป็นกำลังใจให้นะ";
    document.getElementById('options-grid').innerHTML = '';
    document.getElementById('home-btn').style.display = 'flex';
}
</script>
</body>
</html>
