<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-5-7 แมวหมูหมา: Fixed Button Lock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
        }
        .animal-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }
        .focus-ring:focus {
            outline: 3px solid #6366f1;
            outline-offset: 2px;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
        .announcing-wait {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <div id="start-overlay" class="fixed inset-0 bg-indigo-900 bg-opacity-95 flex flex-col items-center justify-center z-[100] text-center p-6">
        <h1 class="text-4xl font-bold text-white mb-4">เกม 3-5-7 แมวหมูหมา</h1>
        <p class="text-indigo-200 mb-8 max-w-md text-lg">โหมด Impossible AI (แก้ไขปุ่มกดรอบถัดไป)<br>กติกา: 2 ใน 3 รอบ | สลับฝั่งเริ่มก่อน</p>
        <button id="start-btn" class="bg-yellow-400 hover:bg-yellow-300 text-indigo-900 text-2xl font-bold px-12 py-4 rounded-full shadow-2xl transition-all transform active:scale-95 focus-ring">
            คลิกเพื่อเริ่มเล่น
        </button>
    </div>

    <div id="game-container" class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-6 md:p-8 border-4 border-indigo-50 hidden">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-700 uppercase tracking-wide">การแข่งขันทัวร์นาเมนต์</h1>
            <div id="announcer" class="sr-only" aria-live="assertive"></div>
        </header>

        <div class="flex justify-between items-center bg-indigo-600 p-6 rounded-2xl mb-8 text-white shadow-lg" role="status">
            <div class="text-center flex-1">
                <p class="text-xs text-indigo-200 uppercase font-bold mb-1">คุณ</p>
                <p id="player-score" class="text-5xl font-black">0</p>
            </div>
            <div class="px-4 text-center border-x border-indigo-500">
                <p class="text-xs text-indigo-200 font-bold mb-1">รอบที่</p>
                <p id="round-number" class="text-xl font-bold bg-indigo-800 px-3 py-1 rounded-lg">1/3</p>
            </div>
            <div class="text-center flex-1">
                <p class="text-xs text-indigo-200 uppercase font-bold mb-1">บอท</p>
                <p id="bot-score" class="text-5xl font-black">0</p>
            </div>
        </div>

        <div id="board" class="space-y-8" role="application" aria-label="กระดานเกม"></div>

        <div class="mt-8 pt-6 border-t border-gray-100 flex flex-col items-center">
            <div id="turn-indicator" class="mb-4 text-lg font-medium text-gray-600 text-center" aria-live="polite"></div>
            <button id="end-turn-btn" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-2xl font-bold shadow-lg transition-all hidden focus-ring"
                    onclick="finishPlayerTurn()">
                ยืนยันการหยิบสัตว์
            </button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
            <div id="modal-icon" class="text-6xl mb-4" aria-hidden="true"></div>
            <h2 id="modal-title" class="text-2xl font-bold mb-2"></h2>
            <p id="modal-body" class="text-gray-600 mb-8"></p>
            <button id="modal-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 focus-ring shadow-lg" onclick="closeModal()">
                ตกลง
            </button>
        </div>
    </div>

    <script>
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        
        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            pick: () => playTone(880, 'sine', 0.1, 0.1),
            confirm: () => { playTone(523, 'triangle', 0.2, 0.1); setTimeout(() => playTone(783, 'triangle', 0.2, 0.1), 100); },
            bot: () => playTone(300, 'square', 0.15, 0.05),
            win: () => [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.5, 0.15), i * 150)),
            lose: () => [392, 349, 311, 261].forEach((f, i) => setTimeout(() => playTone(f, 'sawtooth', 0.6, 0.05), i * 200))
        };

        const ANIMALS = [
            { name: 'แมว', emoji: '🐱' },
            { name: 'หมู', emoji: '🐷' },
            { name: 'หมา', emoji: '🐶' }
        ];

        let state = {
            piles: [3, 5, 7],
            playerScore: 0,
            botScore: 0,
            round: 1,
            isPlayerTurn: true,
            selectedPile: -1,
            selectedCount: 0,
            firstPlayerOfRound: null,
            isAnnouncing: false
        };

        const overlay = document.getElementById('start-overlay');
        const gameContainer = document.getElementById('game-container');
        const board = document.getElementById('board');
        const turnIndicator = document.getElementById('turn-indicator');
        const endTurnBtn = document.getElementById('end-turn-btn');
        const announcer = document.getElementById('announcer');

        document.getElementById('start-btn').onclick = () => {
            initAudio();
            overlay.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            state.firstPlayerOfRound = Math.random() < 0.5 ? 'player' : 'bot';
            startNewRound(true);
        };

        function announce(text, delay = 1000) {
            return new Promise((resolve) => {
                announcer.textContent = ""; 
                setTimeout(() => { 
                    announcer.textContent = text;
                    setTimeout(resolve, delay);
                }, 50);
            });
        }

        async function announceBoardState() {
            const status = ANIMALS.map((a, i) => `${a.name}เหลือ ${state.piles[i]}`).join(", ");
            await announce(`สถานะกองสัตว์ปัจจุบัน: ${status}`, 3500);
        }

        async function startNewRound(isFirstCall = false) {
            state.piles = [3, 5, 7];
            state.selectedPile = -1;
            state.selectedCount = 0;
            state.isAnnouncing = true; // ล็อคก่อนประกาศ
            toggleBoardLock(true);

            if (!isFirstCall) {
                state.firstPlayerOfRound = (state.firstPlayerOfRound === 'player') ? 'bot' : 'player';
            }

            state.isPlayerTurn = (state.firstPlayerOfRound === 'player');
            updateScoreboard();
            renderBoard();

            const starterText = state.isPlayerTurn ? "คุณได้เริ่มก่อน" : "บอทได้เริ่มก่อน";
            turnIndicator.textContent = `เตรียมตัวเริ่มรอบที่ ${state.round}`;
            
            await announce(`เริ่มรอบที่ ${state.round}. ${starterText}. กองแมวมี 3 ตัว, หมูมี 5 ตัว, หมามี 7 ตัว`, 5000);

            // ปลดล็อคหลังจากประกาศเสร็จ
            state.isAnnouncing = false;
            toggleBoardLock(false);
            renderBoard(); // วาดใหม่เพื่อให้ปุ่มเปิดการทำงาน

            if (!state.isPlayerTurn) {
                turnIndicator.textContent = "ตาของบอท บอทกำลังคิด...";
                setTimeout(botMove, 500);
            } else {
                turnIndicator.textContent = "ตาของคุณแล้ว เลือกหยิบสัตว์ได้เลย";
            }
        }

        function toggleBoardLock(lock) {
            if (lock) {
                board.classList.add('announcing-wait');
            } else {
                board.classList.remove('announcing-wait');
            }
        }

        function renderBoard() {
            board.innerHTML = '';
            state.piles.forEach((count, pileIdx) => {
                const pileDef = ANIMALS[pileIdx];
                const pileDiv = document.createElement('div');
                pileDiv.className = "flex flex-col items-center md:items-start group";
                pileDiv.setAttribute('role', 'group');
                pileDiv.setAttribute('aria-label', `กอง${pileDef.name} เหลือ ${count} ตัว`);

                const title = document.createElement('h2');
                title.className = "text-sm font-bold text-indigo-400 mb-2 uppercase tracking-widest";
                title.textContent = `กอง${pileDef.name} (${count})`;
                pileDiv.appendChild(title);

                const container = document.createElement('div');
                container.className = "flex flex-wrap gap-2 justify-center md:justify-start bg-gray-50 p-4 rounded-2xl w-full border border-gray-100";

                for (let i = 0; i < count; i++) {
                    const btn = document.createElement('button');
                    btn.className = "text-4xl p-2 bg-white rounded-xl shadow-sm border-2 border-transparent transition-all hover:bg-indigo-50 focus-ring animal-btn";
                    btn.innerHTML = pileDef.emoji;
                    btn.setAttribute('aria-label', `${pileDef.name} ตัวที่ ${i + 1}`);
                    
                    // สำคัญ: ตรวจสอบสถานะการประกาศก่อนเปิดปุ่ม
                    const isSelectable = !state.isAnnouncing && state.isPlayerTurn && (state.selectedPile === -1 || state.selectedPile === pileIdx);
                    btn.disabled = !isSelectable;
                    
                    btn.onclick = () => handlePick(pileIdx);
                    container.appendChild(btn);
                }

                if (count === 0) {
                    container.innerHTML = '<span class="text-gray-300 italic py-2">กองนี้หมดแล้ว</span>';
                }

                pileDiv.appendChild(container);
                board.appendChild(pileDiv);
            });
        }

        function handlePick(pileIdx) {
            sounds.pick();
            state.selectedPile = pileIdx;
            state.selectedCount++;
            state.piles[pileIdx]--;
            
            endTurnBtn.classList.remove('hidden');
            renderBoard();
            announcer.textContent = `เลือก ${ANIMALS[pileIdx].name} 1 ตัว`;
        }

        async function finishPlayerTurn() {
            if (state.selectedCount === 0) return;
            const animalName = ANIMALS[state.selectedPile].name;
            const pickedCount = state.selectedCount;
            
            sounds.confirm();
            state.isPlayerTurn = false;
            state.isAnnouncing = true;
            toggleBoardLock(true);
            endTurnBtn.classList.add('hidden');
            
            await announce(`คุณหยิบ ${animalName} ออกไปทั้งหมด ${pickedCount} ตัว`, 2500);
            
            if (!checkGameOver()) {
                await announceBoardState();
                state.selectedPile = -1;
                state.selectedCount = 0;
                turnIndicator.textContent = "บอทกำลังคำนวณการเดิน...";
                setTimeout(botMove, 500);
            }
        }

        async function botMove() {
            const p = state.piles;
            const nimSum = p.reduce((a, b) => a ^ b, 0);
            let pileToMove = -1, removeCount = 0;

            const greaterThanOne = p.filter(x => x > 1).length;

            if (greaterThanOne === 1) {
                const target = p.findIndex(x => x > 1);
                const ones = p.filter(x => x === 1).length;
                removeCount = (ones % 2 === 0) ? p[target] - 1 : p[target];
                if (removeCount <= 0) removeCount = 1;
                pileToMove = target;
            } else if (nimSum !== 0) {
                for (let i = 0; i < p.length; i++) {
                    const target = p[i] ^ nimSum;
                    if (target < p[i]) {
                        pileToMove = i;
                        removeCount = p[i] - target;
                        break;
                    }
                }
            } else {
                pileToMove = p.indexOf(Math.max(...p));
                removeCount = 1;
            }

            state.piles[pileToMove] -= removeCount;
            sounds.bot();
            renderBoard();
            
            const moveMsg = `บอทหยิบ ${ANIMALS[pileToMove].name} ออกไป ${removeCount} ตัว`;
            turnIndicator.textContent = moveMsg;
            await announce(moveMsg, 2500);
            
            if (!checkGameOver()) {
                await announceBoardState();
                state.isPlayerTurn = true;
                state.isAnnouncing = false;
                toggleBoardLock(false);
                turnIndicator.textContent = "ตาของคุณแล้ว เลือกหยิบสัตว์ได้เลย";
                renderBoard();
            }
        }

        function checkGameOver() {
            const total = state.piles.reduce((a, b) => a + b, 0);
            if (total === 0) {
                state.isAnnouncing = true;
                if (state.isPlayerTurn) { 
                    state.playerScore++;
                    sounds.win();
                    const winMsg = "จบการแข่งขันรอบนี้! คุณชนะ เพราะบอทหยิบตัวสุดท้ายไป";
                    announce(winMsg, 4000).then(() => showModal("คุณชนะ!", winMsg, "🏆"));
                } else {
                    state.botScore++;
                    sounds.lose();
                    const loseMsg = "จบการแข่งขันรอบนี้! บอทชนะ เพราะคุณต้องหยิบตัวสุดท้ายไป";
                    announce(loseMsg, 4000).then(() => showModal("บอทชนะ!", loseMsg, "🤖"));
                }
                updateScoreboard();
                return true;
            }
            return false;
        }

        function updateScoreboard() {
            document.getElementById('player-score').textContent = state.playerScore;
            document.getElementById('bot-score').textContent = state.botScore;
            document.getElementById('round-number').textContent = `${state.round}/3`;
        }

        function showModal(title, body, icon) {
            document.getElementById('modal-icon').textContent = icon;
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').textContent = body;
            
            const btn = document.getElementById('modal-btn');
            if (state.playerScore === 2 || state.botScore === 2) {
                const finalWinner = state.playerScore === 2 ? "ยินดีด้วย คุณชนะการแข่งขัน!" : "เสียใจด้วย บอทชนะการแข่งขัน!";
                document.getElementById('modal-title').textContent = finalWinner;
                btn.textContent = "เริ่มการแข่งขันใหม่";
                announce(`จบการแข่งขันทัวร์นาเมนต์ ${finalWinner}`, 4000);
            } else {
                btn.textContent = "เล่นรอบถัดไป";
            }
            
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            if (state.playerScore === 2 || state.botScore === 2) {
                state.playerScore = 0;
                state.botScore = 0;
                state.round = 1;
                state.firstPlayerOfRound = Math.random() < 0.5 ? 'player' : 'bot';
                startNewRound(true);
            } else {
                state.round++;
                startNewRound();
            }
        }
    </script>
</body>
</html>
