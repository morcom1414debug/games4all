<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star nameFighter - ศึกจ้าวนักเตะระดับโลก</title>
    <style>
        :root {
            --player-color: #3498db;
            --bot-color: #e67e22;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --combo-color: #f1c40f;
            --ui-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; position: fixed; width: 100%;
        }

        #game-container {
            width: 95%; max-width: 1000px;
            height: 95vh; max-height: 700px;
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center;
            border: 5px solid #333;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Home Button */
        .home-btn-hex {
            width: 60px; height: 60px;
            background-color: var(--combo-color); 
            color: #000; font-size: 1.8rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: none;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            z-index: 120; position: absolute; top: 20px; left: 20px;
        }

        /* Top UI: Questions & Options */
        #top-ui {
            background: var(--ui-bg);
            padding: 20px; z-index: 10;
            border-bottom: 3px solid var(--combo-color);
            display: none;
        }

        #question-text {
            font-size: 1.8rem; text-align: center;
            margin: 0 0 20px 0; min-height: 60px;
            display: flex; justify-content: center; align-items: center;
            outline: none;
        }

        .options-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; max-width: 800px; margin: 0 auto;
        }

        .option-btn {
            padding: 15px 5px; font-size: 1.2rem;
            background: #444; border: 2px solid #666; color: white;
            cursor: pointer; border-radius: 10px; font-weight: bold;
        }
        .option-btn:hover { background: #555; }
        .option-btn.correct { background: var(--correct-color) !important; border-color: #fff; }
        .option-btn.wrong { background: var(--wrong-color) !important; border-color: #fff; }

        /* Battle Field */
        #pitch {
            flex-grow: 1; position: relative;
            display: none; justify-content: space-between; align-items: center;
            padding: 0 50px;
        }

        .character { width: 120px; height: 120px; position: relative; z-index: 5; }
        #ball {
            position: absolute; width: 40px; height: 40px; border-radius: 50%;
            left: 140px; bottom: 50px; background: radial-gradient(circle at 30% 30%, #fff, #999);
            display: none; z-index: 6;
        }

        /* Bottom UI: Status */
        #bottom-ui {
            background: var(--ui-bg);
            padding: 15px 30px; display: none;
            justify-content: space-between; align-items: center;
            border-top: 3px solid var(--player-color);
        }

        .side-group { width: 45%; outline: none; }
        .hp-bar-bg { height: 20px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.4s ease-out; }

        /* Animations */
        @keyframes shoot-goal { 0% { transform: translate(0, 0); opacity: 1; } 100% { transform: translate(600px, -60px) scale(0.5); opacity: 0; } }
        @keyframes shoot-fail { 0% { transform: translate(0, 0); } 50% { transform: translate(450px, -30px); } 100% { transform: translate(400px, 50px); } }
        .ball-goal { display: block !important; animation: shoot-goal 0.6s ease-in forwards; }
        .ball-fail { display: block !important; animation: shoot-fail 0.6s ease-out forwards; }
        .kick-anim { animation: kick 0.4s ease; }
        @keyframes kick { 0% { transform: rotate(0); } 50% { transform: rotate(-30deg) translateX(10px); } 100% { transform: rotate(0); } }
        .save-anim { animation: save 0.4s ease; }
        @keyframes save { 0% { transform: translateY(0); } 50% { transform: translateY(-30px); } 100% { transform: translateY(0); } }

        /* Popups */
        .damage-popup {
            position: absolute; font-size: 2.5rem; font-weight: bold;
            pointer-events: none; z-index: 50; text-shadow: 2px 2px #000;
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }

        /* Screens */
        #start-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200;
        }
        .title { font-size: 3.5rem; color: var(--combo-color); margin-bottom: 30px; outline: none; text-align: center; }
        .btn-start { padding: 20px 60px; font-size: 1.5rem; background: var(--correct-color); border: none; cursor: pointer; font-weight: bold; }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sr-announcer" class="sr-only" aria-live="assertive"></div>
    
    <button id="home-btn" class="home-btn-hex" aria-label="กลับสู่ชุมชน" onclick="window.location.reload()">🏠</button>

    <div id="start-screen">
        <h1 class="title" id="main-heading" tabindex="-1">Star nameFighter</h1>
        <button class="btn-start" onclick="startGame()">เริ่มเขี่ยลูก</button>
    </div>

    <div id="top-ui">
        <div id="timer-bar-bg" style="width:100%; height:6px; background:#222; margin-bottom:10px;">
            <div id="timer-fill" style="width:100%; height:100%; background:var(--combo-color);"></div>
        </div>
        <h2 id="question-text" tabindex="-1"></h2>
        <div class="options-grid" id="options-grid"></div>
    </div>

    <div id="pitch">
        <div id="ball"></div>
        <div id="player" class="character">
            <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
                <circle cx="50" cy="30" r="15" fill="#fbd38d"/>
                <rect x="35" y="45" width="30" height="40" fill="var(--player-color)"/>
            </svg>
        </div>
        <div id="bot" class="character">
            <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
                <rect x="30" y="15" width="40" height="30" fill="#7f8c8d"/>
                <rect x="35" y="45" width="30" height="40" fill="var(--bot-color)"/>
            </svg>
        </div>
    </div>

    <div id="bottom-ui">
        <section id="player-hp-group" class="side-group" role="group" aria-label="ผู้เล่น พลัง 1000" tabindex="0">
            <div style="color:var(--player-color); font-weight:bold;">PLAYER</div>
            <div class="hp-bar-bg"><div id="player-hp-fill" class="hp-fill" style="background:var(--player-color)"></div></div>
        </section>
        <section id="bot-hp-group" class="side-group" role="group" aria-label="บอท พลัง 1000" tabindex="0">
            <div style="color:var(--bot-color); font-weight:bold; text-align:right;">BOT</div>
            <div class="hp-bar-bg"><div id="bot-hp-fill" class="hp-fill" style="background:var(--bot-color); margin-left:auto;"></div></div>
        </section>
    </div>
</div>

<script>
const questions = [
  { q: "ลิโอเนล เมสซี เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","อาร์เจนตินา","โปรตุเกส"], answer: 1 },
  { q: "คริสเตียโน โรนัลโด เป็นสตาร์ของทีมชาติใด", options: ["โปรตุเกส","สเปน","อิตาลี"], answer: 0 },
  { q: "เปเล่ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","อาร์เจนตินา","โคลอมเบีย"], answer: 0 },
  { q: "ดีเอโก มาราโดนา เป็นสตาร์ของทีมชาติใด", options: ["อาร์เจนตินา","อุรุกวัย","ชิลี"], answer: 0 },
  { q: "โยฮัน ครัฟฟ์ เป็นสตาร์ของทีมชาติใด", options: ["เนเธอร์แลนด์","เยอรมนี","เบลเยียม"], answer: 0 },
  { q: "ซีเนดีน ซีดาน เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","โมร็อกโก","เบลเยียม"], answer: 0 },
  { q: "โรนัลดินโญ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","โปรตุเกส","อาร์เจนตินา"], answer: 0 },
  { q: "เนย์มาร์ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","สเปน","ฝรั่งเศส"], answer: 0 },
  { q: "ฟรานซ์ เบ็คเคนเบาเออร์ เป็นสตาร์ของทีมชาติใด", options: ["เยอรมนี","ออสเตรีย","สวิตเซอร์แลนด์"], answer: 0 },
  { q: "เปาโล มัลดินี เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","สเปน","โปรตุเกส"], answer: 0 },
  { q: "มาร์โก ฟาน บัสเทิน เป็นสตาร์ของทีมชาติใด", options: ["เนเธอร์แลนด์","เบลเยียม","เดนมาร์ก"], answer: 0 },
  { q: "มิเชล พลาตินี เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","สวิตเซอร์แลนด์","อิตาลี"], answer: 0 },
  { q: "โรแบร์โต บักโจ เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","บราซิล","อาร์เจนตินา"], answer: 0 },
  { q: "เธียร์รี อองรี เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","ไอวอรีโคสต์","เบลเยียม"], answer: 0 },
  { q: "จอร์จ เบสต์ เป็นสตาร์ของทีมชาติใด", options: ["ไอร์แลนด์เหนือ","ไอร์แลนด์","สกอตแลนด์"], answer: 0 },
  { q: "บ็อบบี ชาร์ลตัน เป็นสตาร์ของทีมชาติใด", options: ["อังกฤษ","สกอตแลนด์","เวลส์"], answer: 0 },
  { q: "เปาโล รอสซี เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","อาร์เจนตินา","บราซิล"], answer: 0 },
  { q: "ซลาตัน อิบราฮิโมวิช เป็นสตาร์ของทีมชาติใด", options: ["สวีเดน","โครเอเชีย","นอร์เวย์"], answer: 0 },
  { q: "โรนัลโด นาซาริโอ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","อาร์เจนตินา","โปรตุเกส"], answer: 0 },
  { q: "โรแบร์โต คาร์ลอส เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","โปรตุเกส","สเปน"], answer: 0 },
  { q: "อลัน เชียเรอร์ เป็นสตาร์ของทีมชาติใด", options: ["อังกฤษ","ไอร์แลนด์เหนือ","สกอตแลนด์"], answer: 0 },
  { q: "เซร์คิโอ รามอส เป็นสตาร์ของทีมชาติใด", options: ["สเปน","โปรตุเกส","ฝรั่งเศส"], answer: 0 },
  { q: "อันเดรส อิเนียสตา เป็นสตาร์ของทีมชาติใด", options: ["สเปน","อาร์เจนตินา","บราซิล"], answer: 0 },
  { q: "ลูกา โมดริช เป็นสตาร์ของทีมชาติใด", options: ["โครเอเชีย","โปแลนด์","สโลวีเนีย"], answer: 0 },
  { q: "เควิน เดอ บรอยน์ เป็นสตาร์ของทีมชาติใด", options: ["เบลเยียม","เนเธอร์แลนด์","สวิตเซอร์แลนด์"], answer: 0 },
  { q: "คิลิยัน เอ็มบัปเป้ เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","เบลเยียม","โปรตุเกส"], answer: 0 },
  { q: "เออร์ลิง ฮาแลนด์ เป็นสตาร์ของทีมชาติใด", options: ["นอร์เวย์","เดนมาร์ก","สวีเดน"], answer: 0 },
  { q: "เลวานดอฟสกี เป็นสตาร์ของทีมชาติใด", options: ["โปแลนด์","เยอรมนี","ออสเตรีย"], answer: 0 },
  { q: "ซาดิโอ มาเน่ เป็นสตาร์ของทีมชาติใด", options: ["เซเนกัล","ไอวอรีโคสต์","กานา"], answer: 0 },
  { q: "โมฮาเหม็ด ซาลาห์ เป็นสตาร์ของทีมชาติใด", options: ["อียิปต์","โมร็อกโก","ตูนิเซีย"], answer: 0 },
  { q: "จิอันลุยจิ บุฟฟอน เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","สเปน","ฝรั่งเศส"], answer: 0 }
];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sounds = {};
let bgmSource = null;
let playerHP = 1000, botHP = 1000, playerCombo = 0, botCombo = 0;
let lastPlayerAtk = "", lastBotAtk = "";
let currentQuestions = [];
let timer = null;

// โหลดเสียง
const files = [
    ['start','audio/start.mp3'],['back','audio/back.mp3'],
    ['at1','audio/at1.mp3'],['at2','audio/at2.mp3'],['at3','audio/at3.mp3'],['atc','audio/atc.mp3'],
    ['en1','audio/en1.mp3'],['en2','audio/en2.mp3'],['en3','audio/en3.mp3'],['enc','audio/enc.mp3'],
    ['win','audio/win.mp3'],['lost','audio/lost.mp3']
];

async function loadSounds() {
    for (const f of files) {
        try {
            const res = await fetch(f[1]);
            const buf = await res.arrayBuffer();
            sounds[f[0]] = await audioCtx.decodeAudioData(buf);
        } catch(e) { console.log("Load fail:", f[0]); }
    }
}
loadSounds();

function playSound(name) {
    if (!sounds[name]) return null;
    const s = audioCtx.createBufferSource();
    s.buffer = sounds[name];
    s.connect(audioCtx.destination);
    s.start();
    return s;
}

function updateUI() {
    document.getElementById('player-hp-fill').style.width = (playerHP/10) + "%";
    document.getElementById('bot-hp-fill').style.width = (botHP/10) + "%";
    document.getElementById('player-hp-group').setAttribute('aria-label', `ผู้เล่น พลังเหลือ ${playerHP}`);
    document.getElementById('bot-hp-group').setAttribute('aria-label', `บอท พลังเหลือ ${botHP}`);
}

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('home-btn').style.display = 'none';
    document.getElementById('top-ui').style.display = 'block';
    document.getElementById('pitch').style.display = 'flex';
    document.getElementById('bottom-ui').style.display = 'flex';
    
    playerHP = 1000; botHP = 1000; playerCombo = 0; botCombo = 0;
    currentQuestions = [...questions].sort(() => Math.random() - 0.5);
    updateUI();
    
    const h = document.getElementById('question-text');
    h.textContent = "3... 2... 1...";
    h.focus();
    
    const s = playSound('start');
    if (s) {
        s.onended = () => {
            bgmSource = audioCtx.createBufferSource();
            bgmSource.buffer = sounds.back;
            bgmSource.loop = true;
            bgmSource.connect(audioCtx.destination);
            bgmSource.start();
            nextQuestion();
        };
    } else {
        nextQuestion(); // Fallback if sound fails
    }
}

function nextQuestion() {
    if (playerHP <= 0 || botHP <= 0) return endGame();
    if (currentQuestions.length === 0) currentQuestions = [...questions].sort(() => Math.random() - 0.5);
    
    const qData = currentQuestions.pop();
    const h = document.getElementById('question-text');
    h.textContent = qData.q;
    h.focus();
    
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    qData.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(i, qData.answer);
        grid.appendChild(btn);
    });
    
    let left = 7000;
    const bar = document.getElementById('timer-fill');
    clearInterval(timer);
    timer = setInterval(() => {
        left -= 100;
        bar.style.width = (left/7000)*100 + "%";
        if (left <= 0) { clearInterval(timer); checkAnswer(-1, qData.answer); }
    }, 100);
}

function checkAnswer(idx, correct) {
    clearInterval(timer);
    const isCorrect = idx === correct;
    const p = document.getElementById('player');
    const b = document.getElementById('bot');
    const ball = document.getElementById('ball');
    
    if (isCorrect) {
        playerCombo++; botCombo = 0;
        let dmg = playerCombo >= 5 ? 250 : 100;
        botHP -= dmg;
        p.classList.add('kick-anim');
        ball.className = 'ball-goal';
        
        let sName = "at1";
        if (playerCombo >= 5) {
            sName = "atc"; playerCombo = 0;
        } else {
            let pool = ["at1","at2","at3"].filter(x => x !== lastPlayerAtk);
            sName = pool[Math.floor(Math.random()*pool.length)];
            lastPlayerAtk = sName;
        }
        playSound(sName);
        showDmg(dmg, 'bot', sName === "atc");
    } else {
        botCombo++; playerCombo = 0;
        let dmg = botCombo >= 5 ? 200 : 120;
        playerHP -= dmg;
        p.classList.add('kick-anim');
        ball.className = 'ball-fail';
        b.classList.add('save-anim');
        
        let sName = "en1";
        if (botCombo >= 5) {
            sName = "enc"; botCombo = 0;
        } else {
            let pool = ["en1","en2","en3"].filter(x => x !== lastBotAtk);
            sName = pool[Math.floor(Math.random()*pool.length)];
            lastBotAtk = sName;
        }
        playSound(sName);
        showDmg(dmg, 'player', sName === "enc");
    }
    
    updateUI();
    setTimeout(() => {
        p.classList.remove('kick-anim');
        b.classList.remove('save-anim');
        ball.className = '';
        nextQuestion();
    }, 2000);
}

function showDmg(amt, side, crit) {
    const d = document.createElement('div');
    d.className = 'damage-popup';
    d.textContent = crit ? `SUPER GOAL! -${amt}` : `-${amt}`;
    d.style.color = side === 'bot' ? 'var(--combo-color)' : 'var(--wrong-color)';
    d.style.left = side === 'bot' ? '70%' : '20%';
    d.style.top = '40%';
    document.getElementById('game-container').appendChild(d);
    setTimeout(() => d.remove(), 1000);
}

function endGame() {
    if (bgmSource) bgmSource.stop();
    const isWin = botHP <= 0;
    playSound(isWin ? 'win' : 'lost');
    
    document.getElementById('top-ui').style.display = 'none';
    document.getElementById('pitch').style.display = 'none';
    document.getElementById('bottom-ui').style.display = 'none';
    
    const screen = document.getElementById('start-screen');
    const h = document.getElementById('main-heading');
    screen.style.display = 'flex';
    document.getElementById('home-btn').style.display = 'flex';
    
    h.textContent = isWin ? "ชัยชนะเป็นของคุณ!" : "พ่ายแพ้! ลองใหม่อีกครั้ง";
    h.focus();
    
    const btn = screen.querySelector('.btn-start');
    btn.textContent = "เล่นใหม่อีกครั้ง";
    btn.onclick = () => window.location.reload();
}
</script>
</body>
</html>
