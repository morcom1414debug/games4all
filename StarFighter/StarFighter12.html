<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star nameFighter - ศึกจ้าวนักเตะระดับโลก</title>
    <style>
        :root {
            --player-color: #3498db;
            --bot-color: #e67e22;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --combo-color: #f1c40f;
            --ui-bg: rgba(0, 0, 0, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; position: fixed; width: 100%;
        }

        #game-container {
            width: 95%; max-width: 1000px;
            height: 95vh; max-height: 700px;
            position: relative;
            background: #1a1a1a;
            border: 5px solid #333;
            display: flex; flex-direction: column; overflow: hidden;
            transition: transform 0.1s; /* รองรับ Screen Shake */
        }

        /* Screen Shake Animation */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-1px, -1px) rotate(1deg); }
            80% { transform: translate(-3px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }
        .shake-effect { animation: shake 0.3s; }

        .home-btn-hex {
            width: 60px; height: 60px;
            background-color: var(--combo-color);
            color: #000; font-size: 1.8rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: none; z-index: 220;
            position: absolute; top: 20px; left: 20px;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #top-ui {
            background: var(--ui-bg);
            padding: 20px; z-index: 10;
            border-bottom: 3px solid var(--combo-color);
            display: none;
        }

        #timer-bar-bg { width: 100%; height: 8px; background: #222; margin-bottom: 15px; border-radius: 4px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--combo-color); transition: width 0.1s linear; }

        #question-text {
            font-size: 1.8rem; text-align: center;
            margin: 0 0 20px 0; min-height: 60px;
            outline: none; display: flex; align-items: center; justify-content: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; max-width: 800px; margin: 0 auto;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-btn {
            padding: 15px 5px; font-size: 1.2rem;
            background: linear-gradient(to bottom, #444, #222);
            border: 2px solid #555;
            color: white; cursor: pointer; border-radius: 12px;
            font-weight: bold; transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--combo-color); }

        #pitch {
            flex-grow: 1; position: relative;
            display: none; justify-content: space-between; align-items: center;
            padding: 0 50px; 
            /* เพิ่ม Gradient และมิติสนาม */
            background: radial-gradient(circle at center, #2ecc71 0%, #27ae60 100%);
            background-image: linear-gradient(rgba(255,255,255,0.05) 2px, transparent 2px);
            background-size: 100% 60px;
        }

        #goal-post {
            position: absolute;
            right: 0; bottom: 50px; width: 60px; height: 180px;
            border-left: 6px solid rgba(255,255,255,0.8); 
            border-top: 6px solid rgba(255,255,255,0.8); 
            border-bottom: 6px solid rgba(255,255,255,0.8);
            background: rgba(255, 255, 255, 0.05); z-index: 1;
        }

        .character { width: 120px; height: 120px; z-index: 5; transition: transform 0.3s; filter: drop-shadow(0 10px 5px rgba(0,0,0,0.2)); }
        
        #ball {
            position: absolute; width: 35px; height: 35px; border-radius: 50%;
            bottom: 70px; left: 150px; display: block; z-index: 6;
            background-color: white;
            background-image: radial-gradient(circle at 30% 30%, #fff 0%, #ccc 100%),
                              repeating-conic-gradient(from 0deg, #000 0deg 36deg, transparent 36deg 72deg);
            border: 2px solid #333; box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            transition: opacity 0.3s;
        }

        @keyframes kick { 0% { transform: scale(1); } 50% { transform: scale(1.15) translateX(25px); } 100% { transform: scale(1); } }
        .kick-anim { animation: kick 0.4s ease; }
        @keyframes save { 0% { transform: translateY(0); } 50% { transform: translateY(-40px) rotate(-15deg); } 100% { transform: translateY(0); } }
        .save-anim { animation: save 0.5s ease; }
        @keyframes celebrate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-35px); } }
        .victory-anim { animation: celebrate 0.4s infinite; }
        @keyframes frustrated { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px) rotate(-8deg); } 75% { transform: translateX(10px) rotate(8deg); } }
        .sad-anim { animation: frustrated 0.25s infinite; }

        /* Ball Animations with Rotation */
        @keyframes toGoal { 
            0% { left: 150px; bottom: 70px; transform: rotate(0deg); } 
            100% { left: 930px; bottom: 130px; transform: rotate(720deg); opacity: 0; } 
        }
        .ball-goal { display: block !important; animation: toGoal 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        
        @keyframes toFail { 
            0% { left: 150px; bottom: 70px; transform: rotate(0deg); } 
            50% { left: 750px; bottom: 120px; transform: rotate(360deg); } 
            100% { left: 600px; bottom: 40px; transform: rotate(540deg); opacity: 0; } 
        }
        .ball-fail { display: block !important; animation: toFail 0.9s ease-in forwards; }

        /* HP Pulse Effect */
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.05); filter: brightness(1.5); } 100% { transform: scale(1); } }
        .hp-pulse { animation: pulse-red 0.4s ease; }

        .damage-popup {
            position: absolute; font-size: 2.8rem; font-weight: 900; pointer-events: none; z-index: 100;
            text-shadow: 3px 3px 0px #000; text-align: center; width: 300px;
            animation: dropDown 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .combo-text { font-size: 3.5rem !important; color: var(--combo-color) !important; filter: drop-shadow(0 0 15px rgba(241, 196, 15, 0.6)); }

        @keyframes dropDown { 0% { opacity: 0; transform: translateY(-60px) scale(0.5); } 20% { opacity: 1; transform: translateY(20px) scale(1.1); } 80% { opacity: 1; transform: translateY(25px) scale(1); } 100% { opacity: 0; transform: translateY(50px) scale(0.8); } }

        #bottom-ui { background: var(--ui-bg); padding: 20px 30px; display: none; justify-content: space-between; border-top: 4px solid var(--player-color); }
        .side-group { width: 45%; outline: none; transition: transform 0.2s; }
        .hp-bar-bg { height: 22px; background: #222; border: 2px solid #555; border-radius: 11px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .hp-fill { height: 100%; width: 100%; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1); }

        #start-screen { 
            position: absolute; inset: 0; 
            background: rgba(0,0,0,0.75); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; backdrop-filter: blur(4px);
        }
        .title { 
            font-size: 4rem; color: var(--combo-color); 
            margin-bottom: 40px; text-align: center; 
            text-shadow: 0 0 20px rgba(0,0,0,1), 4px 4px 0px #000; outline: none;
            letter-spacing: 2px;
        }
        .btn-start { 
            padding: 18px 70px; font-size: 2rem; background: var(--correct-color); 
            border: none; cursor: pointer; border-radius: 60px; color: white; 
            font-weight: 900; box-shadow: 0 8px 0px #27ae60, 0 15px 25px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 4px 0px #27ae60, 0 5px 15px rgba(0,0,0,0.4); }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

        /* Kick Dust Effect */
        .kick-dust {
            position: absolute; width: 40px; height: 20px; background: rgba(255,255,255,0.4);
            border-radius: 50%; filter: blur(5px); pointer-events: none;
            animation: dustAnim 0.4s forwards;
        }
        @keyframes dustAnim { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sr-announcer" class="sr-only" aria-live="assertive"></div>
    
    <a href="../index9.html" id="home-btn" class="home-btn-hex" aria-label="กลับสู่ชุมชน">🏠</a>

    <div id="start-screen">
        <h1 class="title" id="main-heading" tabindex="-1">Star nameFighter</h1>
        <button class="btn-start" id="start-game-btn" onclick="startGame()">เริ่มเขี่ยลูก</button>
    </div>

    <div id="top-ui">
        <div id="timer-bar-bg"><div id="timer-fill"></div></div>
        <h2 id="question-text" tabindex="-1"></h2>
        <div class="options-grid" id="options-grid"></div>
    </div>

    <div id="pitch">
        <div id="goal-post"></div> <div id="ball"></div> 
        <div id="player" class="character">
            <svg viewBox="0 0 100 100"><circle cx="50" cy="30" r="15" fill="#fbd38d"/><rect x="35" y="45" width="30" height="40" fill="var(--player-color)"/></svg>
        </div>
        <div id="bot" class="character">
            <svg viewBox="0 0 100 100"><rect x="30" y="15" width="40" height="30" fill="#7f8c8d"/><rect x="35" y="45" width="30" height="40" fill="var(--bot-color)"/></svg>
        </div>
    </div>

    <div id="bottom-ui">
        <section id="player-hp-group" class="side-group" role="group" aria-label="ผู้เล่น พลัง 1000" tabindex="0">
            <div style="color:var(--player-color); font-weight:bold; margin-bottom:5px; text-shadow: 1px 1px #000;">PLAYER</div>
            <div class="hp-bar-bg"><div id="player-hp-fill" class="hp-fill" style="background: linear-gradient(to right, #2980b9, var(--player-color))"></div></div>
        </section>
        <section id="bot-hp-group" class="side-group" role="group" aria-label="บอท พลัง 1000" tabindex="0">
            <div style="color:var(--bot-color); font-weight:bold; text-align:right; margin-bottom:5px; text-shadow: 1px 1px #000;">BOT</div>
            <div class="hp-bar-bg"><div id="bot-hp-fill" class="hp-fill" style="background: linear-gradient(to left, #d35400, var(--bot-color)); margin-left:auto;"></div></div>
        </section>
    </div>
</div>

<script>
const questions = [
  { q: "ลิโอเนล เมสซี เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","อาร์เจนตินา","โปรตุเกส"], answer: 1 },
  { q: "คริสเตียโน โรนัลโด เป็นสตาร์ของทีมชาติใด", options: ["โปรตุเกส","สเปน","อิตาลี"], answer: 0 },
  { q: "เปเล่ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","อาร์เจนตินา","โคลอมเบีย"], answer: 0 },
  { q: "ดีเอโก มาราโดนา เป็นสตาร์ของทีมชาติใด", options: ["อาร์เจนตินา","อุรุกวัย","ชิลี"], answer: 0 },
  { q: "โยฮัน ครัฟฟ์ เป็นสตาร์ของทีมชาติใด", options: ["เนเธอร์แลนด์","เยอรมนี","เบลเยียม"], answer: 0 },
  { q: "ซีเนดีน ซีดาน เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","โมร็อกโก","เบลเยียม"], answer: 0 },
  { q: "โรนัลดินโญ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","โปรตุเกส","อาร์เจนตินา"], answer: 0 },
  { q: "เนย์มาร์ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","สเปน","ฝรั่งเศส"], answer: 0 },
  { q: "ฟรานซ์ เบ็คเคนเบาเออร์ เป็นสตาร์ของทีมชาติใด", options: ["เยอรมนี","ออสเตรีย","สวิตเซอร์แลนด์"], answer: 0 },
  { q: "เปาโล มัลดินี เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","สเปน","โปรตุเกส"], answer: 0 },
  { q: "มาร์โก ฟาน บัสเทิน เป็นสตาร์ของทีมชาติใด", options: ["เนเธอร์แลนด์","เบลเยียม","เดนมาร์ก"], answer: 0 },
  { q: "มิเชล พลาตินี เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","สวิตเซอร์แลนด์","อิตาลี"], answer: 0 },
  { q: "โรแบร์โต บักโจ เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","บราซิล","อาร์เจนตินา"], answer: 0 },
  { q: "เธียร์รี อองรี เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","ไอวอรีโคสต์","เบลเยียม"], answer: 0 },
  { q: "จอร์จ เบสต์ เป็นสตาร์ของทีมชาติใด", options: ["ไอร์แลนด์เหนือ","ไอร์แลนด์","สกอตแลนด์"], answer: 0 },
  { q: "บ็อบบี ชาร์ลตัน เป็นสตาร์ของทีมชาติใด", options: ["อังกฤษ","สกอตแลนด์","เวลส์"], answer: 0 },
  { q: "เปาโล รอสซี เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","อาร์เจนตินา","บราซิล"], answer: 0 },
  { q: "ซลาตัน อิบราฮิโมวิช เป็นสตาร์ของทีมชาติใด", options: ["สวีเดน","โครเอเชีย","นอร์เวย์"], answer: 0 },
  { q: "โรนัลโด นาซาริโอ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","อาร์เจนตินา","โปรตุเกส"], answer: 0 },
  { q: "โรแบร์โต คาร์ลอส เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","โปรตุเกส","สเปน"], answer: 0 },
  { q: "อลัน เชียเรอร์ เป็นสตาร์ของทีมชาติใด", options: ["อังกฤษ","ไอร์แลนด์เหนือ","สกอตแลนด์"], answer: 0 },
  { q: "เซร์คิโอ รามอส เป็นสตาร์ของทีมชาติใด", options: ["สเปน","โปรตุเกส","ฝรั่งเศส"], answer: 0 },
  { q: "อันเดรส อิเนียสตา เป็นสตาร์ของทีมชาติใด", options: ["สเปน","อาร์เจนตินา","บราซิล"], answer: 0 },
  { q: "ลูกา โมดริช เป็นสตาร์ของทีมชาติใด", options: ["โครเอเชีย","โปแลนด์","สโลวีเนีย"], answer: 0 },
  { q: "เควิน เดอ บรอยน์ เป็นสตาร์ของทีมชาติใด", options: ["เบลเยียม","เนเธอร์แลนด์","สวิตเซอร์แลนด์"], answer: 0 },
  { q: "คิลิยัน เอ็มบัปเป้ เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","เบลเยียม","โปรตุเกส"], answer: 0 },
  { q: "เออร์ลิง ฮาแลนด์ เป็นสตาร์ของทีมชาติใด", options: ["นอร์เวย์","เดนมาร์ก","สวีเดน"], answer: 0 },
  { q: "เลวานดอฟสกี เป็นสตาร์ของทีมชาติใด", options: ["โปแลนด์","เยอรมนี","ออสเตรีย"], answer: 0 },
  { q: "ซาดิโอ มาเน่ เป็นสตาร์ของทีมชาติใด", options: ["เซเนกัล","ไอวอรีโคสต์","กานา"], answer: 0 },
  { q: "โมฮาเหม็ด ซาลาห์ เป็นสตาร์ของทีมชาติใด", options: ["อียิปต์","โมร็อกโก","ตูนิเซีย"], answer: 0 },
  { q: "จิอันลุยจิ บุฟฟอน เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","สเปน","ฝรั่งเศส"], answer: 0 }
];

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let sounds = {}; let bgmSource = null;
let playerHP = 1000, botHP = 1000, playerCombo = 0, botCombo = 0;
let currentQ = []; let timer = null;
let lastPlayerAtk = ""; let lastBotAtk = "";

async function initSounds() {
    const files = [['start','audio/start.mp3'],['back','audio/back.mp3'],['at1','audio/at1.mp3'],['at2','audio/at2.mp3'],['at3','audio/at3.mp3'],['atc','audio/atc.mp3'],['en1','audio/en1.mp3'],['en2','audio/en2.mp3'],['en3','audio/en3.mp3'],['enc','audio/enc.mp3'],['win','audio/win.mp3'],['lost','audio/lost.mp3']];
    for(let f of files) { try { const r = await fetch(f[1]); const b = await r.arrayBuffer(); sounds[f[0]] = await audioCtx.decodeAudioData(b); } catch(e){} }
}
initSounds();

function playSound(n) { if(!sounds[n]) return; const s = audioCtx.createBufferSource(); s.buffer = sounds[n]; s.connect(audioCtx.destination); s.start(); return s; }

function announce(txt) {
    const el = document.getElementById('sr-announcer');
    el.textContent = ""; 
    setTimeout(() => { el.textContent = txt; }, 50);
}

function triggerShake() {
    const container = document.getElementById('game-container');
    container.classList.remove('shake-effect');
    void container.offsetWidth; // Trigger reflow
    container.classList.add('shake-effect');
}

function spawnDust(x, y) {
    const d = document.createElement('div');
    d.className = 'kick-dust';
    d.style.left = x + 'px';
    d.style.bottom = y + 'px';
    document.getElementById('pitch').appendChild(d);
    setTimeout(() => d.remove(), 400);
}

function startGame() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('home-btn').style.display = 'none';
    document.getElementById('top-ui').style.display = 'block';
    document.getElementById('pitch').style.display = 'flex';
    document.getElementById('bottom-ui').style.display = 'flex';
    playerHP = 1000; botHP = 1000; playerCombo = 0; botCombo = 0;
    currentQ = [...questions].sort(() => Math.random() - 0.5);
    updateUI();
    const h = document.getElementById('question-text'); h.textContent = "เตรียมตัว..."; h.focus();
    const s = playSound('start');
    if(s) s.onended = () => { 
        bgmSource = audioCtx.createBufferSource(); 
        bgmSource.buffer = sounds.back; 
        bgmSource.loop = true; 
        bgmSource.connect(audioCtx.destination); 
        bgmSource.start(); 
        nextQuestion(); 
    };
    else nextQuestion();
}

function nextQuestion() {
    document.getElementById('sr-announcer').textContent = "";
    if(playerHP <= 0 || botHP <= 0) return endGame();
    if(currentQ.length === 0) currentQ = [...questions].sort(() => Math.random() - 0.5);
    const data = currentQ.pop();
    const correctText = data.options[data.answer];
    let shuffledOptions = [...data.options].sort(() => Math.random() - 0.5);
    let newAnswerIndex = shuffledOptions.indexOf(correctText);
    const h = document.getElementById('question-text'); h.textContent = data.q; h.focus();
    const grid = document.getElementById('options-grid'); grid.innerHTML = '';
    
    shuffledOptions.forEach((opt, i) => {
        const b = document.createElement('button'); 
        b.className = 'option-btn'; 
        b.textContent = opt;
        b.onclick = () => checkAnswer(i, newAnswerIndex); 
        grid.appendChild(b);
    });

    let timeLeft = 7000;
    const bar = document.getElementById('timer-fill');
    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft -= 100; bar.style.width = (timeLeft/7000)*100 + "%";
        if(timeLeft <= 0) { clearInterval(timer); checkAnswer(-1, newAnswerIndex); }
    }, 100);
}

function checkAnswer(idx, correct) {
    clearInterval(timer);
    const allButtons = document.querySelectorAll('.option-btn');
    allButtons.forEach(btn => { btn.disabled = true; });

    const isCorrect = idx === correct;
    const p = document.getElementById('player'), b = document.getElementById('bot'), ball = document.getElementById('ball');
    
    if (isCorrect) {
        playerCombo++; botCombo = 0;
        let isSuper = playerCombo >= 5;
        let dmg = isSuper ? 250 : 100;
        botHP -= dmg;
        p.classList.add('kick-anim'); 
        ball.className = 'ball-goal';
        spawnDust(180, 70); // ฝุ่นตอนเตะ
        
        setTimeout(() => { 
            p.classList.add('victory-anim'); 
            b.classList.add('sad-anim'); 
            triggerShake(); // จอสั่นตอนยิงเข้า
            document.getElementById('bot-hp-group').classList.add('hp-pulse');
            setTimeout(() => document.getElementById('bot-hp-group').classList.remove('hp-pulse'), 400);
        }, 600);

        let sName = isSuper ? 'atc' : ['at1','at2','at3'].filter(x=>x!==lastPlayerAtk)[Math.floor(Math.random()*2)];
        lastPlayerAtk = sName;
        playSound(sName);
        showDmg(dmg, 'bot', isSuper);
        let msg = isSuper ? "Combo! เยี่ยม ยิงได้ 5 ลูกติด" : "ถูกต้อง! ยิงเข้าประตู";
        announce(`${msg} บอทเสียพลัง ${dmg}`);
        if(isSuper) playerCombo = 0; 
    } else {
        botCombo++; playerCombo = 0;
        let isSuperBot = botCombo >= 5;
        let dmg = isSuperBot ? 200 : 120;
        playerHP -= dmg;
        p.classList.add('kick-anim'); 
        ball.className = 'ball-fail'; 
        b.classList.add('save-anim');
        spawnDust(180, 70);

        setTimeout(() => { 
            b.classList.add('victory-anim'); 
            p.classList.add('sad-anim'); 
            triggerShake(); // จอสั่นตอนโดนดาเมจ
            document.getElementById('player-hp-group').classList.add('hp-pulse');
            setTimeout(() => document.getElementById('player-hp-group').classList.remove('hp-pulse'), 400);
        }, 500);

        let sName = isSuperBot ? 'enc' : ['en1','en2','en3'].filter(x=>x!==lastBotAtk)[Math.floor(Math.random()*2)];
        lastBotAtk = sName;
        playSound(sName);
        showDmg(dmg, 'player', isSuperBot);
        let msg = isSuperBot ? "Combo! บอทซุปเปอร์เซฟได้ 5 ลูกต่อเนื่อง" : "พลาด! บอทป้องกันไว้ได้";
        announce(`${msg} คุณเสียพลัง ${dmg}`);
        if(isSuperBot) botCombo = 0;
    }
    
    updateUI();
    setTimeout(() => {
        p.classList.remove('kick-anim', 'victory-anim', 'sad-anim'); 
        b.classList.remove('save-anim', 'victory-anim', 'sad-anim');
        ball.className = ''; 
        nextQuestion();
    }, 3500); 
}

function showDmg(amt, side, crit) {
    const container = document.getElementById('pitch');
    const d = document.createElement('div');
    d.className = crit ? 'damage-popup combo-text' : 'damage-popup';
    d.textContent = crit ? (side === 'bot' ? `SUPER GOAL! -${amt}` : `COMBO ATTACK! -${amt}`) : `-${amt}`;
    d.style.color = side === 'bot' ? 'var(--combo-color)' : 'var(--wrong-color)';
    d.style.left = side === 'bot' ? '65%' : '10%';
    d.style.top = '10px'; 
    container.appendChild(d);
    setTimeout(() => d.remove(), 1200);
}

function updateUI() {
    document.getElementById('player-hp-fill').style.width = (Math.max(0, playerHP)/10) + "%";
    document.getElementById('bot-hp-fill').style.width = (Math.max(0, botHP)/10) + "%";
    document.getElementById('player-hp-group').setAttribute('aria-label', `ผู้เล่น พลังเหลือ ${playerHP}`);
    document.getElementById('bot-hp-group').setAttribute('aria-label', `บอท พลังเหลือ ${botHP}`);
}

function endGame() {
    if (bgmSource) bgmSource.stop();
    document.getElementById('sr-announcer').textContent = "";
    
    const isWin = botHP <= 0;
    const endSound = playSound(isWin ? 'win' : 'lost');
    
    const showResult = () => {
        document.getElementById('top-ui').style.display = 'none';
        document.getElementById('home-btn').style.display = 'flex';
        const s = document.getElementById('start-screen');
        const h = document.getElementById('main-heading');
        s.style.display = 'flex';
        
        h.textContent = isWin ? "ชัยชนะเป็นของคุณ!" : "พ่ายแพ้ในสนามแข่ง!";
        h.focus();

        const b = document.getElementById('start-game-btn');
        if(b) b.style.display = 'none';

        const p = document.getElementById('player');
        const bot = document.getElementById('bot');
        if(isWin) {
            p.classList.add('victory-anim');
            bot.classList.add('sad-anim');
        } else {
            bot.classList.add('victory-anim');
            p.classList.add('sad-anim');
        }
    };
    
    if(endSound) endSound.onended = showResult;
    else showResult();
}
</script>
</body>
</html>
