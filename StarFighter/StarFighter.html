<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star nameFighter - ศึกจ้าวนักเตะระดับโลก</title>
    <style>
        :root {
            --player-color: #3498db; /* Blue */
            --bot-color: #e67e22;    /* Orange */
            --field-green: #27ae60;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --combo-color: #f1c40f;
            --ui-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; position: fixed; width: 100%;
        }

        #game-container {
            width: 95%; max-width: 1000px;
            height: 95vh; max-height: 700px;
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center;
            border: 5px solid #333;
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: box-shadow 0.5s ease;
        }

        /* --- Home Button Styles (From Original) --- */
        .home-btn-hex {
            width: 60px; height: 60px;
            background-color: var(--combo-color) !important; 
            color: #000 !important; font-size: 1.8rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: none;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            transition: all 0.3s ease;
            z-index: 120;
            -webkit-appearance: none; text-decoration: none;
        }
        .home-btn-hex:hover { transform: scale(1.1); filter: brightness(1.2); }
        .top-left-home { position: absolute; top: 20px; left: 20px; }

        /* --- UI ส่วนบน: คำถามและตัวเลือก --- */
        #top-ui {
            background: var(--ui-bg);
            padding: 20px;
            z-index: 10;
            border-bottom: 3px solid var(--combo-color);
            display: none; /* Hidden by default, shown in Battle Arena */
        }

        #question-text {
            font-size: 2rem; text-align: center;
            margin: 0 0 20px 0; min-height: 60px;
            display: flex; justify-content: center; align-items: center;
            color: #fff; text-shadow: 2px 2px 4px #000;
            outline: none; /* For Focus */
        }

        .options-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; max-width: 800px; margin: 0 auto;
        }

        .option-btn {
            padding: 18px 5px; font-size: 1.3rem;
            background: #444; border: 2px solid #666;
            color: white; cursor: pointer;
            border-radius: 10px; transition: all 0.2s;
            font-weight: bold; outline: none;
        }
        .option-btn:hover { background: #555; transform: translateY(-3px); }
        .option-btn.correct { background: var(--correct-color) !important; border-color: #fff; animation: pulseGlow 0.5s; }
        .option-btn.wrong { background: var(--wrong-color) !important; border-color: #fff; }

        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0px rgba(46, 204, 113, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); } 100% { box-shadow: 0 0 0 0px rgba(46, 204, 113, 0); } }

        /* --- สนามแข่ง (กลาง) --- */
        #pitch {
            flex-grow: 1; position: relative;
            display: none; /* Hidden by default */
            justify-content: space-between; align-items: center;
            padding: 0 50px;
        }

        .goal {
            position: absolute; width: 25px; height: 180px;
            background: rgba(255,255,255,0.2); border: 4px solid white;
            top: 50%; transform: translateY(-50%);
        }
        .goal-left { left: 0; border-left: none; }
        .goal-right { right: 0; border-right: none; }

        .character { width: 130px; height: 130px; position: relative; z-index: 5; }
        .game-icon { width: 100%; height: 100%; }

        #ball {
            position: absolute; width: 45px; height: 45px;
            border-radius: 50%; left: 150px; bottom: 60px;
            background: radial-gradient(circle at 30% 30%, #fff, #999);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none; z-index: 6;
        }

        /* --- UI ส่วนล่าง: แถบพลัง (Group ARIA) --- */
        #bottom-ui {
            background: var(--ui-bg);
            padding: 15px 30px;
            display: none; /* Hidden by default */
            justify-content: space-between; align-items: center;
            border-top: 3px solid var(--player-color);
        }

        .side-group { width: 45%; display: flex; flex-direction: column; gap: 5px; outline: none; }
        .hp-label { font-weight: bold; font-size: 1.1rem; margin-bottom: 2px; }
        .hp-bar-bg { height: 22px; background: #333; border: 2px solid #fff; border-radius: 11px; overflow: hidden; position: relative;}
        .hp-fill { height: 100%; width: 100%; transition: width 0.4s ease-out; position: absolute; inset: 0; }

        /* --- Animations --- */
        @keyframes shoot-goal {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(650px, -80px) scale(0.4); opacity: 0; }
        }
        @keyframes shoot-fail {
            0% { transform: translate(0, 0) scale(1); }
            40% { transform: translate(500px, -40px) scale(0.8); }
            100% { transform: translate(450px, 60px) scale(0.9); }
        }
        .ball-goal { display: block !important; animation: shoot-goal 0.7s ease-in forwards; }
        .ball-fail { display: block !important; animation: shoot-fail 0.7s ease-out forwards; }

        .kick-anim { animation: kick 0.4s ease; }
        @keyframes kick { 0% { transform: rotate(0); } 50% { transform: rotate(-35deg) translateX(15px); } 100% { transform: rotate(0); } }

        .save-anim { animation: save 0.4s ease; }
        @keyframes save { 0% { transform: translateY(0); } 50% { transform: translateY(-40px) scale(1.1); filter: brightness(1.3); } 100% { transform: translateY(0); } }

        /* --- Screen Shake --- */
        @keyframes shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-8px, 8px); } 50% { transform: translate(8px, -8px); } 75% { transform: translate(-8px, -8px); } }
        .shake-heavy { animation: shake 0.4s ease-in-out; }

        /* --- Damage Popup (Original Logic) --- */
        .damage-popup {
            position: absolute; font-size: 2.8rem; font-weight: bold; font-style: italic;
            pointer-events: none; z-index: 50;
            text-shadow: 2px 2px 0px #000, -1px -1px 0px #000;
            opacity: 0;
        }
        @keyframes floatUpDamage {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1); opacity: 0; }
        }
        .animate-damage { animation: floatUpDamage 1.2s ease-out forwards; }
        .damage-critical { font-size: 4rem; text-shadow: 0 0 10px #fff, 0 0 20px var(--combo-color) !important; color: #fff !important; }

        /* --- Start/End Screen --- */
        #start-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center;
        }
        .title {
            font-size: 4.5rem; text-transform: uppercase; font-style: italic;
            background: linear-gradient(to bottom, #fff 20%, var(--combo-color) 50%, #e67e22 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px #000); margin-bottom: 30px; outline: none;
        }
        .btn-start {
            padding: 20px 60px; font-size: 1.6rem; background: var(--correct-color); color: #000;
            border: none; font-weight: bold; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: all 0.2s;
        }
        .btn-start:hover { transform: scale(1.05); filter: brightness(1.1); }

        .final-msg-anim { animation: titlePop 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        @keyframes titlePop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        
        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .title { font-size: 2.8rem; }
            #pitch { padding: 0 15px; }
            #question-text { font-size: 1.6rem; }
            .character { width: 90px; height: 90px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sr-announcer" class="sr-only" aria-live="assertive"></div>
    
    <button id="main-home-btn" class="home-btn-hex top-left-home" aria-label="กลับสู่ชุมชน" onclick="window.location.reload()">🏠</button>

    <div id="start-screen">
        <h1 class="title" id="start-title" tabindex="-1">Star nameFighter</h1>
        <button class="btn-start" onclick="startGame()">เริ่มเขี่ยลูก</button>
    </div>

    <div id="top-ui">
        <div id="timer-bar-bg" style="width:100%; height:6px; background:#222; margin-bottom:12px; border-radius:3px; overflow:hidden;">
            <div id="timer-fill" style="width:100%; height:100%; background:var(--combo-color); transition: width 0.1s linear;"></div>
        </div>
        <h2 id="question-text" tabindex="-1"></h2>
        <div class="options-grid" id="options-grid"></div>
    </div>

    <div id="pitch">
        <div class="goal goal-left"></div>
        <div class="goal goal-right"></div>
        <div id="ball"></div>

        <div id="player" class="character">
            <svg class="game-icon" viewBox="0 0 100 100">
                <circle cx="50" cy="30" r="15" fill="#fbd38d"/>
                <rect x="35" y="45" width="30" height="40" fill="var(--player-color)" rx="2"/>
                <rect x="35" y="85" width="12" height="15" fill="#fff"/>
                <rect x="53" y="85" width="12" height="15" fill="#fff"/>
            </svg>
        </div>

        <div id="bot" class="character">
            <svg class="game-icon" viewBox="0 0 100 100">
                <rect x="30" y="15" width="40" height="30" fill="#7f8c8d" rx="2"/>
                <rect x="35" y="45" width="30" height="40" fill="var(--bot-color)" rx="2"/>
                <circle cx="40" cy="25" r="3" fill="#ff3300"/>
                <circle cx="60" cy="25" r="3" fill="#ff3300"/>
                <rect x="35" y="85" width="12" height="15" fill="#333"/>
                <rect x="53" y="85" width="12" height="15" fill="#333"/>
            </svg>
        </div>
    </div>

    <div id="bottom-ui">
        <section id="player-hp-group" class="side-group" role="group" aria-label="ผู้เล่น พลัง 1000" tabindex="0">
            <div class="hp-label" style="color:var(--player-color)">PLAYER (YOU)</div>
            <div class="hp-bar-bg">
                <div id="player-hp-fill" class="hp-fill" style="background:var(--player-color); box-shadow: 0 0 10px var(--player-color);"></div>
            </div>
        </section>
        
        <section id="bot-hp-group" class="side-group" role="group" aria-label="บอท พลัง 1000" tabindex="0">
            <div class="hp-label" style="color:var(--bot-color); text-align:right;">BOT (CPU)</div>
            <div class="hp-bar-bg">
                <div id="bot-hp-fill" class="hp-fill" style="background:var(--bot-color); margin-left:auto; box-shadow: 0 0 10px var(--bot-color);"></div>
            </div>
        </section>
    </div>
</div>

<script>
// --- ชุดข้อมูลคำถาม (format ตามที่กำหนด) ---
const questionsData = [
  { q: "ลิโอเนล เมสซี เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","อาร์เจนตินา","โปรตุเกส"], answer: 1 },
  { q: "คริสเตียโน โรนัลโด เป็นสตาร์ของทีมชาติใด", options: ["โปรตุเกส","สเปน","อิตาลี"], answer: 0 },
  { q: "เปเล่ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","อาร์เจนตินา","โคลอมเบีย"], answer: 0 },
  { q: "ดีเอโก มาราโดนา เป็นสตาร์ของทีมชาติใด", options: ["อาร์เจนตินา","อุรุกวัย","ชิลี"], answer: 0 },
  { q: "โยฮัน ครัฟฟ์ เป็นสตาร์ของทีมชาติใด", options: ["เนเธอร์แลนด์","เยอรมนี","เบลเยียม"], answer: 0 },
  { q: "ซีเนดีน ซีดาน เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","โมร็อกโก","เบลเยียม"], answer: 0 },
  { q: "โรนัลดินโญ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","โปรตุเกส","อาร์เจนตินา"], answer: 0 },
  { q: "เนย์มาร์ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","สเปน","ฝรั่งเศส"], answer: 0 },
  { q: "ฟรานซ์ เบ็คเคนเบาเออร์ เป็นสตาร์ของทีมชาติใด", options: ["เยอรมนี","ออสเตรีย","สวิตเซอร์แลนด์"], answer: 0 },
  { q: "เปาโล มัลดินี เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","สเปน","โปรตุเกส"], answer: 0 },
  { q: "มาร์โก ฟาน บัสเทิน เป็นสตาร์ของทีมชาติใด", options: ["เนเธอร์แลนด์","เบลเยียม","เดนมาร์ก"], answer: 0 },
  { q: "มิเชล พลาตินี เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","สวิตเซอร์แลนด์","อิตาลี"], answer: 0 },
  { q: "โรแบร์โต บักโจ เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","บราซิล","อาร์เจนตินา"], answer: 0 },
  { q: "เธียร์รี อองรี เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","ไอวอรีโคสต์","เบลเยียม"], answer: 0 },
  { q: "จอร์จ เบสต์ เป็นสตาร์ของทีมชาติใด", options: ["ไอร์แลนด์เหนือ","ไอร์แลนด์","สกอตแลนด์"], answer: 0 },
  { q: "บ็อบบี ชาร์ลตัน เป็นสตาร์ของทีมชาติใด", options: ["อังกฤษ","สกอตแลนด์","เวลส์"], answer: 0 },
  { q: "เปาโล รอสซี เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","อาร์เจนตินา","บราซิล"], answer: 0 },
  { q: "ซลาตัน อิบราฮิโมวิช เป็นสตาร์ของทีมชาติใด", options: ["สวีเดน","โครเอเชีย","นอร์เวย์"], answer: 0 },
  { q: "โรนัลโด นาซาริโอ เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","อาร์เจนตินา","โปรตุเกส"], answer: 0 },
  { q: "โรแบร์โต คาร์ลอส เป็นสตาร์ของทีมชาติใด", options: ["บราซิล","โปรตุเกส","สเปน"], answer: 0 },
  { q: "อลัน เชียเรอร์ เป็นสตาร์ของทีมชาติใด", options: ["อังกฤษ","ไอร์แลนด์เหนือ","สกอตแลนด์"], answer: 0 },
  { q: "เซร์คิโอ รามอส เป็นสตาร์ของทีมชาติใด", options: ["สเปน","โปรตุเกส","ฝรั่งเศส"], answer: 0 },
  { q: "อันเดรส อิเนียสตา เป็นสตาร์ของทีมชาติใด", options: ["สเปน","อาร์เจนตินา","บราซิล"], answer: 0 },
  { q: "ลูกา โมดริช เป็นสตาร์ของทีมชาติใด", options: ["โครเอเชีย","โปแลนด์","สโลวีเนีย"], answer: 0 },
  { q: "เควิน เดอ บรอยน์ เป็นสตาร์ของทีมชาติใด", options: ["เบลเยียม","เนเธอร์แลนด์","สวิตเซอร์แลนด์"], answer: 0 },
  { q: "คิลิยัน เอ็มบัปเป้ เป็นสตาร์ของทีมชาติใด", options: ["ฝรั่งเศส","เบลเยียม","โปรตุเกส"], answer: 0 },
  { q: "เออร์ลิง ฮาแลนด์ เป็นสตาร์ของทีมชาติใด", options: ["นอร์เวย์","เดนมาร์ก","สวีเดน"], answer: 0 },
  { q: "เลวานดอฟสกี เป็นสตาร์ของทีมชาติใด", options: ["โปแลนด์","เยอรมนี","ออสเตรีย"], answer: 0 },
  { q: "ซาดิโอ มาเน่ เป็นสตาร์ของทีมชาติใด", options: ["เซเนกัล","ไอวอรีโคสต์","กานา"], answer: 0 },
  { q: "โมฮาเหม็ด ซาลาห์ เป็นสตาร์ของทีมชาติใด", options: ["อียิปต์","โมร็อกโก","ตูนิเซีย"], answer: 0 },
  { q: "จิอันลุยจิ บุฟฟอน เป็นสตาร์ของทีมชาติใด", options: ["อิตาลี","สเปน","ฝรั่งเศส"], answer: 0 }
];

// --- Audio & Game Logic (100% Original Logic) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sounds = {};
let bgmSource = null;
let playerHP = 1000, botHP = 1000;
let playerCombo = 0, botCombo = 0;
let currentQuestions = [];
let currentQIndex = 0;
let timerInterval = null;
let lastPlayerAtk = "", lastBotAtk = "";

// โฟกัสหน้าแรก
window.onload = () => { setTimeout(() => document.getElementById('start-title').focus(), 500); };

async function loadSound(name, url) {
    try {
        const res = await fetch(url);
        const buf = await res.arrayBuffer();
        sounds[name] = await audioCtx.decodeAudioData(buf);
    } catch(e) { console.error("Sound load error:", name); }
}

// ไฟล์เสียงเดิม 100%
const files = [
    ['start','audio/start.mp3'], ['back','audio/back.mp3'],
    ['at1','audio/at1.mp3'], ['at2','audio/at2.mp3'], ['at3','audio/at3.mp3'], ['atc','audio/atc.mp3'],
    ['en1','audio/en1.mp3'], ['en2','audio/en2.mp3'], ['en3','audio/en3.mp3'], ['enc','audio/enc.mp3'],
    ['win','audio/win.mp3'], ['lost','audio/lost.mp3']
];
files.forEach(f => loadSound(f[0], f[1]));

function playSound(name) {
    if (sounds[name]) {
        const s = audioCtx.createBufferSource();
        s.buffer = sounds[name];
        s.connect(audioCtx.destination);
        s.start();
        return s;
    }
}

function announce(msg) { document.getElementById('sr-announcer').textContent = msg; }

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // เตรียมคำถาม (สุ่ม)
    currentQuestions = [...questionsData].sort(() => Math.random() - 0.5);
    currentQIndex = 0;
    playerHP = 1000; botHP = 1000; playerCombo = 0; botCombo = 0;
    updateUI();

    // ซ่อนหน้าแรกและปุ่ม Home
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('main-home-btn').style.display = 'none';
    
    // แสดง Arena
    document.getElementById('top-ui').style.display = 'block';
    document.getElementById('pitch').style.display = 'flex';
    document.getElementById('bottom-ui').style.display = 'flex';
    
    const qEl = document.getElementById('question-text');
    qEl.focus(); // โฟกัสที่ Heading ก่อน

    // อนิเมชั่นเริ่มเกม 3 2 FIGHT (แบบเดิม)
    const s = playSound('start');
    qEl.style.fontSize = "4rem"; qEl.style.color = "var(--combo-color)";
    qEl.textContent = "3";
    setTimeout(() => qEl.textContent = "2", 500);
    setTimeout(() => { qEl.textContent = "FIGHT!"; qEl.style.color = var(--wrong-color); }, 1000);
    
    s.onended = () => {
        qEl.style.fontSize = ""; qEl.style.color = "";
        if (!bgmSource) {
            bgmSource = audioCtx.createBufferSource();
            bgmSource.buffer = sounds.back;
            bgmSource.loop = true;
            bgmSource.connect(audioCtx.destination);
            bgmSource.start();
        }
        nextQuestion();
    };
}

function nextQuestion() {
    if (playerHP <= 0 || botHP <= 0) return endGame();
    
    if (currentQIndex >= currentQuestions.length) {
        currentQuestions = [...questionsData].sort(() => Math.random() - 0.5);
        currentQIndex = 0;
    }
    
    const currentQ = currentQuestions[currentQIndex];
    const qEl = document.getElementById('question-text');
    qEl.textContent = currentQ.q;
    
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    
    currentQ.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(idx, currentQ.answer);
        grid.appendChild(btn);
    });
    
    // โฟกัสคำถามเพื่อให้ SR อ่าน
    setTimeout(() => qEl.focus(), 100);
    startTimer();
}

function startTimer() {
    let left = 7000; // 7 วินาทีเดิม
    const bar = document.getElementById('timer-fill');
    clearInterval(timerInterval);
    bar.style.width = "100%";
    timerInterval = setInterval(() => {
        left -= 100;
        bar.style.width = (left/7000)*100 + "%";
        if (left <= 0) { clearInterval(timerInterval); checkAnswer(-1, -99); } // หมดเวลา
    }, 100);
}

function checkAnswer(tunedIdx, correctIdx) {
    clearInterval(timerInterval);
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    
    const isCorrect = tunedIdx === correctIdx;
    const ball = document.getElementById('ball');
    const p = document.getElementById('player');
    const b = document.getElementById('bot');
    const container = document.getElementById('game-container');

    if (isCorrect) {
        // --- Logic โจมตีของผู้เล่น (เดิม 100%) ---
        playerCombo++; botCombo = 0;
        let dmg = Math.floor(Math.random() * 51) + 80; // ดาเมจปกติ
        let isCrit = false;
        
        // คอมโบครบ 5 (Super Goal)
        if (playerCombo >= 5) {
            dmg = Math.floor(Math.random() * 101) + 200;
            playSound('atc');
            announce(`ซูเปอร์โกล! คอมโบโจมตีแรงพิเศษ ${dmg} หน่วย!`);
            playerCombo = 0; isCrit = true;
            container.classList.add('shake-heavy');
            setTimeout(() => container.classList.remove('shake-heavy'), 400);
        } else {
            // สุ่มเสียง at1-at3 ไม่ให้ซ้ำเดิม
            let pool = ['at1','at2','at3'].filter(s => s !== lastPlayerAtk);
            let sName = pool[Math.floor(Math.random() * pool.length)];
            playSound(sName); lastPlayerAtk = sName;
            announce(`ถูกต้อง! ยิงประตูสำเร็จ ดาเมจ ${dmg}`);
        }
        
        botHP -= dmg;
        if (btns[tunedIdx]) btns[tunedIdx].classList.add('correct');
        
        // อนิเมชั่นเตะเข้าประตู
        p.classList.add('kick-anim');
        ball.className = 'ball-goal';
        showDamage(dmg, 'bot', isCrit);

    } else {
        // --- Logic โจมตีของบอท (เดิม 100% เมื่อผู้เล่นตอบผิด/หมดเวลา) ---
        botCombo++; playerCombo = 0;
        let dmg = Math.floor(Math.random() * 51) + 70;
        let isCrit = false;

        if (btns[tunedIdx]) btns[tunedIdx].classList.add('wrong');
        
        if (botCombo >= 5) {
            dmg = Math.floor(Math.random() * 101) + 180;
            playSound('enc');
            announce(`อันตราย! บอทใช้ซูเปอร์คอมโบสวนกลับ ${dmg} หน่วย!`);
            botCombo = 0; isCrit = true;
            container.classList.add('shake-heavy');
            setTimeout(() => container.classList.remove('shake-heavy'), 400);
        } else {
            // สุ่มเสียง en1-en3 ไม่ให้ซ้ำเดิม
            let pool = ['en1','en2','en3'].filter(s => s !== lastBotAtk);
            let sName = pool[Math.floor(Math.random() * pool.length)];
            playSound(sName); lastBotAtk = sName;
            announce(tunedIdx === -1 ? `หมดเวลา! โดนบอทสวนกลับ ${dmg}` : `ผิดพลาด! โดนบอทป้องกันและสวนกลับ ${dmg}`);
        }
        
        playerHP -= dmg;
        
        // อนิเมชั่นเตะติดเซฟ
        p.classList.add('kick-anim');
        ball.className = 'ball-fail';
        b.classList.add('save-anim'); // บอทกระโดดเซฟ
        showDamage(dmg, 'player', isCrit);
    }

    updateUI();
    
    // รออนิเมชั่นจบแล้วไปข้อต่อไป
    setTimeout(() => {
        p.classList.remove('kick-anim');
        b.classList.remove('save-anim');
        ball.className = '';
        currentQIndex++;
        nextQuestion();
    }, 2500); // รอเวลาเท่าเดิมเพื่อให้เห็นผลลัพธ์
}

// Damage Popup Logic (เดิม)
function showDamage(amount, side, isCombo = false) {
    const container = document.getElementById('game-container');
    const d = document.createElement('div');
    d.className = `damage-popup animate-damage ${isCombo ? 'damage-critical' : ''}`;
    d.textContent = isCombo ? `SUPER GOAL! -${amount}` : `-${amount}`;
    
    if (side === 'bot') { 
        d.style.color = 'var(--combo-color)'; d.style.right = '20%'; d.style.top = '40%'; 
    } else { 
        d.style.color = 'var(--wrong-color)'; d.style.left = '20%'; d.style.top = '40%'; 
    }
    
    container.appendChild(d);
    setTimeout(() => d.remove(), 1200);
}

function updateUI() {
    const pFill = document.getElementById('player-hp-fill');
    const bFill = document.getElementById('bot-hp-fill');
    const pGroup = document.getElementById('player-hp-group');
    const bGroup = document.getElementById('bot-hp-group');
    
    const pPercent = Math.max(0, playerHP / 10);
    const bPercent = Math.max(0, botHP / 10);
    
    pFill.style.width = pPercent + "%";
    bFill.style.width = bPercent + "%";
    
    // อัปเดต ARIA Label (เดิม 100%)
    pGroup.setAttribute('aria-label', `ผู้เล่น พลังเหลือ ${Math.max(0, playerHP)}`);
    bGroup.setAttribute('aria-label', `บอท พลังเหลือ ${Math.max(0, botHP)}`);
}

function endGame() {
    clearInterval(timerInterval);
    if (bgmSource) bgmSource.stop();
    
    const isWin = botHP <= 0;
    playSound(isWin ? 'win' : 'lost');
    
    // ซ่อน Arena และส่วนควบคุม
    document.getElementById('top-ui').style.display = 'none';
    document.getElementById('pitch').style.display = 'none';
    document.getElementById('bottom-ui').style.display = 'none';
    
    // แสดงปุ่ม Home อีกครั้งที่มุมเดิม
    document.getElementById('main-home-btn').style.display = 'flex';
    
    // ใช้หน้า Start แสดงผลจบเกม
    const startScreen = document.getElementById('start-screen');
    const qEl = document.getElementById('start-title'); // ใช้ Title เดิมแสดงความยินดี
    const startBtn = startScreen.querySelector('.btn-start');
    
    startScreen.style.display = 'flex';
    qEl.classList.add('final-msg-anim');
    
    const winMsgs = ["แชมป์โลกสมัยนี้เป็นของคุณ!", "คุณคือดาวยิงระดับตำนาน!", "ชัยชนะที่ยิ่งใหญ่ ยินดีด้วยกัปตัน!"];
    const loseMsgs = ["แพ้ในรอบชิง! กลับไปซ้อมมาใหม่นะ", "บอทเหนียวเกินไป พยายามสู้ใหม่!", "เกือบจะได้ชูถ้วยแล้ว อีกนิดเดียว!"];
    
    const msg = isWin ? winMsgs[Math.floor(Math.random()*winMsgs.length)] : loseMsgs[Math.floor(Math.random()*loseMsgs.length)];
    
    qEl.innerHTML = `<span style="font-size:2.5rem; color:var(--combo-color)">${isWin ? 'VICTORY!' : 'GAME OVER'}</span><br><span style="font-size:1.8rem;">${msg}</span>`;
    startBtn.textContent = "เล่นใหม่อีกครั้ง";
    startBtn.onclick = () => window.location.reload(); // Reload เพื่อเริ่มใหม่หมด

    // โฟกัสข้อความจบเกม
    setTimeout(() => qEl.focus(), 100);
}
</script>
