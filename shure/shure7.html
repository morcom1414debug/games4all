<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ชัวร์หรือมั่วนิ่ม - ศึกจ้าวนักตัดสิน</title>
    <style>
        :root {
            --player-color: #00ffcc;
            --bot-color: #ff3300;
            --bg-dark: #1a1a1a;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --combo-color: #ffcc00;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; position: fixed; width: 100%;
        }

        #game-container {
            width: 95%; max-width: 1000px; height: 90vh; max-height: 650px;
            position: relative;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            border: 4px solid #444;
            display: flex; flex-direction: column;
            transition: filter 2s ease-in-out;
        }

        .home-btn-hex {
            width: 60px; height: 60px;
            background-color: var(--combo-color) !important; 
            color: #000 !important; font-size: 1.8rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: none;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            transition: all 0.3s ease;
            z-index: 120;
        }
        .top-left-home { position: absolute; top: 20px; left: 20px; }

        #start-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .title { font-size: 4rem; background: linear-gradient(to bottom, #fff, #ffcc00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        
        .battle-layout { display: flex; justify-content: space-between; padding: 20px; flex-grow: 1; }
        .side-group { width: 40%; display: flex; flex-direction: column; align-items: center; transition: all 0.3s; }
        .hp-bar-bg { height: 20px; background: #333; border: 2px solid #fff; width: 100%; position: relative; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.3s ease-out; }

        #quiz-container { background: rgba(0,0,0,0.5); padding: 20px; margin-top: auto; }
        #question-text { font-size: 1.8rem; text-align: center; margin-bottom: 20px; min-height: 3em; outline: none; }
        
        .options-grid { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
        .option-btn {
            width: 120px; height: 120px; font-size: 3.5rem; border: none; cursor: pointer;
            border-radius: 50%; background: #444; color: white; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .option-btn:hover { transform: scale(1.1); background: #666; }
        .option-btn.correct { background: var(--correct-color) !important; }
        .option-btn.wrong { background: var(--wrong-color) !important; }

        #info-box {
            background: rgba(255, 204, 0, 0.1);
            border-top: 2px solid var(--combo-color);
            padding: 15px; color: var(--combo-color);
            font-size: 1.2rem; text-align: center;
            min-height: 60px; visibility: hidden;
        }

        #timer-bar-bg { width: 100%; background: #222; height: 10px; margin-bottom: 10px; }
        #timer-fill { height: 100%; width: 100%; background: var(--combo-color); }

        .idle { animation: idleMove 2.5s ease-in-out infinite; }
        @keyframes idleMove { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes attack-right { 0% { transform: translateX(0); } 30% { transform: translateX(50px) scale(1.1); } 100% { transform: translateX(0); } }
        .p-attack { animation: attack-right 0.4s ease-out !important; }
        @keyframes attack-left { 0% { transform: translateX(0); } 30% { transform: translateX(-50px) scale(1.1); } 100% { transform: translateX(0); } }
        .c-attack { animation: attack-left 0.4s ease-out !important; }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sr-announcer" class="sr-only" aria-live="assertive" aria-hidden="true"></div>

    <div id="start-screen">
        <button class="home-btn-hex top-left-home" aria-label="กลับสู่หน้าหลัก" onclick="window.location.href='../index9.html'">🏠</button>
        <h1 class="title">ชัวร์หรือมั่วนิ่ม</h1>
        <p style="margin-bottom: 30px;">ตัดสินใจให้ดี! คุณมีเวลา 20 วินาทีต่อข้อ</p>
        <button class="home-btn-hex" onclick="startGame()" style="width:200px; border-radius:10px; clip-path:none;">เริ่มเกม</button>
    </div>

    <div id="battle-arena" style="display:none; flex-direction:column; height:100%;">
        <div class="battle-layout">
            <div id="player-group" class="side-group idle" tabindex="0">
                <div class="hp-bar-bg" id="player-hp-container" aria-label="พลังของคุณ: 1000 เต็ม 1000">
                    <div id="player-hp-fill" class="hp-fill" style="background:var(--player-color);"></div>
                </div>
                <svg viewBox="0 0 24 24" width="80" stroke="var(--player-color)" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div id="bot-group" class="side-group idle" tabindex="0">
                <div class="hp-bar-bg" id="bot-hp-container" aria-label="พลังของบอท: 1000 เต็ม 1000">
                    <div id="bot-hp-fill" class="hp-fill" style="background:var(--bot-color);"></div>
                </div>
                <svg viewBox="0 0 24 24" width="80" stroke="var(--bot-color)" fill="none" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M12 11V7M8 7h8M12 3v4"/></svg>
            </div>
        </div>

        <div id="quiz-container">
            <div id="timer-bar-bg"><div id="timer-fill"></div></div>
            <h2 id="question-text" tabindex="-1"></h2>
            
            <div class="options-grid" id="options-grid"></div>
            <div id="info-box" aria-hidden="true"></div>
        </div>
    </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sounds = {};
const questions = [
    { q: "ปลามีโอกาสจมน้ำตายได้ ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 0, info: "ชัวร์ครับ! หากออกซิเจนในน้ำไม่พอ หรือน้ำไม่ไหลผ่านเหงือก ปลาก็ขาดใจตายได้" },
    { q: "มะเขือเทศ จัดว่าเป็น 'ผัก' ในทางพฤกษศาสตร์ ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 1, info: "มั่วนิ่มครับ จริงๆ เป็นผลไม้ เพราะมีเมล็ดและโตจากดอก" },
    { q: "นกกระจอกเทศมีดวงตาขนาดใหญ่กว่าสมองของมันเอง ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 0, info: "ชัวร์ครับ ดวงตาของมันใหญ่กว่าสมองจริงๆ" },
    { q: "แสงเดินทางได้เร็วกว่าเสียง ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 0, info: "ชัวร์ครับ เราจึงเห็นฟ้าแลบก่อนได้ยินเสียงฟ้าร้องเสมอ" },
    { q: "มนุษย์เราสามารถหายใจและกลืนอาหารไปพร้อมๆ กันได้ ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 1, info: "มั่วนิ่มครับ ขณะกลืน ฝาปิดกล่องเสียงจะปิดทางเดินหายใจไว้เพื่อความปลอดภัย" },
    { q: "กล้วยหอมจัดว่าเป็นพืชล้มลุก ไม่ใช่ไม้ยืนต้น ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 0, info: "ชัวร์ครับ เพราะต้นกล้วยไม่มีเนื้อไม้ที่แข็งแรงแบบไม้ยืนต้น" },
    { q: "กำแพงเมืองจีนมองเห็นได้จากดวงจันทร์ด้วยตาเปล่า ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 1, info: "มั่วนิ่มครับ เป็นความเชื่อที่ผิด ตาเปล่ามนุษย์มองไม่เห็นจากระยะไกลขนาดนั้น" },
    { q: "สุนัขมองเห็นได้เฉพาะภาพขาวดำเท่านั้น ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 1, info: "มั่วนิ่มครับ สุนัขยังสามารถมองเห็นสีน้ำเงินและเหลืองได้" },
    { q: "ลายนิ้วมือของ 'โคอาล่า' คล้ายกับมนุษย์มากจนแยกยาก ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 0, info: "ชัวร์ครับ ลายนิ้วมือของมันมีความใกล้เคียงกับมนุษย์เรามาก" },
    { q: "ดาวศุกร์เป็นดาวเคราะห์ที่ร้อนที่สุดในระบบสุริยะ ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 0, info: "ชัวร์ครับ เพราะมีสภาวะเรือนกระจกที่รุนแรงกักเก็บความร้อนไว้สูงมาก" },
    { q: "ท้องฟ้าเป็นสีฟ้าเพราะแสงอาทิตย์สะท้อนน้ำทะเล ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 1, info: "มั่วนิ่มครับ เกิดจากการกระเจิงแสงของโมเลกุลในชั้นบรรยากาศ" }
];

let playerHP = 1000, botHP = 1000, currentQIndex = 0, timerInterval = null, bgmSource = null;
let comboCount = 0;
let lastAtSound = "", lastEnSound = ""; // เก็บประวัติเสียงที่เล่นล่าสุด

async function loadSound(name, url) {
    try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        sounds[name] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) { console.error(name, "failed"); }
}

const soundFiles = [
    ['start','audio/start.mp3'],['back','audio/back.mp3'],
    ['at1','audio/at1.mp3'],['at2','audio/at2.mp3'],['at3','audio/at3.mp3'],
    ['atc','audio/atc.mp3'], 
    ['en1','audio/en1.mp3'],['en2','audio/en2.mp3'],['en3','audio/en3.mp3'],
    ['enc','audio/enc.mp3'], 
    ['win','audio/win.mp3'],['lost','audio/lost.mp3'],
    ['combo','audio/combo.mp3']
];
soundFiles.forEach(f => loadSound(f[0], f[1]));

function playSound(name) { 
    if(sounds[name]) { 
        const s = audioCtx.createBufferSource(); 
        s.buffer = sounds[name]; 
        s.connect(audioCtx.destination); 
        s.start(); 
        return s; 
    } 
}

// ฟังก์ชันสุ่มเสียงแบบไม่ซ้ำล่าสุด
function playRandomSound(prefix, lastSound) {
    const pool = [1, 2, 3].filter(num => `${prefix}${num}` !== lastSound);
    const chosenNum = pool[Math.floor(Math.random() * pool.length)];
    const chosenName = `${prefix}${chosenNum}`;
    playSound(chosenName);
    return chosenName;
}

function announce(msg) {
    const el = document.getElementById('sr-announcer');
    el.textContent = "";
    el.setAttribute('aria-hidden', 'false'); 
    setTimeout(() => { 
        el.textContent = msg; 
        setTimeout(() => { el.setAttribute('aria-hidden', 'true'); }, 4000);
    }, 100);
}

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('battle-arena').style.display = 'flex';
    playerHP = 1000; botHP = 1000; currentQIndex = 0; comboCount = 0;
    const s = playSound('start');
    s.onended = () => {
        bgmSource = playSound('back');
        if(bgmSource) bgmSource.loop = true;
        nextQuestion();
    };
}

function nextQuestion() {
    const el = document.getElementById('sr-announcer');
    el.textContent = "";
    el.setAttribute('aria-hidden', 'true');

    if (playerHP <= 0 || botHP <= 0) { endGame(); return; }
    
    document.getElementById('info-box').style.visibility = 'hidden';
    const qData = questions[currentQIndex % questions.length];
    const qEl = document.getElementById('question-text');
    qEl.textContent = `ข้อที่ ${currentQIndex + 1}: ${qData.q}`;
    
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    grid.appendChild(createBtn('👍', 'ชัวร์', 0, qData.c));
    grid.appendChild(createBtn('👎', 'มั่วนิ่ม', 1, qData.c));

    setTimeout(() => { qEl.focus(); }, 250);
    startTimer();
}

function createBtn(emoji, label, index, correctIdx) {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span>${emoji}</span><small style="font-size:1rem">${label}</small>`;
    btn.setAttribute('aria-label', label);
    btn.onclick = () => checkAnswer(index === correctIdx, btn);
    return btn;
}

function startTimer() {
    let timeLeft = 20000;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft -= 100;
        document.getElementById('timer-fill').style.width = (timeLeft/20000)*100 + "%";
        if(timeLeft <= 0) { clearInterval(timerInterval); checkAnswer(false, null); }
    }, 100);
}

function checkAnswer(isCorrect, btn) {
    clearInterval(timerInterval);
    const qData = questions[currentQIndex % questions.length];
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);

    let dmg = Math.floor(Math.random() * 50) + 100;
    let feedback = "";

    if (isCorrect) {
        if(btn) btn.classList.add('correct');
        if (comboCount < 0) comboCount = 0;
        comboCount++;
        
        if (comboCount >= 4) {
            dmg = dmg * 2;
            comboCount = 0;
            playSound('combo');
            playSound('atc'); 
            feedback = "สุดยอดคอมโบ! ";
        } else {
            // สุ่มเสียง at1-at3 แบบไม่ซ้ำล่าสุด
            lastAtSound = playRandomSound('at', lastAtSound);
        }
        
        botHP -= dmg;
        triggerAnim('player');
        feedback += `ถูกต้อง! พลังบอทเหลือ ${Math.max(0, botHP)}. `;
    } else {
        if(btn) btn.classList.add('wrong');
        if (comboCount > 0) comboCount = 0;
        comboCount--;

        if (comboCount <= -4) {
            dmg = dmg * 2;
            comboCount = 0;
            playSound('combo');
            playSound('enc'); 
            feedback = "โดนคอมโบหนัก! ";
        } else {
            // สุ่มเสียง en1-en3 แบบไม่ซ้ำล่าสุด
            lastEnSound = playRandomSound('en', lastEnSound);
        }

        playerHP -= dmg;
        triggerAnim('bot');
        feedback += `พลาดแล้ว! พลังของคุณเหลือ ${Math.max(0, playerHP)}. `;
    }

    const infoBox = document.getElementById('info-box');
    infoBox.textContent = qData.info;
    infoBox.style.visibility = 'visible';

    announce(`${feedback} ข้อมูลคือ: ${qData.info}`);
    updateHP();
    currentQIndex++;
    
    setTimeout(nextQuestion, 5500);
}

function updateHP() {
    document.getElementById('player-hp-fill').style.width = (playerHP/10) + "%";
    document.getElementById('bot-hp-fill').style.width = (botHP/10) + "%";
    document.getElementById('player-hp-container').setAttribute('aria-label', `พลังของคุณเหลือ: ${Math.max(0, playerHP)} จาก 1000`);
    document.getElementById('bot-hp-container').setAttribute('aria-label', `พลังของบอทเหลือ: ${Math.max(0, botHP)} จาก 1000`);
}

function triggerAnim(attacker) {
    const p = document.getElementById('player-group'), b = document.getElementById('bot-group');
    if(attacker === 'player') { p.classList.add('p-attack'); setTimeout(()=>p.classList.remove('p-attack'), 400); }
    else { b.classList.add('c-attack'); setTimeout(()=>b.classList.remove('c-attack'), 400); }
}

function endGame() {
    if(bgmSource) bgmSource.stop();
    const isWin = botHP <= 0;
    const msg = isWin ? "ยินดีด้วย! คุณคือจ้าวนักตัดสิน" : "จบเกมแล้ว บอทชนะในครั้งนี้";
    const qEl = document.getElementById('question-text');
    document.getElementById('options-grid').innerHTML = "";

    // ปรับลดระยะห่างเหลือ 0.5 วินาที
    setTimeout(() => {
        const finalSound = playSound(isWin ? 'win' : 'lost');
        
        finalSound.onended = () => {
            qEl.textContent = msg;
            const el = document.getElementById('sr-announcer');
            el.textContent = "";
            el.setAttribute('aria-hidden', 'true');
            
            document.getElementById('options-grid').innerHTML = `<button class="home-btn-hex" onclick="location.reload()" style="width:150px; border-radius:10px; clip-path:none;">เล่นใหม่</button>`;
            setTimeout(() => { qEl.focus(); }, 200);
        };
    }, 500); 
}
</script>
</body>
</html>
