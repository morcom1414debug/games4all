<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ชัวร์หรือมั่วนิ่ม - ศึกจ้าวนักตัดสิน</title>
    <style>
        :root {
            --player-color: #00ffcc;
            --bot-color: #ff3300;
            --bg-dark: #0f172a;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --combo-color: #ffcc00;
            --btn-default: #334155;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100%;
            position: fixed;
        }

        #game-container {
            width: 100%; height: 100%;
            max-width: 600px;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            border: 2px solid #334155;
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: filter 2s ease-in; /* สำหรับเอฟเฟกต์หน้าจอมืด */
        }

        #top-ui { 
            flex: 0 1 auto;
            padding: 10px; 
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid #334155;
            z-index: 20;
            display: flex; flex-direction: column; align-items: center;
            min-height: 40%;
        }

        #timer-bar-bg { width: 100%; background: #1e293b; height: 6px; margin-bottom: 8px; border-radius: 3px; }
        #timer-fill { height: 100%; width: 100%; background: var(--combo-color); transition: width 0.1s linear; }

        #question-text { 
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            text-align: center; 
            margin: 10px 0; 
            width: 100%;
            display: flex; align-items: center; justify-content: center;
            min-height: 3em; 
            outline: none;
            word-break: break-word;
        }

        .options-grid { display: flex; justify-content: center; gap: 20px; padding-bottom: 10px; }

        .option-btn {
            width: clamp(70px, 18vw, 90px); 
            height: clamp(70px, 18vw, 90px); 
            font-size: clamp(2rem, 10vw, 2.8rem); 
            border: none; cursor: pointer;
            border-radius: 50%; background: var(--btn-default); color: white; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #0f172a;
        }

        .option-btn.correct { background-color: var(--correct-color) !important; transform: scale(1.1); box-shadow: 0 0 20px var(--correct-color); }
        .option-btn.wrong { background-color: var(--wrong-color) !important; transform: scale(0.9); }

        #info-box {
            flex: 0 0 15%;
            display: flex; align-items: center; justify-content: center;
            text-align: center; color: var(--combo-color);
            background: rgba(255, 204, 0, 0.05);
            border-top: 1px solid rgba(255, 204, 0, 0.2);
            border-bottom: 1px solid rgba(255, 204, 0, 0.2);
            font-size: clamp(0.9rem, 3.5vw, 1.1rem);
            visibility: hidden;
            z-index: 10;
            padding: 5px 15px;
            overflow: hidden;
        }

        #battle-field {
            flex: 1;
            position: relative;
            display: flex; align-items: flex-end; justify-content: space-between;
            padding: 0 10% 20px 10%;
        }

        .side-group { 
            width: clamp(80px, 25vw, 120px); 
            display: flex; flex-direction: column; align-items: center; 
            outline: none; position: relative;
            transition: transform 0.5s ease-out, opacity 0.5s;
        }
        
        /* Slide-in Effect */
        .slide-in-left { transform: translateX(-200px); opacity: 0; }
        .slide-in-right { transform: translateX(200px); opacity: 0; }
        .in-place { transform: translateX(0); opacity: 1; }

        /* Glow Effect */
        .side-group svg { 
            width: 100%; height: auto; max-height: clamp(60px, 15vh, 100px);
            filter: drop-shadow(0 0 8px currentColor);
        }

        .damage-popup {
            position: absolute;
            top: -40px;
            font-weight: bold;
            font-size: 1.5rem;
            animation: damageFloat 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
        @keyframes damageFloat {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        .hp-bar-bg { height: 8px; background: #1e293b; border: 1px solid #fff; width: 100%; margin-bottom: 5px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.3s ease-out; }

        .idle { animation: idleMove 2.5s ease-in-out infinite; }
        @keyframes idleMove { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        @keyframes playerJump {
            0% { transform: translate(0, 0) rotate(0deg); }
            40% { transform: translate(50px, -100px) rotate(180deg); scale: 1.2; }
            70% { transform: translate(100px, -20px) rotate(360deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        .p-jump { animation: playerJump 0.6s ease-in-out !important; z-index: 50; }

        @keyframes botJump {
            0% { transform: translate(0, 0) rotate(0deg); }
            40% { transform: translate(-50px, -100px) rotate(-180deg); scale: 1.2; }
            70% { transform: translate(-100px, -20px) rotate(-360deg); }
            100% { transform: translate(0, 0) rotate(-360deg); }
        }
        .b-jump { animation: botJump 0.6s ease-in-out !important; z-index: 50; }

        .is-dizzy { animation: dizzy 0.2s infinite; filter: sepia(1) saturate(3) hue-rotate(-50deg); }
        @keyframes dizzy { 0% { transform: translateX(0); } 25% { transform: translateX(-3px) rotate(-2deg); } 75% { transform: translateX(3px) rotate(2deg); } 100% { transform: translateX(0); } }

        /* Start Sequence Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
        .text-pulse { animation: pulse 0.5s ease-out forwards; }

        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            20% { transform: translate(-10px, 10px); }
            40% { transform: translate(10px, -10px); }
            60% { transform: translate(-10px, -10px); }
            80% { transform: translate(10px, 10px); }
        }
        .shake-screen { animation: shake 0.4s ease-in-out; }

        /* End Game Elements */
        .celebration-element {
            position: absolute; top: -100px; font-size: 3rem; z-index: 150;
            animation: fallRotate 3s ease-in forwards;
        }
        @keyframes fallRotate {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }
        
        .victory-jump { animation: victoryJump 0.5s infinite; }
        @keyframes victoryJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

        #start-screen {
            position:absolute; inset:0; background:rgba(15, 23, 42, 0.95); z-index:200; 
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            padding: 20px; text-align: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sr-announcer" class="sr-only" aria-live="assertive"></div>

    <div id="start-screen">
        <h1 style="font-size:clamp(2rem, 10vw, 3rem); color:var(--combo-color); margin-bottom:30px;">ชัวร์หรือมั่วนิ่ม</h1>
        <button class="option-btn" onclick="startGameSequence()" style="width:180px; height:60px; border-radius:10px; font-size:1.4rem;">เริ่มเกม</button>
    </div>

    <div id="top-ui">
        <div id="timer-bar-bg"><div id="timer-fill"></div></div>
        <h2 id="question-text" tabindex="-1"></h2>
        <div class="options-grid" id="options-grid"></div>
    </div>

    <div id="info-box" aria-hidden="true"></div>

    <div id="battle-field">
        <section id="player-group" class="side-group idle slide-in-left" role="group" aria-label="ผู้เล่น พลัง 1000" tabindex="0">
            <div id="player-damage-container"></div>
            <div class="hp-bar-bg" aria-hidden="true">
                <div id="player-hp-fill" class="hp-fill" style="background:var(--player-color);"></div>
            </div>
            <svg viewBox="0 0 24 24" stroke="var(--player-color)" fill="none" stroke-width="2" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <span style="font-size:0.7rem; color:var(--player-color); font-weight:bold;">PLAYER</span>
        </section>

        <section id="bot-group" class="side-group idle slide-in-right" role="group" aria-label="บอท พลัง 1000" tabindex="0">
            <div id="bot-damage-container"></div>
            <div class="hp-bar-bg" aria-hidden="true">
                <div id="bot-hp-fill" class="hp-fill" style="background:var(--bot-color);"></div>
            </div>
            <svg viewBox="0 0 24 24" stroke="var(--bot-color)" fill="none" stroke-width="2" aria-hidden="true">
                <rect x="3" y="11" width="18" height="10" rx="2"/><path d="M12 11V7M8 7h8M12 3v4"/>
            </svg>
            <span style="font-size:0.7rem; color:var(--bot-color); font-weight:bold;">BOT CPU</span>
        </section>
    </div>
</div>

    { q: "พลาสติกทำมาจากน้ำมันดิบ ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 0, info: "ชัวร์ครับ เป็นผลผลิตหนึ่งจากปิโตรเคมี" },

    { q: "ท้องฟ้าเป็นสีฟ้าเพราะแสงอาทิตย์สะท้อนน้ำทะเล ชัวร์หรือมั่วนิ่ม?", a: ["ชัวร์", "มั่วนิ่ม"], c: 1, info: "มั่วนิ่มครับ เกิดจากการกระเจิงแสงของโมเลกุลในชั้นบรรยากาศ" }

let playerHP = 1000, botHP = 1000, timerInterval = null, bgmSource = null;
let comboCount = 0, lastAtSound = "", lastEnSound = "";
let shuffledQuestions = [], currentQIndex = 0;

function shuffleQuestions() {
    shuffledQuestions = [...questionsData];
    for (let i = shuffledQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledQuestions[i], shuffledQuestions[j]] = [shuffledQuestions[j], shuffledQuestions[i]];
    }
    currentQIndex = 0;
}

async function loadSound(name, url) {
    try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        sounds[name] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) { console.error(name, "failed"); }
}

const soundFiles = [['start','audio/start.mp3'],['back','audio/back.mp3'],['at1','audio/at1.mp3'],['at2','audio/at2.mp3'],['at3','audio/at3.mp3'],['atc','audio/atc.mp3'],['en1','audio/en1.mp3'],['en2','audio/en2.mp3'],['en3','audio/en3.mp3'],['enc','audio/enc.mp3'],['win','audio/win.mp3'],['lost','audio/lost.mp3'],['combo','audio/combo.mp3']];
soundFiles.forEach(f => loadSound(f[0], f[1]));

function playSound(name) { 
    if(sounds[name]) { 
        const s = audioCtx.createBufferSource(); 
        s.buffer = sounds[name]; s.connect(audioCtx.destination); 
        s.start(); return s; 
    } 
}

function playRandomSound(prefix, lastSound) {
    const pool = [1, 2, 3].filter(num => `${prefix}${num}` !== lastSound);
    const chosen = `${prefix}${pool[Math.floor(Math.random() * pool.length)]}`;
    playSound(chosen); return chosen;
}

function announce(msg) {
    const el = document.getElementById('sr-announcer');
    el.textContent = ""; 
    if(msg !== "") {
        setTimeout(() => { el.textContent = msg; }, 50);
    }
}

// 1. จุดที่ปรับปรุง: Start Sequence
function startGameSequence() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('start-screen').style.display = 'none';
    shuffleQuestions();
    const startSnd = playSound('start');
    const qEl = document.getElementById('question-text');
    const container = document.getElementById('game-container');
    
    qEl.style.fontSize = "6rem"; 
    qEl.style.color = "var(--combo-color)";

    const countdown = (val, delay, isFinal) => {
        setTimeout(() => {
            qEl.textContent = val;
            qEl.classList.remove('text-pulse');
            void qEl.offsetWidth; 
            qEl.classList.add('text-pulse');
            if(isFinal) {
                qEl.style.color = "#ff3300";
                container.classList.add('shake-screen');
                document.getElementById('player-group').classList.add('in-place');
                document.getElementById('bot-group').classList.add('in-place');
            }
        }, delay);
    };

    countdown("3", 0, false);
    countdown("2", 500, false);
    countdown("1", 1000, false);
    countdown("GO!", 1500, true);

    if (startSnd) {
        startSnd.onended = () => {
            qEl.style.fontSize = ""; qEl.style.color = "";
            qEl.classList.remove('text-pulse');
            container.classList.remove('shake-screen');
            bgmSource = playSound('back'); if(bgmSource) bgmSource.loop = true;
            nextQuestion();
        };
    } else {
        setTimeout(() => {
            qEl.style.fontSize = ""; qEl.style.color = "";
            container.classList.remove('shake-screen');
            bgmSource = playSound('back'); if(bgmSource) bgmSource.loop = true;
            nextQuestion();
        }, 2500);
    }
}

function nextQuestion() {
    if (playerHP <= 0 || botHP <= 0) { endGame(); return; }
    if (currentQIndex >= shuffledQuestions.length) { shuffleQuestions(); }
    announce(""); 
    document.getElementById('info-box').style.visibility = 'hidden';
    const qData = shuffledQuestions[currentQIndex];
    const qEl = document.getElementById('question-text');
    qEl.textContent = qData.q;
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    const b1 = document.createElement('button'); b1.className='option-btn'; b1.innerHTML='👍';
    b1.setAttribute('aria-label', 'ชัวร์'); b1.onclick=()=>checkAnswer(0===qData.c, b1);
    const b2 = document.createElement('button'); b2.className='option-btn'; b2.innerHTML='👎';
    b2.setAttribute('aria-label', 'มั่วนิ่ม'); b2.onclick=()=>checkAnswer(1===qData.c, b2);
    grid.appendChild(b1); grid.appendChild(b2);
    setTimeout(() => { qEl.focus(); }, 100);
    startTimer();
}

function startTimer() {
    let timeLeft = 20000;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft -= 100;
        document.getElementById('timer-fill').style.width = (timeLeft/20000)*100 + "%";
        if(timeLeft <= 0) { clearInterval(timerInterval); checkAnswer(false, null); }
    }, 100);
}

function showDamage(target, amount) {
    const container = document.getElementById(`${target}-damage-container`);
    const div = document.createElement('div');
    div.className = 'damage-popup';
    div.textContent = `-${amount}`;
    div.style.color = target === 'bot' ? 'var(--player-color)' : 'var(--bot-color)';
    container.appendChild(div);
    setTimeout(() => div.remove(), 1000);
}

function checkAnswer(isCorrect, btn) {
    clearInterval(timerInterval);
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    const qData = shuffledQuestions[currentQIndex];
    let fb = "";
    
    if (isCorrect) {
        if(btn) btn.classList.add('correct');
        comboCount = comboCount < 0 ? 1 : comboCount + 1;
        let dmg = 150;
        if (comboCount >= 4) {
            dmg = 300; playSound('atc'); playSound('combo'); comboCount = 0; 
            fb = "ถูกต้อง! คอมโบสำเร็จ! บอทลด 300";
        } else {
            lastAtSound = playRandomSound('at', lastAtSound);
            fb = "ถูกต้อง! บอทลด 150";
        }
        botHP -= dmg;
        showDamage('bot', dmg);
        triggerJump('player');
    } else {
        if(btn) btn.classList.add('wrong');
        btns.forEach((b, idx) => { if(idx === qData.c) b.classList.add('correct'); });
        
        comboCount = comboCount > 0 ? -1 : comboCount - 1;
        let dmg = 150;
        if (comboCount <= -4) {
            dmg = 300; playSound('enc'); playSound('combo'); comboCount = 0; 
            fb = "พลาดแล้ว! บอทใช้คอมโบ! คุณลด 300";
        } else {
            lastEnSound = playRandomSound('en', lastEnSound);
            fb = "พลาดแล้ว! คุณลด 150";
        }
        playerHP -= dmg;
        showDamage('player', dmg);
        triggerJump('bot');
    }
    
    updateHP();
    const infoText = qData.info;
    document.getElementById('info-box').textContent = infoText;
    document.getElementById('info-box').style.visibility = 'visible';
    announce(`${fb} ข้อมูล: ${infoText}`);
    currentQIndex++;
    setTimeout(nextQuestion, 7000);
}

function triggerJump(attacker) {
    const p = document.getElementById('player-group'), b = document.getElementById('bot-group');
    if(attacker === 'player') {
        p.classList.remove('idle'); p.classList.add('p-jump'); b.classList.add('is-dizzy');
        setTimeout(() => { p.classList.remove('p-jump'); p.classList.add('idle'); b.classList.remove('is-dizzy'); }, 800);
    } else {
        b.classList.remove('idle'); b.classList.add('b-jump'); p.classList.add('is-dizzy');
        setTimeout(() => { b.classList.remove('b-jump'); b.classList.add('idle'); p.classList.remove('is-dizzy'); }, 800);
    }
}

function updateHP() {
    document.getElementById('player-hp-fill').style.width = Math.max(0, playerHP/10) + "%";
    document.getElementById('bot-hp-fill').style.width = Math.max(0, botHP/10) + "%";
    document.getElementById('player-group').setAttribute('aria-label', `ผู้เล่น พลังเหลือ ${Math.max(0, playerHP)}`);
    document.getElementById('bot-group').setAttribute('aria-label', `บอท พลังเหลือ ${Math.max(0, botHP)}`);
}

// 2. จุดที่ปรับปรุง: Win/Lost Sequence
function endGame() {
    if(bgmSource) bgmSource.stop();
    announce(""); 
    const win = botHP <= 0;
    const endSnd = playSound(win ? 'win' : 'lost');
    const container = document.getElementById('game-container');
    
    if(win) {
        // เอฟเฟกต์ชนะ
        for(let i=0; i<15; i++) {
            setTimeout(() => {
                const conf = document.createElement('div');
                conf.className = 'celebration-element';
                conf.textContent = ['✨','🎉','🎊','⭐'][Math.floor(Math.random()*4)];
                conf.style.left = Math.random()*100 + "vw";
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 3000);
            }, i * 200);
        }
        const trophy = document.createElement('div');
        trophy.className = 'celebration-element';
        trophy.innerHTML = '🏆'; trophy.style.left = '45vw'; trophy.style.fontSize = '5rem';
        document.body.appendChild(trophy);
        document.getElementById('player-group').classList.add('victory-jump');
    } else {
        // เอฟเฟกต์แพ้
        container.style.filter = "brightness(0.2) grayscale(0.8)";
        const skull = document.createElement('div');
        skull.className = 'celebration-element';
        skull.innerHTML = '💀'; skull.style.left = '45vw'; skull.style.fontSize = '5rem';
        document.body.appendChild(skull);
    }

    setTimeout(() => {
        document.getElementById('info-box').style.visibility = 'hidden';
        const qEl = document.getElementById('question-text');
        qEl.textContent = win ? "ชัยชนะเป็นของคุณ!" : "พ่ายแพ้ให้กับบอท...";
        document.getElementById('options-grid').innerHTML = `<button class="option-btn" onclick="location.reload()" style="width:140px; height:50px; font-size:1.1rem; border-radius:8px;">เล่นใหม่</button>`;
        if (endSnd) { endSnd.onended = () => { qEl.focus(); }; } else { qEl.focus(); }
    }, 1000);
}
