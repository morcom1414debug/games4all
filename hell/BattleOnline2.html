<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALUKA Online - Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
            --cls-fire: #ff4b2b; --cls-water: #00d2ff; --cls-earth: #e67e22;
            --cls-wind: #2ecc71; --cls-thunder: #f1c40f; --cls-winter: #ecf0f1;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at center, #1b1b2f 0%, #0f0c29 100%);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        /* Effect Styles from Original */
        #hit-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; opacity: 0; transition: opacity 0.1s; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .particle { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.2; animation: floatUp 10s infinite ease-in; }
        @keyframes floatUp { 0% { transform: translateY(105vh) scale(0); opacity: 0; } 50% { opacity: 0.4; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        #result-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        #game-container {
            background: rgba(15, 12, 41, 0.75); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 3rem 2.5rem; text-align: center;
            box-shadow: 0 0 80px rgba(0,0,0,0.9); border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%; max-width: 500px; position: relative; z-index: 5;
        }

        #btn-community {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(241, 196, 15, 0.3);
            color: rgba(255, 255, 255, 0.8); padding: 8px 15px; border-radius: 12px;
            font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 5px; z-index: 10;
        }
        #btn-community.hidden { display: none; }

        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
        .stat-item { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 18px; flex: 1; border: 2px solid rgba(255,255,255,0.1); transition: 0.4s; position: relative; }
        .stat-item.active-turn { border-color: var(--gold); transform: scale(1.05); }
        .hp-track { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: var(--success); transition: width 0.5s ease; }
        .shield-icon { display: none; font-size: 1.1rem; }
        .has-shield .shield-icon { display: inline; }
        
        .wheel-container { position: relative; width: 180px; height: 180px; margin: 25px auto; }
        .wheel-arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 20px solid var(--gold); z-index: 2; }
        .wheel-graphic { width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--gold); background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%); transition: transform 2.5s cubic-bezier(0.15, 0, 0.15, 1); }

        .btn-main { background: linear-gradient(135deg, var(--danger), var(--gold)); border: none; padding: 20px 40px; border-radius: 50px; color: white; font-size: 1.4rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .room-list { margin-top: 10px; max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .room-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-10px)} 75% {transform:translateX(10px)} }
    </style>
</head>
<body>

<canvas id="result-canvas"></canvas>
<div id="hit-flash"></div>
<div class="particles" id="particles"></div>
<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive" aria-atomic="true"></div>

<div id="game-container">
    <button id="btn-community" onclick="location.href='../index.html'" aria-label="กลับสู่ชุมชน">
        🏠 กลับสู่ชุมชน
    </button>

    <section id="scene-lobby" class="scene active">
        <h1 style="color:var(--gold); margin:0; font-size: 2.5rem;">VALUKA</h1>
        <p>ประลองยุทธ์ออนไลน์ 1 ต่อ 1</p>
        <button id="btn-create-room" class="btn-main">สร้างห้อง</button>
        <div class="room-list" id="room-list"></div>
    </section>

    <section id="scene-waiting" class="scene">
        <h2 style="color:var(--gold);">เตรียมการประลอง</h2>
        <div style="font-size: 3rem; animation: rotate 2s linear infinite;">🌀</div>
        <p id="wait-status" tabindex="0">รอคู่ต่อสู้กดเข้าร่วมห้อง...</p>
        <button onclick="location.reload()" class="btn-main" style="background:var(--danger); font-size: 1rem;">ยกเลิก</button>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item" id="host-box" tabindex="0">
                <span style="font-size:0.8rem; opacity:0.7;">HOST</span>
                <div style="font-size:1.3rem; font-weight:600;"><span id="hp-host">1000</span> <span class="shield-icon">🛡️</span></div>
                <div class="hp-track"><div id="bar-host" class="hp-fill"></div></div>
            </div>
            <div class="stat-item" id="guest-box" tabindex="0">
                <span style="font-size:0.8rem; opacity:0.7;">GUEST</span>
                <div style="font-size:1.3rem; font-weight:600;"><span id="hp-guest">1000</span> <span class="shield-icon">🛡️</span></div>
                <div class="hp-track"><div id="bar-guest" class="hp-fill"></div></div>
            </div>
        </div>
        <div class="wheel-container">
            <div class="wheel-arrow"></div>
            <div id="visual-wheel" class="wheel-graphic"></div>
        </div>
        <button id="btn-spin" class="btn-main" disabled>โยกคันโยก</button>
        <p id="battle-log" style="font-size: 0.9rem; color: var(--gold); min-height: 1.5em;"></p>
    </section>

    <section id="scene-result" class="scene">
        <span id="result-icon" style="font-size: 5rem; display:block; margin-bottom: 10px;">🏆</span>
        <h2 id="result-title"></h2>
        <p id="result-desc"></p>
        <button onclick="location.reload()" class="btn-main">เล่นใหม่อีกครั้ง</button>
    </section>
</div>

<script>
// --- Configuration ---
const firebaseConfig = {
    apiKey: "AIzaSyDvcdgsyT5sDdYTYKIqetzNL9Be-MFC0l4",
    authDomain: "xo-game-134ec.firebaseapp.com",
    databaseURL: "https://xo-game-134ec-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "xo-game-134ec",
    storageBucket: "xo-game-134ec.firebasestorage.app",
    messagingSenderId: "318375224157",
    appId: "1:318375224157:web:3e49732b1c382009b77eb4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const GAME_ID = "valuka";

let myRole = null;
let currentRoomId = null;
let bgmSource = null;
let lastUpdateLocal = 0;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioCache = {};

const skills = [
    {id: 'earth', name: 'ปฐพีกลืนกิน', dmg: 200, color: 'var(--cls-earth)'},
    {id: 'fire', name: 'อัคนีพิโรธ', dmg: 400, color: 'var(--cls-fire)'},
    {id: 'water', name: 'มหาสมุทรคลั่ง', dmg: 300, color: 'var(--cls-water)'},
    {id: 'wind', name: 'วายุลมกลด', dmg: 100, color: 'var(--cls-wind)'},
    {id: 'thunder', name: 'ทัณฑ์สวรรค์สายฟ้า', dmg: 500, color: 'var(--cls-thunder)'},
    {id: 'winter', name: 'ดินแดนเยือกแข็ง', dmg: 300, color: 'var(--cls-winter)'}
];

const wheelOptions = [...skills.map(s => ({...s, type: 'attack'})), 
    {id: 'hp', name: 'ได้รับน้ำยาเพิ่มพลัง', type: 'hp'},
    {id: 'shield', name: 'ได้รับเกราะแห่งแสง', type: 'shield'}
];

// --- Audio & Timing (Original Logic) ---
async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const res = await fetch(`audio/${name}.mp3`);
        const buf = await audioCtx.decodeAudioData(await res.arrayBuffer());
        return audioCache[name] = buf;
    } catch (e) { return null; }
}

function playSound(name) {
    const buf = audioCache[name];
    if (!buf) return null;
    const s = audioCtx.createBufferSource();
    s.buffer = buf; s.connect(audioCtx.destination);
    s.start(0); return s;
}

const playWait = (name) => new Promise(res => {
    const s = playSound(name);
    if(!s) return res();
    s.onended = res;
});

const wait = ms => new Promise(res => setTimeout(res, ms));

function announce(msg) {
    const el = document.getElementById('aria-announcer');
    el.innerText = "";
    setTimeout(() => { 
        el.innerText = msg;
        document.getElementById('battle-log').innerText = msg;
    }, 100);
}

// --- Online Room Management ---
db.ref(`${GAME_ID}/rooms`).on('value', snapshot => {
    const list = document.getElementById('room-list');
    list.innerHTML = "";
    snapshot.forEach(child => {
        const room = child.val();
        if (room.status === 'waiting') {
            const btn = document.createElement('div');
            btn.className = 'room-item';
            btn.innerHTML = `<span>${child.key}</span><button class="btn-main" style="padding:5px 15px; font-size:0.9rem">เข้าร่วม</button>`;
            btn.onclick = () => joinRoom(child.key);
            list.appendChild(btn);
        }
    });
});

async function createRoom() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const snap = await db.ref(`${GAME_ID}/room_counter`).transaction(curr => (curr || 0) % 99999 + 1);
    const num = String(snap.snapshot.val()).padStart(5, '0');
    currentRoomId = `Battle${num}`;
    myRole = 'host';
    
    await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).set({
        status: 'waiting', hostHP: 1000, guestHP: 1000,
        hostShield: false, guestShield: false,
        turn: '', lastUpdate: Date.now(), lastId: ''
    });

    document.getElementById('scene-lobby').classList.remove('active');
    document.getElementById('scene-waiting').classList.add('active');
    document.getElementById('btn-community').classList.add('hidden');
    
    const bgm = audioCtx.createBufferSource();
    bgm.buffer = await loadSound('back1');
    bgm.loop = true; bgm.connect(audioCtx.destination);
    bgm.start(0); bgmSource = bgm;

    announce("รอคู่ต่อสู้กดเข้าร่วมห้อง ถ้าคู่ต่อสู้พร้อม การประลองจะเริ่มโดยทันที");
    listenToRoom();
}

async function joinRoom(roomId) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    currentRoomId = roomId;
    myRole = 'guest';
    
    const turnStart = Math.random() < 0.5 ? 'host' : 'guest';
    await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update({
        status: 'playing', turn: turnStart, lastUpdate: Date.now()
    });

    const bgm = audioCtx.createBufferSource();
    bgm.buffer = await loadSound('back1');
    bgm.loop = true; bgm.connect(audioCtx.destination);
    bgm.start(0); bgmSource = bgm;

    listenToRoom();
}

function listenToRoom() {
    db.ref(`${GAME_ID}/rooms/${currentRoomId}`).on('value', snapshot => {
        const room = snapshot.val();
        if (!room) return;

        if (Date.now() - room.lastUpdate > 300000) location.reload(); // 5 min cleanup

        if (room.status === 'playing') {
            document.getElementById('scene-lobby').classList.remove('active');
            document.getElementById('scene-waiting').classList.remove('active');
            document.getElementById('scene-battle').classList.add('active');
            document.getElementById('btn-community').classList.add('hidden');
            updateUI(room);
        }

        if (room.lastAction && room.lastAction.id !== window.processedId) {
            window.processedId = room.lastAction.id;
            handleAction(room.lastAction, room);
        }

        if (room.status === 'finished') endGame(room);
    });
}

function updateUI(room) {
    document.getElementById('hp-host').innerText = room.hostHP.toLocaleString();
    document.getElementById('hp-guest').innerText = room.guestHP.toLocaleString();
    document.getElementById('bar-host').style.width = (room.hostHP / 10) + '%';
    document.getElementById('bar-guest').style.width = (room.guestHP / 10) + '%';
    
    const hb = document.getElementById('host-box'), gb = document.getElementById('guest-box');
    room.hostShield ? hb.classList.add('has-shield') : hb.classList.remove('has-shield');
    room.guestShield ? gb.classList.add('has-shield') : gb.classList.remove('has-shield');

    hb.classList.toggle('active-turn', room.turn === 'host');
    gb.classList.toggle('active-turn', room.turn === 'guest');

    const isMyTurn = room.turn === myRole;
    document.getElementById('btn-spin').disabled = !isMyTurn;
    
    if (isMyTurn && !window.isAnimating) {
        announce(`ตา ${myRole === 'host' ? 'Host' : 'Guest'}`);
        document.getElementById('btn-spin').focus();
    }
}

// --- Battle Logic (Original Rules) ---
document.getElementById('btn-spin').onclick = async () => {
    document.getElementById('btn-spin').disabled = true;
    const roomRef = db.ref(`${GAME_ID}/rooms/${currentRoomId}`);
    const snap = await roomRef.get();
    const room = snap.val();

    let res;
    while(true) {
        res = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
        // กฎต้นฉบับ: ไม่ให้ได้ผลลัพธ์เดิมซ้ำ
        if(res.id === room.lastId) continue; 
        // กฎต้นฉบับ: ถ้าได้ Bonus รอบต่อไปต้องเป็นการโจมตีเท่านั้น
        if(room.isBonus && res.type !== 'attack') continue; 
        break;
    }

    const deg = 1440 + Math.floor(Math.random() * 360);
    roomRef.update({
        lastAction: { id: Date.now(), actor: myRole, result: res, deg: deg },
        lastUpdate: Date.now()
    });
};

async function handleAction(action, room) {
    window.isAnimating = true;
    const { actor, result, deg } = action;
    const isMe = actor === myRole;
    
    // 1. Wheel Sequence
    document.getElementById('visual-wheel').style.transform = `rotate(${deg}deg)`;
    await playWait('wheel'); 
    await wait(800);

    let updates = { lastUpdate: Date.now(), lastId: result.id };
    let logMsg = "";

    if (result.type === 'attack') {
        const sound = actor === 'host' ? `${result.id}1` : result.id;
        await playWait(sound);

        const target = actor === 'host' ? 'guest' : 'host';
        const hasShield = room[target + 'Shield'];

        if (hasShield) {
            updates[target + 'Shield'] = false;
            logMsg = `${actor === 'host' ? 'Host' : 'Guest'} ใช้ ${result.name} แต่ติดเกราะ!`;
        } else {
            const newHP = Math.max(0, room[target + 'HP'] - result.dmg);
            updates[target + 'HP'] = newHP;
            // การประกาศ HP ที่เหลือตามต้นฉบับ
            logMsg = `${actor === 'host' ? 'Host' : 'Guest'} ใช้ ${result.name} ลดไป ${result.dmg} เหลือ ${newHP}`;
            
            document.getElementById('hit-flash').style.backgroundColor = result.color;
            document.getElementById('hit-flash').style.opacity = '0.4';
            setTimeout(() => document.getElementById('hit-flash').style.opacity = '0', 150);
            if(target === 'host' || (target === 'guest' && myRole === 'guest')) {
                document.getElementById('game-container').classList.add('shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 200);
            }
        }
        updates.turn = actor === 'host' ? 'guest' : 'host';
        updates.isBonus = false;
    } else {
        // HP/Shield Bonus Logic
        if (result.type === 'hp') {
            const sound = isMe ? 'hp' : 'hp2';
            await playWait(sound);
            const val = [100, 300, 500][Math.floor(Math.random()*3)];
            updates[actor + 'HP'] = Math.min(1000, room[actor + 'HP'] + val);
            logMsg = `${actor === 'host' ? 'Host' : 'Guest'} ได้น้ำยา ${val} หน่วย และได้สุ่มต่อ!`;
        } else {
            const sound = isMe ? 'shield' : 'shield2';
            await playWait(sound);
            updates[actor + 'Shield'] = true;
            logMsg = `${actor === 'host' ? 'Host' : 'Guest'} ได้รับเกราะ และได้สุ่มต่อ!`;
        }
        updates.turn = actor;
        updates.isBonus = true;
    }

    announce(logMsg);
    await wait(2000);

    if (myRole === 'host') {
        if (updates.hostHP === 0 || updates.guestHP === 0) updates.status = 'finished';
        db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update(updates);
    }
    window.isAnimating = false;
}

function endGame(room) {
    if (bgmSource) bgmSource.stop();
    document.getElementById('scene-battle').classList.remove('active');
    document.getElementById('scene-result').classList.add('active');
    document.getElementById('btn-community').classList.remove('hidden');

    const iWon = (myRole === 'host' && room.guestHP === 0) || (myRole === 'guest' && room.hostHP === 0);
    document.getElementById('result-title').innerText = iWon ? "ชัยชนะเป็นของคุณ!" : "คุณพ่ายแพ้...";
    document.getElementById('result-desc').innerText = iWon ? "คุณได้พิสูจน์ตนเองในฐานะผู้กล้าแล้ว!" : "พยายามอีกครั้ง โอกาสหน้ายังรอคุณอยู่";
    
    if(iWon) playSound('winner1'); else playSound('lost1');
    announce(document.getElementById('result-title').innerText);
}

// Assets Load
['earth','earth1','fire','fire1','water','water1','wind','wind1','thunder','thunder1','winter','winter1','hp','hp2','shield','shield2','wheel','back1','winner1','lost1'].forEach(loadSound);

document.getElementById('btn-create-room').onclick = createRoom;
</script>
</body>
</html>
