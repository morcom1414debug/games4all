<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuga Battle - Final Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        #game-container {
            background: rgba(22, 33, 62, 0.9); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 2.5rem; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); border: 2px solid rgba(255, 255, 255, 0.15);
            width: 100%; max-width: 500px;
        }
        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .stat-item { 
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; flex: 1; 
            border: 2px solid rgba(255,255,255,0.1); transition: all 0.3s; outline: none;
        }
        .stat-item.has-shield { border-color: var(--gold); box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        .hp-val-container { font-size: 1.5rem; font-weight: 600; color: var(--gold); display: flex; justify-content: center; align-items: center; gap: 5px; }
        .shield-icon { display: none; font-size: 1.2rem; }
        .has-shield .shield-icon { display: inline; animation: scaleIn 0.3s forwards; }
        
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }

        .wheel-graphic {
            width: 200px; height: 200px; margin: 20px auto; border-radius: 50%; border: 8px solid var(--gold);
            background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%);
            transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .btn-main {
            background: linear-gradient(135deg, var(--danger), var(--gold));
            border: none; padding: 18px 45px; border-radius: 50px; color: white;
            font-size: 1.4rem; font-weight: 600; cursor: pointer;
        }
        .btn-main:focus { outline: 3px solid white; box-shadow: 0 0 20px var(--gold); }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-10px)} 75% {transform:translateX(10px)} }
    </style>
</head>
<body>

<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive" aria-atomic="true"></div>

<div id="game-container">
    <section id="scene-start" class="scene active">
        <h1>โหมด Battle ผู้พิทักษ์</h1>
        <button id="btn-start-game" class="btn-main">เริ่ม Battle</button>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item" id="p-box" tabindex="0">
                <span style="font-size:0.9rem; opacity:0.8;">👤 ผู้กล้า</span>
                <div class="hp-val-container">
                    <span id="p-hp">1,000</span>
                    <span class="shield-icon">🛡️</span>
                </div>
            </div>
            <div class="stat-item" id="g-box" tabindex="0">
                <span style="font-size:0.9rem; opacity:0.8;">💀 ผู้พิทักษ์</span>
                <div class="hp-val-container">
                    <span id="g-hp">1,000</span>
                    <span class="shield-icon">🛡️</span>
                </div>
            </div>
        </div>
        <div id="visual-wheel" class="wheel-graphic"></div>
        <button id="btn-spin" class="btn-main">โยกคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <h2 id="result-title"></h2>
        <button onclick="location.reload()" class="btn-main">เล่นอีกครั้ง</button>
    </section>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioCache = {};

async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const res = await fetch(`audio/${name}.mp3`);
        const buf = await audioCtx.decodeAudioData(await res.arrayBuffer());
        return audioCache[name] = buf;
    } catch (e) { return null; }
}

function playSound(name) {
    const buf = audioCache[name];
    if (!buf) return null;
    const s = audioCtx.createBufferSource();
    s.buffer = buf; s.connect(audioCtx.destination);
    s.start(0); return s;
}

const playWait = (name) => new Promise(res => {
    const s = playSound(name);
    if(!s) return res();
    s.onended = res;
});

const wait = ms => new Promise(res => setTimeout(res, ms));

// ข้อมูล Damage ตามไฟล์ hell.html (Thunder 500, Fire 450, ฯลฯ)
const skills = [
    {id: 'earth', name: 'ปฐพีกลืนกิน', dmg: 200},
    {id: 'fire', name: 'อัคนีพิโรธ', dmg: 400},
    {id: 'water', name: 'มหาสมุทรคลั่ง', dmg: 300},
    {id: 'wind', name: 'วายุลมกลด', dmg: 100},
    {id: 'thunder', name: 'ทัณฑ์สวรรค์สายฟ้า', dmg: 500},
    {id: 'winter', name: 'ดินแดนเยือกแข็ง', dmg: 300}
];

let wheelOptions = [];
skills.forEach(s => { wheelOptions.push({...s, type: 'attack'}); });
wheelOptions.push({id: 'hp', name: 'ได้รับน้ำยาเพิ่มพลัง', type: 'hp'});
wheelOptions.push({id: 'shield', name: 'ได้รับเกราะแห่งแสง', type: 'shield'});

let state = {
    pHP: 1000, gHP: 1000,
    pShield: false, gShield: false,
    turn: 'player', isBonus: false,
    lastId: null // เก็บ ID ล่าสุดกันสุ่มซ้ำ
};

const announcer = document.getElementById('aria-announcer');
const spinBtn = document.getElementById('btn-spin');

function announce(msg) {
    announcer.innerText = ""; 
    setTimeout(() => { announcer.innerText = msg; }, 100);
}

function updateUI() {
    document.getElementById('p-hp').innerText = state.pHP.toLocaleString();
    document.getElementById('g-hp').innerText = state.gHP.toLocaleString();
    const pb = document.getElementById('p-box'), gb = document.getElementById('g-box');
    state.pShield ? pb.classList.add('has-shield') : pb.classList.remove('has-shield');
    state.gShield ? gb.classList.add('has-shield') : gb.classList.remove('has-shield');
    pb.setAttribute('aria-label', `ผู้กล้า เลือด ${state.pHP} ${state.pShield ? 'มีเกราะ' : ''}`);
    gb.setAttribute('aria-label', `ผู้พิทักษ์ เลือด ${state.gHP} ${state.gShield ? 'มีเกราะ' : ''}`);
}

document.getElementById('btn-start-game').onclick = async () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('scene-start').classList.remove('active');
    document.getElementById('scene-battle').classList.add('active');
    announce("เริ่มการต่อสู้!");
    await playWait('start1');
    const bgm = audioCtx.createBufferSource();
    bgm.buffer = await loadSound('back');
    bgm.loop = true; bgm.connect(audioCtx.destination);
    bgm.start(0); state.bgm = bgm;
    nextTurnCycle();
};

async function nextTurnCycle() {
    updateUI();
    await wait(600); // เร็วขึ้น
    if (state.pHP <= 0 || state.gHP <= 0) return checkEndGame();

    if (state.turn === 'player') {
        if (!state.isBonus) announce("ตาของคุณแล้ว โยกคันโยกเลย");
        spinBtn.disabled = false; spinBtn.focus(); 
    } else {
        if (!state.isBonus) announce("ตาผู้พิทักษ์...");
        await wait(800); executeSpin();
    }
}

spinBtn.onclick = () => { spinBtn.disabled = true; executeSpin(); };

async function executeSpin() {
    await playWait('wheel');
    const deg = 1440 + Math.floor(Math.random() * 360);
    document.getElementById('visual-wheel').style.transform = `rotate(${deg}deg)`;

    let res;
    // ลอจิกห้ามสุ่มซ้ำอันเดิม (Anti-Repeat)
    while(true) {
        res = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
        if(res.id === state.lastId) continue; // ห้ามซ้ำ ID เดิม
        const hasS = state.turn === 'player' ? state.pShield : state.gShield;
        if(res.type === 'shield' && hasS) continue; // มีเกราะแล้วไม่เอาซ้ำ
        if(state.isBonus && res.type !== 'attack') continue; // โบนัสต้องได้โจมตี
        break;
    }
    state.lastId = res.id;
    await wait(800); handleResult(res);
}

async function handleResult(res) {
    const isP = state.turn === 'player', sfx = isP ? '1' : '';
    let bonus = false;

    if (res.type === 'attack') {
        await playWait(`${res.id}${sfx}`);
        let msg = `${isP ? 'คุณ' : 'ศัตรู'}ใช้ ${res.name} `;
        if (isP) {
            if (state.gShield) { state.gShield = false; msg += "แต่ติดเกราะ!"; }
            else { state.gHP = Math.max(0, state.gHP - res.dmg); msg += `แรงมาก! ลดไป ${res.dmg}`; }
        } else {
            if (state.pShield) { state.pShield = false; msg += "แต่คุณมีเกราะ!"; }
            else { state.pHP = Math.max(0, state.pHP - res.dmg); msg += `โดนเต็มๆ ${res.dmg} หน่วย`;
                document.getElementById('game-container').classList.add('shake');
                setTimeout(()=>document.getElementById('game-container').classList.remove('shake'),300);
            }
        }
        announce(msg); state.isBonus = false;
    } 
    else if (res.type === 'hp') {
        await playWait(`hp${isP ? '' : '1'}`);
        if(isP) state.pHP = Math.min(1000, state.pHP + 300); 
        else state.gHP = Math.min(1000, state.gHP + 300);
        announce("ฟื้นฟูพลัง! และสุ่มโจมตีต่อทันที"); bonus = true;
    } 
    else if (res.type === 'shield') {
        await playWait(`shield${isP ? '' : '1'}`);
        if(isP) state.pShield = true; else state.gShield = true;
        announce("กางเกราะแห่งแสง! และสุ่มโจมตีต่อทันที"); bonus = true;
    }

    updateUI();
    await wait(2200); // ลดเวลาประกาศลงนิดหน่อยให้กระชับ
    if (bonus) {
        state.isBonus = true;
        if (isP) { spinBtn.disabled = false; spinBtn.focus(); }
        else { executeSpin(); }
    } else {
        state.turn = isP ? 'guardian' : 'player';
        nextTurnCycle();
    }
}

function checkEndGame() {
    if (state.bgm) state.bgm.stop();
    document.getElementById('scene-battle').classList.remove('active');
    document.getElementById('scene-result').classList.add('active');
    const win = state.pHP > 0;
    document.getElementById('result-title').innerText = win ? "ชัยชนะ!" : "พ่ายแพ้...";
    playSound(win ? 'win' : 'lost');
    announce(win ? "คุณชนะแล้ว!" : "คุณพ่ายแพ้ในการต่อสู้");
}

['earth','earth1','fire','fire1','water','water1','wind','wind1','thunder','thunder1','winter','winter1','hp','hp1','shield','shield1','wheel','back','win','lost','start1'].forEach(loadSound);
</script>
</body>
</html>
