<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuga Battle - Guardian Spirit</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        #game-container {
            background: rgba(22, 33, 62, 0.9); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 2.5rem; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); border: 2px solid rgba(255, 255, 255, 0.15);
            width: 100%; max-width: 500px;
        }
        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .stat-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; flex: 1; border: 1px solid rgba(255,255,255,0.1); }
        .hp-val { display: block; font-size: 1.4rem; color: var(--gold); font-weight: 600; }
        
        .wheel-graphic {
            width: 220px; height: 220px; margin: 20px auto; border-radius: 50%; border: 10px solid var(--gold);
            background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .btn-main {
            background: linear-gradient(135deg, var(--danger), var(--gold));
            border: none; padding: 18px 45px; border-radius: 50px; color: white;
            font-size: 1.4rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-main:focus { outline: 3px solid white; box-shadow: 0 0 20px var(--gold); }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-10px)} 75% {transform:translateX(10px)} }
    </style>
</head>
<body>

<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive" aria-atomic="true"></div>

<div id="game-container">
    <section id="scene-start" class="scene active">
        <h1>โหมด Battle ผู้พิทักษ์</h1>
        <p>เผชิญหน้ากับความท้าทายในชั้นที่ 20</p>
        <button id="btn-start-game" class="btn-main">เริ่ม Battle</button>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item" id="p-box">👤 ผู้กล้า <span class="hp-val" id="p-hp">1,000</span></div>
            <div class="stat-item" id="g-box">💀 ผู้พิทักษ์ <span class="hp-val" id="g-hp">1,000</span></div>
        </div>
        <div id="visual-wheel" class="wheel-graphic"></div>
        <button id="btn-spin" class="btn-main" aria-label="โยกคันโยกเพื่อเริ่มสุ่มท่า">โยกคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <h2 id="result-title"></h2>
        <button onclick="location.reload()" class="btn-main">กลับไปหน้าแรก</button>
    </section>
</div>

<script>
/** ──────────────────────────────────────────────────────────────
 * WEB AUDIO API SYSTEM
 * ────────────────────────────────────────────────────────────── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioCache = {};

async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const response = await fetch(`audio/${name}.mp3`);
        const arrayBuffer = await response.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        audioCache[name] = audioBuffer;
        return audioBuffer;
    } catch (e) { return null; }
}

function playSound(name) {
    const buffer = audioCache[name];
    if (!buffer) return null;
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);
    return source;
}

const playWait = (name) => {
    return new Promise((resolve) => {
        const source = playSound(name);
        if(!source) { resolve(); return; }
        source.onended = resolve;
    });
};

const wait = ms => new Promise(res => setTimeout(res, ms));

/** ──────────────────────────────────────────────────────────────
 * GAME DATA & LOGIC (Updated Skill Names)
 * ────────────────────────────────────────────────────────────── */
const skills = [
    {id: 'earth', name: 'ปฐพีกลืนกิน', dmg: 150},
    {id: 'fire', name: 'ปฐพีพิโรธ', dmg: 180},
    {id: 'water', name: 'มหาสมุทรคลั่ง', dmg: 140},
    {id: 'wind', name: 'วายุลมกลด', dmg: 130},
    {id: 'thunder', name: 'ทัณฑ์สวรรค์สายฟ้า', dmg: 200},
    {id: 'winter', name: 'ดินแดนเยือกแข็ง', dmg: 160}
];

let wheelOptions = [];
skills.forEach(s => { wheelOptions.push({...s, type: 'attack'}); wheelOptions.push({...s, type: 'attack'}); });
wheelOptions.push({id: 'hp', name: 'ได้รับน้ำยาเพิ่มพลัง', type: 'hp'});
wheelOptions.push({id: 'shield', name: 'ได้รับเกราะแห่งแสง', type: 'shield'});

let state = {
    pHP: 1000, gHP: 1000,
    pShield: false, gShield: false,
    turn: 'player', bgm: null
};

const announcer = document.getElementById('aria-announcer');
const spinBtn = document.getElementById('btn-spin');

function announce(msg) {
    announcer.innerText = ""; 
    setTimeout(() => { announcer.innerText = msg; }, 100);
}

document.getElementById('btn-start-game').onclick = async () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('scene-start').classList.remove('active');
    document.getElementById('scene-battle').classList.add('active');
    
    announce("ศึกตัดสินเริ่มขึ้นแล้ว!");
    await playWait('start1');
    
    const bgm = audioCtx.createBufferSource();
    bgm.buffer = await loadSound('back');
    bgm.loop = true;
    bgm.connect(audioCtx.destination);
    bgm.start(0);
    state.bgm = bgm;

    nextTurnCycle();
};

async function nextTurnCycle() {
    updateUI();
    await wait(1000);

    if (state.pHP <= 0 || state.gHP <= 0) {
        checkEndGame();
        return;
    }

    if (state.turn === 'player') {
        announce("ถึงตาผู้กล้าแล้ว โยกคันโยกเพื่อเริ่มการต่อสู้");
        spinBtn.disabled = false;
        spinBtn.focus(); // เลื่อน Focus มาที่ปุ่มตามสั่ง
    } else {
        announce("ตาของผู้พิทักษ์หอคอย...");
        await wait(1500);
        executeSpin();
    }
}

function updateUI() {
    document.getElementById('p-hp').innerText = state.pHP.toLocaleString();
    document.getElementById('g-hp').innerText = state.gHP.toLocaleString();
    document.getElementById('p-box').style.borderColor = state.pShield ? 'var(--gold)' : 'rgba(255,255,255,0.1)';
    document.getElementById('g-box').style.borderColor = state.gShield ? 'var(--gold)' : 'rgba(255,255,255,0.1)';
}

spinBtn.onclick = () => {
    spinBtn.disabled = true;
    executeSpin();
};

async function executeSpin() {
    await playWait('wheel');
    const deg = 1800 + Math.floor(Math.random() * 360);
    document.getElementById('visual-wheel').style.transform = `rotate(${deg}deg)`;

    let res;
    while(true) {
        res = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
        const hasShield = state.turn === 'player' ? state.pShield : state.gShield;
        if(res.type === 'shield' && hasShield) continue; 
        break;
    }

    await wait(1000);
    handleResult(res);
}

async function handleResult(res) {
    const isP = state.turn === 'player';
    const sfxSuffix = isP ? '1' : '';

    if (res.type === 'attack') {
        // เล่นเสียงท่าโจมตีก่อน
        await playWait(`${res.id}${sfxSuffix}`);
        
        let msg = `${isP ? 'ผู้กล้า' : 'ผู้พิทักษ์'} ใช้ท่า ${res.name}! `;
        
        if (isP) {
            if (state.gShield) {
                state.gShield = false;
                msg += "แต่ถูกป้องกันไว้ด้วยเกราะแห่งแสง!";
            } else {
                state.gHP = Math.max(0, state.gHP - res.dmg);
                msg += `โจมตีเข้าเป้า! ผู้พิทักษ์เหลือพลังชีวิต ${state.gHP} หน่วย`;
            }
        } else {
            if (state.pShield) {
                state.pShield = false;
                msg += "แต่คุณใช้เกราะแห่งแสงป้องกันไว้ได้!";
            } else {
                state.pHP = Math.max(0, state.pHP - res.dmg);
                msg += `คุณได้รับความเสียหาย! เหลือพลังชีวิต ${state.pHP} หน่วย`;
                document.getElementById('game-container').classList.add('shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
            }
        }
        announce(msg);

    } else if (res.type === 'hp') {
        const val = [100, 300, 500][Math.floor(Math.random()*3)];
        // เสียง hp ของผู้เล่นคือ hp.mp3, ผู้พิทักษ์คือ hp1.mp3
        await playWait(`hp${isP ? '' : '1'}`);
        
        if(isP) state.pHP += val; else state.gHP += val;
        announce(`${isP ? 'ผู้กล้า' : 'ผู้พิทักษ์'} ${res.name} ฟื้นฟู ${val} หน่วย พลังชีวิตขณะนี้คือ ${isP ? state.pHP : state.gHP} หน่วย`);

    } else if (res.type === 'shield') {
        // เสียง shield ของผู้เล่นคือ shield.mp3, ผู้พิทักษ์คือ shield1.mp3
        await playWait(`shield${isP ? '' : '1'}`);
        
        if(isP) state.pShield = true; else state.gShield = true;
        announce(`${isP ? 'ผู้กล้า' : 'ผู้พิทักษ์'} ${res.name} สำเร็จ!`);
    }

    await wait(3500); // รอให้ Screen Reader อ่านจบ
    state.turn = isP ? 'guardian' : 'player';
    nextTurnCycle();
}

function checkEndGame() {
    if (state.pHP <= 0 || state.gHP <= 0) {
        if (state.bgm) state.bgm.stop();
        document.getElementById('scene-battle').classList.remove('active');
        document.getElementById('scene-result').classList.add('active');
        
        if (state.pHP > 0) {
            document.getElementById('result-title').innerText = "ชัยชนะเป็นของผู้กล้า!";
            playSound('win');
            announce("ยินดีด้วย! คุณสามารถพิชิตผู้พิทักษ์หอคอยลงได้ ชัยชนะเป็นของคุณแล้ว!");
        } else {
            document.getElementById('result-title').innerText = "คุณพ่ายแพ้ในศึกนี้";
            playSound('lost');
            announce("การเดินทางสิ้นสุดลงที่นี่ คุณพ่ายแพ้ให้กับผู้พิทักษ์หอคอย...");
        }
    }
}

// Pre-load sounds
[
    'earth','earth1','fire','fire1','water','water1',
    'wind','wind1','thunder','thunder1','winter','winter1',
    'hp','hp1','shield','shield1','wheel','back','win','lost','start1'
].forEach(loadSound);
</script>
</body>
</html>
