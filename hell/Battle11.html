<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuga Battle - Guardian Spirit ชั้นที่ 20</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at center, #1a1a3a 0%, #0f0c29 100%);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        /* Background Particles */
        #particles { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: float 10s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }

        #game-container {
            background: rgba(22, 33, 62, 0.85); backdrop-filter: blur(25px);
            border-radius: 35px; padding: 2.5rem; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.05);
            width: 100%; max-width: 500px; position: relative; z-index: 1; border: 1px solid rgba(255,255,255,0.1);
        }
        
        #btn-community {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(241, 196, 15, 0.2);
            color: rgba(255, 255, 255, 0.7); padding: 8px 15px; border-radius: 12px;
            font-size: 0.85rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 5px; z-index: 10;
        }
        #btn-community:hover { background: rgba(255, 255, 255, 0.2); color: white; border-color: var(--gold); }
        #btn-community.hidden { display: none; }

        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 15px; position: relative; }
        .stat-item { 
            background: rgba(0,0,0,0.4); padding: 18px; border-radius: 20px; flex: 1; 
            border: 2px solid rgba(255,255,255,0.05); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.27); position: relative;
        }
        .stat-item.has-shield { border-color: var(--gold); box-shadow: 0 0 25px rgba(241, 196, 15, 0.25); background: rgba(241, 196, 15, 0.05); }
        
        /* Floating Damage Text */
        .dmg-text {
            position: absolute; font-weight: 800; font-size: 2rem; color: #ff3333;
            text-shadow: 0 0 10px rgba(0,0,0,0.5); pointer-events: none; z-index: 20;
            animation: dmgFloat 1s ease-out forwards;
        }
        .heal-text { color: #00ff88; animation: dmgFloat 1s ease-out forwards; }
        @keyframes dmgFloat { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-60px); } }

        .hp-val-container { font-size: 1.6rem; font-weight: 600; color: var(--gold); display: flex; justify-content: center; align-items: center; gap: 8px; }
        .shield-icon { display: none; filter: drop-shadow(0 0 5px var(--gold)); }
        .has-shield .shield-icon { display: inline-block; animation: shieldPulse 2s infinite; }
        @keyframes shieldPulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.25); opacity: 1; } }

        /* Wheel & Pointer */
        .wheel-container { position: relative; width: 220px; height: 220px; margin: 20px auto; }
        .wheel-pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 35px; background: var(--gold); clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 5; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }
        .wheel-graphic {
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid var(--gold);
            background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%);
            transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .btn-main {
            background: linear-gradient(135deg, var(--danger), var(--gold));
            border: none; padding: 18px 45px; border-radius: 50px; color: white;
            font-size: 1.4rem; font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-main:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.4); }
        .btn-main:active { transform: translateY(0); }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 20% {transform:translateX(-12px)} 40% {transform:translateX(12px)} 60% {transform:translateX(-8px)} 80% {transform:translateX(8px)} }
    </style>
</head>
<body>

<div id="particles"></div>
<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive" aria-atomic="true"></div>

<div id="game-container">
    <button id="btn-community" onclick="location.href='../index.html'" aria-label="กลับสู่ชุมชน">
        🏠 กลับสู่ชุมชน
    </button>

    <section id="scene-start" class="scene active">
        <h1>ชั้นที่ 20: ผู้พิทักษ์หอคอย</h1>
        <p>ระวังการสุ่มให้ดี ทุกเทิร์นมีความหมาย!</p>
        <button id="btn-start-game" class="btn-main">เริ่มการต่อสู้</button>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item" id="p-box" tabindex="0">
                <span class="hp-label">👤 ผู้กล้า</span>
                <div class="hp-val-container">
                    <span id="p-hp">1,000</span>
                    <span class="shield-icon" aria-hidden="true">🛡️</span>
                </div>
            </div>
            <div class="stat-item" id="g-box" tabindex="0">
                <span class="hp-label">💀 ผู้พิทักษ์</span>
                <div class="hp-val-container">
                    <span id="g-hp">1,000</span>
                    <span class="shield-icon" aria-hidden="true">🛡️</span>
                </div>
            </div>
        </div>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div id="visual-wheel" class="wheel-graphic"></div>
        </div>
        <button id="btn-spin" class="btn-main">โยกคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <h2 id="result-title"></h2>
        <p id="result-desc" style="font-size: 1.1rem; line-height: 1.6;"></p>
    </section>
</div>

<script>
// Particle System
const partContainer = document.getElementById('particles');
for(let i=0; i<30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
    p.style.animationDuration = (Math.random() * 5 + 5) + 's';
    p.style.animationDelay = Math.random() * 5 + 's';
    partContainer.appendChild(p);
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioCache = {};

async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const res = await fetch(`audio/${name}.mp3`);
        const buf = await audioCtx.decodeAudioData(await res.arrayBuffer());
        return audioCache[name] = buf;
    } catch (e) { return null; }
}

function playSound(name) {
    const buf = audioCache[name];
    if (!buf) return null;
    const s = audioCtx.createBufferSource();
    s.buffer = buf; s.connect(audioCtx.destination);
    s.start(0); return s;
}

const playWait = (name) => new Promise(res => {
    const s = playSound(name);
    if(!s) return res();
    s.onended = res;
});

const wait = ms => new Promise(res => setTimeout(res, ms));

const skills = [
    {id: 'earth', name: 'ปฐพีกลืนกิน', dmg: 200},
    {id: 'fire', name: 'อัคนีพิโรธ', dmg: 400},
    {id: 'water', name: 'มหาสมุทรคลั่ง', dmg: 300},
    {id: 'wind', name: 'วายุลมกลด', dmg: 100},
    {id: 'thunder', name: 'ทัณฑ์สวรรค์สายฟ้า', dmg: 500},
    {id: 'winter', name: 'ดินแดนเยือกแข็ง', dmg: 300}
];

const winMessages = [
    "คุณคือตำนานบทใหม่แห่งวาลูก้า!",
    "พลังของคุณอยู่เหนือทุกสรรพสิ่งในหอคอยนี้",
    "ผู้พิทักษ์พ่ายแพ้ต่อจิตวิญญาณที่แข็งแกร่งของคุณ",
    "ชัยชนะครั้งยิ่งใหญ่ถูกจารึกไว้ด้วยชื่อของคุณแล้ว",
    "ไม่มีสิ่งใดขวางกั้นวิถีแห่งผู้กล้าของคุณได้"
];

const loseMessages = [
    "เกือบสำเร็จแล้ว! ความพยายามคือหัวใจของผู้กล้า",
    "อย่าเพิ่งท้อ พลังของคุณจะแข็งแกร่งขึ้นในทุกครั้งที่ลุกขึ้น",
    "ความพ่ายแพ้คือบทเรียน ครั้งหน้าชัยชนะจะเป็นของคุณแน่นอน",
    "แม้จะล้มลง แต่จิตวิญญาณของคุณยังคงสว่างไสวเสมอ",
    "พักกายให้พร้อม แล้วกลับมาพิชิตหอคอยนี้อีกครั้ง!"
];

let wheelOptions = [];
skills.forEach(s => { wheelOptions.push({...s, type: 'attack'}); });
wheelOptions.push({id: 'hp', name: 'น้ำยาเพิ่มพลัง', type: 'hp'});
wheelOptions.push({id: 'shield', name: 'เกราะแห่งแสง', type: 'shield'});

let state = {
    pHP: 1000, gHP: 1000,
    pShield: false, gShield: false,
    turn: 'player', isBonus: false,
    lastId: null, bgm: null
};

const announcer = document.getElementById('aria-announcer');
const spinBtn = document.getElementById('btn-spin');
const communityBtn = document.getElementById('btn-community');

function announce(msg) {
    if (!announcer.hasAttribute('aria-live')) return; 
    announcer.innerText = ""; 
    setTimeout(() => { announcer.innerText = msg; }, 100);
}

function spawnFloatingText(boxId, text, isHeal = false) {
    const box = document.getElementById(boxId);
    const ft = document.createElement('div');
    ft.className = isHeal ? 'dmg-text heal-text' : 'dmg-text';
    ft.innerText = text;
    ft.style.left = '50%';
    box.appendChild(ft);
    setTimeout(() => ft.remove(), 1000);
}

function updateUI() {
    document.getElementById('p-hp').innerText = state.pHP.toLocaleString();
    document.getElementById('g-hp').innerText = state.gHP.toLocaleString();
    const pb = document.getElementById('p-box'), gb = document.getElementById('g-box');
    state.pShield ? pb.classList.add('has-shield') : pb.classList.remove('has-shield');
    state.gShield ? gb.classList.add('has-shield') : gb.classList.remove('has-shield');
    
    pb.setAttribute('aria-label', `ผู้กล้า พลังชีวิต ${state.pHP} ${state.pShield ? 'มีเกราะแห่งแสง' : 'ไม่มีเกราะ'}`);
    gb.setAttribute('aria-label', `ผู้พิทักษ์ พลังชีวิต ${state.gHP} ${state.gShield ? 'มีเกราะแห่งแสง' : 'ไม่มีเกราะ'}`);
}

document.getElementById('btn-start-game').onclick = async () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('scene-start').classList.remove('active');
    document.getElementById('scene-battle').classList.add('active');
    communityBtn.classList.add('hidden');
    announce("เริ่มการต่อสู้!");
    await playWait('start1');
    const bgm = audioCtx.createBufferSource();
    bgm.buffer = await loadSound('back');
    bgm.loop = true; bgm.connect(audioCtx.destination);
    bgm.start(0); state.bgm = bgm;
    nextTurnCycle();
};

async function nextTurnCycle() {
    updateUI();
    if (state.pHP <= 0 || state.gHP <= 0) return checkEndGame();
    if (state.turn === 'player') {
        if (!state.isBonus) announce("ตาคุณ");
        spinBtn.disabled = false; spinBtn.focus();
    } else {
        if (!state.isBonus) announce("ตาผู้พิทักษ์");
        await wait(600); executeSpin();
    }
}

spinBtn.onclick = () => { spinBtn.disabled = true; executeSpin(); };

async function executeSpin() {
    await playWait('wheel');
    const deg = 1440 + Math.floor(Math.random() * 360);
    document.getElementById('visual-wheel').style.transform = `rotate(${deg}deg)`;
    let res;
    while(true) {
        res = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
        if(res.id === state.lastId) continue; 
        const hasS = (state.turn === 'player') ? state.pShield : state.gShield;
        if(res.type === 'shield' && hasS) continue;
        if(state.isBonus && res.type !== 'attack') continue;
        break;
    }
    state.lastId = res.id;
    await wait(1500); handleResult(res);
}

async function handleResult(res) {
    const isP = state.turn === 'player', sfx = isP ? '1' : '';
    let bonus = false;
    
    if (res.type === 'attack') {
        await playWait(`${res.id}${sfx}`);
        if (isP) {
            if (state.gShield) { state.gShield = false; spawnFloatingText('g-box', 'BLOCK'); }
            else { state.gHP = Math.max(0, state.gHP - res.dmg); spawnFloatingText('g-box', `-${res.dmg}`); }
        } else {
            if (state.pShield) { state.pShield = false; spawnFloatingText('p-box', 'BLOCK'); }
            else { 
                state.pHP = Math.max(0, state.pHP - res.dmg); 
                spawnFloatingText('p-box', `-${res.dmg}`);
                document.getElementById('game-container').classList.add('shake');
                setTimeout(()=>document.getElementById('game-container').classList.remove('shake'), 400);
            }
        }
        announce(`${isP ? 'คุณ' : 'ผู้พิทักษ์'}ใช้ ${res.name}`); 
        state.isBonus = false;
    } else if (res.type === 'hp') {
        await playWait(`hp${isP ? '' : '1'}`);
        const val = [100, 300, 500][Math.floor(Math.random()*3)];
        if(isP) { state.pHP = Math.min(1000, state.pHP + val); spawnFloatingText('p-box', `+${val}`, true); }
        else { state.gHP = Math.min(1000, state.gHP + val); spawnFloatingText('g-box', `+${val}`, true); }
        announce(`${isP ? 'คุณ' : 'ผู้พิทักษ์'}ได้น้ำยาเพิ่มพลัง สุ่มต่อ`); 
        bonus = true;
    } else if (res.type === 'shield') {
        await playWait(`shield${isP ? '' : '1'}`);
        if(isP) state.pShield = true; else state.gShield = true;
        announce(`${isP ? 'คุณ' : 'ผู้พิทักษ์'}ได้รับเกราะแห่งแสง สุ่มต่อ`); 
        bonus = true;
    }
    updateUI();
    await wait(2000);
    if (bonus) {
        state.isBonus = true;
        if (isP) { spinBtn.disabled = false; spinBtn.focus(); } else { executeSpin(); }
    } else {
        state.turn = isP ? 'guardian' : 'player';
        nextTurnCycle();
    }
}

function checkEndGame() {
    if (state.bgm) state.bgm.stop();
    document.getElementById('scene-battle').classList.remove('active');
    document.getElementById('scene-result').classList.add('active');
    communityBtn.classList.remove('hidden');
    
    announcer.removeAttribute('aria-live');
    announcer.removeAttribute('role');

    const win = state.pHP > 0;
    const title = document.getElementById('result-title');
    const desc = document.getElementById('result-desc');

    if(win) {
        title.innerText = "ชัยชนะเป็นของคุณ!";
        desc.innerText = winMessages[Math.floor(Math.random() * winMessages.length)];
        playSound('winner');
    } else {
        title.innerText = "การเดินทางยังไม่สิ้นสุด";
        desc.innerText = loseMessages[Math.floor(Math.random() * loseMessages.length)];
        playSound('lost');
    }
}

['earth','earth1','fire','fire1','water','water1','wind','wind1','thunder','thunder1','winter','winter1','hp','hp1','shield','shield1','wheel','back','winner','lost','start1'].forEach(loadSound);
</script>
</body>
</html>
