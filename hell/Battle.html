<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuga Battle Mode - ศึกผู้พิทักษ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
            --hp-color: #00e676;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; margin: 0; display: flex;
            justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        #game-container {
            background: rgba(22, 33, 62, 0.85); backdrop-filter: blur(15px);
            border-radius: 30px; padding: 2.5rem; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 2px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 500px; position: relative;
        }
        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; padding: 18px 40px; border-radius: 50px; color: white;
            font-size: 1.3rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(37, 117, 252, 0.4); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        .stats-bar { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .stat-item { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; flex: 1; font-weight: bold; position: relative; }
        .shield-active { border: 2px solid var(--gold); box-shadow: 0 0 15px var(--gold); }

        .wheel-wrapper { position: relative; width: 180px; height: 180px; margin: 20px auto; }
        .wheel-graphic {
            width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--gold);
            background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%);
            transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        
        /* Flash Effects */
        #element-flash { position: fixed; inset: 0; pointer-events: none; z-index: 2000; opacity: 0; }
        .flash-active { animation: flash-anim 0.8s forwards; }
        @keyframes flash-anim { 0% { opacity: 0; } 30% { opacity: 0.6; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="element-flash" aria-hidden="true"></div>
<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive"></div>

<div id="game-container">
    <section id="scene-intro" class="scene active">
        <h1>โหมด Battle พิเศษ</h1>
        <p>เผชิญหน้ากับผู้พิทักษ์หอคอยในศึกตัดสิน!<br>สุ่มกงล้อเพื่อโจมตี ฟื้นพลัง หรือกางเกราะแห่งแสง</p>
        <button id="btn-start" class="btn-main">เริ่ม Battle</button>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div id="p-stat" class="stat-item">❤️ ผู้เล่น: <span id="p-hp">1000</span></div>
            <div id="g-stat" class="stat-item">🛡️ ผู้พิทักษ์: <span id="g-hp">1000</span></div>
        </div>

        <h2 id="turn-display">เตรียมตัวต่อสู้...</h2>

        <div class="wheel-wrapper">
            <div id="visual-wheel" class="wheel-graphic"></div>
        </div>

        <button id="btn-action" class="btn-main">กดคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <h2 id="result-title">จบการต่อสู้</h2>
        <p id="result-desc"></p>
        <button onclick="location.reload()" class="btn-main">เล่นใหม่อีกครั้ง</button>
    </section>
</div>

<script>
    // การตั้งค่าท่าและตัวเลือกกงล้อ
    const attacks = [
        {name: "หมัดอัคคีพิฆาต", dmg: 150, flash: "#ff4b2b", sfx: "fire"},
        {name: "วารีสลาตัน", dmg: 140, flash: "#2575fc", sfx: "water"},
        {name: "พฤกษาพันธนาการ", dmg: 130, flash: "#8d6e63", sfx: "wood"},
        {name: "สายฟ้ากัมปนาท", dmg: 180, flash: "#bf55ff", sfx: "thunder"},
        {name: "ปฐพีถล่ม", dmg: 160, flash: "#5d4037", sfx: "earth"},
        {name: "เหมันต์นิรันดร์", dmg: 145, flash: "#81d4fa", sfx: "ice"}
    ];

    // สร้างลิสต์ตัวเลือก 14 ช่อง (6 ท่า x 2 + HP 1 + Shield 1)
    let wheelOptions = [];
    attacks.forEach(a => { wheelOptions.push(a); wheelOptions.push(a); });
    wheelOptions.push({name: "ฟื้นฟู HP", type: "hp"});
    wheelOptions.push({name: "เกราะแห่งแสง", type: "shield"});

    let state = {
        pHP: 1000, gHP: 1000,
        pShield: false, gShield: false,
        isPlayerTurn: true,
        isBusy: false
    };

    const audioPath = "audio/";
    const sounds = {
        start: new Audio(audioPath + "start1.mp3"),
        bgm: new Audio(audioPath + "back.mp3"),
        wheel: new Audio(audioPath + "wheel.mp3"),
        win: new Audio(audioPath + "win.mp3"),
        lost: new Audio(audioPath + "lost.mp3")
    };
    sounds.bgm.loop = true;

    // ระบบประกาศ Screen Reader
    function announce(msg) {
        document.getElementById('aria-announcer').innerText = msg;
    }

    // เริ่มเกม
    document.getElementById('btn-start').onclick = async () => {
        document.getElementById('btn-start').disabled = true;
        await sounds.start.play();
        sounds.start.onended = () => {
            sounds.bgm.play();
            switchScene('scene-battle');
            // สุ่มว่าใครเริ่มก่อน
            state.isPlayerTurn = Math.random() > 0.5;
            updateTurnUI();
        };
    };

    function switchScene(id) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updateTurnUI() {
        const turnText = state.isPlayerTurn ? "ตาของคุณแล้ว!" : "ตาของผู้พิทักษ์...";
        document.getElementById('turn-display').innerText = turnText;
        document.getElementById('btn-action').disabled = !state.isPlayerTurn;
        announce(turnText);

        if(!state.isPlayerTurn && state.pHP > 0 && state.gHP > 0) {
            setTimeout(executeTurn, 1500); // ผู้พิทักษ์เล่นอัตโนมัติ
        }
    }

    document.getElementById('btn-action').onclick = () => {
        if(state.isBusy) return;
        executeTurn();
    };

    async function executeTurn() {
        state.isBusy = true;
        document.getElementById('btn-action').disabled = true;
        
        sounds.wheel.currentTime = 0;
        sounds.wheel.play();

        // สุ่มผลลัพธ์
        let index = Math.floor(Math.random() * wheelOptions.length);
        let result = wheelOptions[index];

        // เงื่อนไข Shield: ถ้ามีอยู่แล้วให้สุ่มใหม่ไปโดนท่าโจมตีแทน
        if(result.type === "shield") {
            const hasShield = state.isPlayerTurn ? state.pShield : state.gShield;
            if(hasShield) {
                while(wheelOptions[index].type === "shield") {
                    index = Math.floor(Math.random() * wheelOptions.length);
                }
                result = wheelOptions[index];
            }
        }

        // Animation กงล้อ
        const rotation = 3600 + (index * (360/wheelOptions.length));
        document.getElementById('visual-wheel').style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            processResult(result);
        }, 3000);
    }

    async function processResult(res) {
        const isP = state.isPlayerTurn;
        const actorName = isP ? "คุณ" : "ผู้พิทักษ์";
        
        if(res.type === "hp") {
            const heal = [100, 300, 500][Math.floor(Math.random()*3)];
            if(isP) state.pHP = Math.min(1000, state.pHP + heal);
            else state.gHP = Math.min(1000, state.gHP + heal);
            
            const sfx = isP ? "hp.mp3" : "hp1.mp3";
            new Audio(audioPath + sfx).play();
            flashEffect("#00e676");
            announce(`${actorName} ได้รับการฟื้นฟู HP ${heal} หน่วย`);
        } 
        else if(res.type === "shield") {
            if(isP) state.pShield = true; else state.gShield = true;
            const sfx = isP ? "shield.mp3" : "shield1.mp3";
            new Audio(audioPath + sfx).play();
            flashEffect("#f1c40f");
            announce(`${actorName} เปิดใช้งานเกราะแห่งแสง!`);
        }
        else {
            // โจมตี
            let damage = res.dmg;
            const targetShield = isP ? state.gShield : state.pShield;
            
            if(targetShield) {
                damage = 0;
                if(isP) state.gShield = false; else state.pShield = false;
                announce(`${actorName} ใช้ท่า ${res.name} แต่ถูกเกราะป้องกันไว้ได้!`);
            } else {
                if(isP) state.gHP -= damage; else state.pHP -= damage;
                announce(`${actorName} ใช้ท่า ${res.name} โจมตี ${damage} หน่วย`);
            }
            
            new Audio(audioPath + res.sfx + ".mp3").play();
            flashEffect(res.flash);
        }

        updateStatsUI();

        // ตรวจสอบจบเกม
        if(state.pHP <= 0 || state.gHP <= 0) {
            endGame();
        } else {
            state.isPlayerTurn = !state.isPlayerTurn;
            state.isBusy = false;
            setTimeout(updateTurnUI, 1500);
        }
    }

    function updateStatsUI() {
        document.getElementById('p-hp').innerText = Math.max(0, state.pHP);
        document.getElementById('g-hp').innerText = Math.max(0, state.gHP);
        
        document.getElementById('p-stat').className = "stat-item" + (state.pShield ? " shield-active" : "");
        document.getElementById('g-stat').className = "stat-item" + (state.gShield ? " shield-active" : "");
    }

    function flashEffect(color) {
        const el = document.getElementById('element-flash');
        el.style.background = `radial-gradient(circle, ${color} 0%, transparent 70%)`;
        el.classList.add('flash-active');
        setTimeout(() => el.classList.remove('flash-active'), 800);
    }

    function endGame() {
        sounds.bgm.pause();
        switchScene('scene-result');
        if(state.gHP <= 0) {
            document.getElementById('result-title').innerText = "ชัยชนะเป็นของคุณ!";
            document.getElementById('result-desc').innerText = "คุณได้พิชิตผู้พิทักษ์หอคอยสำเร็จ";
            sounds.win.play();
        } else {
            document.getElementById('result-title').innerText = "พ่ายแพ้...";
            document.getElementById('result-desc').innerText = "พลังของคุณยังไม่เพียงพอที่จะล้มผู้พิทักษ์";
            sounds.lost.play();
        }
    }
</script>

</body>
</html>
