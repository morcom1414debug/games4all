<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuga Battle - Guardian Spirit ชั้นที่ 20</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
            --cls-fire: #ff4b2b; --cls-water: #00d2ff; --cls-earth: #e67e22;
            --cls-wind: #2ecc71; --cls-thunder: #f1c40f; --cls-winter: #ecf0f1;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            transition: filter 1s ease;
        }

        /* Hit Flash Overlay */
        #hit-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99; opacity: 0; transition: opacity 0.1s;
        }

        /* Particles Background */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .particle { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: float 15s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); } 100% { transform: translateY(-10vh) scale(1); } }

        /* Results FX Canvas */
        #result-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        #game-container {
            background: rgba(22, 33, 62, 0.85); backdrop-filter: blur(15px);
            border-radius: 30px; padding: 2.5rem; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); border: 2px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 500px; position: relative; z-index: 1;
        }
        
        #btn-community {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(241, 196, 15, 0.3);
            color: rgba(255, 255, 255, 0.8); padding: 8px 15px; border-radius: 12px;
            font-size: 0.85rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 5px; z-index: 10;
        }
        #btn-community:hover { background: rgba(255, 255, 255, 0.2); color: white; border-color: var(--gold); }
        #btn-community.hidden { display: none; }
        #btn-community.show-result { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }

        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.4s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
        .stat-item { 
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 18px; flex: 1; 
            border: 2px solid rgba(255,255,255,0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.27); position: relative;
        }
        
        .stat-item.active-turn { border-color: var(--gold); box-shadow: 0 0 20px rgba(241, 196, 15, 0.3); transform: scale(1.05); }

        .hp-track { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: var(--success); transition: width 0.5s ease, background-color 0.3s; }

        .hp-label { font-size: 0.8rem; opacity: 0.7; display: block; }
        .hp-val-container { font-size: 1.3rem; font-weight: 600; color: #fff; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .shield-icon { display: none; font-size: 1.1rem; }
        .has-shield .shield-icon { display: inline; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27) forwards; }
        
        .dmg-popup { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-weight: bold; font-size: 1.5rem; pointer-events: none; animation: flyUp 1s forwards; z-index: 5; }
        @keyframes flyUp { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -40px); } }

        .wheel-container { position: relative; width: 200px; height: 200px; margin: 25px auto; }
        .wheel-arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; 
            border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 20px solid var(--gold); z-index: 2; }
        .wheel-graphic {
            width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--gold);
            background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%);
            transition: transform 2.5s cubic-bezier(0.15, 0, 0.15, 1); box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .btn-main {
            background: linear-gradient(135deg, var(--danger), var(--gold));
            border: none; padding: 18px 45px; border-radius: 50px; color: white;
            font-size: 1.4rem; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-main:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.4); }
        .btn-main:focus { outline: 3px solid white; }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Result FX Styles */
        #result-icon { font-size: 5rem; display: block; margin-bottom: 10px; opacity: 0; }
        .win-anim #result-icon { animation: trophyPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.27) 0.5s forwards, trophyGlow 2s infinite ease-in-out 1.5s; }
        .lost-anim #result-icon { animation: fallDown 1.2s ease-in 0.3s forwards; filter: grayscale(1); }
        
        @keyframes trophyPop { from { transform: scale(0) rotate(-20deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
        @keyframes trophyGlow { 0%, 100% { filter: drop-shadow(0 0 10px var(--gold)); } 50% { filter: drop-shadow(0 0 30px var(--gold)); } }
        @keyframes fallDown { 0% { transform: translateY(-100px); opacity: 0; } 60% { transform: translateY(0); opacity: 1; } 80% { transform: translateY(-10px); } 100% { transform: translateY(0); opacity: 0.8; } }
        @keyframes bounceIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-10px)} 75% {transform:translateX(10px)} }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

<canvas id="result-canvas"></canvas>
<div id="hit-flash"></div>
<div class="particles" id="particles"></div>
<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive" aria-atomic="true"></div>

<div id="game-container">
    <button id="btn-community" onclick="location.href='../index.html'" aria-label="กลับสู่ชุมชน">
        🏠 กลับสู่ชุมชน
    </button>

    <section id="scene-start" class="scene active">
        <h1 style="color:var(--gold)">ชั้นที่ 20: ผู้พิทักษ์หอคอย</h1>
        <p>ระวังการสุ่มให้ดี ทุกเทิร์นมีความหมาย!</p>
        <button id="btn-start-game" class="btn-main">เริ่มการต่อสู้</button>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item" id="p-box" tabindex="0">
                <span class="hp-label">👤 ผู้กล้า</span>
                <div class="hp-val-container">
                    <span id="p-hp">1,000</span>
                    <span class="shield-icon" aria-hidden="true">🛡️</span>
                </div>
                <div class="hp-track"><div id="p-hp-bar" class="hp-fill"></div></div>
            </div>
            <div class="stat-item" id="g-box" tabindex="0">
                <span class="hp-label">💀 ผู้พิทักษ์</span>
                <div class="hp-val-container">
                    <span id="g-hp">1,000</span>
                    <span class="shield-icon" aria-hidden="true">🛡️</span>
                </div>
                <div class="hp-track"><div id="g-hp-bar" class="hp-fill"></div></div>
            </div>
        </div>
        <div class="wheel-container">
            <div class="wheel-arrow"></div>
            <div id="visual-wheel" class="wheel-graphic"></div>
        </div>
        <button id="btn-spin" class="btn-main" disabled>โยกคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <div id="result-visual-wrapper">
            <span id="result-icon" aria-hidden="true">🏆</span>
            <h2 id="result-title"></h2>
            <p id="result-desc"></p>
        </div>
    </section>
</div>

<script>
// --- Canvas FX for Fireworks ---
const canvas = document.getElementById('result-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

class Firework {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.life = 100; this.opacity = 1;
    }
    draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`; ctx.fill();
    }
    update() {
        this.x += this.velocity.x; this.y += this.velocity.y;
        this.life -= 1.5; this.opacity = this.life / 100;
    }
}

function animateFX() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.update(); p.draw(); });
    if (particles.length > 0) requestAnimationFrame(animateFX);
}

function launchFireworks() {
    const colors = ['255, 215, 0', '255, 75, 43', '0, 210, 255', '46, 204, 113'];
    const interval = setInterval(() => {
        if (document.getElementById('scene-result').style.display === 'none') return clearInterval(interval);
        for(let i=0; i<30; i++) {
            particles.push(new Firework(canvas.width/2, canvas.height/2, colors[Math.floor(Math.random()*colors.length)]));
        }
        animateFX();
    }, 800);
    setTimeout(() => clearInterval(interval), 6000);
}

// --- Original Particles Background ---
const pContainer = document.getElementById('particles');
for(let i=0; i<20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (Math.random() * 5 + 2) + 'px';
    p.style.animationDelay = (Math.random() * 15) + 's';
    pContainer.appendChild(p);
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioCache = {};

async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const res = await fetch(`audio/${name}.mp3`);
        const buf = await audioCtx.decodeAudioData(await res.arrayBuffer());
        return audioCache[name] = buf;
    } catch (e) { return null; }
}

function playSound(name) {
    const buf = audioCache[name];
    if (!buf) return null;
    const s = audioCtx.createBufferSource();
    s.buffer = buf; s.connect(audioCtx.destination);
    s.start(0); return s;
}

const playWait = (name) => new Promise(res => {
    const s = playSound(name);
    if(!s) return res();
    s.onended = res;
});

const wait = ms => new Promise(res => setTimeout(res, ms));

const skills = [
    {id: 'earth', name: 'ปฐพีกลืนกิน', dmg: 200, color: 'var(--cls-earth)'},
    {id: 'fire', name: 'อัคนีพิโรธ', dmg: 400, color: 'var(--cls-fire)'},
    {id: 'water', name: 'มหาสมุทรคลั่ง', dmg: 300, color: 'var(--cls-water)'},
    {id: 'wind', name: 'วายุลมกลด', dmg: 100, color: 'var(--cls-wind)'},
    {id: 'thunder', name: 'ทัณฑ์สวรรค์สายฟ้า', dmg: 500, color: 'var(--cls-thunder)'},
    {id: 'winter', name: 'ดินแดนเยือกแข็ง', dmg: 300, color: 'var(--cls-winter)'}
];

const winMessages = [
    { title: "ชัยชนะเป็นของคุณ!", desc: "คุณได้พิสูจน์ตนเองในฐานะผู้กล้าที่แท้จริงแล้ว!" },
    { title: "สุดยอดฝีมือ!", desc: "การตัดสินใจของคุณนำมาซึ่งชัยชนะอันรุ่งโรจน์ในครั้งนี้" },
    { title: "ผู้พิชิตหอคอย!", desc: "ตำนานหน้าใหม่ได้เริ่มขึ้นแล้ว ด้วยความสามารถของคุณ!" }
];

const lostMessages = [
    { title: "พ่ายแพ้แต่ไม่ถอย...", desc: "อีกเพียงนิดเดียวเท่านั้น ประสบการณ์ครั้งนี้จะทำให้คุณแข็งแกร่งขึ้น" },
    { title: "หอคอยยังคงรอคุณอยู่", desc: "ความพยายามไม่เคยสูญเปล่า พักผ่อนให้เต็มที่แล้วกลับมาลุยใหม่นะ" },
    { title: "เกือบไปแล้ว!", desc: "คุณทำได้ดีมากแล้วในรอบนี้ ครั้งหน้าชัยชนะจะเป็นของคุณแน่นอน" }
];

let wheelOptions = [];
skills.forEach(s => { wheelOptions.push({...s, type: 'attack'}); });
wheelOptions.push({id: 'hp', name: 'ได้รับน้ำยาเพิ่มพลัง', type: 'hp', color: 'var(--success)'});
wheelOptions.push({id: 'shield', name: 'ได้รับเกราะแห่งแสง', type: 'shield', color: 'var(--gold)'});

let state = {
    pHP: 1000, gHP: 1000,
    pShield: false, gShield: false,
    turn: 'player', isBonus: false,
    lastId: null, bgm: null
};

const announcer = document.getElementById('aria-announcer');
const spinBtn = document.getElementById('btn-spin');
const communityBtn = document.getElementById('btn-community');
const flashOverlay = document.getElementById('hit-flash');

function triggerFlash(color) {
    flashOverlay.style.backgroundColor = color;
    flashOverlay.style.opacity = '0.4';
    setTimeout(() => { flashOverlay.style.opacity = '0'; }, 150);
}

function announce(msg) {
    announcer.innerText = ""; 
    setTimeout(() => { announcer.innerText = msg; }, 100);
}

function spawnPop(boxId, val, isHeal=false) {
    const box = document.getElementById(boxId);
    const pop = document.createElement('div');
    pop.className = 'dmg-popup';
    pop.innerText = isHeal ? `+${val}` : `-${val}`;
    pop.style.color = isHeal ? 'var(--success)' : 'var(--danger)';
    box.appendChild(pop);
    setTimeout(() => pop.remove(), 1000);
}

function updateUI() {
    document.getElementById('p-hp').innerText = state.pHP.toLocaleString();
    document.getElementById('g-hp').innerText = state.gHP.toLocaleString();
    const pBar = document.getElementById('p-hp-bar'), gBar = document.getElementById('g-hp-bar');
    const pPerc = (state.pHP / 1000) * 100, gPerc = (state.gHP / 1000) * 100;
    pBar.style.width = pPerc + '%';
    gBar.style.width = gPerc + '%';
    [pBar, gBar].forEach(bar => {
        const perc = parseFloat(bar.style.width);
        if(perc > 50) bar.style.backgroundColor = 'var(--success)';
        else if(perc > 25) bar.style.backgroundColor = 'var(--gold)';
        else bar.style.backgroundColor = 'var(--danger)';
    });
    const pb = document.getElementById('p-box'), gb = document.getElementById('g-box');
    state.pShield ? pb.classList.add('has-shield') : pb.classList.remove('has-shield');
    state.gShield ? gb.classList.add('has-shield') : gb.classList.remove('has-shield');
    if(state.turn === 'player') { pb.classList.add('active-turn'); gb.classList.remove('active-turn'); }
    else { gb.classList.add('active-turn'); pb.classList.remove('active-turn'); }
    pb.setAttribute('aria-label', `ผู้กล้า พลังชีวิต ${state.pHP} ${state.pShield ? 'มีเกราะ' : ''}`);
    gb.setAttribute('aria-label', `ผู้พิทักษ์ พลังชีวิต ${state.gHP} ${state.gShield ? 'มีเกราะ' : ''}`);
}

document.getElementById('btn-start-game').onclick = async () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('scene-start').classList.remove('active');
    document.getElementById('scene-battle').classList.add('active');
    communityBtn.classList.add('hidden');
    announce("เริ่มการต่อสู้!");
    await playWait('start1');
    const bgm = audioCtx.createBufferSource();
    bgm.buffer = await loadSound('back1');
    bgm.loop = true; bgm.connect(audioCtx.destination);
    bgm.start(0); state.bgm = bgm;
    nextTurnCycle();
};

async function nextTurnCycle() {
    updateUI();
    if (state.pHP <= 0 || state.gHP <= 0) return checkEndGame();
    if (state.turn === 'player') {
        if (!state.isBonus) announce("ตาคุณ");
        spinBtn.disabled = false; spinBtn.focus();
    } else {
        if (!state.isBonus) announce("ตาผู้พิทักษ์");
        await wait(600); executeSpin();
    }
}

spinBtn.onclick = () => { spinBtn.disabled = true; executeSpin(); };

async function executeSpin() {
    await playWait('wheel');
    const deg = 1080 + Math.floor(Math.random() * 360);
    document.getElementById('visual-wheel').style.transform = `rotate(${deg}deg)`;
    let res;
    while(true) {
        res = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
        if(res.id === state.lastId) continue; 
        const hasS = (state.turn === 'player') ? state.pShield : state.gShield;
        if(res.type === 'shield' && hasS) continue;
        if(state.isBonus && res.type !== 'attack') continue;
        break;
    }
    state.lastId = res.id;
    await wait(800); handleResult(res);
}

async function handleResult(res) {
    const isP = state.turn === 'player', sfx = isP ? '1' : '';
    let bonus = false;
    if (res.type === 'attack') {
        await playWait(`${res.id}${sfx}`);
        let msg = `${isP ? 'คุณ' : 'ผู้พิทักษ์'}ใช้ ${res.name} `;
        if (isP) {
            if (state.gShield) { state.gShield = false; msg += "แต่ติดเกราะ"; }
            else { 
                state.gHP = Math.max(0, state.gHP - res.dmg); 
                msg += `ลดไป ${res.dmg} เหลือ ${state.gHP}`; 
                spawnPop('g-box', res.dmg);
                triggerFlash(res.color);
            }
        } else {
            if (state.pShield) { state.pShield = false; msg += "แต่มีเกราะ"; }
            else { 
                state.pHP = Math.max(0, state.pHP - res.dmg); 
                msg += `ลดไป ${res.dmg} เหลือ ${state.pHP}`;
                spawnPop('p-box', res.dmg);
                triggerFlash(res.color);
                document.getElementById('game-container').classList.add('shake');
                setTimeout(()=>document.getElementById('game-container').classList.remove('shake'), 200);
            }
        }
        announce(msg); state.isBonus = false;
    } else if (res.type === 'hp') {
        await playWait(`hp${isP ? '' : '1'}`);
        const val = [100, 300, 500][Math.floor(Math.random()*3)];
        if(isP) { state.pHP = Math.min(1000, state.pHP + val); spawnPop('p-box', val, true); } 
        else { state.gHP = Math.min(1000, state.gHP + val); spawnPop('g-box', val, true); }
        announce(`${isP ? 'คุณ' : 'ผู้พิทักษ์'}ได้ ${val} สุ่มต่อ`); 
        bonus = true;
    } else if (res.type === 'shield') {
        await playWait(`shield${isP ? '' : '1'}`);
        if(isP) state.pShield = true; else state.gShield = true;
        announce(`${isP ? 'คุณ' : 'ผู้พิทักษ์'}ได้รับเกราะ สุ่มต่อ`); 
        bonus = true;
    }
    updateUI();
    await wait(2200);
    if (bonus) {
        state.isBonus = true;
        if (isP) { spinBtn.disabled = false; spinBtn.focus(); } else { executeSpin(); }
    } else {
        state.turn = isP ? 'guardian' : 'player';
        nextTurnCycle();
    }
}

function checkEndGame() {
    if (state.bgm) state.bgm.stop();
    const win = state.pHP > 0;
    
    document.getElementById('scene-battle').classList.remove('active');
    const resultScene = document.getElementById('scene-result');
    resultScene.classList.add('active');
    
    // Set animations based on win/lost
    const wrapper = document.getElementById('result-visual-wrapper');
    const icon = document.getElementById('result-icon');
    if (win) {
        wrapper.className = 'win-anim';
        icon.innerText = '🏆';
        launchFireworks();
    } else {
        wrapper.className = 'lost-anim';
        icon.innerText = '💀';
        document.body.style.filter = 'grayscale(0.7)';
    }

    announcer.innerText = ""; 
    announcer.setAttribute('aria-live', 'off');
    
    // Stage button entrance
    communityBtn.classList.remove('hidden');
    communityBtn.classList.add('show-result');
    
    const msgPool = win ? winMessages : lostMessages;
    const randomMsg = msgPool[Math.floor(Math.random() * msgPool.length)];
    document.getElementById('result-title').innerText = randomMsg.title;
    document.getElementById('result-desc').innerText = randomMsg.desc;
    
    if(win) { playSound('winner'); } else { playSound('lost'); }
}

['earth','earth1','fire','fire1','water','water1','wind','wind1','thunder','thunder1','winter','winter1','hp','hp1','shield','shield1','wheel','back1','winner','lost','start1'].forEach(loadSound);
</script>
