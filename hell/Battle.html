<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuga Guardian Battle - Original Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        #game-container {
            background: rgba(22, 33, 62, 0.85); backdrop-filter: blur(15px);
            border-radius: 30px; padding: 2.5rem; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 2px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 500px; position: relative;
        }
        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .stat-item { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; flex: 1; margin: 0 5px; font-weight: bold; }
        .hp-val { display: block; font-size: 1.2rem; color: var(--gold); }
        
        .wheel-graphic {
            width: 200px; height: 200px; margin: 20px auto; border-radius: 50%; border: 8px solid var(--gold);
            background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .btn-main {
            background: linear-gradient(135deg, var(--danger), var(--gold));
            border: none; padding: 18px 45px; border-radius: 50px; color: white;
            font-size: 1.4rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-8px)} 75% {transform:translateX(8px)} }
    </style>
</head>
<body>

<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive" aria-atomic="true"></div>

<div id="game-container">
    <section id="scene-start" class="scene active">
        <h1>โหมด Battle ผู้พิทักษ์</h1>
        <p>เผชิญหน้ากับผู้พิทักษ์หอคอยชั้นที่ 20</p>
        <button id="btn-start-game" class="btn-main">เริ่ม Battle</button>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item">👤 ผู้กล้า <span class="hp-val" id="p-hp">1,000</span></div>
            <div class="stat-item">💀 ผู้พิทักษ์ <span class="hp-val" id="g-hp">1,000</span></div>
        </div>
        <div id="visual-wheel" class="wheel-graphic"></div>
        <button id="btn-spin" class="btn-main">โยกคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <h2 id="result-title"></h2>
        <button onclick="location.reload()" class="btn-main">เล่นอีกครั้ง</button>
    </section>
</div>

<script>
/** ──────────────────────────────────────────────────────────────
 * WEB AUDIO API & ASSETS (จากต้นฉบับ)
 * ────────────────────────────────────────────────────────────── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioCache = {};

async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const response = await fetch(`audio/${name}.mp3`);
        const arrayBuffer = await response.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        audioCache[name] = audioBuffer;
        return audioBuffer;
    } catch (e) { return null; }
}

function playSound(name, loop = false) {
    const buffer = audioCache[name];
    if (!buffer) return null;
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = loop;
    source.connect(audioCtx.destination);
    source.start(0);
    return source;
}

const wait = ms => new Promise(res => setTimeout(res, ms));

// ชื่อท่าโจมตี 6 ธาตุ ตามต้นฉบับ
const skills = [
    {id: 'earth', name: 'พสุธากัมปนาท', dmg: 150},
    {id: 'fire', name: 'อัคคีแผดเผา', dmg: 180},
    {id: 'water', name: 'มหาสมุทรคลั่ง', dmg: 140},
    {id: 'wind', name: 'วายุโหมกระหน่ำ', dmg: 130},
    {id: 'thunder', name: 'สายฟ้าฟาดฟัน', dmg: 200},
    {id: 'winter', name: 'เหมันต์นิรันดร์', dmg: 160}
];

let wheelOptions = [];
skills.forEach(s => { wheelOptions.push({...s, type: 'attack'}); wheelOptions.push({...s, type: 'attack'}); });
wheelOptions.push({id: 'hp', name: 'เพิ่มพลังชีวิต', type: 'hp'});
wheelOptions.push({id: 'shield', name: 'เกราะแห่งแสง', type: 'shield'});

let state = {
    playerHP: 1000, guardianHP: 1000,
    playerShield: false, guardianShield: false,
    turn: 'player'
};

const announcer = document.getElementById('aria-announcer');

function announce(msg) {
    announcer.innerText = ""; 
    setTimeout(() => { announcer.innerText = msg; }, 100); // เว้นระยะเพื่อให้ Screen Reader ตรวจพบการเปลี่ยนแปลง
}

// เริ่มต้นเกม
document.getElementById('btn-start-game').onclick = async () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('scene-start').classList.remove('active');
    document.getElementById('scene-battle').classList.add('active');
    
    await loadSound('start1');
    const s = playSound('start1');
    announce("ศึกสุดท้ายเริ่มต้นขึ้นแล้ว! เผชิญหน้ากับผู้พิทักษ์หอคอย");
    s.onended = () => { playSound('back', true); nextTurnCycle(); };
};

async function nextTurnCycle() {
    updateUI();
    await wait(1800); // เว้นระยะให้การประกาศก่อนหน้าจบลง

    if (state.turn === 'player') {
        announce("ถึงตาผู้กล้าแล้ว โยกคันโยกเพื่อเริ่มการโจมตี");
        document.getElementById('btn-spin').disabled = false;
    } else {
        announce("ตาของผู้พิทักษ์หอคอย กำลังหมุนกงล้อแห่งโชคชะตา...");
        await wait(2000);
        executeSpin();
    }
}

function updateUI() {
    document.getElementById('p-hp').innerText = `${state.playerHP.toLocaleString()} ${state.playerShield ? '(🛡️ มีเกราะ)' : ''}`;
    document.getElementById('g-hp').innerText = `${state.guardianHP.toLocaleString()} ${state.guardianShield ? '(🛡️ มีเกราะ)' : ''}`;
}

document.getElementById('btn-spin').onclick = () => {
    document.getElementById('btn-spin').disabled = true;
    executeSpin();
};

async function executeSpin() {
    playSound('wheel');
    const deg = 1800 + Math.floor(Math.random() * 360);
    document.getElementById('visual-wheel').style.transform = `rotate(${deg}deg)`;

    let result = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
    await wait(4200); // รอจนกงล้อหยุดหมุน
    handleResult(result);
}

async function handleResult(res) {
    const isPlayer = state.turn === 'player';
    const suffix = isPlayer ? '1' : '';

    if (res.type === 'attack') {
        // ประกาศชื่อท่าตามต้นฉบับ
        announce(`${isPlayer ? 'ผู้กล้า' : 'ผู้พิทักษ์'} ใช้ท่า ${res.name}!`);
        playSound(`${res.id}${suffix}`); 
        await wait(2200); // เว้นระยะให้ชื่อท่าจบก่อนประกาศผลดาเมจ

        if (isPlayer) {
            if (state.guardianShield) {
                state.guardianShield = false;
                announce("ผู้พิทักษ์ใช้เกราะแห่งแสงป้องกันไว้ได้!");
            } else {
                state.guardianHP -= res.dmg;
                announce(`โจมตีสำเร็จ! ผู้พิทักษ์หอคอยเสียพลังชีวิต ${res.dmg} หน่วย`);
            }
        } else {
            if (state.playerShield) {
                state.playerShield = false;
                announce("ผู้กล้าใช้เกราะแห่งแสงป้องกันการโจมตีไว้ได้!");
            } else {
                state.playerHP -= res.dmg;
                announce(`คุณถูกโจมตี! เสียพลังชีวิต ${res.dmg} หน่วย`);
                document.getElementById('game-container').classList.add('shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
            }
        }
    } else if (res.type === 'hp') {
        const val = [100, 300, 500][Math.floor(Math.random()*3)];
        playSound(`hp${isPlayer ? '' : '1'}`);
        if(isPlayer) state.playerHP += val; else state.guardianHP += val;
        announce(`${isPlayer ? 'ผู้กล้า' : 'ผู้พิทักษ์'} ได้รับการฟื้นฟูพลังชีวิต ${val} หน่วย`);
    } else if (res.type === 'shield') {
        playSound(`shield${isPlayer ? '' : '1'}`);
        if(isPlayer) state.playerShield = true; else state.guardianShield = true;
        announce(`${isPlayer ? 'ผู้กล้า' : 'ผู้พิทักษ์'} ร่ายเวทย์สร้างเกราะแห่งแสงปกป้องกาย`);
    }

    await wait(2800); // เว้นระยะก่อนจบ Turn เพื่อความต่อเนื่องของการอ่าน
    checkEndGame();
}

function checkEndGame() {
    if (state.playerHP <= 0 || state.guardianHP <= 0) {
        document.getElementById('scene-battle').classList.remove('active');
        document.getElementById('scene-result').classList.add('active');
        if (state.playerHP > 0) {
            document.getElementById('result-title').innerText = "ชัยชนะเป็นของผู้กล้า!";
            playSound('win');
            announce("ยินดีด้วย! คุณสามารถพิชิตผู้พิทักษ์หอคอยลงได้ ชัยชนะเป็นของคุณ!");
        } else {
            document.getElementById('result-title').innerText = "คุณพ่ายแพ้ในศึกนี้";
            playSound('lost');
            announce("ร่างของคุณล้มลง... การเดินทางสิ้นสุดลงที่นี่ คุณพ่ายแพ้แล้ว");
        }
    } else {
        state.turn = state.turn === 'player' ? 'guardian' : 'player';
        nextTurnCycle();
    }
}

// Load เสียงทั้งหมดเตรียมไว้
[...skills.map(s=>s.id), ...skills.map(s=>s.id+'1'), 'hp', 'hp1', 'shield', 'shield1', 'wheel', 'back', 'win', 'lost'].forEach(loadSound);
</script>
</body>
</html>
