<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuga Battle Mode - ศึกผู้พิทักษ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
            --hp-color: #00e676;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        #game-container {
            background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px);
            border-radius: 30px; padding: 2.5rem; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 2px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 500px; position: relative;
        }
        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .stat-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; flex: 1; margin: 0 5px; font-weight: bold; }
        
        .wheel-wrapper { position: relative; width: 180px; height: 180px; margin: 20px auto; }
        .wheel-graphic {
            width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--gold);
            background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%);
            transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .btn-main {
            background: linear-gradient(135deg, var(--danger), var(--gold));
            border: none; padding: 15px 40px; border-radius: 50px; color: white;
            font-size: 1.3rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        
        /* Animations */
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-10px)} 75% {transform:translateX(10px)} }
        .hp-up { animation: hp-glow 1s; }
        @keyframes hp-glow { 0% { background: var(--success); } 100% { background: rgba(255,255,255,0.1); } }
    </style>
</head>
<body>

<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive"></div>

<div id="game-container">
    <section id="scene-start" class="scene active">
        <h1>โหมด Battle ผู้พิทักษ์</h1>
        <p>เผชิญหน้ากับผู้พิทักษ์หอคอยในศึกตัดสิน!</p>
        <button id="btn-start-game" class="btn-main">เริ่ม Battle</button>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item" id="player-hp-bar">❤️ ผู้กล้า: 1000</div>
            <div class="stat-item" id="guardian-hp-bar">💀 ผู้พิทักษ์: 1000</div>
        </div>
        <div id="turn-indicator" style="font-size: 1.2rem; color: var(--gold);"></div>
        
        <div class="wheel-wrapper">
            <div id="visual-wheel" class="wheel-graphic"></div>
        </div>

        <button id="btn-spin" class="btn-main">กดคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <h2 id="result-title"></h2>
        <button onclick="location.reload()" class="btn-main">เล่นอีกครั้ง</button>
    </section>
</div>

<script>
const audioPath = 'audio/';
const skills = [
    {id: 'earth', name: 'ธาตุดิน', dmg: 150},
    {id: 'fire', name: 'ธาตุไฟ', dmg: 180},
    {id: 'water', name: 'ธาตุน้ำ', dmg: 140},
    {id: 'wind', name: 'ธาตุลม', dmg: 130},
    {id: 'thunder', name: 'ธาตุสายฟ้า', dmg: 200},
    {id: 'winter', name: 'ธาตุน้ำแข็ง', dmg: 160}
];

// สร้างรายการกงล้อ: ท่าโจมตี 6 ท่าละ 2 ช่อง + HP 1 + Shield 1 = 14 ช่อง
let wheelOptions = [];
skills.forEach(s => { wheelOptions.push({...s, type: 'attack'}); wheelOptions.push({...s, type: 'attack'}); });
wheelOptions.push({id: 'hp', name: 'เพิ่มพลังชีวิต', type: 'hp'});
wheelOptions.push({id: 'shield', name: 'เกราะแห่งแสง', type: 'shield'});

let state = {
    playerHP: 1000, guardianHP: 1000,
    playerShield: false, guardianShield: false,
    turn: 'player', isSpinning: false
};

const announcer = document.getElementById('aria-announcer');
const sounds = {};

function playSound(file, loop = false) {
    const a = new Audio(audioPath + file);
    a.loop = loop;
    a.play().catch(() => console.log("Audio play blocked"));
    return a;
}

function announce(msg, delay = 0) {
    setTimeout(() => {
        announcer.innerText = msg;
    }, delay);
}

document.getElementById('btn-start-game').onclick = async () => {
    document.getElementById('scene-start').classList.remove('active');
    document.getElementById('scene-battle').classList.add('active');
    
    const startAudio = playSound('start1.mp3');
    startAudio.onended = () => {
        state.bgm = playSound('back.mp3', true);
        startGame();
    };
};

function startGame() {
    state.turn = Math.random() > 0.5 ? 'player' : 'guardian';
    updateUI();
    if(state.turn === 'guardian') {
        setTimeout(executeTurn, 2000);
    }
}

function updateUI() {
    document.getElementById('player-hp-bar').innerText = `❤️ ผู้กล้า: ${state.playerHP} ${state.playerShield ? '(🛡️)' : ''}`;
    document.getElementById('guardian-hp-bar').innerText = `💀 ผู้พิทักษ์: ${state.guardianHP} ${state.guardianShield ? '(🛡️)' : ''}`;
    document.getElementById('turn-indicator').innerText = state.turn === 'player' ? " ถึงตาของคุณแล้ว" : "ผู้พิทักษ์กำลังเตรียมการ...";
    announce(state.turn === 'player' ? "ถึงตาผู้กล้าแล้ว กดคันโยกเพื่อเสี่ยงโชค" : "ตาของผู้พิทักษ์", 100);
}

document.getElementById('btn-spin').onclick = executeTurn;

async function executeTurn() {
    if(state.isSpinning) return;
    state.isSpinning = true;
    document.getElementById('btn-spin').disabled = true;

    playSound('wheel.mp3');
    const wheel = document.getElementById('visual-wheel');
    const randomDeg = 1800 + Math.floor(Math.random() * 360);
    wheel.style.transform = `rotate(${randomDeg}deg)`;

    // Logic สุ่มกงล้อ
    let result;
    while(true) {
        result = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
        // ตรวจสอบเงื่อนไข Shield (มีได้อันเดียว)
        const hasShield = state.turn === 'player' ? state.playerShield : state.guardianShield;
        if(result.type === 'shield' && hasShield) continue; 
        break;
    }

    setTimeout(() => finalizeTurn(result), 3500);
}

async function finalizeTurn(result) {
    const isPlayer = state.turn === 'player';
    const suffix = isPlayer ? '1' : ''; // ไฟล์เสียงผู้เล่นมี 1, ผู้พิทักษ์ไม่มี
    
    if(result.type === 'attack') {
        announce(`${isPlayer ? 'ผู้กล้า' : 'ผู้พิทักษ์'} ใช้ท่า ${result.name}!`);
        playSound(`${result.id}${suffix}.mp3`);
        
        // คำนวณความเสียหาย
        setTimeout(() => {
            if(isPlayer) {
                if(state.guardianShield) {
                    state.guardianShield = false;
                    announce("ผู้พิทักษ์ใช้เกราะป้องกันการโจมตีได้!");
                } else {
                    state.guardianHP -= result.dmg;
                    announce(`โจมตีเข้า! ผู้พิทักษ์เสีย HP ${result.dmg} หน่วย`);
                }
            } else {
                if(state.playerShield) {
                    state.playerShield = false;
                    announce("ผู้กล้าใช้เกราะแห่งแสงป้องกันไว้ได้!");
                } else {
                    state.playerHP -= result.dmg;
                    announce(`พลาดท่า! คุณเสีย HP ${result.dmg} หน่วย`);
                    document.getElementById('game-container').classList.add('shake');
                    setTimeout(()=>document.getElementById('game-container').classList.remove('shake'), 400);
                }
            }
            checkGameOver();
        }, 1500);

    } else if(result.type === 'hp') {
        const gains = [100, 300, 500];
        const hpGain = gains[Math.floor(Math.random()*gains.length)];
        playSound(`hp${suffix === '1' ? '' : '1'}.mp3`); // hp.mp3(player), hp1.mp3(guard)
        
        if(isPlayer) state.playerHP += hpGain; else state.guardianHP += hpGain;
        announce(`${isPlayer ? 'ผู้กล้า' : 'ผู้พิทักษ์'} ได้รับพลังชีวิตเพิ่ม ${hpGain} หน่วย!`);
        
    } else if(result.type === 'shield') {
        playSound(`shield${suffix === '1' ? '' : '1'}.mp3`); // shield.mp3(player), shield1.mp3(guard)
        if(isPlayer) state.playerShield = true; else state.guardianShield = true;
        announce(`${isPlayer ? 'ผู้กล้า' : 'ผู้พิทักษ์'} เปิดใช้งานเกราะแห่งแสง!`);
    }

    // สลับ Turn
    setTimeout(() => {
        if(state.playerHP > 0 && state.guardianHP > 0) {
            state.turn = isPlayer ? 'guardian' : 'player';
            state.isSpinning = false;
            document.getElementById('btn-spin').disabled = isPlayer; // ถ้าถึงตาคอม ปุ่มจะกดไม่ได้
            updateUI();
            if(state.turn === 'guardian') setTimeout(executeTurn, 2000);
        }
    }, 3000);
}

function checkGameOver() {
    if(state.playerHP <= 0 || state.guardianHP <= 0) {
        if(state.bgm) state.bgm.pause();
        document.getElementById('scene-battle').classList.remove('active');
        document.getElementById('scene-result').classList.add('active');
        
        if(state.playerHP > 0) {
            document.getElementById('result-title').innerText = "ยินดีด้วย! คุณพิชิตผู้พิทักษ์ได้สำเร็จ";
            playSound('win.mp3');
            announce("ยินดีด้วย คุณเป็นฝ่ายชนะ!");
        } else {
            document.getElementById('result-title').innerText = "คุณพ่ายแพ้ให้กับผู้พิทักษ์...";
            playSound('lost.mp3');
            announce("คุณพ่ายแพ้ พยายามใหม่ในครั้งหน้า");
        }
    }
}
</script>
</body>
</html>
