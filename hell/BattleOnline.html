<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALUKA Online - Ultimate Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
            --cls-fire: #ff4b2b; --cls-water: #00d2ff; --cls-earth: #e67e22;
            --cls-wind: #2ecc71; --cls-thunder: #f1c40f; --cls-winter: #ecf0f1;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at center, #1b1b2f 0%, #0f0c29 100%);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            transition: filter 1.5s ease, background-color 0.4s ease;
        }
        
        /* Effects Canvas & Particles */
        #result-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -2; }
        .particle { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.2; animation: floatUp 10s infinite ease-in; }
        @keyframes floatUp { 0% { transform: translateY(105vh) scale(0); opacity: 0; } 50% { opacity: 0.3; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }

        /* Spirit Shadow Aura */
        .spirit-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; pointer-events: none; }
        .spirit { position: absolute; font-size: 10rem; opacity: 0.05; filter: blur(8px); transition: 1s ease; }
        .host-spirit { left: 5%; top: 15%; color: var(--primary); }
        .guest-spirit { right: 5%; top: 15%; color: var(--secondary); }
        .active-turn-spirit { opacity: 0.2; filter: blur(3px); transform: scale(1.2); animation: spiritPulse 2s infinite ease-in-out; }
        @keyframes spiritPulse { 0%, 100% { transform: translateY(0) scale(1.2); } 50% { transform: translateY(-20px) scale(1.3); } }

        /* Layout & UI */
        #hit-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; opacity: 0; transition: opacity 0.1s; }
        #game-container {
            background: rgba(15, 12, 41, 0.75); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 3rem 2.5rem; text-align: center;
            box-shadow: 0 0 80px rgba(0,0,0,0.9); border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%; max-width: 500px; position: relative; z-index: 5;
            transition: transform 0.1s ease;
        }
        .heavy-shake { animation: heavyShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes heavyShake { 10%, 90% { transform: translate3d(-4px, 0, 0); } 20%, 80% { transform: translate3d(8px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-10px, 0, 0); } 40%, 60% { transform: translate3d(10px, 0, 0); } }

        #btn-community {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(241, 196, 15, 0.3);
            color: rgba(255, 255, 255, 0.8); padding: 8px 15px; border-radius: 12px;
            font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 5px; z-index: 10;
        }
        #btn-community.hidden { display: none; }

        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HP Bar Styling */
        .stat-item { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 18px; flex: 1; border: 2px solid rgba(255,255,255,0.1); transition: 0.4s; }
        .stat-item.active-turn { border-color: var(--gold); transform: scale(1.05); box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); }
        .hp-track { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; margin-top: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .hp-fill { height: 100%; width: 100%; background: var(--success); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .hp-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: hpShine 2s infinite; }
        @keyframes hpShine { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        .shield-icon { display: none; font-size: 1.1rem; }
        .has-shield .shield-icon { display: inline; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1.2); } }

        /* Wheel */
        .wheel-container { position: relative; width: 180px; height: 180px; margin: 25px auto; }
        .wheel-arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 20px solid var(--gold); z-index: 2; }
        .wheel-graphic { width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--gold); background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%); transition: transform 2.5s cubic-bezier(0.15, 0, 0.15, 1); }

        .btn-main { background: linear-gradient(135deg, var(--danger), var(--gold)); border: none; padding: 20px 40px; border-radius: 50px; color: white; font-size: 1.4rem; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(255, 75, 43, 0.3); }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.8); }
        
        .lost-anim { animation: lostPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.27); }
        @keyframes lostPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

<canvas id="result-canvas"></canvas>
<div id="hit-flash"></div>
<div class="particles" id="particles"></div>
<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive" aria-atomic="true"></div>

<div id="game-container">
    <button id="btn-community" onclick="location.href='../index.html'">🏠 กลับสู่ชุมชน</button>

    <section id="scene-lobby" class="scene active">
        <h1 style="color:var(--gold); margin:0; font-size: 2.5rem;">VALUKA</h1>
        <p>ออนไลน์ 1 VS 1 - Ultimate Edition</p>
        <button id="btn-create-room" class="btn-main">สร้างห้อง</button>
        <div id="room-list" style="margin-top:15px; display: flex; flex-direction: column; gap: 10px;"></div>
    </section>

    <section id="scene-waiting" class="scene">
        <h2 style="color:var(--gold);">เตรียมการประลอง</h2>
        <div style="font-size: 3rem; animation: rotate 2s linear infinite;">🌀</div>
        <p>รอคู่ต่อสู้เข้าห้อง...</p>
    </section>

    <section id="scene-battle" class="scene">
        <div class="spirit-container">
            <div class="spirit host-spirit" id="spirit-host">👤</div>
            <div class="spirit guest-spirit" id="spirit-guest">👤</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 20px;">
            <div class="stat-item" id="host-box">
                <span style="font-size:0.7rem; opacity:0.6;">HOST</span>
                <div style="font-size:1.2rem; font-weight:600;"><span id="hp-host">1000</span> <span class="shield-icon">🛡️</span></div>
                <div class="hp-track"><div id="bar-host" class="hp-fill"></div></div>
            </div>
            <div class="stat-item" id="guest-box">
                <span style="font-size:0.7rem; opacity:0.6;">GUEST</span>
                <div style="font-size:1.2rem; font-weight:600;"><span id="hp-guest">1000</span> <span class="shield-icon">🛡️</span></div>
                <div class="hp-track"><div id="bar-guest" class="hp-fill"></div></div>
            </div>
        </div>
        <div class="wheel-container">
            <div class="wheel-arrow"></div>
            <div id="visual-wheel" class="wheel-graphic"></div>
        </div>
        <button id="btn-spin" class="btn-main" disabled>โยกคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <span id="result-emoji" style="font-size: 5rem;">🏆</span>
        <h2 id="result-title" style="margin: 10px 0;"></h2>
        <p id="result-desc" style="color:#ccc; font-size: 1.1rem;"></p>
    </section>
</div>

<script>
// --- Config ---
const firebaseConfig = {
    apiKey: "AIzaSyDvcdgsyT5sDdYTYKIqetzNL9Be-MFC0l4",
    authDomain: "xo-game-134ec.firebaseapp.com",
    databaseURL: "https://xo-game-134ec-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "xo-game-134ec",
    storageBucket: "xo-game-134ec.firebasestorage.app",
    messagingSenderId: "318375224157",
    appId: "1:318375224157:web:3e49732b1c382009b77eb4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const GAME_ID = "valuka";

// --- Visual FX (Fireworks & Particles) ---
const canvas = document.getElementById('result-canvas');
const ctx = canvas.getContext('2d');
let fireworks = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

class ParticleFX {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vel = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.life = 100; this.opacity = 1;
    }
    draw() { ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`; ctx.fill(); }
    update() { this.x += this.vel.x; this.y += this.vel.vel; this.life -= 1.5; this.opacity = this.life / 100; }
}

function launchFireworks() {
    const colors = ['255,215,0', '255,75,43', '0,210,255', '46,204,113'];
    const interval = setInterval(() => {
        for(let i=0; i<30; i++) fireworks.push(new ParticleFX(canvas.width/2, canvas.height/2, colors[Math.floor(Math.random()*colors.length)]));
        renderFX();
    }, 600);
    setTimeout(() => clearInterval(interval), 4000);
}

function renderFX() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    fireworks = fireworks.filter(p => p.life > 0);
    fireworks.forEach(p => { p.update(); p.draw(); });
    if (fireworks.length > 0) requestAnimationFrame(renderFX);
}

// Background Particles
const pContainer = document.getElementById('particles');
for(let i=0; i<20; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
    p.style.animationDelay = (Math.random() * 10) + 's';
    pContainer.appendChild(p);
}

// --- Audio & Game Logic ---
let myRole = null, currentRoomId = null, bgmSource = null, waitMusicSource = null;
let localSpinLocked = false;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioCache = {};

async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const res = await fetch(`audio/${name}.mp3`);
        const buf = await audioCtx.decodeAudioData(await res.arrayBuffer());
        return audioCache[name] = buf;
    } catch (e) { return null; }
}

function playSound(name, loop = false) {
    const buf = audioCache[name]; if (!buf) return null;
    const s = audioCtx.createBufferSource();
    s.buffer = buf; s.loop = loop; s.connect(audioCtx.destination);
    s.start(0); return s;
}

const playWait = (name) => new Promise(res => {
    const s = playSound(name); if(!s) return res();
    s.onended = res;
});

function announce(msg) {
    const el = document.getElementById('aria-announcer');
    if (!el || el.getAttribute('aria-live') === 'off') return;
    el.innerText = ""; setTimeout(() => { el.innerText = msg; }, 100);
}

const skills = [
    {id: 'earth', name: 'ปฐพีกลืนกิน', dmg: 200, color: 'var(--cls-earth)'},
    {id: 'fire', name: 'อัคนีพิโรธ', dmg: 400, color: 'var(--cls-fire)'},
    {id: 'water', name: 'มหาสมุทรคลั่ง', dmg: 300, color: 'var(--cls-water)'},
    {id: 'wind', name: 'วายุลมกลด', dmg: 100, color: 'var(--cls-wind)'},
    {id: 'thunder', name: 'ทัณฑ์สวรรค์สายฟ้า', dmg: 500, color: 'var(--cls-thunder)'},
    {id: 'winter', name: 'ดินแดนเยือกแข็ง', dmg: 300, color: 'var(--cls-winter)'}
];

const wheelOptions = [...skills.map(s => ({...s, type: 'attack'})), 
    {id: 'hp', name: 'ได้รับน้ำยาเพิ่มพลัง', type: 'hp'},
    {id: 'shield', name: 'ได้รับเกราะแห่งแสง', type: 'shield'}
];

// --- Networking ---
db.ref(`${GAME_ID}/rooms`).on('value', snap => {
    const list = document.getElementById('room-list'); list.innerHTML = "";
    snap.forEach(child => {
        const room = child.val();
        if (room.status === 'waiting') {
            const b = document.createElement('button');
            b.innerText = `เข้าสู่สนามประลอง ${child.key}`;
            b.className = "btn-main"; b.style.fontSize = "1rem";
            b.onclick = () => joinRoom(child.key);
            list.appendChild(b);
        }
    });
});

async function createRoom() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const snap = await db.ref(`${GAME_ID}/room_counter`).transaction(curr => (curr || 0) + 1);
    currentRoomId = `ROOM${snap.snapshot.val().toString().padStart(4, '0')}`;
    myRole = 'host';
    await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).set({
        status: 'waiting', hostHP: 1000, guestHP: 1000, hostShield: false, guestShield: false,
        turn: '', lastActivity: Date.now(), spinCount: 0
    });
    showScene('scene-waiting');
    waitMusicSource = playSound('wait', true);
    listenToRoom();
}

async function joinRoom(roomId) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    currentRoomId = roomId; myRole = 'guest';
    const turnStart = Math.random() < 0.5 ? 'host' : 'guest';
    await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update({ status: 'playing', turn: turnStart });
    listenToRoom();
}

function listenToRoom() {
    db.ref(`${GAME_ID}/rooms/${currentRoomId}`).on('value', async snapshot => {
        const room = snapshot.val(); if (!room) return;
        if (room.status === 'playing' && !window.started) {
            window.started = true;
            if (waitMusicSource) { waitMusicSource.stop(); waitMusicSource = null; }
            showScene('scene-battle');
            await playWait('start3');
            const bgm = audioCtx.createBufferSource();
            bgm.buffer = await loadSound('back1'); bgm.loop = true; bgm.connect(audioCtx.destination);
            bgm.start(0); bgmSource = bgm;
            updateUI(room);
        }
        if (room.lastAction && room.lastAction.id !== window.processedId) {
            window.processedId = room.lastAction.id; handleAction(room.lastAction, room);
        } else if (room.status === 'playing') { updateUI(room); }
        if (room.status === 'finished') { db.ref(`${GAME_ID}/rooms/${currentRoomId}`).off(); endGame(room); }
    });
}

function updateUI(room) {
    // Update HP & Spirit
    ['host', 'guest'].forEach(role => {
        const hp = room[`${role}HP`];
        const perc = hp / 10;
        const bar = document.getElementById(`bar-${role}`);
        document.getElementById(`hp-${role}`).innerText = hp.toLocaleString();
        bar.style.width = perc + '%';
        bar.style.backgroundColor = perc > 50 ? 'var(--success)' : (perc > 25 ? 'var(--gold)' : 'var(--danger)');
        
        const box = document.getElementById(`${role}-box`);
        const spirit = document.getElementById(`spirit-${role}`);
        const isTurn = room.turn === role;
        box.classList.toggle('active-turn', isTurn);
        spirit.classList.toggle('active-turn-spirit', isTurn);
        
        room[`${role}Shield`] ? box.classList.add('has-shield') : box.classList.remove('has-shield');
    });

    const spinBtn = document.getElementById('btn-spin');
    const isMyTurn = (room.turn === myRole);
    const canSpin = isMyTurn && !window.animating && !localSpinLocked && ((room.spinCount === 0) || (room.spinCount === 1 && room.isBonus === true));
    
    if (!window.animating && isMyTurn) localSpinLocked = false;
    spinBtn.disabled = !canSpin;
    
    // Condition 1 & 2: Announce short turn & Auto Focus
    if (!room.isBonus && !localSpinLocked && isMyTurn && !window.animating) {
        announce(`ถึงตา ${myRole === 'host' ? 'Host' : 'Guest'}`);
    }
    if (canSpin) spinBtn.focus();
}

document.getElementById('btn-spin').onclick = async () => {
    localSpinLocked = true; document.getElementById('btn-spin').disabled = true;
    window.animating = true;
    const snap = await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).get();
    const room = snap.val();
    let res;
    while(true) {
        res = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
        if (room.isBonus === true && res.type !== 'attack') continue;
        if (res.id === room.lastId) continue;
        break;
    }
    const deg = 1440 + Math.floor(Math.random() * 360);
    db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update({
        lastAction: { id: Date.now(), actor: myRole, result: res, deg: deg },
        spinCount: (room.spinCount || 0) + 1, lastActivity: Date.now()
    });
};

async function handleAction(action, room) {
    window.animating = true;
    const { actor, result, deg } = action;
    document.getElementById('visual-wheel').style.transform = `rotate(${deg}deg)`;
    await playWait('wheel'); await new Promise(r => setTimeout(r, 800));

    let up = { lastId: result.id, isBonus: false, lastActivity: Date.now() };
    const elementColor = result.color ? getComputedStyle(document.documentElement).getPropertyValue(result.color.replace('var(','').replace(')','')).trim() : '';
    if(elementColor) document.body.style.backgroundColor = elementColor + '33';

    if (result.type === 'attack') {
        await playWait(actor === 'host' ? `${result.id}1` : result.id);
        const target = actor === 'host' ? 'guest' : 'host';
        if (!room[target + 'Shield']) {
            up[target + 'HP'] = Math.max(0, room[target + 'HP'] - result.dmg);
            triggerFlash(result.color);
            if(result.dmg >= 400) {
                document.getElementById('game-container').classList.add('heavy-shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('heavy-shake'), 400);
            }
        } else { up[target + 'Shield'] = false; }
        up.turn = actor === 'host' ? 'guest' : 'host'; up.spinCount = 0;
    } else {
        await playWait(result.id === 'hp' ? (actor === myRole ? 'hp' : 'hp2') : (actor === myRole ? 'shield' : 'shield2'));
        if (result.type === 'hp') {
            const val = [100, 300, 500][Math.floor(Math.random()*3)];
            up[actor + 'HP'] = Math.min(1000, room[actor + 'HP'] + val);
        } else { up[actor + 'Shield'] = true; }
        up.isBonus = true; up.turn = actor; up.spinCount = 1;
    }

    setTimeout(() => { document.body.style.backgroundColor = ''; }, 500);
    await new Promise(r => setTimeout(r, 1500));
    if (myRole === 'host') {
        if ((up.hostHP ?? room.hostHP) <= 0 || (up.guestHP ?? room.guestHP) <= 0) up.status = 'finished';
        db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update(up);
    }
    window.animating = false; localSpinLocked = false;
}

function showScene(id) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function triggerFlash(c) {
    const f = document.getElementById('hit-flash');
    f.style.backgroundColor = c; f.style.opacity = '0.4';
    setTimeout(() => f.style.opacity = '0', 150);
}

function endGame(room) {
    if (bgmSource) bgmSource.stop();
    const win = (myRole === 'host' && room.guestHP <= 0) || (myRole === 'guest' && room.hostHP <= 0);
    
    if (!win) document.body.style.filter = 'grayscale(0.7)';
    
    showScene('scene-result');
    document.getElementById('btn-community').classList.remove('hidden');
    
    const emoji = document.getElementById('result-emoji');
    emoji.innerText = win ? "🏆" : "💀";
    emoji.className = win ? "" : "lost-anim";
    
    document.getElementById('result-title').innerText = win ? "ชัยชนะอันรุ่งโรจน์!" : "พ่ายแพ้อย่างสมศักดิ์ศรี";
    document.getElementById('result-desc').innerText = win ? "ฝีมือของคุณยอดเยี่ยมไร้เทียมทาน!" : "ความพ่ายแพ้คือบทเรียนของผู้กล้า...";
    
    if(win) { launchFireworks(); playSound('winner1'); } else { playSound('lost1'); }
    
    if (myRole === 'host') setTimeout(() => db.ref(`${GAME_ID}/rooms/${currentRoomId}`).remove(), 10000);
}

['earth','earth1','fire','fire1','water','water1','wind','wind1','thunder','thunder1','winter','winter1','hp','hp2','shield','shield2','wheel','back1','winner1','lost1','start3','wait'].forEach(loadSound);
document.getElementById('btn-create-room').onclick = createRoom;
</script>
</body>
</html>
