<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALUKA Online Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
            --cls-fire: #ff4b2b; --cls-water: #00d2ff; --cls-earth: #e67e22;
            --cls-wind: #2ecc71; --cls-thunder: #f1c40f; --cls-winter: #ecf0f1;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at center, #1b1b2f 0%, #0f0c29 100%);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            transition: filter 1s ease;
        }

        /* --- Visual Effects from Original --- */
        #hit-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; opacity: 0; transition: opacity 0.1s; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .particle { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.2; animation: floatUp 10s infinite ease-in; }
        @keyframes floatUp { 0% { transform: translateY(105vh) scale(0); opacity: 0; } 50% { opacity: 0.4; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        #result-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .dmg-popup { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-weight: bold; font-size: 1.5rem; pointer-events: none; animation: flyUp 1s forwards; z-index: 5; }
        @keyframes flyUp { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -40px); } }

        #game-container {
            background: rgba(15, 12, 41, 0.75); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 3rem 2.5rem; text-align: center;
            box-shadow: 0 0 80px rgba(0,0,0,0.9); border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%; max-width: 500px; position: relative; z-index: 5;
        }

        /* --- UI Components --- */
        #btn-community {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(241, 196, 15, 0.3);
            color: rgba(255, 255, 255, 0.8); padding: 8px 15px; border-radius: 12px;
            font-size: 0.85rem; cursor: pointer; z-index: 10;
        }

        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-main {
            background: linear-gradient(135deg, var(--danger), var(--gold));
            border: none; padding: 18px 40px; border-radius: 50px; color: white;
            font-size: 1.3rem; font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(255, 75, 43, 0.3);
        }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }

        .room-list { margin-top: 15px; max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .room-item {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }

        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
        .stat-item { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 18px; flex: 1; border: 2px solid rgba(255,255,255,0.1); position: relative; transition: 0.4s; }
        .stat-item.active-turn { border-color: var(--gold); transform: scale(1.05); box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }
        .hp-track { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: var(--success); transition: width 0.5s ease; }
        
        .wheel-container { position: relative; width: 180px; height: 180px; margin: 20px auto; }
        .wheel-arrow { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 18px solid var(--gold); z-index: 2; }
        .wheel-graphic {
            width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--gold);
            background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%);
            transition: transform 2.5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-10px)} 75% {transform:translateX(10px)} }
    </style>
</head>
<body>

<canvas id="result-canvas"></canvas>
<div id="hit-flash"></div>
<div class="particles" id="particles"></div>
<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive" aria-atomic="true"></div>

<div id="game-container">
    <button id="btn-community" onclick="location.reload()" aria-label="กลับสู่หน้าแรก">🏠 หน้าแรก</button>

    <section id="scene-lobby" class="scene active">
        <h1 style="color:var(--gold); margin:0; font-size: 2.5rem;">VALUKA</h1>
        <p>ประลองยุทธ์ออนไลน์ 1 ต่อ 1</p>
        <button id="btn-create-room" class="btn-main">สร้างห้อง</button>
        <div class="room-list" id="room-list" aria-label="รายการห้องที่เข้าร่วมได้">
            </div>
    </section>

    <section id="scene-waiting" class="scene">
        <h2 id="wait-title" style="color:var(--gold);">เตรียมพร้อมการประลอง</h2>
        <div style="font-size: 3rem; animation: rotate 2s linear infinite;">🌀</div>
        <p id="wait-status" tabindex="0">รอคู่ต่อสู้กดเข้าร่วมห้อง ถ้าคู่ต่อสู้พร้อม การประลองจะเริ่มโดยทันที</p>
        <button onclick="leaveRoom()" class="btn-main" style="background:var(--danger); font-size: 1rem; padding: 10px 20px;">ยกเลิกการสร้างห้อง</button>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item" id="box-host" tabindex="0">
                <span class="hp-label">HOST (ผู้สร้าง)</span>
                <div style="font-size: 1.2rem; font-weight:bold;">
                    <span id="hp-host">1000</span> <span id="shield-host"></span>
                </div>
                <div class="hp-track"><div id="bar-host" class="hp-fill"></div></div>
            </div>
            <div class="stat-item" id="box-guest" tabindex="0">
                <span class="hp-label">GUEST (ผู้เข้าร่วม)</span>
                <div style="font-size: 1.2rem; font-weight:bold;">
                    <span id="hp-guest">1000</span> <span id="shield-guest"></span>
                </div>
                <div class="hp-track"><div id="bar-guest" class="hp-fill"></div></div>
            </div>
        </div>
        <div class="wheel-container">
            <div class="wheel-arrow"></div>
            <div id="visual-wheel" class="wheel-graphic"></div>
        </div>
        <button id="btn-spin" class="btn-main" disabled>โยกคันโยก</button>
        <p id="battle-log" aria-hidden="true" style="font-size: 0.9rem; min-height: 1.5em; margin-top: 10px; color: var(--gold);"></p>
    </section>

    <section id="scene-result" class="scene">
        <div id="result-visual-wrapper">
            <span id="result-icon" style="font-size: 5rem; display:block; margin-bottom: 10px;">🏆</span>
            <h2 id="result-title" style="font-size: 2rem; margin: 0;"></h2>
            <p id="result-desc"></p>
            <button onclick="location.reload()" class="btn-main">กลับสู่หน้าแรก</button>
        </div>
    </section>
</div>

<script>
// --- Firebase Config (User's Config) ---
const firebaseConfig = {
    apiKey: "AIzaSyDvcdgsyT5sDdYTYKIqetzNL9Be-MFC0l4",
    authDomain: "xo-game-134ec.firebaseapp.com",
    databaseURL: "https://xo-game-134ec-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "xo-game-134ec",
    storageBucket: "xo-game-134ec.firebasestorage.app",
    messagingSenderId: "318375224157",
    appId: "1:318375224157:web:3e49732b1c382009b77eb4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const GAME_ID = "valuka";

// --- State & Constants ---
let myRole = null; 
let currentRoomId = null;
let bgmSource = null;
let lastUpdateLocal = 0;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioCache = {};

const skills = [
    {id: 'earth', name: 'ปฐพีกลืนกิน', dmg: 200, color: 'var(--cls-earth)'},
    {id: 'fire', name: 'อัคนีพิโรธ', dmg: 400, color: 'var(--cls-fire)'},
    {id: 'water', name: 'มหาสมุทรคลั่ง', dmg: 300, color: 'var(--cls-water)'},
    {id: 'wind', name: 'วายุลมกลด', dmg: 100, color: 'var(--cls-wind)'},
    {id: 'thunder', name: 'ทัณฑ์สวรรค์สายฟ้า', dmg: 500, color: 'var(--cls-thunder)'},
    {id: 'winter', name: 'ดินแดนเยือกแข็ง', dmg: 300, color: 'var(--cls-winter)'}
];

const wheelOptions = [...skills.map(s => ({...s, type: 'attack'})), 
    {id: 'hp', name: 'ได้รับน้ำยาเพิ่มพลัง', type: 'hp'},
    {id: 'shield', name: 'ได้รับเกราะแห่งแสง', type: 'shield'}
];

// --- Audio Engine (Original Timing Logic) ---
async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const res = await fetch(`audio/${name}.mp3`);
        const buf = await audioCtx.decodeAudioData(await res.arrayBuffer());
        return audioCache[name] = buf;
    } catch (e) { return null; }
}

function playSound(name) {
    const buf = audioCache[name];
    if (!buf) return null;
    const s = audioCtx.createBufferSource();
    s.buffer = buf; s.connect(audioCtx.destination);
    s.start(0); return s;
}

const playWait = (name) => new Promise(res => {
    const s = playSound(name);
    if(!s) return res();
    s.onended = res;
});

const wait = ms => new Promise(res => setTimeout(res, ms));

async function startBGM() {
    if (bgmSource) return;
    const buf = await loadSound('back1');
    if (buf) {
        bgmSource = audioCtx.createBufferSource();
        bgmSource.buffer = buf; bgmSource.loop = true;
        bgmSource.connect(audioCtx.destination);
        bgmSource.start(0);
    }
}

// --- ARIA & Focus Management ---
function announce(msg) {
    const el = document.getElementById('aria-announcer');
    el.innerText = "";
    setTimeout(() => { 
        el.innerText = msg;
        document.getElementById('battle-log').innerText = msg;
    }, 100);
}

// --- Visual FX ---
function triggerFlash(color) {
    const f = document.getElementById('hit-flash');
    f.style.backgroundColor = color; f.style.opacity = '0.4';
    setTimeout(() => f.style.opacity = '0', 150);
}

function spawnPop(boxId, val, isHeal=false) {
    const box = document.getElementById(boxId);
    const pop = document.createElement('div');
    pop.className = 'dmg-popup';
    pop.innerText = isHeal ? `+${val}` : `-${val}`;
    pop.style.color = isHeal ? 'var(--success)' : 'var(--danger)';
    box.appendChild(pop);
    setTimeout(() => pop.remove(), 1000);
}

// --- Lobby Logic ---
db.ref(`${GAME_ID}/rooms`).on('value', snapshot => {
    const list = document.getElementById('room-list');
    list.innerHTML = "";
    snapshot.forEach(child => {
        const room = child.val();
        if (room.status === 'waiting') {
            const btn = document.createElement('div');
            btn.className = 'room-item';
            btn.innerHTML = `<span>${child.key}</span><button class="btn-main" style="padding:5px 15px; font-size:0.9rem">เข้าร่วม</button>`;
            btn.onclick = () => joinRoom(child.key);
            list.appendChild(btn);
        }
    });
});

async function createRoom() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const snap = await db.ref(`${GAME_ID}/room_counter`).transaction(curr => (curr || 0) % 99999 + 1);
    const num = String(snap.snapshot.val()).padStart(5, '0');
    currentRoomId = `Battle${num}`;
    myRole = 'host';
    
    await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).set({
        status: 'waiting',
        hostHP: 1000, guestHP: 1000,
        hostShield: false, guestShield: false,
        turn: '', lastUpdate: Date.now()
    });

    showScene('scene-waiting');
    document.getElementById('wait-status').focus();
    startBGM();
    announce("รอคู่ต่อสู้กดเข้าร่วมห้อง ถ้าคู่ต่อสู้พร้อม การประลองจะเริ่มโดยทันที");
    listenToRoom();
}

async function joinRoom(roomId) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    currentRoomId = roomId;
    myRole = 'guest';
    
    const turnStart = Math.random() < 0.5 ? 'host' : 'guest';
    await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update({
        status: 'playing',
        turn: turnStart,
        lastUpdate: Date.now()
    });
    
    showScene('scene-battle');
    startBGM();
    listenToRoom();
}

function listenToRoom() {
    const roomRef = db.ref(`${GAME_ID}/rooms/${currentRoomId}`);
    roomRef.on('value', async snapshot => {
        const room = snapshot.val();
        if (!room) return;

        // Auto cleanup
        if (Date.now() - room.lastUpdate > 300000) { leaveRoom(); return; }

        if (room.status === 'playing' && document.getElementById('scene-battle').style.display !== 'flex') {
            showScene('scene-battle');
            announce("การประลองเริ่มขึ้นแล้ว!");
            updateBattleUI(room);
        }

        if (room.lastAction && room.lastAction.id !== window.lastId) {
            window.lastId = room.lastAction.id;
            handleBattleAction(room.lastAction, room);
        } else if (room.status === 'playing') {
            updateBattleUI(room);
        }

        if (room.status === 'finished') { handleEndGame(room); }
    });
}

function updateBattleUI(room) {
    document.getElementById('hp-host').innerText = room.hostHP;
    document.getElementById('hp-guest').innerText = room.guestHP;
    document.getElementById('bar-host').style.width = (room.hostHP / 10) + '%';
    document.getElementById('bar-guest').style.width = (room.guestHP / 10) + '%';
    document.getElementById('shield-host').innerText = room.hostShield ? "🛡️" : "";
    document.getElementById('shield-guest').innerText = room.guestShield ? "🛡️" : "";

    const isMyTurn = room.turn === myRole;
    document.getElementById('btn-spin').disabled = !isMyTurn;
    
    document.getElementById('box-host').className = `stat-item ${room.turn === 'host' ? 'active-turn' : ''}`;
    document.getElementById('box-guest').className = `stat-item ${room.turn === 'guest' ? 'active-turn' : ''}`;
    
    if (isMyTurn && !window.isAnimating) {
        announce("ตาของคุณแล้ว โยกคันโยกเพื่อเริ่มการโจมตี");
        document.getElementById('btn-spin').focus();
    }
}

// --- Battle Execution (Timing & Audio Focus) ---
document.getElementById('btn-spin').onclick = async () => {
    document.getElementById('btn-spin').disabled = true;
    const res = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
    const deg = 1440 + Math.floor(Math.random() * 360);
    
    await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update({
        lastAction: { id: Date.now(), actor: myRole, result: res, deg: deg },
        lastUpdate: Date.now()
    });
};

async function handleBattleAction(action, room) {
    window.isAnimating = true;
    const { actor, result, deg } = action;
    const isMe = actor === myRole;
    
    // 1. Wheel Spinning
    document.getElementById('visual-wheel').style.transform = `rotate(${deg}deg)`;
    announce(`${actor === 'host' ? 'Host' : 'Guest'} กำลังโยกคันโยก...`);
    await playWait('wheel'); 
    await wait(500);

    // 2. Handle Logic & Audio Sequence
    let updates = { lastUpdate: Date.now() };
    let logMsg = "";

    if (result.type === 'attack') {
        // Play attack sound based on role (Host 1 / Guest Normal)
        const soundName = actor === 'host' ? `${result.id}1` : result.id;
        await playWait(soundName);

        const target = actor === 'host' ? 'guest' : 'host';
        const hasShield = room[target + 'Shield'];

        if (hasShield) {
            updates[target + 'Shield'] = false;
            logMsg = `${result.name}! แต่ถูกเกราะป้องกันไว้ได้`;
        } else {
            const newHP = Math.max(0, room[target + 'HP'] - result.dmg);
            updates[target + 'HP'] = newHP;
            logMsg = `${result.name}! สร้างความเสียหาย ${result.dmg} หน่วย`;
            triggerFlash(result.color);
            spawnPop(`box-${target}`, result.dmg);
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 200);
        }
        updates.turn = actor === 'host' ? 'guest' : 'host';
    } 
    else if (result.type === 'hp') {
        // Specific Audio Rule
        if (isMe) await playWait('hp'); else await playWait('hp2');
        
        const val = [100, 300, 500][Math.floor(Math.random()*3)];
        updates[actor + 'HP'] = Math.min(1000, room[actor + 'HP'] + val);
        logMsg = `${actor === 'host' ? 'Host' : 'Guest'} ได้รับพลังชีวิตเพิ่ม ${val} และได้สิทธิ์หมุนต่อ!`;
        spawnPop(`box-${actor}`, val, true);
        updates.turn = actor; 
    } 
    else if (result.type === 'shield') {
        // Specific Audio Rule
        if (isMe) await playWait('shield'); else await playWait('shield2');
        
        updates[actor + 'Shield'] = true;
        logMsg = `${actor === 'host' ? 'Host' : 'Guest'} กางเกราะแห่งแสง! และได้สิทธิ์หมุนต่อ!`;
        updates.turn = actor;
    }

    announce(logMsg);
    await wait(1500);

    if (myRole === 'host') {
        if (updates.hostHP === 0 || updates.guestHP === 0) updates.status = 'finished';
        db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update(updates);
    }
    window.isAnimating = false;
}

function handleEndGame(room) {
    if (bgmSource) { bgmSource.stop(); bgmSource = null; }
    showScene('scene-result');
    const iWon = (myRole === 'host' && room.guestHP === 0) || (myRole === 'guest' && room.hostHP === 0);
    
    const title = document.getElementById('result-title');
    const desc = document.getElementById('result-desc');
    const icon = document.getElementById('result-icon');

    if (iWon) {
        title.innerText = "คุณชนะการประลอง!";
        desc.innerText = "ความกล้าหาญของคุณนำมาซึ่งชัยชนะอันยิ่งใหญ่";
        icon.innerText = "🏆";
        playSound('winner1');
        launchFireworks();
    } else {
        title.innerText = "คุณพ่ายแพ้...";
        desc.innerText = "อย่าท้อถอย ฝึกฝนตนเองแล้วกลับมาประลองใหม่";
        icon.innerText = "💀";
        playSound('lost1');
    }
    announce(title.innerText + " " + desc.innerText);
}

function leaveRoom() {
    if (currentRoomId && myRole === 'host') db.ref(`${GAME_ID}/rooms/${currentRoomId}`).remove();
    location.reload();
}

function showScene(id) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// --- Particles & Fireworks from Original ---
function launchFireworks() {
    const canvas = document.getElementById('result-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let parts = [];
    class P {
        constructor() {
            this.x = canvas.width/2; this.y = canvas.height/2;
            this.vx = (Math.random()-0.5)*10; this.vy = (Math.random()-0.5)*10;
            this.life = 100;
        }
        update() { this.x+=this.vx; this.y+=this.vy; this.life-=2; }
    }
    const loop = () => {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(parts.length<100) parts.push(new P());
        parts.forEach(p => { p.update(); ctx.fillStyle=`hsla(${Math.random()*360},100%,50%,${p.life/100})`; ctx.fillRect(p.x,p.y,4,4); });
        parts = parts.filter(p => p.life>0);
        if(document.getElementById('scene-result').classList.contains('active')) requestAnimationFrame(loop);
    };
    loop();
}

// Initial Assets Load
['earth','earth1','fire','fire1','water','water1','wind','wind1','thunder','thunder1','winter','winter1','hp','hp2','shield','shield2','wheel','back1','winner1','lost1'].forEach(loadSound);

document.getElementById('btn-create-room').onclick = createRoom;
window.onbeforeunload = leaveRoom;
</script>
</body>
</html>
