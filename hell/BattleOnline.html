<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuka Battle Online - ห้องแห่งกาลเวลา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        /* สไตล์หลักอิงจากไฟล์เดิม */
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
            --cls-fire: #ff4b2b; --cls-water: #00d2ff; --cls-earth: #e67e22;
            --cls-wind: #2ecc71; --cls-thunder: #f1c40f; --cls-winter: #ecf0f1;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at center, #1b1b2f 0%, #0f0c29 100%);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        #game-container {
            background: rgba(15, 12, 41, 0.75); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 2rem; text-align: center;
            box-shadow: 0 0 80px rgba(0,0,0,0.9); border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%; max-width: 500px; position: relative; z-index: 5;
        }
        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* สไตล์ปุ่มและ UI */
        .btn-main {
            background: linear-gradient(135deg, var(--danger), var(--gold));
            border: none; padding: 15px 30px; border-radius: 50px; color: white;
            font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .room-list { margin-top: 20px; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 10px; }
        .room-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .btn-join { background: var(--success); border: none; color: white; padding: 5px 15px; border-radius: 10px; cursor: pointer; }

        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
        .stat-item { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 18px; flex: 1; border: 2px solid transparent; }
        .stat-item.active-turn { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        
        .hp-track { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: var(--success); transition: width 0.5s ease; }
        
        .wheel-container { position: relative; width: 180px; height: 180px; margin: 0 auto; }
        .wheel-graphic { width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--gold); transition: transform 2.5s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%); }
        .wheel-arrow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); border-top: 15px solid var(--gold); border-left: 10px solid transparent; border-right: 10px solid transparent; z-index: 10; }
        
        .dmg-popup { position: absolute; font-weight: bold; animation: flyUp 1s forwards; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }
        
        #hit-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; opacity: 0; transition: opacity 0.1s; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

<div id="hit-flash"></div>
<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive"></div>

<div id="game-container">
    <section id="scene-lobby" class="scene active">
        <h1 class="game-title" style="color:var(--gold)">Valuka Battle Online</h1>
        <p>โหมดประลองออนไลน์ 1 ต่อ 1</p>
        <button id="btn-create-room" class="btn-main">สร้างห้อง</button>
        <div id="room-list-container">
            <p style="font-size: 0.9rem; margin-top: 20px;">ห้องที่รอผู้เล่น:</p>
            <div class="room-list" id="room-list">
                </div>
        </div>
    </section>

    <section id="scene-waiting" class="scene">
        <h2 id="wait-room-id">BattleXXXXX</h2>
        <p>รอคู่ต่อสู้กดเข้าร่วมห้อง...</p>
        <p style="font-size: 0.8rem; opacity: 0.7;">ถ้าคู่ต่อสู้พร้อม การประลองจะเริ่มโดยทันที</p>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item" id="p1-box">
                <span id="p1-name">Host</span>
                <div style="font-size: 1.2rem; font-weight: bold;" id="p1-hp-txt">1000</div>
                <div class="hp-track"><div id="p1-hp-bar" class="hp-fill"></div></div>
                <span id="p1-shield-icon" style="display:none">🛡️</span>
            </div>
            <div class="stat-item" id="p2-box">
                <span id="p2-name">Guest</span>
                <div style="font-size: 1.2rem; font-weight: bold;" id="p2-hp-txt">1000</div>
                <div class="hp-track"><div id="p2-hp-bar" class="hp-fill"></div></div>
                <span id="p2-shield-icon" style="display:none">🛡️</span>
            </div>
        </div>
        <div class="wheel-container">
            <div class="wheel-arrow"></div>
            <div id="visual-wheel" class="wheel-graphic"></div>
        </div>
        <button id="btn-spin" class="btn-main" disabled>โยกคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <h1 id="result-title"></h1>
        <p id="result-desc"></p>
        <button onclick="location.reload()" class="btn-main">กลับหน้าหลัก</button>
    </section>
</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyDvcdgsyT5sDdYTYKIqetzNL9Be-MFC0l4",
    authDomain: "xo-game-134ec.firebaseapp.com",
    databaseURL: "https://xo-game-134ec-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "xo-game-134ec",
    storageBucket: "xo-game-134ec.firebasestorage.app",
    messagingSenderId: "318375224157",
    appId: "1:318375224157:web:3e49732b1c382009b77eb4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const GAME_ID = "valuka";

// --- STATE ---
let myRole = null; // 'host' or 'guest'
let currentRoomId = null;
let gameState = null;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioCache = {};

// --- UTILS ---
const announce = (msg) => {
    const el = document.getElementById('aria-announcer');
    el.innerText = "";
    setTimeout(() => { el.innerText = msg; }, 100);
};

const wait = ms => new Promise(res => setTimeout(res, ms));

// --- AUDIO LOGIC ---
async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const res = await fetch(`audio/${name}.mp3`);
        const buf = await audioCtx.decodeAudioData(await res.arrayBuffer());
        return audioCache[name] = buf;
    } catch (e) { return null; }
}

function playSound(name) {
    const buf = audioCache[name];
    if (!buf) return;
    const s = audioCtx.createBufferSource();
    s.buffer = buf; s.connect(audioCtx.destination);
    s.start(0); return s;
}

// โหลดเสียงทั้งหมดที่จำเป็น
const soundsToLoad = ['earth','earth1','fire','fire1','water','water1','wind','wind1','thunder','thunder1','winter','winter1','hp','hp2','shield','shield2','wheel','back1','winner1','lost1','start1'];
soundsToLoad.forEach(loadSound);

// --- ROOM SYSTEM ---
function createRoom() {
    db.ref(`${GAME_ID}/lastRoomNum`).transaction(num => (num || 0) % 99999 + 1, (err, committed, snapshot) => {
        const roomNum = snapshot.val().toString().padStart(5, '0');
        const roomId = `Battle${roomNum}`;
        currentRoomId = roomId;
        myRole = 'host';

        db.ref(`${GAME_ID}/rooms/${roomId}`).set({
            id: roomId,
            status: 'waiting',
            p1_hp: 1000, p2_hp: 1000,
            p1_shield: false, p2_shield: false,
            turn: '', 
            lastUpdate: Date.now(),
            hostPresent: true
        });

        document.getElementById('scene-lobby').classList.remove('active');
        document.getElementById('scene-waiting').classList.add('active');
        document.getElementById('wait-room-id').innerText = roomId;
        announce("รอคู่ต่อสู้กดเข้าร่วมห้อง ถ้าคู่ต่อสู้พร้อม การประลองจะเริ่มโดยทันที");
        
        playSound('back1'); // เริ่มเพลง BGM ทันทีสำหรับ Host
        listenToRoom(roomId);
    });
}

function listenToRooms() {
    db.ref(`${GAME_ID}/rooms`).on('value', snapshot => {
        const rooms = snapshot.val();
        const listEl = document.getElementById('room-list');
        listEl.innerHTML = "";
        const now = Date.now();

        for (let id in rooms) {
            // ลบห้องที่เก่าเกิน 5 นาที
            if (now - rooms[id].lastUpdate > 300000) {
                db.ref(`${GAME_ID}/rooms/${id}`).remove();
                continue;
            }

            if (rooms[id].status === 'waiting') {
                const item = document.createElement('div');
                item.className = 'room-item';
                item.innerHTML = `<span>${id}</span> <button class="btn-join" onclick="joinRoom('${id}')">เข้าร่วม</button>`;
                listEl.appendChild(item);
            }
        }
    });
}

function joinRoom(roomId) {
    currentRoomId = roomId;
    myRole = 'guest';
    
    db.ref(`${GAME_ID}/rooms/${roomId}`).update({
        status: 'playing',
        lastUpdate: Date.now(),
        turn: Math.random() < 0.5 ? 'host' : 'guest' // สุ่มฝ่ายเริ่มก่อน
    }).then(() => {
        playSound('back1'); // เริ่มเพลง BGM สำหรับ Guest
        listenToRoom(roomId);
    });
}

// --- GAMEPLAY LOGIC ---
function listenToRoom(roomId) {
    db.ref(`${GAME_ID}/rooms/${roomId}`).on('value', async snapshot => {
        const data = snapshot.val();
        if (!data) return;
        
        // เมื่อเริ่มเล่น
        if (data.status === 'playing' && document.getElementById('scene-battle').style.display !== 'flex') {
            startBattleUI();
        }

        gameState = data;
        updateUI(data);

        // ตรวจสอบการหมุนวงล้อจากอีกฝ่าย
        if (data.lastSpin && data.lastSpin.processed === false) {
            handleSpinResult(data.lastSpin);
        }

        // ตรวจสอบจบเกม
        if (data.p1_hp <= 0 || data.p2_hp <= 0) {
            endGame(data);
        }
    });
}

function startBattleUI() {
    document.getElementById('scene-lobby').classList.remove('active');
    document.getElementById('scene-waiting').classList.remove('active');
    document.getElementById('scene-battle').classList.add('active');
    announce("การประลองเริ่มขึ้นแล้ว!");
}

function updateUI(data) {
    document.getElementById('p1-hp-txt').innerText = data.p1_hp;
    document.getElementById('p2-hp-txt').innerText = data.p2_hp;
    document.getElementById('p1-hp-bar').style.width = (data.p1_hp / 10) + '%';
    document.getElementById('p2-hp-bar').style.width = (data.p2_hp / 10) + '%';
    
    document.getElementById('p1-shield-icon').style.display = data.p1_shield ? 'inline' : 'none';
    document.getElementById('p2-shield-icon').style.display = data.p2_shield ? 'inline' : 'none';

    document.getElementById('p1-box').className = 'stat-item' + (data.turn === 'host' ? ' active-turn' : '');
    document.getElementById('p2-box').className = 'stat-item' + (data.turn === 'guest' ? ' active-turn' : '');

    // เปิดปุ่มหมุนถ้าเป็นตาเรา
    const spinBtn = document.getElementById('btn-spin');
    if (data.turn === myRole && !data.isSpinning) {
        spinBtn.disabled = false;
    } else {
        spinBtn.disabled = true;
    }
}

document.getElementById('btn-spin').onclick = async () => {
    if (gameState.isSpinning) return;
    
    const spinDeg = 1080 + Math.floor(Math.random() * 360);
    const skills = [
        {id:'earth', dmg:200, type:'atk'}, {id:'fire', dmg:400, type:'atk'},
        {id:'water', dmg:300, type:'atk'}, {id:'wind', dmg:100, type:'atk'},
        {id:'thunder', dmg:500, type:'atk'}, {id:'winter', dmg:300, type:'atk'},
        {id:'hp', type:'hp'}, {id:'shield', type:'shield'}
    ];
    const result = skills[Math.floor(Math.random() * skills.length)];
    
    // อัปเดต Firebase ให้ทุกคนเห็นว่ากำลังหมุน
    db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update({
        isSpinning: true,
        lastSpin: { ...result, deg: spinDeg, by: myRole, processed: false },
        lastUpdate: Date.now()
    });
};

async function handleSpinResult(spin) {
    // 1. หมุนวงล้อ
    document.getElementById('visual-wheel').style.transform = `rotate(${spin.deg}deg)`;
    playSound('wheel');
    await wait(2500);

    // 2. คำนวณผลกระทบ (Logic ฝั่งผู้หมุนเป็นคนส่งข้อมูลอัปเดตหลัก)
    if (spin.by === myRole) {
        let updates = { isSpinning: false, 'lastSpin/processed': true };
        let nextTurn = (myRole === 'host') ? 'guest' : 'host';
        
        if (spin.type === 'atk') {
            const target = (myRole === 'host') ? 'p2' : 'p1';
            const hasShield = (myRole === 'host') ? gameState.p2_shield : gameState.p1_shield;
            
            if (hasShield) {
                updates[target + '_shield'] = false;
            } else {
                updates[target + '_hp'] = Math.max(0, gameState[target + '_hp'] - spin.dmg);
            }
        } else if (spin.type === 'hp') {
            const me = (myRole === 'host') ? 'p1' : 'p2';
            updates[me + '_hp'] = Math.min(1000, gameState[me + '_hp'] + 200);
            nextTurn = myRole; // ได้หมุนต่อ
        } else if (spin.type === 'shield') {
            const me = (myRole === 'host') ? 'p1' : 'p2';
            updates[me + '_shield'] = true;
            nextTurn = myRole; // ได้หมุนต่อ
        }
        
        updates.turn = nextTurn;
        db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update(updates);
    }

    // 3. เล่นเสียงและการแจ้งเตือน (แยกตาม Role)
    playEffectSound(spin);
}

function playEffectSound(spin) {
    const isActor = spin.by === myRole;
    const isHostActor = spin.by === 'host';
    
    let soundName = spin.id;
    // ปรับไฟล์เสียงตามเงื่อนไข Guest/Bot
    if (spin.id === 'hp' && !isHostActor) soundName = 'hp2';
    else if (spin.id === 'shield' && !isHostActor) soundName = 'shield2';
    else if (spin.type === 'atk' && !isHostActor) soundName += '1';

    playSound(soundName);
    
    const actorName = isHostActor ? "Host" : "Guest";
    const msg = `${actorName} ใช้ ${spin.id}!`;
    announce(msg);
    
    if (spin.type === 'atk') {
        const flashColor = getComputedStyle(document.documentElement).getPropertyValue(`--cls-${spin.id}`);
        triggerFlash(flashColor);
    }
}

function triggerFlash(color) {
    const f = document.getElementById('hit-flash');
    f.style.backgroundColor = color;
    f.style.opacity = '0.4';
    setTimeout(() => { f.style.opacity = '0'; }, 150);
}

function endGame(data) {
    document.getElementById('scene-battle').classList.remove('active');
    document.getElementById('scene-result').classList.add('active');
    
    const iWon = (myRole === 'host' && data.p1_hp > 0) || (myRole === 'guest' && data.p2_hp > 0);
    
    document.getElementById('result-title').innerText = iWon ? "ชัยชนะเป็นของคุณ!" : "พ่ายแพ้แต่ไม่ถอย...";
    document.getElementById('result-desc').innerText = iWon ? "คุณเก่งมากที่เอาชนะศึกครั้งนี้ได้" : "ลองใหม่อีกครั้ง โชคต้องเข้าข้างคุณแน่";
    
    playSound(iWon ? 'winner1' : 'lost1');
}

// Start listining
listenToRooms();
document.getElementById('btn-create-room').onclick = () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    createRoom();
};
</script>
</body>
</html>
