<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuka Battle Online - ห้องแห่งกาลเวลา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
            --cls-fire: #ff4b2b; --cls-water: #00d2ff; --cls-earth: #e67e22;
            --cls-wind: #2ecc71; --cls-thunder: #f1c40f; --cls-winter: #ecf0f1;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at center, #1b1b2f 0%, #0f0c29 100%);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            transition: filter 1s ease;
        }
        #hit-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; opacity: 0; transition: opacity 0.1s; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .particle { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.2; animation: floatUp 10s infinite ease-in; }
        @keyframes floatUp { 0% { transform: translateY(105vh) scale(0); opacity: 0; } 50% { opacity: 0.4; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        #result-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        #game-container {
            background: rgba(15, 12, 41, 0.75); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 2rem; text-align: center;
            box-shadow: 0 0 80px rgba(0,0,0,0.9); border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%; max-width: 500px; position: relative; z-index: 5;
        }
        .game-title { font-size: 2.5rem; background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .scene { display: none; flex-direction: column; gap: 1rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .room-list { max-height: 200px; overflow-y: auto; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .room-item { background: rgba(255,255,255,0.1); padding: 10px; margin: 5px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .room-item:hover { background: rgba(255,255,255,0.2); }

        .stats-bar { display: flex; justify-content: space-between; gap: 10px; }
        .stat-item { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 15px; flex: 1; border: 2px solid transparent; }
        .stat-item.active-turn { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .hp-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: var(--success); transition: width 0.5s; }
        
        .wheel-container { position: relative; width: 160px; height: 160px; margin: 15px auto; }
        .wheel-arrow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); border-top: 15px solid var(--gold); border-left: 10px solid transparent; border-right: 10px solid transparent; z-index: 2; }
        .wheel-graphic { width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--gold); transition: transform 2.5s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%); }
        
        .btn-main { background: linear-gradient(135deg, var(--danger), var(--gold)); border: none; padding: 15px 30px; border-radius: 50px; color: white; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-main:disabled { opacity: 0.4; filter: grayscale(1); }
        .dmg-popup { position: absolute; font-weight: bold; animation: flyUp 1s forwards; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

<canvas id="result-canvas"></canvas>
<div id="hit-flash"></div>
<div class="particles" id="particles"></div>
<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive"></div>

<div id="game-container">
    <section id="scene-lobby" class="scene active">
        <h1 class="game-title">Valuka Battle</h1>
        <p>ประลองโชคชะตาออนไลน์ 1 ต่อ 1</p>
        <button id="btn-create-room" class="btn-main">สร้างห้อง</button>
        <div class="room-list" id="room-list">
            <p style="font-size: 0.9rem; opacity: 0.6;">กำลังมองหาห้องว่าง...</p>
        </div>
    </section>

    <section id="scene-waiting" class="scene">
        <h2 id="wait-room-id">ห้อง: BattleXXXXX</h2>
        <div class="boss-aura" style="font-size: 5rem;">⌛</div>
        <p>รอคู่ต่อสู้เข้าร่วมการประลอง...</p>
        <button onclick="location.reload()" class="btn-main" style="background: #444;">ยกเลิก</button>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item" id="host-box">
                <span id="label-host" class="hp-label">Host</span>
                <div class="hp-val-container"><span id="host-hp">1,000</span> <span id="host-shield">🛡️</span></div>
                <div class="hp-track"><div id="host-hp-bar" class="hp-fill"></div></div>
            </div>
            <div class="stat-item" id="guest-box">
                <span id="label-guest" class="hp-label">Guest</span>
                <div class="hp-val-container"><span id="guest-hp">1,000</span> <span id="guest-shield">🛡️</span></div>
                <div class="hp-track"><div id="guest-hp-bar" class="hp-fill"></div></div>
            </div>
        </div>
        <div class="wheel-container">
            <div class="wheel-arrow"></div>
            <div id="visual-wheel" class="wheel-graphic"></div>
        </div>
        <button id="btn-spin" class="btn-main" disabled>โยกคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <h2 id="result-title"></h2>
        <p id="result-desc"></p>
        <button onclick="location.reload()" class="btn-main">กลับหน้าหลัก</button>
    </section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push, update, onDisconnect, remove, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDvcdgsyT5sDdYTYKIqetzNL9Be-MFC0l4",
    authDomain: "xo-game-134ec.firebaseapp.com",
    databaseURL: "https://xo-game-134ec-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "xo-game-134ec",
    storageBucket: "xo-game-134ec.firebasestorage.app",
    messagingSenderId: "318375224157",
    appId: "1:318375224157:web:3e49732b1c382009b77eb4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const GAME_ID = "valuka";

// --- Game Logic Constants ---
const skills = [
    {id: 'earth', name: 'ปฐพีกลืนกิน', dmg: 200, color: '#e67e22'},
    {id: 'fire', name: 'อัคนีพิโรธ', dmg: 400, color: '#ff4b2b'},
    {id: 'water', name: 'มหาสมุทรคลั่ง', dmg: 300, color: '#00d2ff'},
    {id: 'wind', name: 'วายุลมกลด', dmg: 100, color: '#2ecc71'},
    {id: 'thunder', name: 'ทัณฑ์สวรรค์สายฟ้า', dmg: 500, color: '#f1c40f'},
    {id: 'winter', name: 'ดินแดนเยือกแข็ง', dmg: 300, color: '#ecf0f1'}
];
const wheelOptions = [...skills.map(s => ({...s, type:'attack'})), 
    {id: 'hp', name: 'ได้รับน้ำยาเพิ่มพลัง', type: 'hp', color: '#00b09b'},
    {id: 'shield', name: 'ได้รับเกราะแห่งแสง', type: 'shield', color: '#f1c40f'}
];

// --- State ---
let myRole = null; // 'host' or 'guest'
let currentRoom = null;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioCache = {};
let bgmSource = null;

// --- Audio Helper ---
async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const res = await fetch(`audio/${name}.mp3`);
        const buf = await audioCtx.decodeAudioData(await res.arrayBuffer());
        audioCache[name] = buf;
        return buf;
    } catch(e) { return null; }
}

function playSound(name) {
    const buf = audioCache[name];
    if (!buf) return null;
    const s = audioCtx.createBufferSource();
    s.buffer = buf; s.connect(audioCtx.destination);
    s.start(0); return s;
}

function playBGM() {
    loadSound('back1').then(buf => {
        if(!buf) return;
        bgmSource = audioCtx.createBufferSource();
        bgmSource.buffer = buf; bgmSource.loop = true;
        bgmSource.connect(audioCtx.destination);
        bgmSource.start(0);
    });
}

function announce(msg) {
    const el = document.getElementById('aria-announcer');
    el.innerText = "";
    setTimeout(() => { el.innerText = msg; }, 100);
}

// --- Room Management ---
const roomListEl = document.getElementById('room-list');
onValue(ref(db, `${GAME_ID}/rooms`), (snapshot) => {
    roomListEl.innerHTML = "";
    const rooms = snapshot.val();
    let hasRoom = false;
    const now = Date.now();

    for (let id in rooms) {
        const room = rooms[id];
        // Cleanup: ถ้าห้องว่างหรือค้างเกิน 5 นาที
        if (!room.host || (now - room.lastActive > 300000)) {
            remove(ref(db, `${GAME_ID}/rooms/${id}`));
            continue;
        }
        if (room.status === 'waiting') {
            hasRoom = true;
            const btn = document.createElement('div');
            btn.className = 'room-item';
            btn.innerHTML = `<span>${id}</span> <small>กดเพื่อเข้าร่วม</small>`;
            btn.onclick = () => joinRoom(id);
            roomListEl.appendChild(btn);
        }
    }
    if (!hasRoom) roomListEl.innerHTML = "<p>ไม่มีห้องว่างในขณะนี้</p>";
});

async function createRoom() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    myRole = 'host';
    const snapshot = await get(ref(db, `${GAME_ID}/counter`));
    let count = (snapshot.val() || 0) + 1;
    if (count > 99999) count = 1;
    set(ref(db, `${GAME_ID}/counter`), count);

    const roomId = "Battle" + String(count).padStart(5, '0');
    currentRoom = roomId;

    const roomData = {
        host: { hp: 1000, shield: false },
        guest: { hp: 1000, shield: false },
        status: 'waiting',
        turn: '',
        lastMove: null,
        lastActive: serverTimestamp()
    };

    await set(ref(db, `${GAME_ID}/rooms/${roomId}`), roomData);
    onDisconnect(ref(db, `${GAME_ID}/rooms/${roomId}`)).remove();

    document.getElementById('scene-lobby').classList.remove('active');
    document.getElementById('scene-waiting').classList.add('active');
    document.getElementById('wait-room-id').innerText = "ห้อง: " + roomId;
    
    playBGM();
    announce("สร้างห้องแล้ว รอคู่ต่อสู้เข้าร่วมการประลอง");
    listenToRoom(roomId);
}

async function joinRoom(roomId) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    myRole = 'guest';
    currentRoom = roomId;

    await update(ref(db, `${GAME_ID}/rooms/${roomId}`), {
        status: 'starting',
        lastActive: serverTimestamp()
    });
    onDisconnect(ref(db, `${GAME_ID}/rooms/${roomId}`)).remove();

    document.getElementById('scene-lobby').classList.remove('active');
    playBGM();
    listenToRoom(roomId);
}

function listenToRoom(roomId) {
    onValue(ref(db, `${GAME_ID}/rooms/${roomId}`), (snapshot) => {
        const room = snapshot.val();
        if (!room) return;

        // เริ่มเกม
        if (room.status === 'starting' && myRole === 'host') {
            const firstTurn = Math.random() < 0.5 ? 'host' : 'guest';
            update(ref(db, `${GAME_ID}/rooms/${roomId}`), {
                status: 'playing',
                turn: firstTurn
            });
        }

        if (room.status === 'playing' || room.status === 'starting') {
            document.getElementById('scene-waiting').classList.remove('active');
            document.getElementById('scene-battle').classList.add('active');
            updateUI(room);
        }

        // ฟังคำสั่งการหมุน (Sync Animation)
        if (room.lastMove && room.lastMove.timestamp !== window.lastMoveTs) {
            window.lastMoveTs = room.lastMove.timestamp;
            animateSpin(room.lastMove.resultIndex, room.lastMove.player);
        }
        
        // ตรวจสอบจบเกม
        if (room.host.hp <= 0 || room.guest.hp <= 0) {
            endGame(room);
        }
    });
}

function updateUI(room) {
    document.getElementById('host-hp').innerText = room.host.hp.toLocaleString();
    document.getElementById('guest-hp').innerText = room.guest.hp.toLocaleString();
    document.getElementById('host-hp-bar').style.width = (room.host.hp / 10) + "%";
    document.getElementById('guest-hp-bar').style.width = (room.guest.hp / 10) + "%";
    
    document.getElementById('host-shield').style.display = room.host.shield ? 'inline' : 'none';
    document.getElementById('guest-shield').style.display = room.guest.shield ? 'inline' : 'none';

    const isMyTurn = room.turn === myRole;
    document.getElementById('btn-spin').disabled = !isMyTurn;
    
    document.getElementById('host-box').className = room.turn === 'host' ? 'stat-item active-turn' : 'stat-item';
    document.getElementById('guest-box').className = room.turn === 'guest' ? 'stat-item active-turn' : 'stat-item';

    if(isMyTurn) announce("ตาของคุณแล้ว โยกคันโยกเลย");
}

// --- Battle Actions ---
document.getElementById('btn-spin').onclick = async () => {
    document.getElementById('btn-spin').disabled = true;
    const resultIndex = Math.floor(Math.random() * wheelOptions.length);
    
    await update(ref(db, `${GAME_ID}/rooms/${currentRoom}`), {
        lastMove: {
            player: myRole,
            resultIndex: resultIndex,
            timestamp: serverTimestamp()
        },
        lastActive: serverTimestamp()
    });
};

async function animateSpin(idx, player) {
    const res = wheelOptions[idx];
    const isMe = player === myRole;
    
    playSound('wheel');
    const deg = 1800 + (idx * 45); 
    document.getElementById('visual-wheel').style.transform = `rotate(${deg}deg)`;

    setTimeout(async () => {
        // จัดการเสียงตาม Role
        // Host ใช้เสียงปกติ (earth, fire...), Guest ใช้เสียง1 (earth1, fire1...)
        // ยกเว้น hp/shield ที่คุณกำหนด
        let sfxName = res.id;
        if (player === 'guest') {
            if (res.id === 'hp') sfxName = 'hp2';
            else if (res.id === 'shield') sfxName = 'shield2';
            else sfxName = res.id + '1';
        } else {
            // Host ใช้ตามปกติ
            sfxName = res.id;
        }
        
        playSound(sfxName);
        applyEffect(res, player);
    }, 2600);
}

async function applyEffect(res, player) {
    if (myRole !== 'host') return; // ให้ Host เป็นคนคำนวณ Logic เพื่อป้องกัน Data Conflict

    const snapshot = await get(ref(db, `${GAME_ID}/rooms/${currentRoom}`));
    const room = snapshot.val();
    let updates = {};
    let nextTurn = player === 'host' ? 'guest' : 'host';
    let msg = "";

    if (res.type === 'attack') {
        const target = player === 'host' ? 'guest' : 'host';
        if (room[target].shield) {
            updates[`${target}/shield`] = false;
            msg = `${player} โจมตี แต่ติดเกราะ!`;
        } else {
            updates[`${target}/hp`] = Math.max(0, room[target].hp - res.dmg);
            msg = `${player} ใช้ ${res.name} ลดเลือด ${res.dmg}`;
        }
    } else if (res.type === 'hp') {
        updates[`${player}/hp`] = Math.min(1000, room[player].hp + 200);
        nextTurn = player; // ได้เล่นต่อ
        msg = `${player} ได้เพิ่มพลัง ได้สุ่มต่อ!`;
    } else if (res.type === 'shield') {
        updates[`${player}/shield`] = true;
        nextTurn = player; // ได้เล่นต่อ
        msg = `${player} ได้รับเกราะ ได้สุ่มต่อ!`;
    }

    updates['turn'] = nextTurn;
    updates['lastActive'] = serverTimestamp();
    update(ref(db, `${GAME_ID}/rooms/${currentRoom}`), updates);
    announce(msg);
}

function endGame(room) {
    const win = (myRole === 'host' && room.host.hp > 0) || (myRole === 'guest' && room.guest.hp > 0);
    if(bgmSource) bgmSource.stop();
    
    document.getElementById('scene-battle').classList.remove('active');
    document.getElementById('scene-result').classList.add('active');
    
    if(win) {
        document.getElementById('result-title').innerText = "คุณคือผู้ชนะ!";
        document.getElementById('result-desc').innerText = "โชคชะตาเลือกคุณในวันนี้";
        playSound('winner1');
    } else {
        document.getElementById('result-title').innerText = "พ่ายแพ้...";
        document.getElementById('result-desc').innerText = "ความพยายามจะทำให้คุณแข็งแกร่งขึ้น";
        playSound('lost1');
    }
}

// --- Init ---
document.getElementById('btn-create-room').onclick = createRoom;

// Load all required sounds
['earth','earth1','fire','fire1','water','water1','wind','wind1','thunder','thunder1','winter','winter1','hp','hp2','shield','shield2','wheel','back1','winner1','lost1','start1'].forEach(loadSound);

// Particles BG
const pContainer = document.getElementById('particles');
for(let i=0; i<20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
    p.style.animationDelay = (Math.random() * 5) + 's';
    pContainer.appendChild(p);
}
</script>
</body>
</html>
