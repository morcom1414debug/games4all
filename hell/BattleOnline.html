<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALUKA Online - Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #6a11cb; --secondary: #2575fc; --danger: #ff4b2b;
            --success: #00b09b; --gold: #f1c40f; --dark-bg: #0f0c29;
            --cls-fire: #ff4b2b; --cls-water: #00d2ff; --cls-earth: #e67e22;
            --cls-wind: #2ecc71; --cls-thunder: #f1c40f; --cls-winter: #ecf0f1;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at center, #1b1b2f 0%, #0f0c29 100%);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        #hit-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; opacity: 0; transition: opacity 0.1s; }
        #game-container {
            background: rgba(15, 12, 41, 0.75); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 3rem 2.5rem; text-align: center;
            box-shadow: 0 0 80px rgba(0,0,0,0.9); border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%; max-width: 500px; position: relative; z-index: 5;
        }
        #btn-community {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(241, 196, 15, 0.3);
            color: rgba(255, 255, 255, 0.8); padding: 8px 15px; border-radius: 12px;
            font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 5px; z-index: 10;
        }
        #btn-community.hidden { display: none; }
        .scene { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.5s ease; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
        .stat-item { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 18px; flex: 1; border: 2px solid rgba(255,255,255,0.1); transition: 0.4s; position: relative; }
        .stat-item.active-turn { border-color: var(--gold); transform: scale(1.05); }
        .hp-track { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: var(--success); transition: width 0.5s ease; }
        .shield-icon { display: none; font-size: 1.1rem; }
        .has-shield .shield-icon { display: inline; }
        .wheel-container { position: relative; width: 180px; height: 180px; margin: 25px auto; }
        .wheel-arrow { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 20px solid var(--gold); z-index: 2; }
        .wheel-graphic { width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--gold); background: conic-gradient(var(--primary) 0% 12.5%, var(--secondary) 12.5% 25%, var(--primary) 25% 37.5%, var(--secondary) 37.5% 50%, var(--primary) 50% 62.5%, var(--secondary) 62.5% 75%, var(--primary) 75% 87.5%, var(--secondary) 87.5% 100%); transition: transform 2.5s cubic-bezier(0.15, 0, 0.15, 1); }
        .btn-main { background: linear-gradient(135deg, var(--danger), var(--gold)); border: none; padding: 20px 40px; border-radius: 50px; color: white; font-size: 1.4rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.8); }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .result-msg { font-size: 1.2rem; color: #ccc; margin-top: 10px; line-height: 1.6; }
    </style>
</head>
<body>

<div id="hit-flash"></div>
<div id="aria-announcer" class="sr-only" role="status" aria-live="assertive" aria-atomic="true"></div>

<div id="game-container">
    <button id="btn-community" onclick="location.href='../index.html'">🏠 กลับสู่ชุมชน</button>

    <section id="scene-lobby" class="scene active">
        <h1 style="color:var(--gold); margin:0; font-size: 2.5rem;">VALUKA</h1>
        <p>ประลองยุทธ์ออนไลน์ 1 ต่อ 1</p>
        <button id="btn-create-room" class="btn-main">สร้างห้อง</button>
        <div id="room-list" style="margin-top:15px; display: flex; flex-direction: column; gap: 10px;"></div>
    </section>

    <section id="scene-waiting" class="scene">
        <h2 style="color:var(--gold);">เตรียมการประลอง</h2>
        <div style="font-size: 3rem; animation: rotate 2s linear infinite;">🌀</div>
        <p>รอคู่ต่อสู้กดเข้าร่วมห้อง...</p>
    </section>

    <section id="scene-battle" class="scene">
        <div class="stats-bar">
            <div class="stat-item" id="host-box">
                <span style="font-size:0.8rem; opacity:0.7;">HOST</span>
                <div style="font-size:1.3rem; font-weight:600;"><span id="hp-host">1000</span> <span class="shield-icon">🛡️</span></div>
                <div class="hp-track"><div id="bar-host" class="hp-fill"></div></div>
            </div>
            <div class="stat-item" id="guest-box">
                <span style="font-size:0.8rem; opacity:0.7;">GUEST</span>
                <div style="font-size:1.3rem; font-weight:600;"><span id="hp-guest">1000</span> <span class="shield-icon">🛡️</span></div>
                <div class="hp-track"><div id="bar-guest" class="hp-fill"></div></div>
            </div>
        </div>
        <div class="wheel-container">
            <div class="wheel-arrow"></div>
            <div id="visual-wheel" class="wheel-graphic"></div>
        </div>
        <button id="btn-spin" class="btn-main" disabled>โยกคันโยก</button>
    </section>

    <section id="scene-result" class="scene">
        <div id="result-visual">
            <span id="result-emoji" style="font-size: 5rem;">🏆</span>
        </div>
        <h2 id="result-title" style="margin: 10px 0;"></h2>
        <p id="result-desc" class="result-msg"></p>
    </section>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvcdgsyT5sDdYTYKIqetzNL9Be-MFC0l4",
    authDomain: "xo-game-134ec.firebaseapp.com",
    databaseURL: "https://xo-game-134ec-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "xo-game-134ec",
    storageBucket: "xo-game-134ec.firebasestorage.app",
    messagingSenderId: "318375224157",
    appId: "1:318375224157:web:3e49732b1c382009b77eb4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const GAME_ID = "valuka";

let myRole = null, currentRoomId = null, bgmSource = null;
let localSpinLocked = false; // ระบบ Local Lock ป้องกันการกดย้ำ (Double Click)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioCache = {};

async function loadSound(name) {
    if (audioCache[name]) return audioCache[name];
    try {
        const res = await fetch(`audio/${name}.mp3`);
        const buf = await audioCtx.decodeAudioData(await res.arrayBuffer());
        return audioCache[name] = buf;
    } catch (e) { return null; }
}

function playSound(name) {
    const buf = audioCache[name];
    if (!buf) return null;
    const s = audioCtx.createBufferSource();
    s.buffer = buf; s.connect(audioCtx.destination);
    s.start(0); return s;
}

const playWait = (name) => new Promise(res => {
    const s = playSound(name);
    if(!s) return res();
    s.onended = res;
});

function announce(msg) {
    const el = document.getElementById('aria-announcer');
    if (!el || el.getAttribute('aria-live') === 'off') return;
    el.innerText = "";
    setTimeout(() => { el.innerText = msg; }, 100);
}

const skills = [
    {id: 'earth', name: 'ปฐพีกลืนกิน', dmg: 200, color: 'var(--cls-earth)'},
    {id: 'fire', name: 'อัคนีพิโรธ', dmg: 400, color: 'var(--cls-fire)'},
    {id: 'water', name: 'มหาสมุทรคลั่ง', dmg: 300, color: 'var(--cls-water)'},
    {id: 'wind', name: 'วายุลมกลด', dmg: 100, color: 'var(--cls-wind)'},
    {id: 'thunder', name: 'ทัณฑ์สวรรค์สายฟ้า', dmg: 500, color: 'var(--cls-thunder)'},
    {id: 'winter', name: 'ดินแดนเยือกแข็ง', dmg: 300, color: 'var(--cls-winter)'}
];

const wheelOptions = [...skills.map(s => ({...s, type: 'attack'})), 
    {id: 'hp', name: 'ได้รับน้ำยาเพิ่มพลัง', type: 'hp'},
    {id: 'shield', name: 'ได้รับเกราะแห่งแสง', type: 'shield'}
];

// --- ระบบลบห้องร้างอัตโนมัติ ---
db.ref(`${GAME_ID}/rooms`).on('value', snap => {
    const list = document.getElementById('room-list');
    list.innerHTML = "";
    const now = Date.now();
    snap.forEach(child => {
        const room = child.val();
        // ลบห้องที่ไม่มี Activity เกิน 5 นาที
        if (room.lastActivity && (now - room.lastActivity > 300000)) {
            db.ref(`${GAME_ID}/rooms/${child.key}`).remove();
            return;
        }
        if (room.status === 'waiting') {
            const b = document.createElement('button');
            b.innerText = `เข้าห้อง ${child.key}`;
            b.className = "btn-main"; b.style.fontSize = "1rem";
            b.onclick = () => joinRoom(child.key);
            list.appendChild(b);
        }
    });
});

async function updateActivity() {
    if (currentRoomId) {
        db.ref(`${GAME_ID}/rooms/${currentRoomId}/lastActivity`).set(Date.now());
    }
}

async function createRoom() {
    document.getElementById('aria-announcer').setAttribute('aria-live','assertive');
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const snap = await db.ref(`${GAME_ID}/room_counter`).transaction(curr => (curr || 0) + 1);
    currentRoomId = `Battle${snap.snapshot.val().toString().padStart(5, '0')}`;
    myRole = 'host';
    await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).set({
        status: 'waiting', hostHP: 1000, guestHP: 1000,
        hostShield: false, guestShield: false, turn: '', lastId: '',
        lastActivity: Date.now(), spinCount: 0
    });
    showScene('scene-waiting');
    document.getElementById('btn-community').classList.add('hidden');
    listenToRoom();
}

async function joinRoom(roomId) {
    document.getElementById('aria-announcer').setAttribute('aria-live','assertive');
    if (audioCtx.state === 'suspended') audioCtx.resume();
    currentRoomId = roomId; myRole = 'guest';
    const turnStart = Math.random() < 0.5 ? 'host' : 'guest';
    await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update({ 
        status: 'playing', turn: turnStart, lastActivity: Date.now()
    });
    listenToRoom();
}

function listenToRoom() {
    db.ref(`${GAME_ID}/rooms/${currentRoomId}`).on('value', async snapshot => {
        const room = snapshot.val();
        if (!room) return;
        if (room.status === 'playing' && !window.started) {
            window.started = true;
            showScene('scene-battle');
            document.getElementById('btn-community').classList.add('hidden');
            await playWait('start3');
            const bgm = audioCtx.createBufferSource();
            bgm.buffer = await loadSound('back1');
            bgm.loop = true; bgm.connect(audioCtx.destination);
            bgm.start(0); bgmSource = bgm;
            announce(`ผู้ที่ได้เริ่มก่อนคือ ${room.turn === 'host' ? 'Host' : 'Guest'}`);
            updateUI(room);
        }
        if (room.lastAction && room.lastAction.id !== window.processedId) {
            window.processedId = room.lastAction.id;
            handleAction(room.lastAction, room);
        } else if (room.status === 'playing') {
            updateUI(room);
        }
        if (room.status === 'finished') {
            db.ref(`${GAME_ID}/rooms/${currentRoomId}`).off();
            endGame(room);
        }
    });
}

function updateUI(room) {
    document.getElementById('hp-host').innerText = room.hostHP.toLocaleString();
    document.getElementById('hp-guest').innerText = room.guestHP.toLocaleString();
    document.getElementById('bar-host').style.width = (room.hostHP / 10) + '%';
    document.getElementById('bar-guest').style.width = (room.guestHP / 10) + '%';
    document.getElementById('host-box').classList.toggle('active-turn', room.turn === 'host');
    document.getElementById('guest-box').classList.toggle('active-turn', room.turn === 'guest');
    room.hostShield ? document.getElementById('host-box').classList.add('has-shield') : document.getElementById('host-box').classList.remove('has-shield');
    room.guestShield ? document.getElementById('guest-box').classList.add('has-shield') : document.getElementById('guest-box').classList.remove('has-shield');

    const spinBtn = document.getElementById('btn-spin');
    if (window.animating) {
        spinBtn.disabled = true;
    } else {
        const isMyTurn = (room.turn === myRole);
        // ปลดล็อค Local Lock เมื่อเข้าตาตัวเอง
        if (isMyTurn) localSpinLocked = false; 
        
        spinBtn.disabled = !isMyTurn;
        if (!room.isBonus) announce(`ตา ${room.turn === 'host' ? 'Host' : 'Guest'}`);
        if (isMyTurn) spinBtn.focus();
    }
}

document.getElementById('btn-spin').onclick = async () => {
    // 1. Local Lock + UI Disable ทันทีเพื่อป้องกันกดย้ำเด็ดขาด
    if (localSpinLocked) return;
    localSpinLocked = true;
    document.getElementById('btn-spin').disabled = true;

    updateActivity();
    const snap = await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).get();
    const room = snap.val();

    // 2. เช็คเงื่อนไขจำนวนครั้ง
    const currentSpinCount = room.spinCount || 0;
    if (currentSpinCount >= 2 || (currentSpinCount === 1 && !room.isBonus)) {
        return;
    }

    let res;
    while(true) {
        res = wheelOptions[Math.floor(Math.random() * wheelOptions.length)];
        if(res.id === room.lastId) continue;
        if(room.isBonus && res.type !== 'attack') continue;
        break;
    }
    const deg = 1440 + Math.floor(Math.random() * 360);
    db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update({
        lastAction: { id: Date.now(), actor: myRole, result: res, deg: deg },
        lastActivity: Date.now()
    });
};

async function handleAction(action, room) {
    window.animating = true;
    const { actor, result, deg } = action;
    document.getElementById('visual-wheel').style.transform = `rotate(${deg}deg)`;
    await playWait('wheel');
    await new Promise(r => setTimeout(r, 800));

    let up = { lastId: result.id, isBonus: false, lastActivity: Date.now() };
    let msg = "";

    if (result.type === 'attack') {
        await playWait(actor === 'host' ? `${result.id}1` : result.id);
        const target = actor === 'host' ? 'guest' : 'host';
        if (room[target + 'Shield']) {
            up[target + 'Shield'] = false;
            msg = `${actor === 'host' ? 'Host' : 'Guest'} ใช้ ${result.name} แต่ติดเกราะ!`;
        } else {
            const newHP = Math.max(0, room[target + 'HP'] - result.dmg);
            up[target + 'HP'] = newHP;
            msg = `${actor === 'host' ? 'Host' : 'Guest'} ใช้ ${result.name} ลดไป ${result.dmg} เหลือ ${newHP}`;
            triggerFlash(result.color);
        }
        up.turn = actor === 'host' ? 'guest' : 'host';
        up.spinCount = 0; 
    } else {
        if (result.type === 'hp') {
            await playWait(actor === myRole ? 'hp' : 'hp2');
            const val = [100, 300, 500][Math.floor(Math.random()*3)];
            up[actor + 'HP'] = Math.min(1000, room[actor + 'HP'] + val);
            msg = `${actor === 'host' ? 'Host' : 'Guest'} ได้น้ำยา ${val} หน่วย สุ่มต่อ!`;
        } else {
            await playWait(actor === myRole ? 'shield' : 'shield2');
            up[actor + 'Shield'] = true;
            msg = `${actor === 'host' ? 'Host' : 'Guest'} ได้รับเกราะ สุ่มต่อ!`;
        }
        up.isBonus = true; 
        up.turn = actor;
        up.spinCount = 1; 
    }

    announce(msg);
    await new Promise(r => setTimeout(r, 2000));
    if (myRole === 'host') {
        if ((up.hostHP ?? room.hostHP) <= 0 || (up.guestHP ?? room.guestHP) <= 0) up.status = 'finished';
        db.ref(`${GAME_ID}/rooms/${currentRoomId}`).update(up);
    }
    window.animating = false;

    const freshSnap = await db.ref(`${GAME_ID}/rooms/${currentRoomId}`).get();
    const freshRoom = freshSnap.val();
    if (freshRoom && freshRoom.status === 'playing') updateUI(freshRoom);
}

function showScene(id) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function triggerFlash(c) {
    const f = document.getElementById('hit-flash');
    f.style.backgroundColor = c; f.style.opacity = '0.4';
    setTimeout(() => f.style.opacity = '0', 150);
}

function endGame(room) {
    if (bgmSource) bgmSource.stop();
    const announcer = document.getElementById('aria-announcer');
    announcer.innerText = "";
    announcer.setAttribute('aria-live', 'off');
    
    showScene('scene-result');
    document.getElementById('btn-community').classList.remove('hidden');

    const iAmWin = (myRole === 'host' && room.guestHP <= 0) || (myRole === 'guest' && room.hostHP <= 0);
    const winTexts = [
        { title: "ชัยชนะอันรุ่งโรจน์!", desc: "พลังของคุณช่างแข็งแกร่ง จงนำชัยชนะนี้ไปเป็นแรงผลักดันในการประลองครั้งหน้า!" },
        { title: "จอมยุทธ์ผู้ไร้เทียมทาน", desc: "การต่อสู้ที่ยอดเยี่ยม! พลังเวทย์ของคุณได้รับการอัปเกรดเพื่อปกป้องอาณาจักรต่อไป" },
        { title: "ผู้พิชิต VALUKA", desc: "ชัยชนะเป็นของคุณ! ความพยายามฝึกฝนส่งผลให้คุณก้ามข้ามขีดจำกัดได้สำเร็จ" }
    ];
    const lostTexts = [
        { title: "ความพ่ายแพ้คือบทเรียน", desc: "อย่าเพิ่งท้อถอย! จอมยุทธ์ที่ยิ่งใหญ่ล้วนเคยล้มลงมาก่อน กลับมาฝึกฝนแล้วท้าทายใหม่นะ" },
        { title: "เกือบไปนิดเดียว!", desc: "คุณทำได้ดีมากแล้ว พักผ่อนเติมพลังแล้วกลับมาทวงคืนความยิ่งใหญ่ในครั้งต่อไป" },
        { title: "พลังยังไม่สิ้นสุด", desc: "แม้ครั้งนี้จะพลาดไป แต่จิตวิญญาณนักสู้ของคุณยังอยู่ ครั้งหน้าชัยชนะจะเป็นของคุณแน่นอน!" }
    ];

    const randomIdx = Math.floor(Math.random() * 3);
    const content = iAmWin ? winTexts[randomIdx] : lostTexts[randomIdx];

    document.getElementById('result-emoji').innerText = iAmWin ? "🏆" : "💀";
    document.getElementById('result-title').innerText = content.title;
    document.getElementById('result-desc').innerText = content.desc;
    playSound(iAmWin ? 'winner1' : 'lost1');

    if (myRole === 'host') {
        setTimeout(() => db.ref(`${GAME_ID}/rooms/${currentRoomId}`).remove(), 10000);
    }
}

['earth','earth1','fire','fire1','water','water1','wind','wind1','thunder','thunder1','winter','winter1','hp','hp2','shield','shield2','wheel','back1','winner1','lost1','start3'].forEach(loadSound);
document.getElementById('btn-create-room').onclick = createRoom;
</script>
</body>
</html>
