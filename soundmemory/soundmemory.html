<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sounds Memory.</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f0f0; margin: 0; padding: 20px; }
        h1 { color: #333; }
        .screen { display: none; margin: auto; max-width: 600px; }
        #start-screen { display: block; }
        .grid { display: grid; margin: 20px auto; gap: 10px; }
        .grid-2x2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3x3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4x4 { grid-template-columns: repeat(4, 1fr); }
        button { padding: 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 5px; }
        button:hover { background-color: #45a049; }
        button.selected { background-color: #2196F3; }
        button.matched { background-color: #888; cursor: not-allowed; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #game-info { margin: 20px 0; }
        #timer { font-size: 24px; color: red; }
        #back-button { position: absolute; top: 20px; left: 20px; background-color: #ff4444; padding: 10px 15px; font-size: 14px; }
        #back-button:hover { background-color: #cc0000; }
        img { max-width: 100%; height: auto; margin: 20px 0; }
        .mode-selection { margin: 20px 0; }
        .mode-selection label { margin: 0 10px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="start-screen" class="screen">
        <button id="back-button">กลับเมนูหลัก</button>
        <h1>Sounds Memory.</h1>
        <img src="audio/pic.png" alt="ผู้หญิงกำลังหัวเราะผู้ชายที่ถลกก้นให้ดู!">
        <div class="mode-selection">
            <label><input type="radio" name="game-mode" value="animal" checked> โหมดสัตว์</label>
            <label><input type="radio" name="game-mode" value="fart"> โหมดตด</label>
        </div>
        <button id="start-button">เริ่มเกม</button>
    </div>

    <div id="loading-screen" class="screen">
        <button id="back-button">กลับเมนูหลัก</button>
        <h1>กำลังเตรียมเสียง...</h1>
    </div>

    <div id="game-screen" class="screen">
        <button id="back-button">กลับเมนูหลัก</button>
        <h1>Sounds Memory.</h1>
        <div id="game-info">
            <p>Level: <span id="current-level"></span> | เวลา: <span id="timer"></span> | ผิดได้อีก: <span id="mistakes-left"></span></p>
        </div>
        <div id="grid" class="grid"></div>
    </div>

    <div id="level3-complete-screen" class="screen">
        <h1>ยินดีด้วย! พร้อมไปต่อ Level 4 ไหม?</h1>
        <button id="continue-button">ลุยต่อ</button>
    </div>

    <div id="level7-complete-screen" class="screen">
        <h1>สุดยอด! ไปต่อ Level 8 กัน</h1>
        <button id="continue-level7-button">ลุยต่อ</button>
    </div>

    <div id="next-level-screen" class="screen">
        <h1>ด่านที่ <span id="next-level-number"></span></h1>
        <p>กำลังโหลดเสียงของด่านนี้...</p>
    </div>

    <div id="win-screen" class="screen">
        <h1>คุณคือแฟนพันธุ์แท้!</h1>
        <button id="restart-win">เล่นใหม่</button>
    </div>

    <div id="gameover-screen" class="screen">
        <h1>ลองใหม่อีกครั้งนะ!</h1>
        <button id="restart-gameover">เริ่มใหม่</button>
    </div>

    <script>
        // Web Audio API Context
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        const audioPath = 'audio/';
        const buffers = {}; // เก็บ AudioBuffers
        const activeSources = new Set(); // เก็บแหล่งเสียงที่กำลังเล่น

        const effectFiles = {
            true: 'true.mp3', wrong: 'wrong.mp3', new1: 'new1.mp3',
            new4: 'new4.mp3', a6: 'a6.mp3', heart: 'heart.mp3', a7: 'a7.mp3'
        };

        const soundFiles = {
            fart: ['s1.mp3', 's2.mp3', 's3.mp3', 's4.mp3', 's5.mp3', 's6.mp3', 's7.mp3', 's8.mp3', 's9.mp3', 's10.mp3', 's11.mp3', 's12.mp3', 's13.mp3'],
            animal: ['k1.mp3', 'k2.mp3', 'k3.mp3', 'k4.mp3', 'k5.mp3', 'k6.mp3', 'k7.mp3', 'k8.mp3', 'k9.mp3', 'k10.mp3', 'k11.mp3', 'k12.mp3', 'k13.mp3']
        };

        let gameMode = 'animal';
        let currentLevel = 1;
        let heartSource = null;

        // ฟังก์ชันโหลดไฟล์เสียงและแปลงเป็น Buffer
        async function loadSound(url) {
            if (buffers[url]) return buffers[url];
            try {
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                buffers[url] = audioBuffer;
                return audioBuffer;
            } catch (e) {
                console.error(`Failed to load: ${url}`, e);
                return null;
            }
        }

        // เล่นเสียงจาก Buffer
        function playSound(name, loop = false) {
            const buffer = buffers[name] || buffers[audioPath + name] || buffers[audioPath + name + '.mp3'];
            if (!buffer) return null;

            if (audioCtx.state === 'suspended') audioCtx.resume();

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.loop = loop;
            
            source.start(0);
            activeSources.add(source);
            source.onended = () => activeSources.delete(source);
            
            return source;
        }

        // หยุดเสียงทั้งหมด (ยกเว้นเสียงที่ระบุ)
        function stopAllSounds(exceptHeart = false) {
            activeSources.forEach(source => {
                if (exceptHeart && source === heartSource) return;
                try { source.stop(); } catch(e) {}
            });
            activeSources.clear();
            if (exceptHeart && heartSource) activeSources.add(heartSource);
        }

        // ทยอยโหลดตามด่าน
        async function prepareLevelSounds(level) {
            // โหลด Effects ก่อนเสมอในครั้งแรก
            if (level === 1) {
                const effectPromises = Object.values(effectFiles).map(f => loadSound(audioPath + f));
                await Promise.all(effectPromises);
            }

            // เลือกโหลดเฉพาะเสียงที่ต้องใช้ในด่านนี้ (ประหยัดเวลา)
            const modeSounds = soundFiles[gameMode];
            let numNeeded = (level <= 3) ? 2 : (level <= 7) ? 4 : 8;
            
            // สุ่มเลือกเสียงและโหลด (ถ้ายังไม่เคยโหลด)
            const slice = modeSounds.slice(0, numNeeded); // หรือสุ่ม shuffle ก่อน
            const soundPromises = slice.map(f => loadSound(audioPath + f));
            await Promise.all(soundPromises);
            return slice.map(f => f.replace('.mp3', ''));
        }

        // --- Logic เกม (ปรับปรุงจากเดิมเล็กน้อยให้รองรับ Async Loading) ---
        let timerInterval, timeLeft, mistakesAllowed, mistakesMade, matchedPairs, totalPairs, cards, firstCard, secondCard, lockBoard;

        const screens = {
            start: document.getElementById('start-screen'),
            loading: document.getElementById('loading-screen'),
            game: document.getElementById('game-screen'),
            level3Complete: document.getElementById('level3-complete-screen'),
            level7Complete: document.getElementById('level7-complete-screen'),
            next: document.getElementById('next-level-screen'),
            win: document.getElementById('win-screen'),
            gameover: document.getElementById('gameover-screen')
        };

        async function setupLevel() {
            stopAllSounds();
            const selectedSounds = await prepareLevelSounds(currentLevel);
            
            // ตั้งค่า Grid และจำนวนคู่ (เหมือนเดิม)
            let gridSize = (currentLevel <= 3) ? 2 : (currentLevel <= 7) ? 3 : 4;
            totalPairs = (currentLevel <= 3) ? 2 : (currentLevel <= 7) ? 4 : 8;
            
            mistakesAllowed = (currentLevel <= 3) ? 1 : (currentLevel <= 7) ? 4 : 10;
            timeLimit = (currentLevel <= 3) ? 30 : (currentLevel <= 7) ? 60 : 90 - (currentLevel - 4) * 7;
            
            matchedPairs = 0; mistakesMade = 0; cards = []; firstCard = null; secondCard = null; lockBoard = true;

            let soundAssignments = [...selectedSounds, ...selectedSounds];
            for (let i = soundAssignments.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [soundAssignments[i], soundAssignments[j]] = [soundAssignments[j], soundAssignments[i]];
            }

            const grid = document.getElementById('grid');
            grid.className = `grid grid-${gridSize}x${gridSize}`;
            grid.innerHTML = '';
            
            const totalSlots = gridSize * gridSize;
            for (let i = 0; i < totalSlots; i++) {
                const isExtra = (gridSize === 3 && i === 8);
                cards.push({ index: i, sound: isExtra ? null : soundAssignments[i], matched: isExtra });
                const btn = document.createElement('button');
                if (isExtra) { btn.textContent = 'ว่าง'; btn.classList.add('matched'); btn.disabled = true; }
                else { btn.textContent = `ช่อง ${i+1}`; btn.dataset.index = i; btn.addEventListener('click', handleCardClick); }
                grid.appendChild(btn);
            }

            document.getElementById('current-level').textContent = currentLevel;
            document.getElementById('mistakes-left').textContent = mistakesAllowed;
            timeLeft = timeLimit;
            document.getElementById('timer').textContent = timeLeft;

            playSound('a6');
            lockBoard = false;
            startTimer();
            grid.querySelector('button:not(.matched)').focus();
        }

        function handleCardClick(e) {
            if (lockBoard) return;
            const btn = e.target;
            const card = cards[btn.dataset.index];
            if (card.matched || btn === firstCard) return;

            btn.classList.add('selected');
            playSound(card.sound);

            if (!firstCard) { firstCard = btn; } 
            else { secondCard = btn; lockBoard = true; checkForMatch(); }
        }

        async function checkForMatch() {
            const s1 = cards[firstCard.dataset.index].sound;
            const s2 = cards[secondCard.dataset.index].sound;

            if (s1 === s2) {
                playSound('true');
                firstCard.classList.replace('selected', 'matched');
                secondCard.classList.replace('selected', 'matched');
                firstCard.disabled = secondCard.disabled = true;
                cards[firstCard.dataset.index].matched = cards[secondCard.dataset.index].matched = true;
                matchedPairs++;
                resetTurn();
                if (matchedPairs === totalPairs) winLevel();
            } else {
                playSound('wrong');
                setTimeout(() => {
                    firstCard.classList.remove('selected');
                    secondCard.classList.remove('selected');
                    mistakesMade++;
                    document.getElementById('mistakes-left').textContent = mistakesAllowed - mistakesMade;
                    resetTurn();
                    if (mistakesMade > mistakesAllowed) gameOver();
                }, 500);
            }
        }

        function resetTurn() { firstCard = secondCard = null; lockBoard = false; }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft === 10) heartSource = playSound('heart', true);
                if (timeLeft <= 0) gameOver();
            }, 1000);
        }

        async function winLevel() {
            clearInterval(timerInterval);
            stopAllSounds();
            if (currentLevel === 10) { showScreen('win'); playSound('new4'); }
            else if (currentLevel === 3) { showScreen('level3Complete'); playSound('new1'); }
            else if (currentLevel === 7) { showScreen('level7Complete'); playSound('new1'); }
            else {
                showScreen('next');
                document.getElementById('next-level-number').textContent = currentLevel + 1;
                await playSound('new1');
                currentLevel++;
                showScreen('game');
                setupLevel();
            }
        }

        function gameOver() {
            clearInterval(timerInterval);
            stopAllSounds();
            showScreen('gameover');
            playSound('a7');
        }

        function showScreen(id) {
            Object.values(screens).forEach(s => s.style.display = 'none');
            screens[id].style.display = 'block';
            const h1 = screens[id].querySelector('h1');
            if (h1) h1.focus();
        }

        // Event Listeners
        document.getElementById('start-button').addEventListener('click', async () => {
            gameMode = document.querySelector('input[name="game-mode"]:checked').value;
            showScreen('loading');
            await setupLevel();
            showScreen('game');
        });

        document.getElementById('continue-button').addEventListener('click', () => { currentLevel++; showScreen('game'); setupLevel(); });
        document.getElementById('continue-level7-button').addEventListener('click', () => { currentLevel++; showScreen('game'); setupLevel(); });
        document.querySelectorAll('#restart-win, #restart-gameover').forEach(b => b.addEventListener('click', () => { currentLevel = 1; showScreen('loading'); setupLevel().then(() => showScreen('game')); }));
        document.querySelectorAll('#back-button').forEach(b => b.addEventListener('click', () => window.location.href = '../index.html'));

    </script>
</body>
</html>
