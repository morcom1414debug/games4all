<!DOCTYPE html>
<html lang="th" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Snakes and Ladders</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #fdcb6e;
            --text-dark: #2d3436;
            --text-light: #f5f6fa;
            --bg-color: #1e272e;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        body { 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: var(--text-dark);
        }

        /* --- SVG Background Animation --- */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.4;
        }
        
        .snake-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: slither 15s linear infinite alternate;
        }

        .ladder-path {
            animation: float 6s ease-in-out infinite alternate;
        }

        @keyframes slither {
            0% { stroke-dashoffset: 1000; }
            100% { stroke-dashoffset: 0; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-20px); }
        }

        /* --- UI Elements --- */
        .home-btn-hex { 
            background-color: var(--primary); 
            color: #fff; 
            border: none; 
            width: 60px; 
            height: 60px; 
            font-size: 1.8rem; 
            cursor: pointer; 
            transition: transform 0.2s, background-color 0.2s; 
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
        .home-btn-hex:hover, .home-btn-hex:focus { 
            background-color: #5b4cc4; 
            transform: scale(1.1); 
            outline: none;
        }
        /* เพิ่ม Focus Ring ที่ชัดเจนสำหรับการใช้ Keyboard */
        .home-btn-hex:focus-visible {
            box-shadow: 0 0 0 4px var(--secondary);
        }
        
        .pos-top-left { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 100; 
        }

        .menu-card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 50px 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            text-align: center; 
            max-width: 450px; 
            width: 90%; 
            border-top: 5px solid var(--primary);
            animation: popIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.8) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .game-title { 
            color: var(--primary); 
            font-size: 2.2rem; 
            margin-top: 0; 
            margin-bottom: 5px;
            font-weight: 800;
            outline: none; /* ซ่อนเส้นขอบสีดำเวลากดโฟกัสแบบโปรแกรมเพื่อให้สวยงาม แต่ SC ยังคงอ่านปกติ */
        }
        /* เมื่อกด Tab วนกลับมาที่ชื่อเกม จะแสดงกรอบขอบสีเพื่อความเข้าถึงง่าย */
        .game-title:focus-visible {
            outline: 3px solid var(--secondary);
            border-radius: 8px;
        }

        .select-mode-text {
            font-size: 1.2rem;
            color: #636e72;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-mode { 
            background-color: var(--primary); 
            color: #fff; 
            border: none; 
            padding: 18px 20px; 
            font-size: 1.3rem; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-mode:hover, .btn-mode:focus { 
            background-color: #5b4cc4; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 15px rgba(108, 92, 231, 0.3);
            outline: none;
        }
        .btn-mode:focus-visible {
            box-shadow: 0 0 0 4px var(--secondary);
        }

        .btn-mode-secondary {
            background-color: #0984e3;
        }
        .btn-mode-secondary:hover, .btn-mode-secondary:focus {
            background-color: #076ebd;
            box-shadow: 0 8px 15px rgba(9, 132, 227, 0.3);
        }

        /* จัดการ Emoji ให้อยู่ถูกที่และสวยงาม */
        .emoji-icon {
            font-size: 1.5rem;
            line-height: 1;
        }
    </style>
</head>
<body>

    <svg class="bg-container" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <defs>
            <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
                <rect width="80" height="80" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
        
        <g class="ladder-path" stroke="#fdcb6e" stroke-width="8" stroke-linecap="round" opacity="0.6">
            <line x1="150" y1="650" x2="250" y2="100" />
            <line x1="200" y1="660" x2="300" y2="110" />
            <line x1="165" y1="550" x2="215" y2="560" />
            <line x1="180" y1="450" x2="230" y2="460" />
            <line x1="195" y1="350" x2="245" y2="360" />
            <line x1="210" y1="250" x2="260" y2="260" />
        </g>

        <g class="ladder-path" stroke="#fdcb6e" stroke-width="8" stroke-linecap="round" opacity="0.4" style="animation-delay: -3s;">
            <line x1="650" y1="500" x2="550" y2="-50" />
            <line x1="700" y1="510" x2="600" y2="-40" />
            <line x1="665" y1="400" x2="715" y2="410" />
            <line x1="645" y1="250" x2="695" y2="260" />
            <line x1="625" y1="100" x2="675" y2="110" />
        </g>

        <path class="snake-path" d="M 0 200 C 200 300, 300 100, 500 250 S 700 150, 850 300" fill="none" stroke="#2ecc71" stroke-width="15" stroke-linecap="round" opacity="0.7"/>
        
        <path class="snake-path" d="M 850 500 C 600 550, 500 350, 300 450 S 100 300, -50 400" fill="none" stroke="#e74c3c" stroke-width="12" stroke-linecap="round" opacity="0.5" style="animation-delay: -5s;"/>
    </svg>

    <button id="home-btn" class="home-btn-hex pos-top-left" onclick="window.location.href='../index.html'">
        <span aria-hidden="true">🏠</span>
    </button>

    <main class="menu-card">
        <h1 id="game-title" class="game-title" tabindex="-1">...</h1>
        <div id="select-mode" class="select-mode-text">...</div>
        
        <div class="btn-group">
            <button id="btn-bot" class="btn-mode" type="button"></button>
            <button id="btn-online" class="btn-mode btn-mode-secondary" type="button"></button>
        </div>
    </main>

    <script>
        // Language Detection Logic
        document.addEventListener('DOMContentLoaded', () => {
            // ดึงภาษาจากอุปกรณ์ของผู้ใช้งาน
            const userLang = navigator.language || navigator.userLanguage;
            // เช็คว่าขึ้นต้นด้วย 'th' หรือไม่
            const isThai = userLang.toLowerCase().startsWith('th');

            // กำหนดค่า Elements ที่ต้องเปลี่ยนภาษา
            const htmlRoot = document.getElementById('html-root');
            const homeBtn = document.getElementById('home-btn');
            const titleEl = document.getElementById('game-title');
            const modeTextEl = document.getElementById('select-mode');
            const btnBot = document.getElementById('btn-bot');
            const btnOnline = document.getElementById('btn-online');

            // ประมวลผลและอัปเดต UI ทันทีตามภาษาของเครื่อง
            if (isThai) {
                htmlRoot.lang = 'th';
                homeBtn.setAttribute('aria-label', 'กลับสู่ชุมชน');
                titleEl.innerText = 'บันไดงูป่วนมิติ';
                modeTextEl.innerText = 'เลือกโหมด';
                
                // ปุ่มบอท
                btnBot.innerHTML = `เล่นกับบอท <span class="emoji-icon" aria-hidden="true">🤖</span>`;
                btnBot.onclick = () => window.location.href = 'snake.html';
                
                // ปุ่มออนไลน์
                btnOnline.innerHTML = `เล่นออนไลน์กับเพื่อน <span class="emoji-icon" aria-hidden="true">🌐</span>`;
                btnOnline.onclick = () => window.location.href = 'SnakeOnline.html';
            } else {
                htmlRoot.lang = 'en';
                homeBtn.setAttribute('aria-label', 'Back to home');
                titleEl.innerText = 'Audio Snakes and Ladders';
                modeTextEl.innerText = 'Choose Mode';
                
                // ปุ่มบอท
                btnBot.innerHTML = `Play with bot <span class="emoji-icon" aria-hidden="true">🤖</span>`;
                btnBot.onclick = () => window.location.href = 'snake-en.html';
                
                // ปุ่มออนไลน์
                btnOnline.innerHTML = `Play online with friend <span class="emoji-icon" aria-hidden="true">🌐</span>`;
                btnOnline.onclick = () => window.location.href = 'snake-enonline.html';
            }

            // สั่งให้ระบบเจาะจง Focus ไปที่ชื่อเกม (Heading 1) ทันทีหลังโหลดข้อความเสร็จ
            // ทำให้ Screen Reader อ่านชื่อเกมก่อนเป็นอันดับแรกเมื่อผู้เล่นเข้ามาในหน้านี้
            titleEl.focus();
        });
    </script>
</body>
</html>
