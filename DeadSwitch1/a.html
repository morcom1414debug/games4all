<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>กดติด...ตาย : Dead switch</title>
<style>
/* --- 1. ปรับปรุงพื้นฐานและบรรยากาศ (Ambient) --- */
body { 
  font-family: 'Segoe UI', Tahoma, sans-serif; 
  background: radial-gradient(circle, #222 0%, #000 100%); 
  color:white; 
  text-align:center; 
  margin:0;
  padding:20px;
  height:100vh;
  overflow:hidden;
  position:relative;
  transition: background 0.5s;
}

/* เอฟเฟกต์สั่นหน้าจอ */
@keyframes shake {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  10% { transform: translate(-1px, -2px) rotate(-1deg); }
  20% { transform: translate(-3px, 0px) rotate(1deg); }
  30% { transform: translate(3px, 2px) rotate(0deg); }
  40% { transform: translate(1px, -1px) rotate(1deg); }
  50% { transform: translate(-1px, 2px) rotate(-1deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}
.shake-screen { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

/* --- 2. ปรับปรุง UI Elements --- */
#backToMainMenu {
  position: fixed;
  top: 20px;
  left: 20px;
  background: #fff;
  color: #333;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  z-index: 1002;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  transition: all 0.3s;
}
#backToMainMenu:hover { transform: scale(1.1); background: #ffff00; }

#lifeBoard { 
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:1001;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  padding: 15px 40px;
  border-radius: 0 0 20px 20px;
  border: 2px solid #ffff00;
  border-top: none;
  font-size: 32px;
  font-weight: bold;
  color: #ffff00;
  text-shadow: 0 0 10px rgba(255,255,0,0.5);
  min-width: 450px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

#grid-container {
  max-width: 650px;
  margin: 120px auto 0;
  padding: 15px;
  background: #111;
  border-radius: 20px;
  border: 2px solid #333;
  box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px rgba(255,255,0,0.1);
  transition: all 0.3s ease;
}

/* เน้นขอบ Grid เมื่อถึงตาผู้เล่น */
.player-turn-active #grid-container {
  border-color: #ffff00;
  box-shadow: 0 0 30px rgba(255,255,0,0.3);
}

#grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-gap: 12px;
  background: #222;
  padding: 15px;
  border-radius: 15px;
}

/* --- 3. Animation ของช่อง Cell --- */
.cell {
  position: relative;
  background: #333;
  border: 4px solid #444;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  font-weight: bold;
  font-size: 24px;
  color: #fff;
  aspect-ratio: 1;
  overflow: hidden;
}

/* เอฟเฟกต์แสงวิ่งผ่านปุ่ม */
.cell::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%; width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
  transform: rotate(45deg);
  transition: 0.5s;
}

.cell:hover:not(:disabled) { 
  background: #444; 
  border-color: #ffff00;
  transform: scale(1.05) translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}
.cell:hover::after { left: 120%; }

.cell:active { transform: scale(0.95); }

/* สภาพเมื่อเปิดแล้ว */
.cell.safe { 
  background: #008800 !important; 
  border-color: #00ff00 !important;
  color: white; 
  animation: popIn 0.4s ease-out;
}
.cell.boom { 
  background: #aa0000 !important; 
  border-color: #ff0000 !important;
  color: white; 
  animation: explode 0.5s ease-out;
  box-shadow: 0 0 30px #ff0000;
}

@keyframes popIn {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes explode {
  0% { transform: scale(1); background: #fff; }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* --- 4. หน้าจอหลักและปุ่มโหมด --- */
#homeScreen, #playerSelect { 
  height:100vh; 
  display:flex; 
  flex-direction:column; 
  justify-content:center; 
  align-items:center; 
  gap:40px; 
}

.mode-btn, #playerSelect button {
  background: linear-gradient(145deg, #ffffff, #dddddd);
  color: #111;
  border-radius: 15px;
  padding: 25px 60px;
  font-weight: bold;
  cursor: pointer;
  border: 5px solid #ffff00;
  font-size: 32px;
  transition: all 0.3s ease;
  box-shadow: 0 10px 0 #999, 0 15px 30px rgba(0,0,0,0.5);
}

.mode-btn:hover, #playerSelect button:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 0 #999, 0 20px 40px rgba(255,255,0,0.3);
  background: #ffffcc;
}

.mode-btn:active, #playerSelect button:active {
  transform: translateY(5px);
  box-shadow: 0 5px 0 #999;
}

#ttsDisplay {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  backdrop-filter: blur(5px);
  color:#ffff00;
  padding:15px 40px;
  border-radius:50px;
  border:2px solid #ffff00;
  font-size:24px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  opacity:0;
  transition: all 0.4s;
}
#ttsDisplay.show { opacity:1; transform:translateX(-50%) translateY(-10px); }

/* ป้องกันคนเวียนหัว */
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>

<button id="backToMainMenu" onclick="window.location.href='../index.html'">กลับเมนูหลัก</button>

<div id="homeScreen">
  <h1 style="font-size:72px;color:#ffff00;text-shadow:5px 5px 0px #000, 0 0 30px rgba(255,255,0,0.5);">กดติด...ตาย</h1>
  <button class="mode-btn" onclick="selectMode()">เริ่มเล่นกับบอท</button>
  <button class="mode-btn" onclick="window.location.href='o.html'">เล่นออนไลน์</button>
  <p style="font-size:24px;max-width:700px;color:#ccc; line-height: 1.6;">
    สลับกันเลือกช่องจากทั้งหมด 16 ช่อง <br><span style="color:#ff0000; font-weight:bold;">กดเลือกผิด...ติดระเบิดตายทันที</span>
  </p>
</div>

<div id="playerSelect" style="display:none;">
  <p style="font-size:42px;color:#ffff00;text-shadow: 2px 2px #000;">เลือกตัวละครของคุณ</p>
  <div style="display:flex; gap:30px;">
    <button id="firstCharBtn" onclick="selectPlayer('อ้ายมดแดง')">อ้ายมดแดง</button>
    <button onclick="selectPlayer('อ้ายมดดำ')">อ้ายมดดำ</button>
  </div>
</div>

<div id="gameScreen" style="display:none;">
  <div id="lifeBoard">กำลังเริ่มเกม...</div>
  <div id="grid-container">
    <div id="grid"></div>
  </div>
</div>

<div id="ttsDisplay"></div>
<div id="tts" aria-live="assertive" style="position:absolute;left:-9999px;"></div>
<div id="resultAnnouncement" aria-live="assertive" role="alert" style="position:absolute;left:-9999px;"></div>

<script>
/* ======== Web Audio Engine (เดิม) ======== */
class WebAudioEngine {
  constructor() {
    this.audioCtx = null;
    this.buffers = {};
    this.isUnlocked = false;
    this.bgmSource = null;
    this.bgmGain = null;
    this.queue = [];
    this.isPlaying = false;
    this.soundFiles = {
      bgm: 'audio/b.mp3', end: 'audio/end.mp3',
      missPlayer: 'audio/f.mp3', missCpu: 'audio/f4.mp3',
      hitPlayer: 'audio/t.mp3', hitCpu: 'audio/t4.mp3',
      s1: 'audio/s1.mp3', s2: 'audio/s2.mp3'
    };
  }
  async init() {
    if (this.audioCtx) return;
    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const loadPromises = Object.entries(this.soundFiles).map(async ([key, url]) => {
      try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        this.buffers[key] = await this.audioCtx.decodeAudioData(arrayBuffer);
      } catch (e) { console.error(`Failed to load: ${url}`, e); }
    });
    await Promise.all(loadPromises);
  }
  async unlock() {
    if (this.isUnlocked) return;
    await this.init();
    if (this.audioCtx.state === 'suspended') await this.audioCtx.resume();
    this.isUnlocked = true;
  }
  startBGM() {
    if (!this.buffers['bgm']) return;
    this.stopBGM();
    this.bgmSource = this.audioCtx.createBufferSource();
    this.bgmSource.buffer = this.buffers['bgm'];
    this.bgmSource.loop = true;
    this.bgmGain = this.audioCtx.createGain();
    this.bgmGain.gain.value = 0.3; 
    this.bgmSource.connect(this.bgmGain);
    this.bgmGain.connect(this.audioCtx.destination);
    this.bgmSource.start(0);
  }
  stopBGM() { if (this.bgmSource) { try { this.bgmSource.stop(); } catch(e) {} this.bgmSource = null; } }
  playEffect(key) {
    if (!this.buffers[key]) return Promise.resolve();
    return new Promise(resolve => {
      this.queue.push({ key, resolve });
      if (!this.isPlaying) this._dequeue();
    });
  }
  async _dequeue() {
    if (!this.queue.length) { this.isPlaying = false; return; }
    this.isPlaying = true;
    const { key, resolve } = this.queue.shift();
    const source = this.audioCtx.createBufferSource();
    source.buffer = this.buffers[key];
    source.connect(this.audioCtx.destination);
    source.onended = () => { resolve(); setTimeout(() => this._dequeue(), 50); };
    source.start(0);
  }
}

const audioEngine = new WebAudioEngine();

/* ======== เกม Logic (คงเดิม เพิ่มเติมความสวยงาม) ======== */
let userPlayer, cpuPlayer, bombs = [], currentTurn, roundStarter = null, opened = new Set();
let playerWins = 0, cpuWins = 0, currentRound = 1, hasUserInteracted = false;
const totalCells = 16, totalBombs = 4, winScore = 2;

/* TTS (เดิม) */
let ttsQueue = [], isSpeaking = false;
const ttsDisplay = document.getElementById("ttsDisplay");
function speak(text){ if (!hasUserInteracted) return; ttsQueue.push(text); processTTS(); }
function processTTS(){
  if (isSpeaking || !ttsQueue.length) return;
  isSpeaking = true;
  const msg = ttsQueue.shift();
  ttsDisplay.textContent = msg;
  ttsDisplay.classList.add('show');
  document.getElementById("tts").innerText = msg;
  setTimeout(()=>{ isSpeaking=false; ttsDisplay.classList.remove('show'); processTTS(); }, Math.max(1800, msg.length*70));
}

async function unlockAudio(){ if (hasUserInteracted) return; hasUserInteracted = true; await audioEngine.unlock(); }
document.addEventListener("click", unlockAudio, {once:true});

function playSoundByKey(key){
  if (!hasUserInteracted) return;
  if (key==='bgm') audioEngine.startBGM();
  else audioEngine.playEffect(key);
}

function selectMode(){
  document.getElementById("homeScreen").style.display = "none";
  document.getElementById("playerSelect").style.display = "flex";
  setTimeout(() => document.getElementById("firstCharBtn").focus(), 300);
}

function selectPlayer(player){
  userPlayer = player;
  cpuPlayer = player === "อ้ายมดแดง" ? "อ้ายมดดำ" : "อ้ายมดแดง";
  document.getElementById("playerSelect").style.display="none";
  document.getElementById("gameScreen").style.display="block";
  document.getElementById("backToMainMenu").style.display="none";
  playerWins = cpuWins = 0; currentRound = 1; roundStarter = null;
  startNewRound();
  playSoundByKey('bgm');
}

function startNewRound(){
  opened.clear();
  bombs = [];
  while(bombs.length < totalBombs){
    const r = Math.floor(Math.random()*totalCells);
    if(!bombs.includes(r)) bombs.push(r);
  }
  roundStarter = (currentRound === 1) ? (Math.random() < 0.5 ? 'player' : 'cpu') : (roundStarter === 'player' ? 'cpu' : 'player');
  currentTurn = roundStarter;

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for(let i=0; i<totalCells; i++){
    const cell = document.createElement("button");
    cell.className = "cell";
    cell.textContent = i+1;
    cell.onclick = () => playerChoose(i);
    cell.setAttribute("aria-label", `ช่อง ${i+1}`);
    if(i===0) cell.id="cell-1";
    grid.appendChild(cell);
  }

  // เพิ่ม/ลด Class ตามเทิร์นเพื่อ Visual Feedback
  updateTurnVisuals();

  const scoreText = `รอบที่ ${currentRound} : ${userPlayer} ${playerWins} ต่อ ${cpuPlayer} ${cpuWins}`;
  document.getElementById("lifeBoard").innerText = scoreText;
  speak(`${scoreText} ${currentTurn === 'player' ? userPlayer : cpuPlayer} เริ่มก่อน`);
  
  playSoundByKey(currentTurn === 'player' ? 's1' : 's2');
  setTimeout(() => { if(document.getElementById("cell-1")) document.getElementById("cell-1").focus(); }, 800);
  if(currentTurn === 'cpu') setTimeout(cpuTurn, 3500);
}

function updateTurnVisuals() {
  if (currentTurn === 'player') {
    document.body.classList.add('player-turn-active');
  } else {
    document.body.classList.remove('player-turn-active');
  }
}

async function playerChoose(idx){
  if(currentTurn !== 'player' || opened.has(idx)) return;
  await openCell(idx, 'player');
}

async function cpuTurn(){
  if(currentTurn !== 'cpu') return;
  let choice;
  do{ choice = Math.floor(Math.random()*totalCells); }while(opened.has(choice));
  speak(`${cpuPlayer} กำลังเปิดช่อง ${choice + 1}`);
  await new Promise(r => setTimeout(r, 2000));
  await openCell(choice, 'cpu');
}

async function openCell(idx, who){
  opened.add(idx);
  const cell = document.querySelectorAll("#grid .cell")[idx];
  cell.disabled = true;
  const isBomb = bombs.includes(idx);

  if(isBomb){
    // Visual: สั่นหน้าจอเมื่อโดนระเบิด
    document.body.classList.add('shake-screen');
    setTimeout(() => document.body.classList.remove('shake-screen'), 500);

    cell.classList.add("boom");
    cell.textContent = "💥";
    
    if (who === 'player') { cpuWins++; await playSoundByKey('hitPlayer'); }
    else { playerWins++; await playSoundByKey('hitCpu'); }

    speak(`${who === 'player' ? userPlayer : cpuPlayer} เจอระเบิด!`);
    document.getElementById("lifeBoard").innerText = `รอบที่ ${currentRound} : ${userPlayer} ${playerWins} ต่อ ${cpuPlayer} ${cpuWins}`;

    if(playerWins >= winScore || cpuWins >= winScore) endGame();
    else { currentRound++; setTimeout(startNewRound, 3000); }
  } else {
    cell.classList.add("safe");
    cell.textContent = "✔️";
    await playSoundByKey(who === 'player' ? 'missPlayer' : 'missCpu');
    
    currentTurn = who === 'player' ? 'cpu' : 'player';
    updateTurnVisuals();
    if(currentTurn === 'cpu') setTimeout(cpuTurn, 2000);
  }
}

function endGame(){
  audioEngine.stopBGM();
  playSoundByKey('end');
  const endMsg = playerWins >= winScore ? `ยอดเยี่ยม ${userPlayer} ชนะ!` : `เสียใจด้วย ${userPlayer} แพ้แล้ว!`;
  speak(endMsg);
  document.getElementById("resultAnnouncement").textContent = endMsg;
  setTimeout(() => {
    alert(endMsg + `\nคะแนน: ${playerWins} - ${cpuWins}`);
    window.location.href = '../index9.html';
  }, 2500);
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("backToMainMenu").style.display = "block";
  audioEngine.init();
});
</script>
</body>
</html>
