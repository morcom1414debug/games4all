<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>กดติด...ตาย : Dead switch (ออนไลน์)</title>
<style>
  body {font-family: Tahoma, sans-serif;background:#111;color:white;text-align:center;margin:0;padding:20px;height:100vh;overflow:hidden;position:relative;}
  #backToMainMenu{position:fixed;top:20px;left:20px;background:rgba(255,255,255,0.95);color:#333;border:3px solid #fff;border-radius:12px;padding:12px 20px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1002;display:none;}
  #backToMainMenu:hover{background:#fff;transform:translateY(-2px);}
  #lifeBoard{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:1001;background:rgba(0,0,0,0.9);padding:18px 60px;border-radius:15px;border:4px solid #ffff00;font-size:38px;font-weight:bold;color:#ffff00;text-shadow:3px 3px 6px #000;min-width:500px;}
  #turnIndicator{position:fixed;top:90px;left:50%;transform:translateX(-50%);z-index:1001;background:rgba(0,0,0,0.85);padding:12px 40px;border-radius:12px;border:3px solid #00ff00;font-size:28px;font-weight:bold;color:#00ff00;text-shadow:2px 2px 4px #000;}
  #grid-container{max-width:720px;margin:150px auto 0;padding:20px;background:#000;border-radius:20px;box-shadow:0 0 30px rgba(255,255,0,0.6);}
  #grid{display:grid;grid-template-columns:repeat(4,1fr);grid-gap:10px;background:#333;padding:20px;border-radius:15px;border:8px solid #ffff00;}
  .cell{position:relative;background:#fff;border:7px solid #00f;border-radius:15px;box-shadow:0 8px 20px rgba(0,0,0,0.7);cursor:pointer;transition:all .2s;font-weight:bold;font-size:32px;color:#000;aspect-ratio:1;}
  .cell:hover{background:#ffff99;border-color:#f00;transform:scale(1.06);}
  .cell:active{transform:scale(0.95);}
  .cell.safe{background:#0f0 !important;color:#fff;border-color:#0a0;cursor:default;}
  .cell.boom{background:#f00 !important;color:#fff;border-color:#a00;cursor:default;}
  #lobby,#room{display:none;}
  #createRoomBtn{background:#fff;color:#000;padding:20px 60px;border-radius:20px;font-weight:bold;font-size:32px;cursor:pointer;margin:30px;border:8px solid #ffff00;box-shadow:0 12px 30px rgba(255,255,0,0.6);}
  #statusMessage{font-size:28px;margin:20px;color:#ffff00;}
  #resultScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10000;display:none;gap:40px;}
  #resultScreen h1{font-size:82px;color:#ffff00;text-shadow:7px 7px #000;margin:0;}
  #resultScreen p{font-size:52px;margin:20px 0;}
  #resultScreen button{padding:25px 100px;font-size:40px;background:#4CAF50;color:white;border:none;border-radius:25px;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0;}
</style>
</head>
<body>

<button id="backToMainMenu" onclick="location.href='../index.html'">กลับเมนูหลัก</button>
<div aria-live="polite" aria-atomic="true" class="sr-only" id="ariaAnnouncer"></div>

<div id="lobby">
  <h1 style="font-size:56px;color:#ffff00;text-shadow:4px 4px #000;">กดติด...ตาย : Dead switch</h1>
  <p style="font-size:32px;color:#ffdd00;">ออนไลน์ 1 ต่อ 1 • แข่งขัน 2 ใน 3 รอบ</p>
  <button id="createRoomBtn">สร้างห้องใหม่</button>
  <h3 style="font-size:28px;">ห้องที่เปิดอยู่</h3>
  <ul id="roomList" style="list-style:none;padding:0;"></ul>
</div>

<div id="room">
  <h2 id="roomName" style="font-size:42px;color:#ffff00;"></h2>
  <p style="font-size:28px;">ผู้เล่นในห้อง:</p>
  <ul id="playerList" style="font-size:26px;list-style:none;padding:0;"></ul>
  <div id="statusMessage">รอผู้เล่นคนที่ 2 เข้ามา...</div>
</div>

<div id="gameScreen" style="display:none;">
  <div id="lifeBoard">กำลังเริ่มเกม...</div>
  <div id="turnIndicator">รอสักครู่...</div>
  <div id="grid-container"><div id="grid"></div></div>
</div>

<div id="resultScreen">
  <h1 id="resultTitle"></h1>
  <p id="resultMessage"></p>
  <button id="okButton">ตกลง</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ==================== Firebase ====================
const firebaseConfig = {
  apiKey: "AIzaSyBIPeN4YUIrwM4MmFtDvT2DJ-v4toxc7tY",
  authDomain: "xo-game-134ec.firebaseapp.com",
  databaseURL: "https://xo-game-134ec-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "xo-game-134ec",
  storageBucket: "xo-game-134ec.firebasestorage.app",
  messagingSenderId: "318375224157",
  appId: "1:318375224157:web:77bda97639a3f67db77eb4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const GAME_ID = "dead_switch_v1";

// ==================== Web Audio Engine (Stable Version) ====================
class WebAudioEngine {
  constructor() {
    this.audioCtx = null;
    this.buffers = {};
    this.isUnlocked = false;
    this.bgmSource = null;
    this.lastPlayed = {}; // ป้องกันเสียงเดียวกันดังซ้อนกันในเสี้ยววินาที
  }
  async init() {
    if (this.audioCtx) return;
    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const soundFiles = ['bgm.mp3','end.mp3','t3.mp3','t2.mp3','f3.mp3','f2.mp3','s3.mp3','s4.mp3','friend.mp3'];
    const loadPromises = soundFiles.map(async f => {
      try {
        const res = await fetch(`audio/${f}`);
        const buf = await this.audioCtx.decodeAudioData(await res.arrayBuffer());
        this.buffers[f.replace('.mp3', '')] = buf;
      } catch(e) { console.warn("Audio Load Fail:", f); }
    });
    await Promise.all(loadPromises);
  }
  async unlock() {
    if (this.isUnlocked) return;
    await this.init();
    if (this.audioCtx.state === 'suspended') await this.audioCtx.resume();
    this.isUnlocked = true;
  }
  async startBGM() {
    await this.unlock();
    if (this.bgmSource) this.stopBGM();
    const b = this.buffers['bgm']; if (!b) return;
    const s = this.audioCtx.createBufferSource();
    s.buffer = b; s.loop = true;
    const g = this.audioCtx.createGain();
    g.gain.value = 0.4; // ลดระดับเสียง BGM เล็กน้อยเพื่อความนุ่มนวล
    s.connect(g); g.connect(this.audioCtx.destination);
    s.start(0); this.bgmSource = s;
  }
  stopBGM() { if (this.bgmSource) { try { this.bgmSource.stop(); } catch(e){} this.bgmSource = null; } }
  playEffect(k) {
    if (!this.isUnlocked || !this.buffers[k]) return;
    const now = Date.now();
    // ป้องกันปัญหาเสียงเดิมดังซ้ำกันเอง (Debounce)
    if (this.lastPlayed[k] && now - this.lastPlayed[k] < 150) return;
    this.lastPlayed[k] = now;

    const s = this.audioCtx.createBufferSource();
    s.buffer = this.buffers[k];
    const g = this.audioCtx.createGain();
    g.gain.value = 0.8; // ปรับความดัง Effect ให้พอดี
    s.connect(g); g.connect(this.audioCtx.destination);
    s.start(0);
  }
}

const audio = new WebAudioEngine();
let hasUserInteracted = false;
function unlockAudio() {
  if (hasUserInteracted) return;
  hasUserInteracted = true;
  audio.unlock().catch(console.error); 
}
document.addEventListener("touchstart", unlockAudio, {once:true, passive:true});
document.addEventListener("click", unlockAudio, {once:true});

// ==================== Gameplay Logic ====================
let roomId = "", playerId = Math.random().toString(36).substr(2,9);
let isHost = false, myRole = "";
let currentRoomListener = null, soundListener = null, lobbyListener = null;
let gameStarted = false, opened = new Set(), lastSoundTimestamp = 0;

function announce(m) {
  const a = document.getElementById("ariaAnnouncer");
  a.textContent = ""; setTimeout(() => { a.textContent = m; }, 100);
}

async function playSound(f) {
  if (!roomId) return;
  await db.ref(`games/${GAME_ID}/rooms/${roomId}/sound`).set({ file:f, time:Date.now(), sender:playerId });
}

function startSoundListener() {
  if (soundListener) soundListener.off();
  soundListener = db.ref(`games/${GAME_ID}/rooms/${roomId}/sound`);
  soundListener.on("value", s => {
    const d = s.val(); 
    if (!d || Date.now() - d.time > 2000 || d.time <= lastSoundTimestamp) return;
    lastSoundTimestamp = d.time;
    audio.playEffect(d.file.replace(".mp3", ""));
  });
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("lobby").style.display = "block";
  document.getElementById("backToMainMenu").style.display = "block";
  loadRooms();
});

// One-Click Create Room Fix
document.getElementById("createRoomBtn").onclick = () => {
  unlockAudio();
  const countRef = db.ref(`games/${GAME_ID}/roomCount`);
  countRef.transaction((current) => (current || 0) + 1, async (err, comm, snap) => {
    if (comm) {
      const autoName = "dead" + String(snap.val()).padStart(5, '0');
      const roomRef = db.ref(`games/${GAME_ID}/rooms`).push();
      roomId = roomRef.key; isHost = true; myRole = "Host";
      await roomRef.set({
        name: autoName, status: "waiting", host: playerId, created: Date.now(), players: {[playerId]: "Host"}
      });
      db.ref(`games/${GAME_ID}/rooms/${roomId}/players/${playerId}`).onDisconnect().remove();
      showRoom();
    }
  });
};

async function joinRoom(id) {
  unlockAudio();
  const snap = await db.ref(`games/${GAME_ID}/rooms/${id}`).once("value");
  const room = snap.val();
  if (!room || room.status !== "waiting" || Object.keys(room.players || {}).length >= 2) return;
  roomId = id; myRole = "Guest";
  await db.ref(`games/${GAME_ID}/rooms/${roomId}/players/${playerId}`).set("Guest");
  db.ref(`games/${GAME_ID}/rooms/${roomId}/players/${playerId}`).onDisconnect().remove();
  setTimeout(() => { playSound("friend.mp3"); }, 400);
  showRoom();
}

function loadRooms() {
  if (lobbyListener) lobbyListener.off();
  lobbyListener = db.ref(`games/${GAME_ID}/rooms`).orderByChild("status").equalTo("waiting");
  lobbyListener.on("value", snap => {
    const list = document.getElementById("roomList"); list.innerHTML = "";
    snap.forEach(r => {
      const room = r.val();
      if (Object.keys(room.players || {}).length === 1) {
        const li = document.createElement("li");
        li.innerHTML = `<strong>${room.name}</strong> (1/2) <button style="margin-left:10px;padding:6px 15px;background:#4CAF50;color:white;border:none;border-radius:8px;cursor:pointer;">เข้าร่วม</button>`;
        li.querySelector("button").onclick = () => joinRoom(r.key);
        list.appendChild(li);
      }
    });
  });
}

function showRoom() {
  document.getElementById("lobby").style.display = "none";
  document.getElementById("room").style.display = "block";
  document.getElementById("backToMainMenu").style.display = "none";
  startSoundListener(); audio.startBGM();
  if (currentRoomListener) currentRoomListener.off();
  currentRoomListener = db.ref(`games/${GAME_ID}/rooms/${roomId}`);
  currentRoomListener.on("value", snap => {
    const r = snap.val(); if (!r) return;
    document.getElementById("roomName").textContent = `ห้อง: ${r.name}`;
    document.getElementById("playerList").innerHTML = Object.values(r.players || {}).map(p => `<li>${p}</li>`).join("");
    if (Object.keys(r.players || {}).length === 2) {
      document.getElementById("statusMessage").textContent = "ผู้เล่นครบแล้ว กำลังเริ่มเกม...";
      if (isHost && r.status === "waiting") setTimeout(() => startGameAuto(), 1000);
    }
    if (r.status === "playing") startGameplay();
    if (r.status === "finished") showResult(r);
  });
}

async function startGameAuto() {
  const bombs = []; while(bombs.length < 4) { const n = Math.floor(Math.random()*16); if(!bombs.includes(n)) bombs.push(n); }
  await db.ref(`games/${GAME_ID}/rooms/${roomId}`).update({
    status: "playing", currentRound: 1, hostWins: 0, guestWins: 0, bombs, opened: {}, turn: "Host", lastBoom: false, lastAction: Date.now()
  });
  playSound("s3.mp3");
}

function startGameplay() {
  gameStarted = true;
  document.getElementById("room").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";
  const gameRef = db.ref(`games/${GAME_ID}/rooms/${roomId}`);
  let lastActionTime = 0;
  gameRef.on("value", snap => {
    const d = snap.val(); if (!d || d.status !== "playing") return;
    document.getElementById("lifeBoard").textContent = `รอบที่ ${d.currentRound || 1}/3 | Host ${d.hostWins || 0} - Guest ${d.guestWins || 0}`;
    document.getElementById("turnIndicator").textContent = d.turn === "Host" ? "ตานี้ Host เลือก" : "ตานี้ Guest เลือก";
    if (!document.getElementById("grid").children.length) createBoard();
    if (d.lastAction > lastActionTime) {
      lastActionTime = d.lastAction;
      if (d.opened) Object.keys(d.opened).forEach(idxStr => {
        const idx = parseInt(idxStr); if (opened.has(idx)) return;
        opened.add(idx); const cell = document.querySelectorAll("#grid .cell")[idx];
        cell.disabled = true;
        if (d.bombs.includes(idx)) { cell.classList.add("boom"); cell.textContent = "ระเบิด"; playSound(d.turn==="Host"?"t3.mp3":"t2.mp3"); }
        else { cell.classList.add("safe"); cell.textContent = "ว่างเปล่า"; playSound(d.turn==="Host"?"f3.mp3":"f2.mp3"); }
      });
      if (d.lastBoom) setTimeout(() => {
        if (d.hostWins >= 2 || d.guestWins >= 2 || d.currentRound >= 3) gameRef.update({status: "finished"});
        else startNewRound(d);
      }, 4000);
    }
  });
}

function createBoard() {
  const g = document.getElementById("grid"); g.innerHTML = "";
  for (let i = 0; i < 16; i++) {
    const c = document.createElement("button"); c.className = "cell"; c.textContent = `ช่อง ${i+1}`;
    c.onclick = () => { unlockAudio(); playerClick(i); };
    g.appendChild(c);
  }
}

async function playerClick(idx) {
  if (!gameStarted) return;
  const d = (await db.ref(`games/${GAME_ID}/rooms/${roomId}`).once("value")).val();
  if (d.turn !== myRole || d.opened?.[idx]) return;
  const isBomb = d.bombs.includes(idx);
  const updates = { [`opened/${idx}`]: true, lastBoom: isBomb, lastAction: Date.now() };
  if (!isBomb) updates.turn = myRole === "Host" ? "Guest" : "Host";
  else { if (myRole === "Host") updates.guestWins = (d.guestWins||0)+1; else updates.hostWins = (d.hostWins||0)+1; }
  db.ref(`games/${GAME_ID}/rooms/${roomId}`).update(updates);
}

function startNewRound(d) {
  const bombs = []; while(bombs.length < 4) { const n = Math.floor(Math.random()*16); if(!bombs.includes(n)) bombs.push(n); }
  const nextRound = (d.currentRound || 1) + 1; const nextTurn = nextRound % 2 === 1 ? "Host" : "Guest";
  db.ref(`games/${GAME_ID}/rooms/${roomId}`).update({ bombs, opened: {}, lastBoom: false, turn: nextTurn, currentRound: nextRound, lastAction: Date.now() });
  opened.clear(); document.getElementById("grid").innerHTML = "";
  playSound(nextTurn === "Host" ? "s3.mp3" : "s4.mp3");
}

function showResult(r) {
  audio.stopBGM(); document.getElementById("gameScreen").style.display = "none";
  document.getElementById("resultScreen").style.display = "flex";
  const h = r.hostWins || 0, g = r.guestWins || 0;
  const winner = h >= 2 || (h > g && r.currentRound >= 3) ? "Host" : "Guest";
  document.getElementById("resultTitle").textContent = `${winner} ชนะ!`;
  document.getElementById("resultMessage").textContent = h > g ? `Host ชนะ ${h}-${g}` : `Guest ชนะ ${g}-${h}`;
  setTimeout(() => announce(`${winner} ชนะ!`), 500);
  document.getElementById("okButton").onclick = () => { unlockAudio(); audio.playEffect("end"); setTimeout(() => location.href = "../index.html", 1500); };
}
</script>
</body>
</html>
