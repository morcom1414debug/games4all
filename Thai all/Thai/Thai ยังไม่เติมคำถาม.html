<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ภาษาไทย ไม่ยากอย่างที่คิด</title>
    <style>
        :root {
            --player-color: #3498db;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
            --combo-color: #f1c40f;
            --ui-bg: rgba(255, 255, 255, 0.95);
            --board-color: #2c3e50;
        }

        .sr-only {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
        }

        body {
            margin: 0; padding: 0; background-color: #f0f2f5; color: #333;
            font-family: 'Sarabun', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            height: 100vh; position: fixed; width: 100%;
        }

        #game-container {
            width: 95%; max-width: 1000px; height: 95vh; max-height: 800px;
            position: relative; background: #fff; border: 8px solid var(--player-color);
            border-radius: 20px; display: flex; flex-direction: column; overflow: hidden;
            transition: transform 0.1s; /* สำหรับ Screen Shake */
        }

        /* --- เอฟเฟกต์พื้นหลัง (Clouds) --- */
        .cloud-bg {
            position: absolute; top: 10%; width: 100px; height: 40px; 
            background: #fff; border-radius: 20px; opacity: 0.5; z-index: 1;
            filter: blur(2px); animation: cloudMove 20s linear infinite; pointer-events: none;
        }
        @keyframes cloudMove {
            from { left: -150px; } to { left: 110%; }
        }

        /* --- UI ส่วนบน --- */
        #top-ui { background: var(--ui-bg); padding: 15px 25px; z-index: 10; border-bottom: 3px solid #eee; display: none; }
        .hp-bar-bg { height: 25px; background: #eee; border: 2px solid #ccc; border-radius: 15px; overflow: hidden; position: relative; }
        #player-hp-fill { height: 100%; width: 40%; background: linear-gradient(90deg, #2ecc71, #27ae60); transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hp-text { position: absolute; width: 100%; text-align: center; top: 0; font-weight: bold; line-height: 25px; }
        #timer-bar-bg { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        #timer-fill { width: 100%; height: 100%; background: var(--combo-color); transition: width 0.1s linear; }

        /* --- ส่วนกลาง --- */
        #pitch { flex-grow: 1; position: relative; display: none; background: #f4f7f9; overflow: hidden; }
        .blackboard { position: absolute; right: 20px; top: 30px; width: 180px; height: 110px; background: var(--board-color); border: 6px solid #8e44ad; border-radius: 5px; z-index: 2; }
        .character { position: absolute; bottom: 20px; transition: all 0.5s ease-in-out; pointer-events: none; z-index: 5; }
        #player { left: 50px; width: 220px; display: flex; gap: 20px; } 
        #bot { right: 60px; width: 120px; } 
        .char-svg { width: 100px; height: 140px; }
        
        /* Combo Aura */
        .combo-aura { filter: drop-shadow(0 0 15px var(--combo-color)); animation: pulseAura 1s infinite alternate; }
        @keyframes pulseAura { from { filter: drop-shadow(0 0 5px var(--combo-color)); } to { filter: drop-shadow(0 0 25px #ff9f43); } }

        /* Floating Score */
        .floating-score {
            position: absolute; font-weight: bold; font-size: 2rem;
            animation: floatUp 1.2s forwards; pointer-events: none; z-index: 100;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-80px); opacity: 0; }
        }

        /* Screen Shake */
        .shake { animation: screenShake 0.3s; }
        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* --- ส่วนล่าง: คำถาม --- */
        #bottom-ui { background: #fff; padding: 20px; display: none; flex-direction: column; border-top: 5px solid #eee; }
        #question-text { font-size: 1.8rem; text-align: center; margin: 0 0 15px 0; outline: none; color: #2c3e50; transition: opacity 0.3s, transform 0.3s; }
        .q-slide-in { animation: slideIn 0.4s forwards; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .option-btn { 
            padding: 15px 10px; font-size: 1.2rem; background: #f8f9fa; border: 2px solid #ddd; border-radius: 15px; 
            cursor: pointer; font-weight: bold; transition: all 0.2s; position: relative; overflow: hidden;
        }
        .option-btn:active:not(:disabled) { transform: scale(0.92); }
        .option-btn:hover:not(:disabled) { background: var(--player-color); color: #fff; border-color: var(--player-color); }

        /* --- Overlay & Restart --- */
        #overlay-screen { position: absolute; inset: 0; background: rgba(255,255,255,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; padding: 20px; }
        #overlay-screen.summary-mode { background: transparent; }
        #overlay-screen.summary-mode #action-btn { display: none; }
        #restart-btn {
            display: none; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 15px 60px; background: var(--player-color); color: white; z-index: 700;
            min-width: 220px; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        #overlay-screen.summary-mode #restart-btn { display: block; }

        /* Confetti */
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 600; animation: confettiFall 3s linear forwards; pointer-events: none; }
        @keyframes confettiFall { from { transform: translateY(-100vh) rotate(0deg); } to { transform: translateY(100vh) rotate(720deg); } }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            .cloud-bg, .floating-score, .shake, .q-slide-in, .confetti { animation: none !important; transition: none !important; }
        }

        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
        
        /* Animations existing */
        .idle { animation: idle 2s infinite ease-in-out; }
        @keyframes idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .victory-anim { animation: celebrate 0.4s infinite; }
        @keyframes celebrate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
        .sad-anim { animation: shake 0.2s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .giant-center { position: fixed !important; top: 40% !important; left: 50% !important; transform: translate(-50%, -50%) scale(2.2) !important; bottom: auto !important; z-index: 100 !important; }
        .at-top-position { position: absolute !important; top: 15px !important; left: 50% !important; transform: translateX(-50%) scale(0.9) !important; bottom: auto !important; z-index: 5 !important; }
    </style>
</head>
<body>

<div id="announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<div id="game-container">
    <div class="cloud-bg" style="top:15%; animation-duration: 25s; opacity: 0.3;" aria-hidden="true"></div>
    <div class="cloud-bg" style="top:25%; animation-duration: 35s; animation-delay: -5s;" aria-hidden="true"></div>

    <div id="top-ui">
        <div class="hp-bar-bg">
            <div id="player-hp-fill"></div>
            <div class="hp-text" id="hp-label">400 / 1000</div>
        </div>
        <div id="timer-bar-bg"><div id="timer-fill"></div></div>
    </div>

    <div id="pitch">
        <div class="blackboard"></div>
        <div id="player" class="character idle">
            <svg class="char-svg" viewBox="0 0 100 100"><circle cx="50" cy="30" r="20" fill="#fbd38d"/><rect x="30" y="50" width="40" height="40" fill="#3498db" rx="5"/></svg>
            <svg class="char-svg" viewBox="0 0 100 100"><circle cx="50" cy="30" r="20" fill="#fbd38d"/><rect x="30" y="50" width="40" height="40" fill="#e84393" rx="5"/></svg>
        </div>
        <div id="bot" class="character idle">
            <svg class="char-svg" viewBox="0 0 100 120" style="transform: scaleX(-1);"><circle cx="50" cy="30" r="20" fill="#fbd38d"/><rect x="25" y="50" width="50" height="60" fill="#a29bfe" rx="5"/></svg>
        </div>
    </div>

    <div id="bottom-ui">
        <h2 id="question-text" tabindex="-1"></h2>
        <div class="options-grid" id="options-grid"></div>
    </div>

    <div id="overlay-screen">
        <h1 id="main-title" tabindex="-1" style="color: #2c3e50; text-align: center; margin-bottom: 10px;">ภาษาไทย ไม่ยากอย่างที่คิด</h1>
        <p id="summary-text" style="font-size: 1.2rem; margin-bottom: 30px; text-align: center;">สะสมพลังให้ครบ 1,000 เพื่อชนะบทเรียน!</p>
        <button id="action-btn" class="option-btn" style="padding: 15px 50px; background: var(--correct-color); color: white; min-width: 220px;" onclick="startGame()">เริ่มบทเรียน</button>
        <button id="restart-btn" class="option-btn" onclick="startGame()">เริ่มใหม่</button>
    </div>
</div>

<script>
const questions = [
    { q: "รถยนต์ มีลักษณนามว่าอะไร?", a: ["หลัง", "คัน", "เครื่อง"], c: 1 },
    { q: "จดหมาย มีลักษณนามว่าอะไร?", a: ["ฉบับ", "แผ่น", "ใบ"], c: 0 },
    { q: "พระพุทธรูป มีลักษณนามว่าอะไร?", a: ["รูป", "องค์", "ตน"], c: 1 },
    { q: "พระสงฆ์ มีลักษณนามว่าอะไร?", a: ["องค์", "รูป", "คน"], c: 1 },
    { q: "ยักษ์ มีลักษณนามว่าอะไร?", a: ["ตัว", "องค์", "ตน"], c: 2 },
    { q: "ถนน มีลักษณนามว่าอะไร?", a: ["เส้น", "สาย", "แถว"], c: 1 },
    { q: "พัดลม มีลักษณนามว่าอะไร?", a: ["เครื่อง", "ตัว", "อัน"], c: 1 },
    { q: "ปากกา มีลักษณนามว่าอะไร?", a: ["แท่ง", "ด้าม", "อัน"], c: 1 },
    { q: "หนังสือ มีลักษณนามว่าอะไร?", a: ["เล่ม", "ผูก", "ฉบับ"], c: 0 },
    { q: "เครื่องบิน มีลักษณนามว่าอะไร?", a: ["อัน", "เครื่อง", "ลำ"], c: 2 }
];

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let sounds = {}; let bgmSource = null;
let playerHP = 400; let combo = 0; let currentQ = []; let timer = null;

async function initSounds() {
    const files = [['start','audio/start.mp3'],['back','audio/back.mp3'],['at1','audio/at1.mp3'],['atc','audio/atc.mp3'],['en1','audio/en1.mp3'],['win','audio/win.mp3'],['lost','audio/lost.mp3']];
    for(let f of files) { try { const r = await fetch(f[1]); const b = await r.arrayBuffer(); sounds[f[0]] = await audioCtx.decodeAudioData(b); } catch(e){} }
}
initSounds();

function playSound(n) { if(!sounds[n]) return; const s = audioCtx.createBufferSource(); s.buffer = sounds[n]; s.connect(audioCtx.destination); s.start(); return s; }

function announce(msg) { const el = document.getElementById('announcer'); el.textContent = ''; if(msg) setTimeout(() => { el.textContent = msg; }, 50); }

// ฟีเจอร์ใหม่: เอฟเฟกต์พลุกระดาษ
function spawnConfetti() {
    for(let i=0; i<50; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = ['#f1c40f','#e67e22','#e74c3c','#2ecc71','#3498db'][Math.floor(Math.random()*5)];
        c.style.animationDelay = Math.random() * 2 + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }
}

// ฟีเจอร์ใหม่: ตัวเลขลอยขึ้น
function showFloatingScore(val, isCorrect) {
    const p = document.getElementById('player');
    const score = document.createElement('div');
    score.className = 'floating-score';
    score.textContent = (isCorrect ? '+' : '-') + val;
    score.style.color = isCorrect ? 'var(--correct-color)' : 'var(--wrong-color)';
    score.style.left = '100px';
    p.appendChild(score);
    setTimeout(() => score.remove(), 1200);
}

function startGame() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const overlay = document.getElementById('overlay-screen');
    overlay.style.display = 'none';
    overlay.classList.remove('summary-mode');
    
    const p = document.getElementById('player');
    p.classList.remove('giant-center', 'at-top-position', 'victory-anim', 'sad-anim', 'combo-aura');
    p.classList.add('idle');

    document.getElementById('top-ui').style.display = 'block';
    document.getElementById('pitch').style.display = 'flex';
    document.getElementById('bottom-ui').style.display = 'flex';
    
    playerHP = 400; combo = 0;
    currentQ = [...questions].sort(() => Math.random() - 0.5);
    updateUI();
    playSound('start');
    
    setTimeout(() => {
        nextQuestion();
        if(!bgmSource && sounds.back) { 
            bgmSource = audioCtx.createBufferSource(); bgmSource.buffer = sounds.back; bgmSource.loop = true; bgmSource.connect(audioCtx.destination); bgmSource.start(); 
        }
    }, 2000);
}

function nextQuestion() {
    if(playerHP >= 1000 || playerHP <= 0) return endGame();
    if(currentQ.length === 0) currentQ = [...questions].sort(() => Math.random() - 0.5);
    
    const data = currentQ.pop();
    const h = document.getElementById('question-text');
    h.textContent = data.q;
    h.classList.remove('q-slide-in');
    void h.offsetWidth; // trigger reflow
    h.classList.add('q-slide-in');
    h.focus();

    const grid = document.getElementById('options-grid'); grid.innerHTML = '';
    data.a.forEach((opt, i) => {
        const b = document.createElement('button'); b.className = 'option-btn'; b.textContent = opt;
        b.onclick = () => checkAnswer(i, data.c); grid.appendChild(b);
    });

    let timeLeft = 20000;
    const bar = document.getElementById('timer-fill');
    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft -= 100; bar.style.width = (timeLeft/20000)*100 + "%";
        if(timeLeft <= 0) { clearInterval(timer); checkAnswer(-1, data.c); }
    }, 100);
}

function checkAnswer(idx, correct) {
    clearInterval(timer);
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);

    const isCorrect = idx === correct;
    const p = document.getElementById('player');
    const container = document.getElementById('game-container');
    let change = 0;

    if(isCorrect) {
        combo++;
        change = combo >= 3 ? 200 : 100;
        if(combo >= 3) { playSound('atc'); p.classList.add('combo-aura'); } else { playSound('at1'); }
        playerHP = Math.min(1000, playerHP + change);
        p.className = 'character victory-anim' + (combo >= 3 ? ' combo-aura' : '');
        showFloatingScore(change, true);
    } else {
        combo = 0;
        change = 100;
        playSound('en1');
        playerHP = Math.max(0, playerHP - change);
        p.className = 'character sad-anim';
        p.classList.remove('combo-aura');
        showFloatingScore(change, false);
        // Screen Shake
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 300);
    }

    updateUI();
    setTimeout(() => { 
        if(playerHP < 1000 && playerHP > 0) {
            p.classList.remove('victory-anim', 'sad-anim');
            nextQuestion(); 
        } else { endGame(); }
    }, 2500);
}

function updateUI() {
    document.getElementById('player-hp-fill').style.width = (playerHP/10) + "%";
    document.getElementById('hp-label').textContent = `${playerHP} / 1000`;
}

function endGame() {
    clearInterval(timer);
    if(bgmSource){ try{bgmSource.stop();}catch(e){} bgmSource = null; }
    const win = playerHP >= 1000;
    playSound(win ? 'win' : 'lost');
    if(win) spawnConfetti();

    const p = document.getElementById('player');
    const overlay = document.getElementById('overlay-screen');
    p.classList.remove('idle', 'combo-aura');
    p.classList.add('giant-center', win ? 'victory-anim' : 'sad-anim');
    document.getElementById('bottom-ui').style.display = 'none';

    setTimeout(() => {
        p.classList.remove('giant-center');
        p.classList.add('at-top-position');
        overlay.style.display = 'flex';
        overlay.classList.add('summary-mode');
        document.getElementById('restart-btn').disabled = false;
        document.getElementById('main-title').textContent = win ? "ชนะแล้ว! สุดยอดไปเลย" : "พยายามใหม่นะ อีกนิดเดียว!";
        document.getElementById('summary-text').textContent = `พลังความรู้ของคุณคือ ${playerHP} คะแนน`;
    }, 3000);
}
</script>
</body>
</html>
