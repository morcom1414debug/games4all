<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ยุทธภพภาษาไทย</title>
    <style>
        :root {
            --combo-color: #ffcc00; 
            --primary-blue: #3498db;
            --deep-blue: #2c3e50;
            --accent-pink: #e84393;
            --success-green: #2ecc71;
            --skin-asia: #FFE4B5;
        }

        /* --- Home Button --- */
        .home-btn-hex {
            width: 60px; height: 60px;
            background-color: var(--combo-color) !important; 
            color: #000 !important; font-size: 1.8rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: none;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.5));
            z-index: 9999; position: fixed; top: 20px; left: 20px;
            text-decoration: none;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #e0eafc 100%);
            overflow-x: hidden;
        }

        /* --- Character Group (คงสัดส่วนที่ปรับไว้) --- */
        .character-group {
            position: fixed; bottom: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 5%; pointer-events: none; z-index: 10;
            align-items: flex-end;
        }
        .char-child { width: 110px; height: 135px; } 
        .char-teacher { width: 155px; height: 185px; } 
        .char-container { display: flex; align-items: flex-end; }
        .char-svg { width: 100%; height: auto; filter: drop-shadow(4px 6px 10px rgba(0,0,0,0.15)); }
        .idle { animation: idle 3s infinite ease-in-out; }
        @keyframes idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- Main UI --- */
        #main-container {
            width: 90%; max-width: 550px; text-align: center;
            padding: 40px 20px; background: rgba(255, 255, 255, 0.95);
            border: 8px solid var(--primary-blue); border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative; z-index: 20;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .title-box h1 { font-size: clamp(2rem, 8vw, 3rem); color: var(--deep-blue); margin: 0; text-shadow: 2px 2px 0px var(--combo-color); }
        .subtitle { font-size: 1.1rem; color: #636e72; margin: 10px 0 25px; font-weight: bold; }

        /* --- Menu Buttons (ปรับโฉมใหม่) --- */
        .menu-stack { display: flex; flex-direction: column; gap: 18px; }
        
        .menu-btn { 
            padding: 18px; font-size: 1.4rem; font-weight: 900; color: white; 
            border: none; border-radius: 25px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; position: relative; overflow: hidden;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            font-family: 'Sarabun', sans-serif;
        }

        /* สีสันสดใสแบบไล่เฉด (Gradient) เพื่อความดึงดูด */
        .btn-1 { background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); border-bottom: 8px solid #2980b9; }
        .btn-2 { background: linear-gradient(to bottom, #ff0844 0%, #ffb199 100%); border-bottom: 8px solid #c0392b; }
        .btn-3 { background: linear-gradient(to bottom, #43e97b 0%, #38f9d7 100%); border-bottom: 8px solid #27ae60; }

        /* Animation & Hover Effects */
        .menu-btn:hover { 
            transform: translateY(-4px) scale(1.02); 
            filter: brightness(1.1); 
            box-shadow: 0 12px 0 rgba(0,0,0,0.15);
        }

        .menu-btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 2px 0 rgba(0,0,0,0.2); 
        }

        /* เพิ่มเอฟเฟกต์วิบวับ (Shine) ให้ปุ่มดูสนุก */
        .menu-btn::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: rgba(255,255,255,0.2); transform: rotate(45deg);
            transition: 0.5s; pointer-events: none; opacity: 0;
        }
        .menu-btn:hover::after { left: 100%; opacity: 1; }

        .icon-circle { 
            background: white; width: 40px; height: 40px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            order: 2; font-size: 1.5rem; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        @media (max-width: 600px) {
            .character-group { padding: 0 2%; }
            .char-child { width: 85px; height: 110px; }
            .char-teacher { width: 120px; height: 145px; }
            #main-container { padding: 30px 15px; margin-bottom: 100px; }
            .menu-btn { font-size: 1.1rem; padding: 15px; }
        }
    </style>
</head>
<body>

    <button class="home-btn-hex" aria-label="กลับสู่ชุมชน" onclick="window.location.href='../index9.html'">🏠</button>

    <div class="character-group">
        <div class="char-container char-child idle">
            <svg class="char-svg" viewBox="0 0 100 100">
                <path d="M15 45 Q15 5 50 5 Q85 5 85 45 L90 60 L10 60 Z" fill="#000000"/>
                <circle cx="50" cy="45" r="28" fill="var(--skin-asia)"/> 
                <rect x="30" y="72" width="40" height="40" rx="10" fill="#1b5e20"/>
                <circle cx="38" cy="45" r="4.5" fill="#333"/>
                <circle cx="62" cy="45" r="4.5" fill="#333"/>
                <path d="M45 58 Q50 63 55 58" stroke="#333" fill="none" stroke-width="2"/>
            </svg>
        </div>

        <div class="char-container char-teacher idle" style="animation-delay: 0.5s;">
            <svg class="char-svg" viewBox="0 0 100 140">
                <circle cx="75" cy="40" r="12" fill="#9e9e9e"/> 
                <circle cx="50" cy="45" r="28" fill="#FFDBAC"/> 
                <path d="M22 35 Q22 15 50 15 Q78 15 78 35 L82 45 L18 45 Z" fill="#9e9e9e"/>
                <rect x="28" y="44" width="18" height="12" rx="3" fill="none" stroke="#222" stroke-width="2"/>
                <rect x="54" y="44" width="18" height="12" rx="3" fill="none" stroke="#222" stroke-width="2"/>
                <circle cx="37" cy="51" r="2.5" fill="#000"/>
                <circle cx="63" cy="51" r="2.5" fill="#000"/>
                <path d="M42 62 Q50 68 58 62" stroke="#d32f2f" fill="none" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M25 75 Q50 70 75 75 L80 130 L20 130 Z" fill="#1a237e"/> 
            </svg>
        </div>
    </div>

    <div id="main-container">
        <div class="title-box">
            <h1>ยุทธภพภาษาไทย</h1>
            <p class="subtitle">เลือกหมวดเพื่อประชันวิชาได้ทันที!</p>
        </div>

        <div class="menu-stack">
            <!-- เปลี่ยนกลับเป็น Button และเพิ่ม Onclick (ข้อ 1) -->
            <button onclick="window.location.href='Thai.html'" class="menu-btn btn-1">
                ยอดยุทธลักษณะนาม <span class="icon-circle">⚔️</span>
            </button>

            <button onclick="window.location.href='Thai1.html'" class="menu-btn btn-2">
                ปราชญ์น้อยคำไวพจน์ <span class="icon-circle">📜</span>
            </button>

            <button onclick="window.location.href='thai2.html'" class="menu-btn btn-3">
                จอมยุทธสำบัดสำนวน <span class="icon-circle">🎭</span>
            </button>
        </div>
    </div>

</body>
</html>
