<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ปราชญ์น้อยคำไวพจน์</title>
    <style>
        /* [STAGE 6: SILENT OPERATOR - ปรับเฉพาะสีสันเพื่อ High Contrast สำหรับผู้สูงอายุ] */
        :root {
            --player-color: #a04000; /* เปลี่ยนเป็นสีน้ำตาลแดง/ชาด */
            --correct-color: #27ae60;
            --wrong-color: #c0392b;
            --combo-color: #d4af37; /* สีทองหม่น */
            --ui-bg: #fdf5e6; /* สีครีมถนอมสายตา (Old Lace) */
            --board-color: #5d4037; /* สีน้ำตาลไม้ */
            --skin-asia: #FFE4B5;
            --text-main: #2c3e50;
        }

        .sr-only {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
        }

        body {
            margin: 0; padding: 0; background-color: #eaddca; color: var(--text-main);
            font-family: 'Sarabun', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            height: 100vh; position: fixed; width: 100%;
        }

        #game-container {
            width: 95%; max-width: 1000px; height: 95vh; max-height: 800px;
            position: relative; background: var(--ui-bg); border: 8px solid var(--player-color);
            border-radius: 20px; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- Animation Logic (คงเดิม 100%) --- */
        .shake-screen { animation: screenShake 0.4s; }
        @keyframes screenShake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-5px, 5px); } 75% { transform: translate(5px, -5px); } }
        .flash-correct { animation: flashGreen 0.5s; }
        @keyframes flashGreen { 0% { box-shadow: inset 0 0 0 0px rgba(46, 204, 113, 0.5); } 100% { box-shadow: inset 0 0 100px 50px rgba(46, 204, 113, 0); } }

        .particle {
            position: absolute; pointer-events: none; z-index: 100; border-radius: 50%;
            animation: particleOut 0.8s ease-out forwards;
        }
        @keyframes particleOut { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; } }

        .floating-text {
            position: absolute; pointer-events: none; font-size: 2.5rem; font-weight: 900;
            z-index: 1000; animation: floatUp 1.2s ease-out forwards;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        .text-gain { color: var(--correct-color); }
        .text-loss { color: var(--wrong-color); }

        /* --- UI Elements --- */
        #top-ui { background: var(--ui-bg); padding: 15px 25px; z-index: 10; border-bottom: 3px solid #dcd0c0; display: none; }
        .hp-bar-bg { height: 30px; background: #e0d5c5; border: 2px solid var(--player-color); border-radius: 15px; overflow: hidden; position: relative; }
        #player-hp-fill { height: 100%; width: 40%; background: linear-gradient(90deg, #d35400, #a04000); transition: width 0.5s; }
        .hp-text { position: absolute; width: 100%; text-align: center; top: 0; font-weight: bold; line-height: 30px; color: #000; }
        #timer-bar-bg { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        #timer-fill { width: 100%; height: 100%; background: var(--combo-color); transition: width 0.1s linear; }
        
        #pitch { flex-grow: 1; position: relative; display: none; background: #f4ece2; overflow: hidden; }
        .blackboard { position: absolute; right: 20px; top: 30px; width: 180px; height: 110px; background: var(--board-color); border: 6px solid var(--player-color); border-radius: 5px; }
        
        /* --- Character Styling (ปรับเฉพาะสีเสื้อผ้าและผม) --- */
        .character { position: absolute; bottom: 20px; transition: all 0.5s ease-in-out; pointer-events: none; }
        #player { left: 50px; width: 260px; display: flex; gap: 10px; z-index: 5; } 
        #bot { right: 40px; width: 150px; z-index: 5; } 
        .char-svg { width: 120px; height: 160px; filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.15)); }
        
        .idle { animation: idle 2s infinite ease-in-out; }
        @keyframes idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .victory-anim { animation: celebrate 0.4s infinite; }
        @keyframes celebrate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-40px); } }
        .sad-anim { animation: shake 0.2s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        #bottom-ui { background: var(--ui-bg); padding: 20px; display: none; flex-direction: column; border-top: 5px solid #dcd0c0; }
        #question-text { font-size: 2rem; text-align: center; margin: 0 0 15px 0; outline: none; color: var(--player-color); font-weight: bold; }
        
        /* ปรับ Grid ให้รองรับคำยาวขึ้นสำหรับผู้สูงอายุ */
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; width: 100%; }
        .option-btn { 
            padding: 20px 15px; font-size: 1.5rem; background: #fff; border: 3px solid #ccc; 
            border-radius: 15px; cursor: pointer; font-weight: bold; transition: all 0.2s; 
            color: var(--text-main); min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .option-btn:hover:not(:disabled), .option-btn:focus { background: var(--player-color); color: #fff; border-color: var(--combo-color); }
        
        #overlay-screen { position: absolute; inset: 0; background: rgba(253, 245, 230, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; padding: 20px; }
        
        .home-btn-hex {
            width: 70px; height: 70px; background-color: var(--combo-color) !important; 
            color: #000 !important; font-size: 2rem; display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: none; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            transition: all 0.3s ease; filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));
            -webkit-appearance: none; text-decoration: none; z-index: 600;
        }

        .home-btn-hex:hover { transform: scale(1.1) rotate(5deg); filter: brightness(1.1); }
        .top-left-home { position: absolute; top: 20px; left: 20px; }
        #summary-home-btn { display: none; }
        #overlay-screen.summary-mode #summary-home-btn { display: flex !important; position: relative; margin-top: 20px; }
        #overlay-screen.summary-mode #action-btn { display: none !important; }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            #question-text { font-size: 1.6rem; }
            .option-btn { font-size: 1.3rem; padding: 15px; }
            #player { left: 20px; width: 180px; }
            .char-svg { width: 90px; height: 120px; }
        }
    </style>
</head>
<body>

<div id="announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<div id="game-container">
    <div id="top-ui">
        <div class="hp-bar-bg">

        <div id="bot" class="character idle">
            <!-- คุณครู: ผมเทา ชุดน้ำเงินกรมท่า แว่นเดิม หน้าเดิม -->

                <rect x="54" y="44" width="18" height="12" rx="3" fill="none" stroke="#555" stroke-width="1.5"/>
                <path d="M46 50 L54 50" stroke="#555" stroke-width="1.5"/>
                <path d="M34 49 Q37 47 40 49" stroke="#333" fill="none" stroke-width="2" stroke-linecap="round"/>
                <path d="M60 49 Q63 47 66 49" stroke="#333" fill="none" stroke-width="2" stroke-linecap="round"/>
                <circle cx="37" cy="51" r="2" fill="#333"/>
                <circle cx="63" cy="51" r="2" fill="#333"/>
                <path d="M48 55 Q50 57 52 55" stroke="#D2B48C" fill="none" stroke-width="1.5"/>
                <path d="M42 62 Q50 68 58 62" stroke="#E67E22" fill="none" stroke-width="2" stroke-linecap="round"/>
                <circle cx="23" cy="55" r="2" fill="#F1C40F"/>
                <circle cx="77" cy="55" r="2" fill="#F1C40F"/>
                <path d="M25 75 Q50 70 75 75 L80 130 L20 130 Z" fill="#2c3e50"/> 
                <path d="M40 73 L50 85 L60 73" fill="#1a252f"/>

            </svg>
        </div>
    </div>

    <div id="bottom-ui">
        <h2 id="question-text" tabindex="-1"></h2>
        <div class="options-grid" id="options-grid"></div>
    </div>

    <div id="overlay-screen">
        <button id="main-home-btn" class="home-btn-hex top-left-home" aria-label="กลับสู่ชุมชน" onclick="window.location.href='../index9.html'">🏠</button>
        <h1 id="main-title" tabindex="-1" style="color: var(--player-color); text-align: center; margin-bottom: 10px;">ปราชญ์น้อยคำไวพจน์</h1>
<p id="summary-text" style="font-size: 1.2rem; margin-bottom: 30px; text-align: center; line-height: 1.6;">
    สะสมพลังให้ครบ 1,000 เพื่อเป็นสุดยอดปราชญ์!<br>
    <span style="font-size: 1rem; color: #555555;">พัฒนาโดย - ครูเน นนทิยา และ morcom1414</span>
</p>        <button id="action-btn" class="option-btn" style="padding: 15px 50px; background: var(--correct-color); color: white; min-width: 250px; border:none;" onclick="startGame()">เริ่มบทเรียน</button>
        <button id="summary-home-btn" class="home-btn-hex" aria-label="กลับสู่ชุมชน" onclick="window.location.href='../index9.html'">🏠</button>

</div>

<script>
/* [STAGE 4: LOGIC RIGIDITY - ทุกอย่างคงเดิม 100% ยกเว้นชุดคำถาม] */
const questions = [
    { q: "คำในข้อใดเป็นคำไวพจน์ของ 'พระอาทิตย์'?", a: ["รัชนีกร", "ทินกร", "อัมพร"], c: 1 },

    { q: "คำว่า 'ศศิธร' มีความหมายตรงกับข้อใด?", a: ["พระอาทิตย์", "ดวงดาว", "ดวงจันทร์"], c: 2 },
    { q: "คำในข้อใดเป็นคำไวพจน์ของ 'แผ่นดิน'?", a: ["เมทินี", "กระแสสินธุ์", "นภา"], c: 0 },

    { q: "คำในข้อใดหมายถึง 'น้ำ'?", a: ["วารี", "อนิล", "พนา"], c: 0 },

    { q: "คำว่า 'ปฐวี' มีความหมายตรงกับข้อใด?", a: ["ท้องฟ้า", "น้ำ", "แผ่นดิน"], c: 2 },

    { q: "คำในข้อใดหมายถึง 'ท้องฟ้า'?", a: ["เวหา", "สาคร", "ไพร"], c: 0 },
    { q: "คำว่า 'แข' มีความหมายตรงกับข้อใด?", a: ["ดวงอาทิตย์", "ดวงจันทร์", "ดวงดาว"], c: 1 },
    { q: "คำในข้อใดเป็นคำไวพจน์ของ 'แผ่นดิน'?", a: ["พสุธา", "วาริน", "โพยม"], c: 0 },

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let sounds = {}; let bgmSource = null;
let playerHP = 400; let combo = 0; let wrongCombo = 0;
let currentQ = []; let timer = null; let lastSound = '';

/* Visual Effect Logic (คงเดิม) */
function createVisualEffect(isCorrect, changeValue) {
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');
    const rect = player.getBoundingClientRect();
    const color = isCorrect ? '#2ecc71' : '#e74c3c';
    const floatTxt = document.createElement('div');
    floatTxt.textContent = (isCorrect ? "+" : "-") + changeValue;
    floatTxt.className = `floating-text ${isCorrect ? 'text-gain' : 'text-loss'}`;
    floatTxt.style.left = (rect.left + rect.width / 2) + "px";
    floatTxt.style.top = (rect.top) + "px";
    document.body.appendChild(floatTxt);
    setTimeout(() => floatTxt.remove(), 1200);
    for(let i=0; i<12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.backgroundColor = color;
        p.style.width = p.style.height = (Math.random() * 12 + 6) + 'px';
        p.style.left = (rect.left + rect.width/2) + 'px';
        p.style.top = (rect.top + rect.height/2) + 'px';
        p.style.setProperty('--mx', (Math.random() - 0.5) * 250 + 'px');
        p.style.setProperty('--my', (Math.random() - 0.5) * 250 + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
    if(isCorrect) { container.classList.add('flash-correct'); setTimeout(() => container.classList.remove('flash-correct'), 500); }
    else { container.classList.add('shake-screen'); setTimeout(() => container.classList.remove('shake-screen'), 400); }
}

/* Audio Logic (คงเดิม 100%) */
async function initSounds() {
    const files = [['start','audio/start.mp3'],['back','audio/back.mp3'],['at1','audio/at1.mp3'],['at2','audio/at2.mp3'],['at3','audio/at3.mp3'],['atc','audio/atc.mp3'],['en1','audio/en1.mp3'],['en2','audio/en2.mp3'],['en3','audio/en3.mp3'],['enc','audio/enc.mp3'],['win','audio/win.mp3'],['lost','audio/lost.mp3']];
    for(let f of files) { try { const r = await fetch(f[1]); const b = await r.arrayBuffer(); sounds[f[0]] = await audioCtx.decodeAudioData(b); } catch(e){} }
}
initSounds();

function playSound(n) { if(!sounds[n]) return; const s = audioCtx.createBufferSource(); s.buffer = sounds[n]; s.connect(audioCtx.destination); s.start(); return s; }
function announce(msg) { const el = document.getElementById('announcer'); el.textContent = ''; if(msg) { setTimeout(() => { el.textContent = msg; }, 50); } }

/* Game Start Logic (คงเดิม) */
function startGame() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const overlay = document.getElementById('overlay-screen');
    overlay.style.display = 'none';
    overlay.classList.remove('summary-mode');
    document.getElementById('main-home-btn').style.display = 'none';
    const p = document.getElementById('player');
    p.classList.remove('giant-center', 'at-top-position', 'victory-anim', 'sad-anim');
    p.classList.add('idle');
    document.getElementById('top-ui').style.display = 'block';
    document.getElementById('pitch').style.display = 'flex';
    document.getElementById('bottom-ui').style.display = 'flex';
    playerHP = 400; combo = 0; wrongCombo = 0;
    currentQ = [...questions].sort(() => Math.random() - 0.5);
    updateUI();
    playSound('start');
    announce("เริ่มบทเรียน พลังปัจจุบันคือ 400 คะแนน");
    setTimeout(() => {
        nextQuestion();
        if(!bgmSource && sounds.back) { bgmSource = audioCtx.createBufferSource(); bgmSource.buffer = sounds.back; bgmSource.loop = true; bgmSource.connect(audioCtx.destination); bgmSource.start(); }
    }, 3000);
}

/* Question & Answer Logic (คงเดิม) */
function nextQuestion() {
    announce(""); 
    if(playerHP >= 1000 || playerHP <= 0) return endGame();
    if(currentQ.length === 0) currentQ = [...questions].sort(() => Math.random() - 0.5);
    const data = currentQ.pop();
    const h = document.getElementById('question-text');
    h.textContent = data.q; h.focus();
    const grid = document.getElementById('options-grid'); grid.innerHTML = '';
    data.a.forEach((opt, i) => {
        const b = document.createElement('button'); b.className = 'option-btn'; b.textContent = opt;
        b.onclick = () => checkAnswer(i, data.c); grid.appendChild(b);
    });
    let timeLeft = 20000;
    const bar = document.getElementById('timer-fill');
    clearInterval(timer);
    timer = setInterval(() => { timeLeft -= 100; bar.style.width = (timeLeft/20000)*100 + "%"; if(timeLeft <= 0) { clearInterval(timer); checkAnswer(-1, data.c); } }, 100);
}

function checkAnswer(idx, correct) {
    clearInterval(timer);
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    const isCorrect = idx === correct;
    const p = document.getElementById('player');
    let change = 0;
    if(isCorrect) {
        combo++; wrongCombo = 0;
        if(combo >= 4) { change = Math.floor(Math.random() * 71) + 180; playSound('atc'); combo = 0; } 
        else { change = Math.floor(Math.random() * 41) + 80; let s; do{s='at'+(Math.floor(Math.random()*3)+1);}while(s===lastSound); playSound(s); lastSound=s; }
        playerHP = Math.min(1000, playerHP + change);
        p.className = 'character victory-anim';
        announce(`ถูกต้อง! ได้พลังเพิ่ม ${change} คะแนน พลังรวมคือ ${playerHP}`);
        createVisualEffect(true, change);
    } else {
        wrongCombo++; combo = 0;
        if(wrongCombo >= 4) { change = Math.floor(Math.random() * 71) + 180; playSound('enc'); wrongCombo = 0; } 
        else { change = Math.floor(Math.random() * 41) + 80; let s; do{s='en'+(Math.floor(Math.random()*3)+1);}while(s===lastSound); playSound(s); lastSound=s; }
        playerHP = Math.max(0, playerHP - change);
        p.className = 'character sad-anim';
        announce(`เสียดายจัง หักพลัง ${change} คะแนน พลังรวมเหลือ ${playerHP}`);
        createVisualEffect(false, change);
    }
    updateUI();
    setTimeout(() => { if(playerHP < 1000 && playerHP > 0) { p.className = 'character idle'; nextQuestion(); } else { endGame(); } }, 3500);
}

function updateUI() { document.getElementById('player-hp-fill').style.width = (playerHP/10) + "%"; document.getElementById('hp-label').textContent = `${playerHP} / 1000`; }

function endGame() {
    clearInterval(timer); announce(""); 
    if(bgmSource){ try{bgmSource.stop();}catch(e){} bgmSource = null; }
    const win = playerHP >= 1000;
    const endSoundNode = playSound(win ? 'win' : 'lost');
    const p = document.getElementById('player');
    const overlay = document.getElementById('overlay-screen');
    const title = document.getElementById('main-title');
    const summary = document.getElementById('summary-text');
    p.classList.remove('idle'); p.classList.add('giant-center', win ? 'victory-anim' : 'sad-anim');
    document.getElementById('bottom-ui').style.display = 'none';
    const soundDuration = (endSoundNode && endSoundNode.buffer) ? endSoundNode.buffer.duration * 1000 : 4000;
    setTimeout(() => {
        p.classList.remove('giant-center'); p.classList.add('at-top-position');
        overlay.style.display = 'flex'; 
        overlay.classList.add('summary-mode');
        title.textContent = win ? "ชนะแล้ว! ท่านคือมหาปราชญ์" : "พยายามใหม่นะ พลังความรู้ยังไม่พอ";
        summary.textContent = win ? "สะสมพลังคำไวพจน์ได้ครบ 1,000 คะแนน!" : `สะสมพลังได้เพียง ${playerHP} คะแนน`;
        title.focus();
    }, soundDuration);
}
</script>
</body>
</html>
