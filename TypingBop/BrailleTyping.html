<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille Typing Bop (M)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800;900&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Kanit', sans-serif;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6b7280, #a78bfa);
            background-size: 300% 300%;
            animation: gradientBG 18s ease infinite;
            position: relative;
        }

        @keyframes gradientBG {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating orbs สำหรับหน้าแรก */
        .orb {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            pointer-events: none;
            animation: float 24s infinite ease-in-out;
            z-index: 0;
        }
        .orb:nth-child(1) { width: 220px; height: 220px; top: 10%; left: 6%;  animation-delay: 0s;   }
        .orb:nth-child(2) { width: 280px; height: 280px; top: 65%; left: 75%; animation-delay: -8s;  }
        .orb:nth-child(3) { width: 160px; height: 160px; top: 40%; right: 12%;animation-delay: -16s; }

        @keyframes float {
            0%,100% { transform: translate(0, 0) rotate(0deg); }
            25%     { transform: translate(70px, -50px) rotate(4deg); }
            50%     { transform: translate(-40px, 80px) rotate(-3deg); }
            75%     { transform: translate(50px, 40px) rotate(5deg); }
        }

        .container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            padding: 1.4rem 1rem;
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #backToMenu {
            position: absolute;
            top: 1.2rem;
            left: 1.2rem;
            z-index: 100;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.24);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            color: white;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 22px rgba(0,0,0,0.38);
        }
        #backToMenu:hover { background: rgba(255,255,255,0.3); transform: translateY(-3px); }

        #levelSelect, #game, #result {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 32px;
            padding: 2.4rem 2rem;
            box-shadow: 0 22px 70px rgba(0,0,0,0.45);
            margin: auto 0;
            position: relative;
            z-index: 5;
        }

        h1 {
            font-size: 2.7rem;
            margin: 0.5rem 0 1.3rem;
            text-shadow: 0 7px 20px rgba(0,0,0,0.6);
            text-align: center;
        }

        .subtitle {
            font-size: 1.25rem;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        /* ── เพิ่มส่วนเลือกเสียง ── */
        .voice-select-container {
            background: rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 1.4rem 1.8rem;
            margin-bottom: 2.2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.18);
        }

        .voice-select-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 1.1rem 0;
            text-align: center;
        }

        .voice-options {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .voice-label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.25rem;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        .voice-label input[type="radio"] {
            width: 1.3rem;
            height: 1.3rem;
            accent-color: #ffe066;
        }

        .level-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
            align-items: center;
        }

        .level-btn {
            width: 100%;
            max-width: 380px;
            padding: 1.5rem 2.2rem;
            font-size: 1.8rem;
            font-weight: 800;
            border: none;
            border-radius: 26px;
            cursor: pointer;
            color: #111;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 14px 36px rgba(0,0,0,0.45);
            position: relative;
            overflow: hidden;
        }
        .level-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-120%);
            transition: transform 0.7s;
        }
        .level-btn:hover::before { transform: translateX(120%); }
        .level-btn:hover { transform: translateY(-12px) scale(1.05); }
        .level-btn:active { transform: translateY(-5px) scale(0.96); }

        #easy   { background: linear-gradient(135deg, #51cf66, #40c057); color: white; }
        #medium { background: linear-gradient(135deg, #ffd43b, #fcc419); color: #111; }
        #hard   { background: linear-gradient(135deg, #ff6b6b, #fa5252); color: white; }

        .question-heading {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0.8rem 0 1.4rem;
            padding: 1rem 1.8rem;
            background: rgba(255,255,255,0.13);
            border-radius: 22px;
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .spelling-display {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 16px;
            color: #ffe066;
            text-shadow: 0 8px 24px rgba(0,0,0,0.65);
            min-height: 90px;
            text-align: center;
            margin: 1.6rem 0;
            transition: transform 0.3s ease;
        }

        .letters {
            display: flex;
            justify-content: center;
            margin: 2.5rem 0.8rem 3rem;
            gap: 3.2rem;
        }

        .braille-column {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .letter-btn {
            width: 100px;
            height: 100px;
            padding: 0;
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #ffe066, #ffd633);
            color: #1a1a1a;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 
                0 12px 30px rgba(0,0,0,0.45),
                inset 0 -8px 14px rgba(0,0,0,0.22);
            transition: all 0.2s ease;
            user-select: none;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .letter-btn:hover:not(.used):not(.wrong) {
            transform: translateY(-8px) scale(1.09);
            box-shadow: 0 18px 40px rgba(0,0,0,0.5);
        }

        .letter-btn:active:not(.used):not(.wrong) {
            transform: translateY(-3px) scale(0.95);
            box-shadow: 0 8px 20px rgba(0,0,0,0.45);
        }

        .letter-btn.used {
            background: linear-gradient(145deg, #adb5bd, #868e96) !important;
            color: #dee2e6 !important;
            transform: scale(0.92);
            box-shadow: inset 0 5px 12px rgba(0,0,0,0.45);
            cursor: not-allowed;
        }

        .letter-btn.wrong {
            background: #ff4d4d !important;
            color: white !important;
            animation: wrongPulse 0.7s ease;
        }

        @keyframes wrongPulse {
            0%,100% { transform: scale(1); }
            35%     { transform: scale(1.14); }
        }

        #result {
            padding: 1.8rem 1.6rem;
            max-height: 85vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #result h2 {
            font-size: 2.6rem;
            margin: 0.4rem 0 1rem;
            text-shadow: 0 6px 20px rgba(0,0,0,0.55);
        }

        #resultMsg {
            font-size: 1.55rem;
            margin: 1.2rem 0;
            line-height: 1.5;
            text-align: center;
        }

        #score {
            font-size: 4.2rem;
            font-weight: 900;
            margin: 1.4rem 0 1.8rem;
            color: #ffe066;
            text-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .result-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            width: 100%;
        }

        .btn-restart, .btn-newmode {
            padding: 1rem 2.4rem;
            font-size: 1.35rem;
            font-weight: 700;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            color: white;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.45);
            flex: 1 1 45%;
            max-width: 220px;
            min-width: 160px;
            text-align: center;
        }

        .btn-restart { background: linear-gradient(135deg, #4ecdc4, #45b7a7); }
        .btn-newmode  { background: linear-gradient(135deg, #667eea, #5a67d8); }

        .btn-restart:hover, .btn-newmode:hover {
            transform: translateY(-8px) scale(1.06);
        }
        .btn-restart:active, .btn-newmode:active {
            transform: translateY(-3px) scale(0.96);
        }

        @keyframes screenShake {
            0%,100% { transform: translate(0,0); }
            10%,30%,50%,70%,90% { transform: translate(-5px, 4px); }
            20%,40%,60%,80%     { transform: translate(5px, -4px); }
        }

        .shake {
            animation: screenShake 0.6s cubic-bezier(.36,.07,.19,.97) both;
        }

        .flash-red {
            position: fixed;
            inset: 0;
            background: rgba(255, 60, 60, 0.3);
            pointer-events: none;
            opacity: 0;
            z-index: 999;
            animation: flashRed 0.7s forwards;
        }

        @keyframes flashRed {
            0%   { opacity: 0; }
            25%  { opacity: 0.9; }
            100% { opacity: 0; }
        }

        .game-btn {
            background: rgba(255,255,255,0.17);
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(14px);
            padding: 0.9rem 1.8rem;
            border-radius: 999px;
            color: white;
            font-weight: 600;
            margin: 0.7rem;
            transition: all 0.3s;
        }
        .game-btn:hover:not(:disabled) { background: rgba(255,255,255,0.35); transform: translateY(-3px); }
        .game-btn:disabled { opacity: 0.4; }

        @media (max-width: 480px) {
            h1                { font-size: 2.3rem; }
            .question-heading { font-size: 2.1rem; }
            .spelling-display { font-size: 3.3rem; letter-spacing: 12px; }
            .letter-btn       { width: 80px; height: 80px; font-size: 2.6rem; }
            .letters          { gap: 2.4rem; margin: 2rem 0.5rem 2.5rem; }
            .braille-column   { gap: 1rem; }

            #result {
                padding: 1.4rem 1.2rem;
            }
            #result h2 {
                font-size: 2.2rem;
            }
            #resultMsg {
                font-size: 1.35rem;
            }
            #score {
                font-size: 3.6rem;
                margin: 1.2rem 0 1.6rem;
            }
            .btn-restart, .btn-newmode {
                padding: 0.9rem 2rem;
                font-size: 1.2rem;
            }

            .voice-options {
                gap: 2rem;
            }
            .voice-label {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div class="orb"></div><div class="orb"></div><div class="orb"></div>

<div class="container">

    <button id="backToMenu">กลับเมนูหลัก</button>

    <div id="levelSelect">
        <h1>ลานประลองพิมพ์เร็ว : Braille Typing Bop</h1>
        
        <div class="voice-select-container">
            <div class="voice-select-title">เลือกเสียงที่จะเล่น</div>
            <div class="voice-options">
                <label class="voice-label">
                    <input type="radio" name="voice" value="a1" checked>
                    เสียง 1 (ผู้หญิง)
                </label>
                <label class="voice-label">
                    <input type="radio" name="voice" value="a">
                    เสียง 2 (ผู้ชาย)
                </label>
            </div>
        </div>

        <p class="subtitle">พิมพ์ผิดระบบจะหัก 50 คะแนน ลดเวลาลง และเปลี่ยนข้อทันที! แต่หากปล่อยจนหมดเวลา = เกมจบ</p>
        <div class="level-buttons">
            <button class="level-btn" id="easy">ฝึกพื้นฐานเซียน</button>
            <button class="level-btn" id="medium">ระดับเซียน</button>
            <button class="level-btn" id="hard">ปราบเซียน</button>
        </div>
    </div>

    <div id="game" style="display:none">
        <h2 class="question-heading" id="question" tabindex="-1">เตรียมตัว...</h2>
        <div class="spelling-display" id="spellingDisplay">_ _ _ _ _ _</div>
        
        <div class="letters" id="letters" aria-hidden="true">
            <div class="braille-column">
                <button class="letter-btn" data-letter="1">1</button>
                <button class="letter-btn" data-letter="2">2</button>
                <button class="letter-btn" data-letter="3">3</button>
            </div>
            <div class="braille-column">
                <button class="letter-btn" data-letter="4">4</button>
                <button class="letter-btn" data-letter="5">5</button>
                <button class="letter-btn" data-letter="6">6</button>
            </div>
        </div>

        <div style="text-align:center; margin-top:1.2rem;">
            <button id="stopBtn" class="game-btn" disabled>⏹ หยุดเกม</button>
            <button id="audioModeBtn" class="game-btn">โหมดเสียง: File</button>
        </div>
    </div>

    <div id="result" style="display:none">
        <h2 id="resultTitle" tabindex="-1">สุดยอดมาก!</h2>
        <div id="resultMsg" style="font-size:2.4rem; margin:2rem 0; line-height:1.6;"></div>
        <div id="score">0 คะแนน</div>

        <div class="result-buttons">
            <button class="btn-restart" id="restartBtn">เริ่มเล่นใหม่</button>
            <button class="btn-restart btn-newmode" id="newModeBtn">เลือกโหมดใหม่</button>
        </div>
    </div>

</div>

<div id="flashOverlay" class="flash-red"></div>

<script>
// Web Audio API Setup
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

const soundBuffers = {};
const bgmSource = { node: null, isPlaying: false };

let audioMode = 'file';
let voiceFolder = 'a1';   // default เสียง 1 (ผู้หญิง)

async function loadSound(name, url) {
    try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        soundBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (err) {
        console.warn(`โหลดเสียง ${name} ไม่สำเร็จ`, err);
    }
}

// สร้างลิสต์เสียงที่จะโหลด — เฉพาะ a-z จะเปลี่ยน folder ตาม voiceFolder
function getSoundsToLoad() {
    const letterSounds = [];
    const letters = 'abcdefghijklmnopqrstuvwxyz';
    for (let char of letters) {
        letterSounds.push([char, `${voiceFolder}/${char}.mp3`]);
    }

    return [
        ...letterSounds,
        ['correct', 'sounds/correct.mp3'], ['wrong', 'sounds/wrong.mp3'],
        ['tick',    'sounds/tick.mp3'],    ['start',  'sounds/start.mp3'],
        ['gameover','sounds/gameover.mp3'], ['bgm',    'audio/b2.mp3'],
        ['time',    'sounds/time.mp3'],     ['wrong_bop', 'sounds/f.mp3']
    ];
}

let soundsLoadedPromise = null;

function reloadSounds() {
    // ล้าง buffer เก่าเฉพาะตัวอักษร (a-z)
    for (let key in soundBuffers) {
        if (key.length === 1 && key >= 'a' && key <= 'z') {
            delete soundBuffers[key];
        }
    }

    const soundsToLoad = getSoundsToLoad();
    soundsLoadedPromise = Promise.all(soundsToLoad.map(([name, url]) => loadSound(name, url)))
        .then(() => console.log(`โหลดเสียงใหม่เรียบร้อย (folder: ${voiceFolder})`))
        .catch(err => console.warn("บางไฟล์เสียงโหลดไม่สำเร็จ", err));
}

// โหลดรอบแรกด้วย default
reloadSounds();

function play(name, volume = 1.0) {
    if (audioMode === 'off' || !soundBuffers[name]) return;
    const source = audioCtx.createBufferSource();
    source.buffer = soundBuffers[name];
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = volume;
    source.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    source.start(0);
}

function startBackgroundBGM() {
    if (bgmSource.isPlaying || !soundBuffers['time'] || audioMode === 'off') return;
    const source = audioCtx.createBufferSource();
    source.buffer = soundBuffers['time'];
    source.loop = true;
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.40;
    source.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    source.start(0);
    bgmSource.node = source;
    bgmSource.isPlaying = true;
}

function stopBackgroundBGM() {
    if (bgmSource.node && bgmSource.isPlaying) {
        bgmSource.node.stop();
        bgmSource.node = null;
        bgmSource.isPlaying = false;
    }
}

let hasUserInteracted = false;
function unlockAudio() {
    if (hasUserInteracted || audioCtx.state === 'running') return;
    hasUserInteracted = true;
    audioCtx.resume().then(() => console.log("AudioContext is running"));
}

document.addEventListener("touchstart", unlockAudio, {once: true, passive: true});
document.addEventListener("click", unlockAudio, {once: true});

// ตัวแปรเกม (เหมือนเดิม)
const alphabetPatterns = [
    { letter: "a", dots: "1" },
    { letter: "b", dots: "1,2" },
    { letter: "c", dots: "1,4" },
    { letter: "d", dots: "1,4,5" },
    { letter: "e", dots: "1,5" },
    { letter: "f", dots: "1,2,4" },
    { letter: "g", dots: "1,2,4,5" },
    { letter: "h", dots: "1,2,5" },
    { letter: "i", dots: "2,4" },
    { letter: "j", dots: "2,4,5" },
    { letter: "k", dots: "1,3" },
    { letter: "l", dots: "1,2,3" },
    { letter: "m", dots: "1,3,4" },
    { letter: "n", dots: "1,3,4,5" },
    { letter: "o", dots: "1,3,5" },
    { letter: "p", dots: "1,2,3,4" },
    { letter: "q", dots: "1,2,3,4,5" },
    { letter: "r", dots: "1,2,3,5" },
    { letter: "s", dots: "2,3,4" },
    { letter: "t", dots: "2,3,4,5" },
    { letter: "u", dots: "1,3,6" },
    { letter: "v", dots: "1,2,3,6" },
    { letter: "w", dots: "2,4,5,6" },
    { letter: "x", dots: "1,3,4,6" },
    { letter: "y", dots: "1,3,4,5,6" },
    { letter: "z", dots: "1,3,5,6" }
];

let currentPattern = null;
let score = 0, timerInterval, timeLimit = 5000;
let isProcessingTimeout = false;
let backBtn, levelSelect, gameDiv, resultDiv, questionElem, spellingDisplay, lettersDiv, stopBtn, audioModeBtn;
let running = false;
let pressedDots = new Set();
let timestamps = {};
let correctDotsSet = new Set();
let currentLevel = null;
let dotButtons = [];

function setEquals(setA, setB) {
    if (setA.size !== setB.size) return false;
    for (let item of setA) if (!setB.has(item)) return false;
    return true;
}

function activateApplicationMode() {
    levelSelect.setAttribute('aria-hidden', 'true');
    gameDiv.setAttribute('aria-hidden', 'false');
    gameDiv.setAttribute('role', 'application');
    gameDiv.setAttribute('tabindex', '0');
    try { gameDiv.focus(); } catch (e) {}
}

function deactivateApplicationMode() {
    gameDiv.setAttribute('aria-hidden', 'true');
    gameDiv.removeAttribute('role');
    gameDiv.removeAttribute('tabindex');
    levelSelect.setAttribute('aria-hidden', 'false');
}

async function startGame(level) {
    currentLevel = level;
    if (level === 'easy') timeLimit = 3900;
    else if (level === 'medium') timeLimit = 3000;
    else if (level === 'hard') timeLimit = 2000;

    levelSelect.style.display = 'none';
    gameDiv.style.display = 'block';
    resultDiv.style.display = 'none';
    backBtn.style.display = 'none';

    questionElem.innerHTML = '';
    spellingDisplay.textContent = '_ _ _ _ _ _';

    dotButtons = lettersDiv.querySelectorAll('.letter-btn');

    startBackgroundBGM();
    score = 0;
    running = true;
    activateApplicationMode();
    stopBtn.disabled = false;
    questionElem.innerHTML = 'เตรียมตัว...';
    play('start');
    setTimeout(nextQuestion, 1400);
}

document.addEventListener('DOMContentLoaded', () => {
    backBtn         = document.getElementById('backToMenu');
    levelSelect     = document.getElementById('levelSelect');
    gameDiv         = document.getElementById('game');
    resultDiv       = document.getElementById('result');
    questionElem    = document.getElementById('question');
    spellingDisplay = document.getElementById('spellingDisplay');
    lettersDiv      = document.getElementById('letters');
    stopBtn         = document.getElementById('stopBtn');
    audioModeBtn    = document.getElementById('audioModeBtn');

    // เพิ่ม event สำหรับเปลี่ยนเสียง
    document.querySelectorAll('input[name="voice"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            voiceFolder = e.target.value;
            reloadSounds();  // โหลดเสียงใหม่ทันทีเมื่อเปลี่ยน
        });
    });

    document.getElementById('easy').onclick   = () => startGame('easy');
    document.getElementById('medium').onclick = () => startGame('medium');
    document.getElementById('hard').onclick   = () => startGame('hard');

    document.getElementById('restartBtn').onclick = () => {
        resultDiv.style.display = 'none';
        if (currentLevel) startGame(currentLevel);
    };

    document.getElementById('newModeBtn').onclick = () => {
        resultDiv.style.display = 'none';
        levelSelect.style.display = 'block';
        backBtn.style.display = 'block';
        questionElem.innerHTML = '';
        spellingDisplay.textContent = '_ _ _ _ _ _';
        stopBackgroundBGM();
    };

    backBtn.onclick = () => {
        stopBackgroundBGM();
        location.href = '../index.html';
    };

    stopBtn.onclick = () => {
        if (running) fail('ผู้เล่นกดหยุด');
    };

    audioModeBtn.onclick = () => {
        audioMode = audioMode === 'file' ? 'off' : 'file';
        audioModeBtn.textContent = `โหมดเสียง: ${audioMode === 'file' ? 'File' : 'ปิด'}`;
        if (audioMode === 'off') stopBackgroundBGM();
        else if (running) startBackgroundBGM();
    };
});

const keyToDot = {
    'f':'1', 'd':'2', 's':'3', 'j':'4', 'k':'5', 'l':'6',
    'ด':'1', 'ก':'2', 'ห':'3', '่':'4', 'า':'5', 'ส':'6'
};

async function nextQuestion() {
    if (!running) return;

    isProcessingTimeout = false;
    pressedDots.clear();
    timestamps = {};
    spellingDisplay.textContent = '_ _ _ _ _ _';

    currentPattern = alphabetPatterns[Math.floor(Math.random() * alphabetPatterns.length)];
    const letter = currentPattern.letter;
    const correctDots = currentPattern.dots.split(',').map(d => d.trim());
    correctDotsSet = new Set(correctDots);

    questionElem.innerHTML = letter.toUpperCase();
    play(letter);

    dotButtons.forEach(btn => btn.classList.remove('used', 'wrong'));

    clearInterval(timerInterval);

    const deadline = performance.now() + timeLimit;
    let ticked = false;

    timerInterval = setInterval(() => {
        const now = performance.now();
        if (now > deadline && !isProcessingTimeout) {
            isProcessingTimeout = true;
            clearInterval(timerInterval);
            fail("ช้าไป!");
        }
        if (!ticked && deadline - now < 700) {
            play('tick');
            ticked = true;
        }
    }, 50);
}

function markButtons(className, dotsSet) {
    dotButtons.forEach(btn => {
        if (dotsSet.has(btn.dataset.letter)) btn.classList.add(className);
    });
}

async function handleCorrect() {
    isProcessingTimeout = true;
    clearInterval(timerInterval);
    markButtons('used', correctDotsSet);
    play('correct');

    spellingDisplay.style.transform = 'scale(1.2)';
    setTimeout(() => { spellingDisplay.style.transform = 'scale(1)'; }, 220);

    score += 100;
    timeLimit = Math.max(550, Math.floor(timeLimit * 0.94));
    setTimeout(nextQuestion, 450);
}

async function handleWrong() {
    isProcessingTimeout = true;
    clearInterval(timerInterval);
    markButtons('wrong', pressedDots);
    play('wrong');
    play('wrong_bop');

    document.body.classList.add('shake');
    const flash = document.getElementById('flashOverlay');
    flash.style.animation = 'none';
    void flash.offsetWidth;
    flash.style.animation = 'flashRed 0.7s forwards';

    score -= 50;
    if (score < 0) score = 0;

    timeLimit = Math.max(550, Math.floor(timeLimit * 0.94));

    setTimeout(() => {
        document.body.classList.remove('shake');
        nextQuestion();
    }, 380);
}

function fail(reason) {
    running = false;
    clearInterval(timerInterval);
    play('gameover');

    document.body.classList.add('shake');
    const flash = document.getElementById('flashOverlay');
    flash.style.animation = 'none';
    void flash.offsetWidth;
    flash.style.animation = 'flashRed 0.8s forwards';

    setTimeout(() => {
        document.body.classList.remove('shake');
        endGame(reason);
    }, 800);
}

async function endGame(reason = '') {
    stopBackgroundBGM();
    gameDiv.style.display = 'none';
    resultDiv.style.display = 'block';
    backBtn.style.display = 'block';
    deactivateApplicationMode();

    lettersDiv.removeAttribute('aria-hidden');

    questionElem.innerHTML = '';
    spellingDisplay.textContent = '_ _ _ _ _ _';

    const title = document.getElementById('resultTitle');
    const msg   = document.getElementById('resultMsg');
    const scoreDiv = document.getElementById('score');

    const finalPoints = score;
    scoreDiv.textContent = "0 คะแนน";

    let count = 0;
    const duration = 2000;
    const stepTime = 35;
    const steps = duration / stepTime;
    const increment = finalPoints / steps;

    const counter = setInterval(() => {
        count += increment;
        if (count >= finalPoints) {
            count = finalPoints;
            clearInterval(counter);
        }
        scoreDiv.textContent = Math.round(count).toLocaleString() + " คะแนน";
    }, stepTime);

    const perfect = ["สุดยอดไปเลย! คุณคือตำนาน Braille Chord ตัวจริง 💖", "เซียนตัวจริงมาแล้ว! เกิน 2500 คะแนนเลยนะ!"];
    const good    = ["เก่งมาก! ทำคะแนนได้หลักพันแล้ว 💪", "เยี่ยมเลย ใกล้เซียนเต็มทีแล้วนะ!"];
    const normal  = ["ไม่เป็นไรนะจ๊ะ ฝึกต่อไปเราจะเก่งขึ้นแน่นอน 💕", "ครั้งหน้าต้องไกลกว่านี้แน่เลย สู้ๆ นะ!"];

    title.textContent = `จบเกม: ${reason}`;

    if      (score >= 2500) msg.innerHTML = perfect[Math.floor(Math.random() * perfect.length)];
    else if (score >= 1000) msg.innerHTML = good   [Math.floor(Math.random() * good.length)];
    else                    msg.innerHTML = normal [Math.floor(Math.random() * normal.length)];

    setTimeout(() => { try { title.focus(); } catch(e) {} }, 120);
}

window.addEventListener('beforeunload', () => stopBackgroundBGM());

document.addEventListener('keydown', (e) => {
    if (!running || isProcessingTimeout) return;
    const key = e.key.toLowerCase();
    if (key in keyToDot) {
        const dot = keyToDot[key];
        if (!pressedDots.has(dot)) {
            pressedDots.add(dot);
            timestamps[dot] = Date.now();
            spellingDisplay.textContent = Array.from(pressedDots).sort().join(' ') || '_ _ _ _ _ _';

            const btn = lettersDiv.querySelector(`[data-letter="${dot}"]`);
            if (btn) btn.classList.add('used');

            if (pressedDots.size > correctDotsSet.size) {
                handleWrong();
                return;
            }

            if (pressedDots.size === correctDotsSet.size) {
                setTimeout(() => {
                    const tsValues = Object.values(timestamps);
                    const minTs = Math.min(...tsValues);
                    const maxTs = Math.max(...tsValues);
                    if (maxTs - minTs <= 200 && setEquals(pressedDots, correctDotsSet)) {
                        handleCorrect();
                    } else {
                        handleWrong();
                    }
                }, 0);
            }
        }
    }
});
</script>
