<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thai Typing Bop (M)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800;900&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Kanit', sans-serif;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6b7280, #a78bfa);
            background-size: 300% 300%;
            animation: gradientBG 18s ease infinite;
            position: relative;
        }

        @keyframes gradientBG {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            pointer-events: none;
            animation: float 24s infinite ease-in-out;
            z-index: 0;
        }
        .orb:nth-child(1) { width: 220px; height: 220px; top: 10%; left: 6%;  animation-delay: 0s;   }
        .orb:nth-child(2) { width: 280px; height: 280px; top: 65%; left: 75%; animation-delay: -8s;  }
        .orb:nth-child(3) { width: 160px; height: 160px; top: 40%; right: 12%;animation-delay: -16s; }

        @keyframes float {
            0%,100% { transform: translate(0, 0) rotate(0deg); }
            25%     { transform: translate(70px, -50px) rotate(4deg); }
            50%     { transform: translate(-40px, 80px) rotate(-3deg); }
            75%     { transform: translate(50px, 40px) rotate(5deg); }
        }

        .container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            padding: 1.4rem 1rem;
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #backToMenu {
            position: absolute;
            top: 1.2rem;
            left: 1.2rem;
            z-index: 100;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.24);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            color: white;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 22px rgba(0,0,0,0.38);
        }
        #backToMenu:hover { background: rgba(255,255,255,0.3); transform: translateY(-3px); }

        #levelSelect, #game, #result {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 32px;
            padding: 2.4rem 2rem;
            box-shadow: 0 22px 70px rgba(0,0,0,0.45);
            margin: auto 0;
            position: relative;
            z-index: 5;
        }

        h1 {
            font-size: 2.7rem;
            margin: 0.5rem 0 1.3rem;
            text-shadow: 0 7px 20px rgba(0,0,0,0.6);
            text-align: center;
        }

        .subtitle {
            font-size: 1.25rem;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .level-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
            align-items: center;
        }

        .level-btn {
            width: 100%;
            max-width: 380px;
            padding: 1.5rem 2.2rem;
            font-size: 1.8rem;
            font-weight: 800;
            border: none;
            border-radius: 26px;
            cursor: pointer;
            color: #111;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 14px 36px rgba(0,0,0,0.45);
            position: relative;
            overflow: hidden;
        }
        .level-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-120%);
            transition: transform 0.7s;
        }
        .level-btn:hover::before { transform: translateX(120%); }
        .level-btn:hover { transform: translateY(-12px) scale(1.05); }
        .level-btn:active { transform: translateY(-5px) scale(0.96); }

        #easy   { background: linear-gradient(135deg, #51cf66, #40c057); color: white; }
        #medium { background: linear-gradient(135deg, #ffd43b, #fcc419); color: #111; }
        #hard   { background: linear-gradient(135deg, #ff6b6b, #fa5252); color: white; }

        .question-heading {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0.8rem 0 0.6rem;
            padding: 0.6rem 1.2rem;
            background: rgba(255,255,255,0.13);
            border-radius: 22px;
            backdrop-filter: blur(12px);
            text-align: center;
        }

        #gameArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #question {
            font-size: 10rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            color: #ffe066;
            text-shadow: 0 12px 36px rgba(0,0,0,0.75);
            transition: all 0.25s ease;
            transform-origin: center;
            user-select: none;
        }

        #question.near-timeout {
            color: #ff4d4d;
            animation: shake 0.5s infinite;
        }

        #question.correct-flash {
            color: #51cf66;
            transform: scale(1.35);
            text-shadow: 0 0 40px #51cf66aa;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%     { transform: translateX(-6px); }
            75%     { transform: translateX(6px); }
        }

        .judgment {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4.8rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            animation: judgmentPop 1.1s forwards;
        }

        @keyframes judgmentPop {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
            20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
            70%  { opacity: 1; transform: translate(-50%, -120%) scale(1.05); }
            100% { opacity: 0; transform: translate(-50%, -180%) scale(0.85); }
        }

        #result {
            padding: 1.8rem 1.4rem;
            max-height: 85vh;
            overflow-y: auto;
        }

        #result h2 {
            font-size: 2.6rem;
            margin: 0.4rem 0 1rem;
            text-shadow: 0 9px 28px rgba(0,0,0,0.55);
            text-align: center;
        }

        #resultMsg {
            font-size: 1.9rem;
            margin: 1.4rem 0;
            line-height: 1.45;
            text-align: center;
        }

        #score {
            font-size: 4.2rem;
            font-weight: 900;
            margin: 1.4rem 0 2rem;
            color: #ffe066;
            text-shadow: 0 12px 36px rgba(0,0,0,0.7);
            text-align: center;
        }

        .btn-restart, .btn-newmode {
            padding: 1rem 2.6rem;
            font-size: 1.35rem;
            font-weight: 700;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            color: white;
            margin: 0.7rem 0.6rem;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 14px 38px rgba(0,0,0,0.45);
        }

        .btn-restart { background: linear-gradient(135deg, #4ecdc4, #45b7a7); }
        .btn-newmode  { background: linear-gradient(135deg, #667eea, #5a67d8); }

        .btn-restart:hover, .btn-newmode:hover {
            transform: translateY(-10px) scale(1.07);
        }
        .btn-restart:active, .btn-newmode:active {
            transform: translateY(-4px) scale(0.95);
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.2rem;
        }

        @keyframes screenShake {
            0%,100% { transform: translate(0,0); }
            10%,30%,50%,70%,90% { transform: translate(-5px, 4px); }
            20%,40%,60%,80%     { transform: translate(5px, -4px); }
        }

        .shake {
            animation: screenShake 0.6s cubic-bezier(.36,.07,.19,.97) both;
        }

        .flash-red {
            position: fixed;
            inset: 0;
            background: rgba(255, 60, 60, 0.3);
            pointer-events: none;
            opacity: 0;
            z-index: 999;
            animation: flashRed 0.7s forwards;
        }

        @keyframes flashRed {
            0%   { opacity: 0; }
            25%  { opacity: 0.9; }
            100% { opacity: 0; }
        }

        .game-btn {
            background: rgba(255,255,255,0.17);
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(14px);
            padding: 0.9rem 1.8rem;
            border-radius: 999px;
            color: white;
            font-weight: 600;
            margin: 0.7rem;
            transition: all 0.3s;
        }
        .game-btn:hover:not(:disabled) { background: rgba(255,255,255,0.35); transform: translateY(-3px); }
        .game-btn:disabled { opacity: 0.4; }

        /* ==================== ปรับปรุงโค้ด RESPONSIVE ใหม่ตามที่ขอ ==================== */
        @media (max-width: 480px) {
            /* 1. ลดความอ้วนของ Container และ Padding หลัก */
            .container {
                padding: 0.8rem 0.6rem;
            }
            #levelSelect {
                padding: 1.2rem 1rem;
                border-radius: 24px;
            }
            
            /* 2. บีบตัวหนังสือหัวข้อให้เล็กลงเพื่อเซฟพื้นที่แนวตั้ง */
            #levelSelect h1 { 
                font-size: 1.6rem; 
                margin: 0.2rem 0 0.5rem; 
            }
            #levelSelect .subtitle { 
                font-size: 0.9rem; 
                line-height: 1.4;
                margin-bottom: 1rem; 
            }

            /* 3. ปรับส่วนเลือกเสียงให้แบนและกระทัดรัดขึ้น */
            .sound-select-container { 
                padding: 0.6rem 1rem; 
                margin-bottom: 1rem; 
                border-radius: 16px;
            }
            .sound-select-title { 
                font-size: 1rem; 
                margin-bottom: 0.4rem; 
            }
            .sound-options { 
                gap: 1.2rem; 
            }
            .sound-select-container label { 
                font-size: 0.95rem; 
            }

            /* 4. ปรับระยะห่างและขนาดของปุ่มโหมดเกมให้กดง่ายแต่ไม่เปลืองพื้นที่ */
            .level-buttons { 
                gap: 0.6rem; 
            }
            .level-btn {
                padding: 0.9rem 1.5rem;
                font-size: 1.3rem;
                border-radius: 18px;
                max-width: 100%;
            }

            /* ส่วนของหน้าเกมและหน้าสรุปผล (ปรับให้สมดุลกัน) */
            .question-heading { font-size: 1.8rem; padding: 0.4rem 1rem; }
            #question         { font-size: 6.5rem; }
            .judgment         { font-size: 3rem; }
            #result           { padding: 1.2rem 1rem; border-radius: 24px; }
            #result h2        { font-size: 2rem; }
            #resultMsg        { font-size: 1.4rem; margin: 0.8rem 0; }
            #score            { font-size: 3rem; margin: 0.8rem 0 1.2rem; }
            .btn-restart, .btn-newmode { padding: 0.8rem 1.5rem; font-size: 1.1rem; min-width: 46%; }
            .button-container { gap: 0.6rem; }
        }

        /* เพิ่มเติม: ดักจับเคสที่หน้าจอสั้นมาก ๆ (เช่น เครื่องรุ่นเก่า หรือเปิดในเบราว์เซอร์ที่มีแถบเครื่องมือหนา) */
        @media (max-height: 667px) and (max-width: 480px) {
            #levelSelect h1 {
                font-size: 1.4rem;
            }
            #levelSelect .subtitle {
                display: none; /* 💡 ซ่อนคำอธิบายทิ้งไปเลย เพื่อการันตีว่าปุ่มจะไม่ล้นแน่นอน */
            }
            .level-btn {
                padding: 0.8rem 1.2rem;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 360px) {
            #levelSelect h1 { font-size: 1.3rem; }
            .level-btn { font-size: 1.15rem; padding: 0.75rem 1.2rem; }
            #score { font-size: 2.6rem; }
            .btn-restart, .btn-newmode { 
                font-size: 1rem; 
                padding: 0.75rem 1.2rem; 
                min-width: 100%; 
            }
        }
        /* ========================================================================= */
    </style>
</head>
<body>

<div class="orb"></div><div class="orb"></div><div class="orb"></div>

<div class="container">

    <button id="backToMenu">กลับเมนูหลัก</button>

    <div id="levelSelect">
        <h1>ลานประลองพิมพ์เร็ว : Thai Typing Bop</h1>
        <p class="subtitle">พิมพ์ตัวอักษรภาษาไทยที่โผล่ขึ้นมาทันที! ต้องเล่นร่วมกับแป้นพิมพ์จริง<br>ยิ่งตอบเร็ว ยิ่งได้คะแนนดี เวลาจะสั้นลงเรื่อย ๆ<br>พิมพ์ผิดระบบจะหัก 50 คะแนน ลดเวลาลง และเปลี่ยนข้อทันที! แต่หากปล่อยจนหมดเวลา = เกมจบ</p>
        <div class="level-buttons">
            <button class="level-btn" id="easy">ฝึกพื้นฐาน</button>
            <button class="level-btn" id="medium">ระดับเซียน</button>
            <button class="level-btn" id="hard">ปราบเซียน</button>
        </div>
    </div>

    <div id="game" style="display:none">
        <h2 class="question-heading" id="questionHeading">เตรียมตัว...</h2>
        
        <div id="gameArea">
            <div id="question" tabindex="-1">ก</div>
        </div>

        <div style="text-align:center; margin-top:1.2rem;">
            <button id="stopBtn" class="game-btn" disabled>⏹ หยุดเกม</button>
            <button id="audioModeBtn" class="game-btn">โหมดเสียง: File</button>
        </div>
    </div>

    <div id="result" style="display:none">
        <h2 id="resultTitle" tabindex="-1">สุดยอดมาก!</h2>
        <div id="resultMsg"></div>
        <div id="score">0 คะแนน</div>
        
        <div class="button-container">
            <button class="btn-restart" id="restartBtn">เริ่มเล่นใหม่</button>
            <button class="btn-restart btn-newmode" id="newModeBtn">เลือกโหมดใหม่</button>
        </div>
    </div>

</div>

<div id="flashOverlay" class="flash-red"></div>

<script>
// Web Audio API Setup
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

const soundBuffers = {};
const bgmSource = { node: null, isPlaying: false };

let audioMode = 'file';

async function loadSound(name, url) {
    try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        soundBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (err) {
        console.warn(`โหลดเสียง ${name} ไม่สำเร็จ`, err);
    }
}

const soundsToLoad = [
    // เสียงตัวอักษรไทย → เปลี่ยน path เป็น thai/
    ['ก', 'thai/ก.mp3'], ['ข', 'thai/ข.mp3'], ['ค', 'thai/ค.mp3'], ['ฆ', 'thai/ฆ.mp3'],
    ['ง', 'thai/ง.mp3'], ['จ', 'thai/จ.mp3'], ['ฉ', 'thai/ฉ.mp3'], ['ช', 'thai/ช.mp3'],
    ['ซ', 'thai/ซ.mp3'], ['ฌ', 'thai/ฌ.mp3'], ['ญ', 'thai/ญ.mp3'], ['ฎ', 'thai/ฎ.mp3'],
    ['ฏ', 'thai/ฏ.mp3'], ['ฐ', 'thai/ฐ.mp3'], ['ฑ', 'thai/ฑ.mp3'], ['ฒ', 'thai/ฒ.mp3'],
    ['ณ', 'thai/ณ.mp3'], ['ด', 'thai/ด.mp3'], ['ต', 'thai/ต.mp3'], ['ถ', 'thai/ถ.mp3'],
    ['ท', 'thai/ท.mp3'], ['ธ', 'thai/ธ.mp3'], ['น', 'thai/น.mp3'], ['บ', 'thai/บ.mp3'],
    ['ป', 'thai/ป.mp3'], ['ผ', 'thai/ผ.mp3'], ['ฝ', 'thai/ฝ.mp3'], ['พ', 'thai/พ.mp3'],
    ['ฟ', 'thai/ฟ.mp3'], ['ภ', 'thai/ภ.mp3'], ['ม', 'thai/ม.mp3'], ['ย', 'thai/ย.mp3'],
    ['ร', 'thai/ร.mp3'], ['ล', 'thai/ล.mp3'], ['ว', 'thai/ว.mp3'], ['ศ', 'thai/ศ.mp3'],
    ['ษ', 'thai/ษ.mp3'], ['ส', 'thai/ส.mp3'], ['ห', 'thai/ห.mp3'], ['ฬ', 'thai/ฬ.mp3'],
    ['อ', 'thai/อ.mp3'], ['ฮ', 'thai/ฮ.mp3'],

    // เสียงประกอบอื่น ๆ คงเดิม
    ['correct', 'sounds/correct.mp3'], ['wrong', 'sounds/wrong.mp3'],
    ['tick',    'sounds/tick.mp3'],    ['start',  'sounds/start.mp3'],
    ['gameover','sounds/gameover.mp3'], ['bgm',    'audio/b2.mp3'],
    ['time',    'sounds/time.mp3'],
    ['wrong_bop', 'sounds/f.mp3']
];

Promise.all(soundsToLoad.map(([name, url]) => loadSound(name, url)))
    .then(() => console.log("โหลดเสียงทั้งหมดเรียบร้อยแล้ว"))
    .catch(err => console.warn("บางไฟล์เสียงโหลดไม่สำเร็จ", err));

function play(name, volume = 1.0) {
    if (audioMode === 'off' || !soundBuffers[name]) return;
    const source = audioCtx.createBufferSource();
    source.buffer = soundBuffers[name];
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = volume;
    source.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    source.start(0);
}

function startBackgroundBGM() {
    if (bgmSource.isPlaying || !soundBuffers['time'] || audioMode === 'off') return;
    const source = audioCtx.createBufferSource();
    source.buffer = soundBuffers['time'];
    source.loop = true;
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.40;
    source.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    source.start(0);
    bgmSource.node = source;
    bgmSource.isPlaying = true;
}

function stopBackgroundBGM() {
    if (bgmSource.node && bgmSource.isPlaying) {
        bgmSource.node.stop();
        bgmSource.node = null;
        bgmSource.isPlaying = false;
    }
}

let hasUserInteracted = false;
function unlockAudio() {
    if (hasUserInteracted || audioCtx.state === 'running') return;
    hasUserInteracted = true;
    audioCtx.resume().then(() => console.log("AudioContext is running"));
}

document.addEventListener("touchstart", unlockAudio, {once: true, passive: true});
document.addEventListener("click", unlockAudio, {once: true});

// ตัวแปรเกม
const thaiAlphabet = "กขคฆงจฉชซฌญฎฏฐฑฒณดตถทธนบปผฝพฟภมยรลวศษสหฬอฮ".split("");

let currentLetter = null;
let score = 0, timerInterval, timeLimit = 5000;
let isProcessingTimeout = false;
let backBtn, levelSelect, gameDiv, resultDiv, questionHeading, questionElem, stopBtn, audioModeBtn;
let running = false;
let currentLevel = null;

function activateApplicationMode() {
    levelSelect.setAttribute('aria-hidden', 'true');
    gameDiv.setAttribute('aria-hidden', 'false');
    gameDiv.setAttribute('role', 'application');
    gameDiv.setAttribute('tabindex', '0');
    try { gameDiv.focus(); } catch (e) {}
}

function deactivateApplicationMode() {
    gameDiv.setAttribute('aria-hidden', 'true');
    gameDiv.removeAttribute('role');
    gameDiv.removeAttribute('tabindex');
    levelSelect.setAttribute('aria-hidden', 'false');
}

async function startGame(level) {
    currentLevel = level;
    if (level === 'easy')   timeLimit = 3900;
    else if (level === 'medium') timeLimit = 3000;
    else if (level === 'hard')   timeLimit = 2000;

    levelSelect.style.display = 'none';
    gameDiv.style.display = 'block';
    resultDiv.style.display = 'none';
    backBtn.style.display = 'none';

    questionHeading.innerHTML = '';
    questionElem.textContent = 'ก';
    questionElem.className = '';

    startBackgroundBGM();
    score = 0;
    running = true;
    activateApplicationMode();
    stopBtn.disabled = false;
    questionHeading.innerHTML = 'เตรียมตัว...';
    play('start');
    setTimeout(nextQuestion, 1400);
}

document.addEventListener('DOMContentLoaded', () => {
    backBtn         = document.getElementById('backToMenu');
    levelSelect     = document.getElementById('levelSelect');
    gameDiv         = document.getElementById('game');
    resultDiv       = document.getElementById('result');
    questionHeading = document.getElementById('questionHeading');
    questionElem    = document.getElementById('question');
    stopBtn         = document.getElementById('stopBtn');
    audioModeBtn    = document.getElementById('audioModeBtn');

    document.getElementById('easy').onclick   = () => startGame('easy');
    document.getElementById('medium').onclick = () => startGame('medium');
    document.getElementById('hard').onclick   = () => startGame('hard');

    document.getElementById('restartBtn').onclick = () => {
        resultDiv.style.display = 'none';
        if (currentLevel) startGame(currentLevel);
    };

    document.getElementById('newModeBtn').onclick = () => {
        resultDiv.style.display = 'none';
        levelSelect.style.display = 'block';
        backBtn.style.display = 'block';
        questionHeading.innerHTML = '';
        questionElem.textContent = 'ก';
        questionElem.className = '';
        stopBackgroundBGM();
    };

    backBtn.onclick = () => {
        stopBackgroundBGM();
        location.href = '../index.html';
    };

    stopBtn.onclick = () => {
        if (running) fail('ผู้เล่นกดหยุด');
    };

    audioModeBtn.onclick = () => {
        audioMode = audioMode === 'file' ? 'off' : 'file';
        audioModeBtn.textContent = `โหมดเสียง: ${audioMode === 'file' ? 'File' : 'ปิด'}`;
        if (audioMode === 'off') stopBackgroundBGM();
        else if (running) startBackgroundBGM();
    };
});

const judgmentWords = ["เพอร์เฟกต์!", "สุดยอด!", "ว้าว!", "แจ่ม!", "เก่งมาก!", "เร็วเว่อร์!", "ซุปเปอร์!", "บูม!", "สุดปัง!"];

async function nextQuestion() {
    if (!running) return;

    isProcessingTimeout = false;
    questionElem.className = '';
    questionElem.style.transform = 'scale(1)';

    currentLetter = thaiAlphabet[Math.floor(Math.random() * thaiAlphabet.length)];
    questionElem.textContent = currentLetter;
    play(currentLetter);

    clearInterval(timerInterval);

    const deadline = performance.now() + timeLimit;
    let ticked = false;
    let nearTimeoutShown = false;

    timerInterval = setInterval(() => {
        const now = performance.now();
        const remaining = deadline - now;

        if (remaining <= 0 && !isProcessingTimeout) {
            isProcessingTimeout = true;
            clearInterval(timerInterval);
            fail("ช้าไป!");
            return;
        }

        if (remaining < 700 && !nearTimeoutShown) {
            questionElem.classList.add('near-timeout');
            play('tick');
            nearTimeoutShown = true;
        }

        const progress = Math.max(0, Math.min(1, 1 - remaining / timeLimit));
        const scale = 1 + progress * 1.8;
        questionElem.style.transform = `scale(${scale})`;
    }, 30);
}

function showJudgment() {
    const word = judgmentWords[Math.floor(Math.random() * judgmentWords.length)];
    const elem = document.createElement('div');
    elem.className = 'judgment';
    elem.textContent = word;
    document.getElementById('gameArea').appendChild(elem);

    setTimeout(() => elem.remove(), 1200);
}

async function handleCorrect() {
    isProcessingTimeout = true;
    clearInterval(timerInterval);

    questionElem.classList.add('correct-flash');
    play('correct');
    showJudgment();

    setTimeout(() => {
        questionElem.classList.remove('correct-flash');
        score += 100;
        timeLimit = Math.max(550, Math.floor(timeLimit * 0.94));
        nextQuestion();
    }, 380);
}

async function handleWrong() {
    isProcessingTimeout = true;
    clearInterval(timerInterval);
    play('wrong');
    play('wrong_bop');

    document.body.classList.add('shake');
    const flash = document.getElementById('flashOverlay');
    flash.style.animation = 'none';
    void flash.offsetWidth;
    flash.style.animation = 'flashRed 0.7s forwards';

    score -= 50;
    if (score < 0) score = 0;
    timeLimit = Math.max(550, Math.floor(timeLimit * 0.94));

    setTimeout(() => {
        document.body.classList.remove('shake');
        nextQuestion();
    }, 380);
}

function fail(reason) {
    running = false;
    clearInterval(timerInterval);
    play('gameover');

    document.body.classList.add('shake');
    const flash = document.getElementById('flashOverlay');
    flash.style.animation = 'none';
    void flash.offsetWidth;
    flash.style.animation = 'flashRed 0.8s forwards';

    setTimeout(() => {
        document.body.classList.remove('shake');
        endGame(reason);
    }, 800);
}

async function endGame(reason = '') {
    stopBackgroundBGM();
    gameDiv.style.display = 'none';
    resultDiv.style.display = 'block';
    backBtn.style.display = 'block';
    deactivateApplicationMode();

    questionHeading.innerHTML = '';
    questionElem.textContent = 'ก';
    questionElem.className = '';

    const title = document.getElementById('resultTitle');
    const msg   = document.getElementById('resultMsg');
    const scoreDiv = document.getElementById('score');

    const finalPoints = score;
    scoreDiv.textContent = "0 คะแนน";

    let count = 0;
    const duration = 2000;
    const stepTime = 35;
    const steps = duration / stepTime;
    const increment = finalPoints / steps;

    const counter = setInterval(() => {
        count += increment;
        if (count >= finalPoints) {
            count = finalPoints;
            clearInterval(counter);
        }
        scoreDiv.textContent = Math.round(count).toLocaleString() + " คะแนน";
    }, stepTime);

    const perfect = ["สุดยอดไปเลย! คุณคือตำนาน Speed Typing ไทยตัวจริง 💖", "เซียนตัวจริงมาแล้ว! เกิน 2500 คะแนนเลยนะ!"];
    const good    = ["เก่งมาก! ทำคะแนนได้หลักพันแล้ว 💪", "เยี่ยมเลย ใกล้เซียนเต็มทีแล้วนะ!"];
    const normal  = ["ไม่เป็นไรนะ ฝึกต่อไปเราจะเก่งขึ้นแน่นอน 💕", "ครั้งหน้าต้องไกลกว่านี้แน่ สู้ๆ นะ!"];

    title.textContent = `จบเกม: ${reason}`;

    if      (score >= 2500) msg.innerHTML = perfect[Math.floor(Math.random() * perfect.length)];
    else if (score >= 1000) msg.innerHTML = good   [Math.floor(Math.random() * good.length)];
    else                    msg.innerHTML = normal [Math.floor(Math.random() * normal.length)];

    setTimeout(() => { try { title.focus(); } catch(e) {} }, 120);
}

window.addEventListener('beforeunload', () => stopBackgroundBGM());

document.addEventListener('keydown', (e) => {
    if (!running || isProcessingTimeout) return;
    if (e.ctrlKey || e.altKey || e.metaKey) return;

    const key = e.key;
    // รับเฉพาะตัวอักษรไทยเท่านั้น (ไม่รับ a-z อีกต่อไป)
    if (key.length === 1 && thaiAlphabet.includes(key)) {
        if (key === currentLetter) {
            handleCorrect();
        } else {
            handleWrong();
        }
    }
});
</script>
